<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>儲存檢查</title>
<style>
body{background:#0d1117;color:#e6edf3;font-family:monospace;padding:1rem;font-size:13px}
h2{color:#f0883e;margin-bottom:1rem;font-size:15px}
.item{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:.75rem;margin-bottom:.75rem;word-break:break-all}
.key{color:#79c0ff;font-weight:bold;margin-bottom:.4rem}
.val{color:#a5d6ff;white-space:pre-wrap}
.empty{color:#6e7681}
</style>
</head>
<body>
<h2>🔍 LocalStorage 內容</h2>
<div id="out"></div>
<script>
const out = document.getElementById('out');
if(localStorage.length === 0){
  out.innerHTML = '<div class="empty">（空的，沒有任何資料）</div>';
} else {
  const keys = Object.keys(localStorage).sort();
  keys.forEach(k => {
    let val = localStorage.getItem(k);
    try { val = JSON.stringify(JSON.parse(val), null, 2); } catch(e){}
    out.innerHTML += `<div class="item"><div class="key">${k}</div><div class="val">${val}</div></div>`;
  });
}
</script>
</body>
</html>
