<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#fce4f3">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>雲心閣養生會館 · WiFi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fce4f3;
  --card:#fff0f9;
  --border:#f0b8dc;
  --accent:#f589c0;
  --accent-dark:#c9579a;
  --text:#4a1a38;
  --muted:#a06080;
  --faint:#f0c8e4;
  --err:#c0392b;
}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);min-height:100svh;display:flex;flex-direction:column}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.25rem 0}
.brand{display:flex;flex-direction:column;gap:2px}
.brand-name{font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--accent-dark)}
.brand-sub{font-size:10px;color:var(--muted);letter-spacing:.06em}
.admin-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:color .2s,border-color .2s}
.admin-btn:hover{color:var(--accent-dark);border-color:var(--accent)}
.admin-btn svg{width:16px;height:16px}

/* MAIN */
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem}
.wifi-icon{margin-bottom:1.75rem}
.ssid-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.ssid-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:.3rem;text-align:center}
.ssid-hint{font-size:12px;color:var(--muted);margin-bottom:2rem;text-align:center;line-height:1.5}

.copy-btn{display:flex;align-items:center;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:.75rem 1.25rem;cursor:pointer;color:var(--text);font-size:14px;transition:border-color .2s,box-shadow .2s;width:100%;max-width:320px;justify-content:space-between;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(245,137,192,.1)}
.copy-btn:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(245,137,192,.25)}
.copy-btn:active{background:var(--faint)}
.copy-btn .label{color:var(--muted);font-size:12px;margin-bottom:2px}
.copy-btn .val{font-size:15px;font-weight:600;letter-spacing:.05em}
.copy-btn .icon{color:var(--accent-dark);flex-shrink:0;text-align:center}
.copy-btn .icon svg{width:18px;height:18px}
.copy-btn .icon span{font-size:11px;display:block;margin-top:2px;color:var(--muted)}

.copied-toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--accent-dark);color:#fff;font-size:13px;padding:.5rem 1.25rem;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap;z-index:99}
.copied-toast.show{opacity:1}

.divider{display:flex;align-items:center;gap:.75rem;width:100%;max-width:320px;margin-bottom:1.5rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:11px;color:var(--muted);letter-spacing:.06em}

.qr-wrap{background:white;border-radius:16px;padding:14px;display:inline-block;margin-bottom:.5rem;box-shadow:0 2px 12px rgba(245,137,192,.2)}
.qr-wrap img{display:block;width:160px;height:160px}
.qr-hint{font-size:12px;color:var(--muted);margin-bottom:1rem;text-align:center}

/* LANG */
.lang-bar{display:flex;gap:.3rem;flex-wrap:nowrap;justify-content:center;padding:.25rem .75rem 1.5rem;overflow-x:auto;scrollbar-width:none}
.lang-bar::-webkit-scrollbar{display:none}
.lang-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:.3rem .45rem;font-size:11px;color:var(--muted);cursor:pointer;transition:border-color .2s,color .2s,background .2s;white-space:nowrap;flex-shrink:0}
.lang-btn.active,.lang-btn:hover{border-color:var(--accent);color:var(--accent-dark);background:rgba(245,137,192,.08)}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(74,26,56,.45);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.sheet{background:var(--card);border-radius:20px 20px 0 0;border-top:2px solid var(--accent);width:100%;max-width:480px;padding:1.5rem 1.25rem 2.5rem;max-height:90svh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--faint);border-radius:2px;margin:0 auto 1.25rem}
.sheet-title{font-size:16px;font-weight:700;margin-bottom:1.5rem;color:var(--text)}

/* AUTH */
.auth-box{display:flex;flex-direction:column;gap:.75rem}
.field-group{display:flex;flex-direction:column;gap:.4rem}
.field-group label{font-size:12px;color:var(--muted);letter-spacing:.04em}
input[type=text],input[type=password]{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:.65rem .9rem;color:var(--text);font-size:15px;width:100%;outline:none;transition:border-color .2s}
input::placeholder{color:transparent}
input:focus{border-color:var(--accent)}

/* CAPTCHA */
.captcha-row{display:flex;gap:.6rem;align-items:center}
.captcha-row input{flex:1}
.captcha-box{flex-shrink:0;background:var(--faint);border:1.5px solid var(--border);border-radius:10px;padding:.55rem .9rem;font-size:18px;font-weight:700;letter-spacing:.18em;color:var(--accent-dark);cursor:pointer;user-select:none;min-width:90px;text-align:center;transition:background .2s}
.captcha-box:hover{background:#f8d0ec}
.captcha-hint{font-size:10px;color:var(--muted);text-align:right;margin-top:2px}

.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:.75rem;font-size:14px;font-weight:700;cursor:pointer;width:100%;transition:opacity .2s,box-shadow .2s;box-shadow:0 4px 12px rgba(245,137,192,.4)}
.btn-primary:hover{opacity:.9;box-shadow:0 6px 18px rgba(245,137,192,.5)}
.btn-secondary{background:none;border:1.5px solid var(--border);border-radius:10px;padding:.7rem;font-size:14px;color:var(--muted);cursor:pointer;width:100%;margin-top:.5rem}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent-dark)}
.auth-err{font-size:12px;color:var(--err);display:none;padding:.4rem .6rem;background:rgba(192,57,43,.06);border-radius:8px}
.auth-err.show{display:block}

/* ADMIN */
.admin-section{margin-bottom:1.5rem}
.admin-section-title{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.admin-fields{display:flex;flex-direction:column;gap:.75rem;margin-bottom:.75rem}
.code-result{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:.65rem .9rem;font-size:18px;font-weight:700;letter-spacing:.12em;color:var(--accent-dark);text-align:center;display:none}
.code-result.show{display:block}
.logout-btn{background:none;border:1px solid var(--border);border-radius:10px;padding:.6rem;font-size:13px;color:var(--muted);cursor:pointer;width:100%;margin-top:.5rem}
.logout-btn:hover{border-color:var(--err);color:var(--err)}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="brand-name" id="brandName">雲心閣養生會館</span>
    <span class="brand-sub">WiFi</span>
  </div>
  <button class="admin-btn" onclick="openAdmin()" title="管理">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 3H9l-1 5a7 7 0 1 0 8 0Z"/>
      <line x1="12" y1="3" x2="12" y2="8"/>
    </svg>
  </button>
</header>

<main>
  <div class="wifi-icon">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12.55a11 11 0 0 1 14 0" stroke="#f589c0" opacity=".4"/>
      <path d="M1.42 9A16 16 0 0 1 22.58 9" stroke="#f589c0" opacity=".2"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0" stroke="#f589c0" opacity=".7"/>
      <circle cx="12" cy="20" r="1.2" fill="#f589c0"/>
    </svg>
  </div>

  <p class="ssid-label" id="lbl-ssid">WiFi 名稱</p>
  <p class="ssid-name" id="ssidDisplay">Massage218</p>
  <p class="ssid-hint" id="lbl-hint">請點選以上 WiFi 名稱連線</p>

  <button class="copy-btn" onclick="copyPwd()">
    <div>
      <div class="label" id="lbl-pwd">密碼</div>
      <div class="val">••••••••</div>
    </div>
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      <span id="lbl-copy">點此複製</span>
    </div>
  </button>

  <div class="divider"><span id="lbl-or">或</span></div>

  <div class="qr-wrap">
    <img id="qrImg" alt="QR Code">
  </div>
  <p class="qr-hint" id="lbl-qr">掃描 QR Code 自動連線</p>
</main>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('zh')">中文</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('ja')">JP</button>
  <button class="lang-btn" onclick="setLang('ko')">KR</button>
  <button class="lang-btn" onclick="setLang('th')">TH</button>
  <button class="lang-btn" onclick="setLang('vi')">VI</button>
  <button class="lang-btn" onclick="setLang('id')">ID</button>
</div>

<div class="copied-toast" id="toast">✓ 已複製密碼</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeIfBg(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>

    <!-- 登入 -->
    <div id="panelAuth">
      <div class="sheet-title">管理登入</div>
      <div class="auth-box">

        <!-- Step 1：輸入 id + 檢查 -->
        <div id="stepId">
          <div class="field-group" style="margin-bottom:.75rem">
            <label>員工編號</label>
            <input type="text" id="inputCode" autocomplete="off" inputmode="numeric">
          </div>
          <p class="auth-err" id="errId"></p>
          <button class="btn-primary" onclick="checkId()">檢查</button>
          <button class="btn-secondary" onclick="closeOverlay()">取消</button>
        </div>

        <!-- Step 2：需要啟動碼 -->
        <div id="stepAct" style="display:none">
          <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">
            員工編號 <strong id="showId" style="color:var(--text)"></strong>，請輸入啟動碼完成驗證
          </p>
          <div class="field-group" style="margin-bottom:.75rem">
            <label>啟動碼</label>
            <input type="text" id="inputActivation" autocomplete="off" maxlength="11" placeholder="xxx-xxx-xxx">
          </div>
          <div class="field-group" style="margin-bottom:.75rem">
            <label>驗證碼</label>
            <div class="captcha-row">
              <input type="text" id="inputCaptcha" autocomplete="off" maxlength="4" inputmode="numeric">
              <div class="captcha-box" id="captchaDisplay" onclick="refreshCaptcha()"></div>
            </div>
            <div class="captcha-hint">點擊數字可刷新</div>
          </div>
          <p class="auth-err" id="errAct"></p>
          <button class="btn-primary" onclick="doActivate()">驗證</button>
          <button class="btn-secondary" onclick="backToId()">返回</button>
        </div>

      </div>
    </div>

    <!-- 管理 -->
    <div id="panelAdmin" style="display:none">
      <div class="sheet-title">⚙️ 管理設定</div>

      <!-- WiFi 資訊 -->
      <div class="admin-section">
        <div class="admin-section-title">WiFi 資訊</div>
        <div class="admin-fields">
          <div class="field-group">
            <label>公司名稱</label>
            <input type="text" id="set-company" readonly>
          </div>
          <div class="field-group">
            <label>WiFi 名稱</label>
            <input type="text" id="set-ssid" readonly>
          </div>
          <div class="field-group">
            <label>WiFi 密碼</label>
            <input type="text" id="set-pwd" readonly>
          </div>
        </div>
        <div id="editRow" style="display:none">
          <button class="btn-secondary" id="editBtn" onclick="enterEdit()">編輯</button>
          <button class="btn-primary" id="saveBtn" onclick="saveSettings()" style="display:none;margin-top:.5rem">儲存</button>
          <button class="btn-secondary" id="cancelBtn" onclick="cancelEdit()" style="display:none;margin-top:.5rem">取消</button>
          <p id="editHint" style="display:none;font-size:12px;color:var(--err);margin-top:.6rem;line-height:1.5">⚠️ 需先完成連線認證，才能同步至主機</p>
        </div>
        <p id="noEditHint" style="display:none;font-size:12px;color:var(--muted);margin-top:.5rem">一般員工無編輯權限</p>
      </div>

      <!-- 換算啟動碼（管理員專屬） -->
      <div class="admin-section" id="sectionGenCode" style="display:none">
        <div class="admin-section-title">換算啟動碼</div>
        <div class="admin-fields">
          <div class="field-group">
            <label>員工編號</label>
            <input type="text" id="gen-code" inputmode="numeric">
          </div>
        </div>
        <button class="btn-primary" onclick="genActivation()">產生</button>
        <div id="codeResult" style="display:none;margin-top:.75rem;flex-direction:row;align-items:center;gap:.6rem;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:.65rem .9rem">
          <span id="codeText" style="font-size:18px;font-weight:700;letter-spacing:.12em;color:var(--accent-dark);flex:1"></span>
          <button onclick="copyCode()" id="copyCodeBtn" style="background:var(--accent);border:none;border-radius:8px;padding:.35rem .75rem;color:#fff;font-size:12px;font-weight:600;cursor:pointer">複製</button>
        </div>
      </div>

      <!-- 權限資訊 -->
      <div style="border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:1rem">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
          <span style="font-size:12px;color:var(--muted)">資料存取權限：<strong id="connStatus" style="color:var(--text)">本機存取</strong></span>
          <button onclick="clickConn()" style="background:var(--accent);border:none;border-radius:8px;padding:.3rem .75rem;color:#fff;font-size:11px;font-weight:600;cursor:pointer">連線認證</button>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:12px;color:var(--muted)">身份：<strong id="roleLabel" style="color:var(--text)">一般員工</strong></span>
          <button onclick="clickApplySup()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:.3rem .75rem;color:var(--muted);font-size:11px;cursor:pointer">申請主管</button>
        </div>
        <p id="pendingHint" style="display:none;font-size:12px;color:var(--err);margin-top:.75rem;line-height:1.6">
          🚧 本網頁功能建構中<br>如需認證請至<strong>薪資系統</strong>的設定頁最下方進行
        </p>
      </div>

      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>
  </div>
</div>

<script>
const SALT     = 'YXG9';
const KEY      = 'WF2026';
const ADMIN_ID = '122';

// 啟動碼
function fnv(str){
  let h=2166136261;
  for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=(h*16777619)>>>0}
  return h;
}
function makeCode(id){
  const a=fnv(id+SALT+KEY)%1000, b=fnv(KEY+id+SALT)%1000;
  const p=n=>String(n).padStart(3,'0');
  return `${p(a)}-${p(b)}`;
}
function verifyCode(id,input){ return input.replace('-','')=== makeCode(id).replace('-',''); }

// 設定
function loadSettings(){
  const d=JSON.parse(localStorage.getItem('wifiSettings')||'{}');
  return { company:d.company||'雲心閣養生會館', ssid:d.ssid||'Massage218', pwd:d.pwd||'23380193' };
}
function saveToLS(s){ localStorage.setItem('wifiSettings',JSON.stringify(s)); }

// Session
function isLoggedIn(){ return sessionStorage.getItem('wfLoggedIn')==='1'; }
function currentUser(){ return sessionStorage.getItem('wfUser')||''; }
function isAdmin(){ return currentUser()===ADMIN_ID; }
function setSession(id){ sessionStorage.setItem('wfLoggedIn','1'); sessionStorage.setItem('wfUser',id); }
function clearSession(){ sessionStorage.removeItem('wfLoggedIn'); sessionStorage.removeItem('wfUser'); }

// 驗證碼
let captchaVal = '';
function refreshCaptcha(){
  captchaVal = String(Math.floor(1000+Math.random()*9000));
  document.getElementById('captchaDisplay').textContent = captchaVal;
  document.getElementById('inputCaptcha').value = '';
}

// 渲染
function render(){
  const s=loadSettings();
  document.getElementById('brandName').textContent=s.company;
  document.getElementById('ssidDisplay').textContent=s.ssid;
  const q=`WIFI:T:WPA;S:${s.ssid};P:${s.pwd};;`;
  document.getElementById('qrImg').src=`https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(q)}&size=300x300&color=000000&bgcolor=ffffff`;
}

// 啟動時從 GitHub 讀取 wifi.cfg
async function fetchRemoteSettings(){
  const gh=getGithubConfig();
  if(!gh.owner||!gh.repo) return;
  try{
    const res=await fetch(`https://raw.githubusercontent.com/${gh.owner}/${gh.repo}/main/wifi.cfg?t=${Date.now()}`);
    if(!res.ok) return;
    const text=await res.text();
    const s={};
    text.split('\n').forEach(line=>{
      const [k,...v]=line.split('=');
      if(k&&v.length) s[k.trim()]=v.join('=').trim();
    });
    if(s.ssid||s.pwd||s.company){
      saveToLS({company:s.company||'雲心閣養生會館',ssid:s.ssid||'Massage218',pwd:s.pwd||'23380193'});
      render();
    }
  } catch(e){}
}
render();
fetchRemoteSettings();

// 複製
function copyPwd(){
  navigator.clipboard.writeText(loadSettings().pwd).then(()=>{
    const t=document.getElementById('toast');
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2000);
  });
}

// Overlay
function openAdmin(){
  document.getElementById('overlay').classList.add('open');
  isLoggedIn() ? showPanel('admin') : showPanel('auth');
}
function closeOverlay(){ document.getElementById('overlay').classList.remove('open'); }
function closeIfBg(e){ if(e.target===document.getElementById('overlay')) closeOverlay(); }

function showPanel(p){
  document.getElementById('panelAuth').style.display  = p==='auth'  ? '' : 'none';
  document.getElementById('panelAdmin').style.display = p==='admin' ? '' : 'none';
  if(p==='admin'){
    const s=loadSettings();
    const id=currentUser();
    const admin=id===ADMIN_ID;
    const gh=getGithubConfig();
    const hasConn=!!(gh&&gh.token);

    // 填入欄位（唯讀）
    setReadonly(true);
    document.getElementById('set-company').value=s.company;
    document.getElementById('set-ssid').value=s.ssid;
    document.getElementById('set-pwd').value=s.pwd;

    // 未來職務判斷預留：目前 admin=管理員 其他=一般員工
    // const role = await checkRole(id); → 'admin'|'supervisor'|'staff'
    const canEdit = admin; // 未來改為 role==='admin'||role==='supervisor'

    document.getElementById('editRow').style.display   = canEdit ? '' : 'none';
    document.getElementById('noEditHint').style.display= canEdit ? 'none' : '';
    document.getElementById('editBtn').style.display   = '';
    document.getElementById('saveBtn').style.display   = 'none';
    document.getElementById('cancelBtn').style.display = 'none';
    document.getElementById('editHint').style.display  = 'none';
    document.getElementById('sectionGenCode').style.display = admin ? '' : 'none';
    document.getElementById('codeResult').style.display='none';

    // 權限資訊
    document.getElementById('connStatus').textContent = hasConn ? '雲端同步 ☁️' : '本機存取';
    document.getElementById('roleLabel').textContent  = admin ? '管理員' : '一般員工'; // 未來帶入 role
    document.getElementById('pendingHint').style.display='none';
  }
  if(p==='auth'){
    document.getElementById('errId').classList.remove('show');
    document.getElementById('inputCode').value='';
    document.getElementById('stepId').style.display='';
    document.getElementById('stepAct').style.display='none';
    refreshCaptcha();
  }
}

// 唯讀切換
function setReadonly(on){
  const ids=['set-company','set-ssid','set-pwd'];
  const ro_style='background:var(--faint);color:var(--muted);cursor:default';
  const rw_style='';
  ids.forEach(id=>{
    const el=document.getElementById(id);
    el.readOnly=on;
    el.style.cssText=on?ro_style:rw_style;
  });
}

// 編輯模式
function enterEdit(){
  setReadonly(false);
  document.getElementById('editBtn').style.display='none';
  document.getElementById('saveBtn').style.display='';
  document.getElementById('cancelBtn').style.display='';
  const gh=getGithubConfig();
  document.getElementById('editHint').style.display=gh.token?'none':'';
}
function cancelEdit(){
  setReadonly(true);

// ── 啟動碼演算（與薪資系統相同）──
const ACT_SALT='MassagePay2026!SimpleAct';
function genSimpleAct(id){
  const S=ACT_SALT; let h=fnv(S+id+S);
  for(let i=0;i<50;i++) h=fnv(String(h)+S+id);
  const n=h%1000000000, s=String(n).padStart(9,'0');
  return s.substring(0,3)+'-'+s.substring(3,6)+'-'+s.substring(6,9);
}
function verifyAct(id,input){ return input.replace(/-/g,'')=== genSimpleAct(id).replace(/-/g,''); }

// ── 本機啟動狀態 ──
function isActivated(id){ return !!localStorage.getItem(`activated-${id}`); }
function setActivated(id){ localStorage.setItem(`activated-${id}`,JSON.stringify({ts:Date.now()})); }

// ── staff 確認（有 github-config 才查）──
async function checkStaffExists(id){
  const gh=getGithubConfig();
  if(!gh.token||!gh.owner||!gh.repo) return true;
  try{
    const res=await fetch(`https://raw.githubusercontent.com/${gh.owner}/${gh.repo}/main/staff.json?t=${Date.now()}`);
    if(!res.ok) return true;
    const list=await res.json();
    return list.some(s=>s.code===id&&s.status==='active');
  }catch{ return true; }
}

// ── Step 1：檢查 id ──
async function checkId(){
  const id=document.getElementById('inputCode').value.trim();
  const err=document.getElementById('errId');
  const btn=document.querySelector('#stepId .btn-primary');
  if(!id) return;
  err.classList.remove('show');
  btn.textContent='檢查中…'; btn.disabled=true;
  if(isActivated(id)){
    const ok=await checkStaffExists(id);
    btn.textContent='檢查'; btn.disabled=false;
    if(ok){ setSession(id); showPanel('admin'); }
    else{ err.textContent='此帳號已被停用，請聯絡管理員'; err.classList.add('show'); }
    return;
  }
  btn.textContent='檢查'; btn.disabled=false;
  document.getElementById('showId').textContent=id;
  document.getElementById('stepId').style.display='none';
  document.getElementById('stepAct').style.display='';
  document.getElementById('errAct').classList.remove('show');
  document.getElementById('inputActivation').value='';
  refreshCaptcha();
}

// ── Step 2：驗證啟動碼 ──
async function doActivate(){
  const id=document.getElementById('inputCode').value.trim();
  const act=document.getElementById('inputActivation').value.trim();
  const cap=document.getElementById('inputCaptcha').value.trim();
  const err=document.getElementById('errAct');
  err.classList.remove('show');
  if(cap!==captchaVal){
    err.textContent='驗證碼錯誤，請重新輸入';
    err.classList.add('show'); refreshCaptcha(); return;
  }
  if(verifyAct(id,act)){
    setActivated(id); setSession(id); showPanel('admin');
  } else {
    err.textContent='啟動碼錯誤，請重新確認';
    err.classList.add('show'); refreshCaptcha();
  }
}

function backToId(){
  document.getElementById('stepAct').style.display='none';

document.addEventListener('keydown',e=>{

});

// 儲存
async function saveSettings(){
  const s={
    company:document.getElementById('set-company').value.trim()||'雲心閣養生會館',
    ssid:   document.getElementById('set-ssid').value.trim()   ||'Massage218',
    pwd:    document.getElementById('set-pwd').value.trim()    ||'23380193',
  };
  saveToLS(s);
  render();

  // 嘗試寫入 GitHub
  const gh = getGithubConfig();
  const btn = document.getElementById('saveBtn');
  if(gh.token && gh.owner && gh.repo){
    btn.textContent='寫入中…';
    btn.disabled=true;
    try{
      const content = `company=${s.company}\nssid=${s.ssid}\npwd=${s.pwd}\n`;
      const b64 = btoa(unescape(encodeURIComponent(content)));
      // 先取得現有檔案的 sha
      const getRes = await fetch(`https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/wifi.cfg`,{
        headers:{'Authorization':`token ${gh.token}`,'Accept':'application/vnd.github.v3+json'}
      });
      const sha = getRes.ok ? (await getRes.json()).sha : undefined;
      const putRes = await fetch(`https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/wifi.cfg`,{
        method:'PUT',
        headers:{'Authorization':`token ${gh.token}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
        body:JSON.stringify({message:'update wifi settings',content:b64, ...(sha?{sha}:{})})
      });
      if(putRes.ok){
        btn.textContent='✓ 已儲存並同步';
        setTimeout(()=>{ btn.textContent='儲存'; btn.disabled=false; closeOverlay(); },1500);
      } else {
        throw new Error('API 錯誤');
      }
    } catch(e){
      btn.textContent='⚠️ 同步失敗（已存本機）';
      setTimeout(()=>{ btn.textContent='儲存'; btn.disabled=false; closeOverlay(); },2000);
    }
  } else {
    // 沒有 GitHub 設定，只存本機
    closeOverlay();
  }
}
