<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>員工列表 v1.0-009</title>
<script>
  var PAGE="employees",PCODE="04";
  window.__fbLang='zh';
  window.__fbApply=function(){var t=document.getElementById('__fbtitle');if(t)t.textContent='網站更新中';if(window.__fbData){var info=document.getElementById("__fbinfo");if(info)info.textContent=window.__fbData.page+" 網頁 v"+window.__fbData.ver+" 更新中　代碼 "+window.__fbData.code;try{var md=document.getElementById("__fbmsg");if(md&&window.__fbData.msg){md.textContent=window.__fbData.msg;md.style.display="block";}}catch(_e){}}};
  window.__showFallback=function(src,detail){
    if(window.__shownFallback)return;window.__shownFallback=true;
    try{
      var ver=(document.title.match(/v?(\d+\.\d+[-.]\d+)/)||[])[1]||"?";
      var line=(detail&&detail.lineno)?detail.lineno:0;
      var ecode=PCODE+String(src).padStart(2,"0")+String(line%10000).padStart(4,"0");
      window.__fbData={page:PAGE,ver:ver,code:ecode,msg:(detail&&detail.msg)||''};
      var el=document.getElementById("__fallback");
      if(el){window.__fbApply();el.style.display="flex";}
    }catch(_e){}
  };
  window.addEventListener("error",function(e){window.__showFallback(1,{lineno:e.lineno,msg:(e.message||'')+(e.filename?(' @'+e.filename.split('/').pop()+':'+e.lineno+':'+e.colno):'')});},true);
</script>

body{background:#f9fafb;color:#111827;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#root{min-height:100vh}

<body>
<div id="root"></div>

<div id="__fallback" style="display:none;position:fixed;inset:0;z-index:99999;background:#f9fafb;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;font-family:-apple-system,sans-serif">
  <div style="width:64px;height:64px;border-radius:50%;border:3px solid #d97706;display:flex;align-items:center;justify-content:center;margin-bottom:24px">🔧</div>
  <h1 id="__fbtitle" style="font-size:22px;font-weight:500;color:#111827;margin:0 0 1rem">網站更新中</h1>
  <p id="__fbinfo" style="font-size:12px;color:#6b7280;margin:0 0 2rem;font-family:monospace"></p>
  <div id="__fbmsg" style="display:none;margin:-1rem 0 2rem;padding:10px 12px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;font-family:monospace;font-size:11px;color:#b91c1c;max-width:90%;word-break:break-all;white-space:pre-wrap"></div>
</div>

<script src="../common.js"></script>
<script type="text/babel">
(function(){
const{useState,useEffect,useMemo}=React;
const{gasCall,SUP_LEVELS}=window.MP||{};

// 這個頁面需要一個「Endpoint URL指到這個頁面網址」的LIFF App,要另外在LINE Developers Console申請一個,
// 申請好之後把下面這個空字串換成真正的LIFF ID
const LIFF_ID_HARDCODED='2010673151-AU7Cpo5v';

async function gasEmployeeAuth(lineUserId){const r=await gasCall('employeeAuth',{lineUserId},10000);return r||{ok:false,error:'GAS無回應'};}
async function gasEmployeeList(lineUserId,storeFilter){const r=await gasCall('employeeList',{lineUserId,storeFilter},15000);return r||{ok:false,error:'GAS無回應'};}
async function gasEmployeeDetail(lineUserId,code){const r=await gasCall('employeeDetail',{lineUserId,code},10000);return r||{ok:false,error:'GAS無回應'};}
async function gasEmployeeSave(lineUserId,code,patch){const r=await window.MP.gasCallPost('employeeSave',{lineUserId,code,patch:JSON.stringify(patch||{})},15000);return r||{ok:false,error:'GAS無回應'};}
async function gasEmployeeAuditLog(lineUserId,code){const r=await gasCall('employeeAuditLog',{lineUserId,code},10000);return r||{ok:false,error:'GAS無回應'};}
async function loadStoresLocal(){try{const res=await fetch('../stores.cfg',{cache:'no-store'});if(!res.ok)return['龍山寺店'];const text=(await res.text()).trim();const stores=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));return stores.length?stores:['龍山寺店'];}catch(_e){return['龍山寺店']}}

function Spinner({size=16}){return(<span style={{display:'inline-block',width:size,height:size,border:'2px solid #d97706',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>);}

const SHIFT_SHORT_LABEL={A1:'早1',A2:'早2',B:'中',C1:'小夜1',C2:'小夜2',D:'大夜',day:'早班',night:'晚班'};
const ROLE_LABEL={teacher:'老師',supervisor:'主管',admin:'管理者'};

const BASIC_FIELDS=['nameZh','nameVi','gender','lang','phone','email','addrCity','addrDist','addrDetail','school','major','schoolType','permitNo','permitDate','permitExpiry','permitOrg'];
const STORE_FIELDS=['store','shift','workStart','workEnd','workNote','unitPrice','skills','preg','oil','techMentor','lockerNo'];
const FIELD_LABEL={nameZh:'中文姓名',nameVi:'越南文姓名',gender:'性別',lang:'語系',phone:'電話',email:'Email',addrCity:'縣市',addrDist:'鄉鎮區',addrDetail:'詳細地址',school:'學校',major:'科系',schoolType:'學制',permitNo:'工作證號',permitDate:'核發日',permitExpiry:'到期日',permitOrg:'核發單位',
  storeSel:'所在店面',store:'所在店面',shift:'班別',workStart:'上工時間',workEnd:'下工時間',workNote:'工作備註',unitPrice:'每支單價',skills:'老師技能',preg:'懷孕客人',oil:'油壓',techMentor:'指導老師',lockerNo:'置物櫃編號'};
const SKILL_KEYS_LOCAL=['guasha','baguang','xiujiao'];
const SKILL_LABEL={guasha:'刮痧',baguang:'拔罐',xiujiao:'修腳皮'};
const TIME_OPTIONS=Array.from({length:48},(_,i)=>{const h=Math.floor(i/2);const m=i%2===0?'00':'30';return String(h).padStart(2,'0')+':'+m;});
async function gasEmployeeCreate(lineUserId,data){const r=await window.MP.gasCallPost('employeeCreate',{lineUserId,...data},15000);return r||{ok:false,error:'GAS無回應'};}
async function gasLaborPointsGetMonth(lineUserId,store,yearMonth){const r=await gasCall('laborPointsGetMonth',{lineUserId,store,yearMonth},10000);return r||{ok:false,error:'GAS無回應'};}
async function gasLaborPointsSave(lineUserId,store,yearMonth,code,points){const r=await window.MP.gasCallPost('laborPointsSave',{lineUserId,store,yearMonth,code,points},10000);return r||{ok:false,error:'GAS無回應'};}
async function gasLaborPointsSaveBatch(lineUserId,store,yearMonth,entries){const r=await window.MP.gasCallPost('laborPointsSaveBatch',{lineUserId,store,yearMonth,entries:JSON.stringify(entries)},20000);return r||{ok:false,error:'GAS無回應'};}
async function gasLaborPointsRanking(lineUserId,store,yearMonth,improveTopN){const r=await gasCall('laborPointsRanking',{lineUserId,store,yearMonth,improveTopN},10000);return r||{ok:false,error:'GAS無回應'};}

function EmployeeDetailModal({code,myAuth,onClose}){
  const[staff,setStaff]=useState(null);
  const[form,setForm]=useState(null);
  const[saveStatus,setSaveStatus]=useState('');
  const[auditLog,setAuditLog]=useState(null);
  const[stores,setStores]=useState([]);
  useEffect(()=>{loadStoresLocal().then(setStores)},[]);
  const load=()=>{
    gasEmployeeDetail(myAuth.lineUserId,code).then(r=>{if(r&&r.ok){setStaff(r.staff);setForm({...r.staff,skills:r.staff.skills||{}})}});
    gasEmployeeAuditLog(myAuth.lineUserId,code).then(r=>{if(r&&r.ok)setAuditLog(r.list)});
  };
  useEffect(()=>{load()},[code]);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const doSave=async()=>{
    setSaveStatus('saving');
    const patch={};
    [...BASIC_FIELDS,...STORE_FIELDS].forEach(k=>{
      if(k==='skills'){
        if(JSON.stringify(form.skills||{})!==JSON.stringify(staff.skills||{}))patch.skills=form.skills||{};
        return;
      }
      const nv=String(form[k]!=null?form[k]:'');
      const ov=String(staff[k]!=null?staff[k]:'');
      if(nv!==ov)patch[k]=nv;
    });
    if(!Object.keys(patch).length){setSaveStatus('沒有變更');setTimeout(()=>setSaveStatus(''),1500);return}
    try{
      const r=await gasEmployeeSave(myAuth.lineUserId,code,patch);
      if(r&&r.ok){setSaveStatus('✓ 已存檔');load()}else{setSaveStatus((r&&r.error)||'存檔失敗')}
    }catch(e){setSaveStatus(String(e))}
    setTimeout(()=>setSaveStatus(''),2500);
  };
  const renderField=(k,i)=>{
    let inputEl;
    if(k==='gender'){
      inputEl=(<div className="grid grid-cols-2 gap-1.5">{[['M','男'],['F','女']].map(([v,l])=>(<button key={v} onClick={()=>upd('gender',v)} className={`py-1.5 rounded-lg text-xs font-semibold ${form.gender===v?'bg-amber-600 text-white':'bg-white text-gray-500 border border-gray-200'}`}>{l}</button>))}</div>);
    }else if(k==='lang'){
      inputEl=(<div className="grid grid-cols-2 gap-1.5">{[['zh','中文'],['vi','越南文']].map(([v,l])=>(<button key={v} onClick={()=>upd('lang',v)} className={`py-1.5 rounded-lg text-xs font-semibold ${form.lang===v?'bg-amber-600 text-white':'bg-white text-gray-500 border border-gray-200'}`}>{l}</button>))}</div>);
    }else if(k==='store'){
      inputEl=(<select value={form.store||''} onChange={e=>upd('store',e.target.value)} className="w-full bg-white border border-gray-300 rounded-lg px-2 py-1.5 text-xs text-gray-900"><option value="">--</option>{stores.map(s=>(<option key={s} value={s}>{s}</option>))}</select>);
    }else if(k==='shift'){
      inputEl=(<div className="grid grid-cols-2 gap-1.5">{[['day','早班'],['night','晚班']].map(([v,l])=>(<button key={v} onClick={()=>upd('shift',v)} className={`py-1.5 rounded-lg text-xs font-semibold ${form.shift===v?'bg-amber-600 text-white':'bg-white text-gray-500 border border-gray-200'}`}>{l}</button>))}</div>);
    }else if(k==='preg'||k==='oil'){
      inputEl=(<div className="grid grid-cols-2 gap-1.5">{[['yes','接'],['no','不接']].map(([v,l])=>(<button key={v} onClick={()=>upd(k,v)} className={`py-1.5 rounded-lg text-xs font-semibold ${form[k]===v?'bg-amber-600 text-white':'bg-white text-gray-500 border border-gray-200'}`}>{l}</button>))}</div>);
    }else if(k==='skills'){
      const sk=form.skills||{};
      inputEl=(<div className="grid grid-cols-3 gap-1.5">{SKILL_KEYS_LOCAL.map(s=>(<button key={s} onClick={()=>upd('skills',{...sk,[s]:!sk[s]})} className={`py-1.5 rounded-lg text-xs font-semibold ${sk[s]?'bg-amber-600 text-white':'bg-white text-gray-500 border border-gray-200'}`}>{SKILL_LABEL[s]}</button>))}</div>);
    }else if(k==='unitPrice'){
      inputEl=(<input value={form.unitPrice||''} onChange={e=>upd('unitPrice',e.target.value.replace(/\D/g,''))} inputMode="numeric" className="w-full bg-white border border-gray-300 rounded-lg px-2 py-1.5 text-xs text-gray-900"/>);
    }else if(k==='workStart'){
      inputEl=(<select value={form.workStart||''} onChange={e=>{
        const v=e.target.value;
        if(v){
          const[hh,mm]=v.split(':').map(Number);
          const totalMin=(hh*60+mm+12*60)%1440;
          const eh=Math.floor(totalMin/60),em=totalMin%60;
          const endStr=String(eh).padStart(2,'0')+':'+String(em).padStart(2,'0');
          setForm(f=>({...f,workStart:v,workEnd:endStr}));
        }else{upd('workStart',v)}
      }} className="w-full bg-white border border-gray-300 rounded-lg px-2 py-1.5 text-xs text-gray-900"><option value="">--</option>{TIME_OPTIONS.map(tm=>(<option key={tm} value={tm}>{tm}</option>))}</select>);
    }else if(k==='workEnd'){
      inputEl=(<select value={form.workEnd||''} onChange={e=>upd('workEnd',e.target.value)} className="w-full bg-white border border-gray-300 rounded-lg px-2 py-1.5 text-xs text-gray-900"><option value="">--</option>{TIME_OPTIONS.map(tm=>(<option key={tm} value={tm}>{tm}</option>))}</select>);
    }else if(k==='permitDate'||k==='permitExpiry'){
      inputEl=(<div className="flex gap-1"><input type="date" value={form[k]||''} onChange={e=>upd(k,e.target.value)} className="flex-1 bg-white border border-gray-300 rounded-lg px-2 py-1.5 text-xs text-gray-900"/>{form[k]&&<button onClick={()=>upd(k,'')} className="w-7 h-7 flex-shrink-0 rounded-lg bg-gray-100 text-gray-500 text-xs">✕</button>}</div>);
    }else{
      inputEl=(<input value={form[k]||''} onChange={e=>upd(k,e.target.value)} className="w-full bg-white border border-gray-300 rounded-lg px-2 py-1.5 text-xs text-gray-900"/>);
    }
    return(<div key={k} className={`px-2.5 py-2 ${i%2===0?'bg-white/60':'bg-transparent'}`}><label className="text-[10px] text-gray-500 block mb-0.5">{FIELD_LABEL[k]}</label>{inputEl}</div>);
  };
  if(!staff||!form)return(<div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center"><Spinner size={28}/></div>);
  return(<div className="fixed inset-0 z-50 bg-black/40 flex items-end sm:items-center justify-center" onClick={onClose}>
    <div className="bg-gray-50 w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl max-h-[90vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
      <div className="p-4 border-b border-gray-200 flex items-center justify-between sticky top-0 bg-gray-50 z-10"><h3 className="text-base font-bold text-gray-900">{staff.nameZh||code}（{code}）</h3><button onClick={onClose} className="text-gray-400">✕</button></div>
      <div className="p-3 space-y-3">
        <div className="bg-blue-50 rounded-xl overflow-hidden border border-blue-100">
          <p className="text-xs font-semibold text-blue-700 px-2.5 pt-2">基本資料</p>
          {BASIC_FIELDS.map((k,i)=>renderField(k,i))}
        </div>
        <div className="bg-amber-50 rounded-xl overflow-hidden border border-amber-100">
          <p className="text-xs font-semibold text-amber-700 px-2.5 pt-2">在店資料</p>
          {STORE_FIELDS.map((k,i)=>renderField(k,i))}
        </div>
        {saveStatus&&<p className="text-xs text-center text-emerald-600 font-semibold">{saveStatus}</p>}
        <button onClick={doSave} disabled={saveStatus==='saving'} className="w-full py-3 rounded-xl bg-emerald-600 text-white font-bold disabled:opacity-50 flex items-center justify-center gap-2">{saveStatus==='saving'&&<Spinner size={14}/>}存檔（不需審核，直接生效）</button>
        <div className="pt-2 border-t border-gray-200">
          <p className="text-xs font-semibold text-gray-600 mb-1.5">主管操作紀錄</p>
          {auditLog===null?<Spinner size={14}/>:auditLog.length===0?<p className="text-xs text-gray-400">目前沒有操作紀錄</p>:(
            <div className="space-y-1.5">{auditLog.map((a,i)=>(<div key={i} className="bg-white rounded-lg px-2.5 py-2 border border-gray-100"><p className="text-[11px] text-gray-700">{a.changes}</p><p className="text-[10px] text-gray-400 mt-0.5">{a.operatorName}（{a.operatorCode}）・{a.time}</p></div>))}</div>
          )}
        </div>
      </div>
    </div>
  </div>);
}

function CreateStaffModal({myAuth,stores,onClose,onCreated}){
  const canPickStore=myAuth.level>=4;
  const[code,setCode]=useState('');
  const[store,setStore]=useState(canPickStore?'':myAuth.store);
  const[shift,setShift]=useState('day');
  const[lang,setLang]=useState('zh');
  const[gender,setGender]=useState('');
  const[workStart,setWorkStart]=useState('');
  const[workEnd,setWorkEnd]=useState('');
  const[status,setStatus]=useState('');
  const canSubmit=code.trim()&&store&&shift&&lang;
  const doCreate=async()=>{
    if(!canSubmit)return;
    setStatus('saving');
    try{
      const r=await gasEmployeeCreate(myAuth.lineUserId,{code:code.trim(),store,shift,lang,gender,workStart,workEnd});
      if(r&&r.ok){onCreated()}else{setStatus((r&&r.error)||'新增失敗')}
    }catch(e){setStatus(String(e))}
  };
  return(<div className="fixed inset-0 z-50 bg-black/40 flex items-end sm:items-center justify-center" onClick={onClose}>
    <div className="bg-white w-full sm:max-w-sm sm:rounded-2xl rounded-t-2xl p-4 space-y-3" onClick={e=>e.stopPropagation()}>
      <div className="flex items-center justify-between"><h3 className="text-base font-bold text-gray-900">新增老師</h3><button onClick={onClose} className="text-gray-400">✕</button></div>
      <div><label className="text-[11px] text-gray-500 block mb-1">編號</label><input value={code} onChange={e=>setCode(e.target.value)} className="w-full bg-gray-100 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900"/></div>
      <div><label className="text-[11px] text-gray-500 block mb-1">店家</label>{canPickStore?(<select value={store} onChange={e=>setStore(e.target.value)} className="w-full bg-gray-100 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900"><option value="">--</option>{stores.map(s=>(<option key={s} value={s}>{s}</option>))}</select>):(<p className="text-sm text-gray-700 px-3 py-2 bg-gray-100 rounded-lg">{myAuth.store}</p>)}</div>
      <div><label className="text-[11px] text-gray-500 block mb-1">班別</label><div className="grid grid-cols-2 gap-2">{[['day','早班'],['night','晚班']].map(([v,l])=>(<button key={v} onClick={()=>setShift(v)} className={`py-2 rounded-lg text-sm font-semibold ${shift===v?'bg-amber-600 text-white':'bg-gray-100 text-gray-500'}`}>{l}</button>))}</div></div>
      <div><label className="text-[11px] text-gray-500 block mb-1">語系</label><div className="grid grid-cols-2 gap-2">{[['zh','中文'],['vi','越南文']].map(([v,l])=>(<button key={v} onClick={()=>setLang(v)} className={`py-2 rounded-lg text-sm font-semibold ${lang===v?'bg-amber-600 text-white':'bg-gray-100 text-gray-500'}`}>{l}</button>))}</div></div>
      <div><label className="text-[11px] text-gray-500 block mb-1">性別</label><div className="grid grid-cols-2 gap-2">{[['M','男'],['F','女']].map(([v,l])=>(<button key={v} onClick={()=>setGender(v)} className={`py-2 rounded-lg text-sm font-semibold ${gender===v?'bg-amber-600 text-white':'bg-gray-100 text-gray-500'}`}>{l}</button>))}</div></div>
      <div className="grid grid-cols-2 gap-2">
        <div><label className="text-[11px] text-gray-500 block mb-1">上工時間</label><select value={workStart} onChange={e=>setWorkStart(e.target.value)} className="w-full bg-gray-100 border border-gray-300 rounded-lg px-2 py-2 text-sm text-gray-900"><option value="">--</option>{TIME_OPTIONS.map(tm=>(<option key={tm} value={tm}>{tm}</option>))}</select></div>
        <div><label className="text-[11px] text-gray-500 block mb-1">下工時間</label><select value={workEnd} onChange={e=>setWorkEnd(e.target.value)} className="w-full bg-gray-100 border border-gray-300 rounded-lg px-2 py-2 text-sm text-gray-900"><option value="">--</option>{TIME_OPTIONS.map(tm=>(<option key={tm} value={tm}>{tm}</option>))}</select></div>
      </div>
      {status&&status!=='saving'&&<p className="text-xs text-center text-red-500">{status}</p>}
      <button onClick={doCreate} disabled={!canSubmit||status==='saving'} className="w-full py-3 rounded-xl bg-emerald-600 text-white font-bold disabled:opacity-50 flex items-center justify-center gap-2">{status==='saving'&&<Spinner size={14}/>}新增</button>
    </div>
  </div>);
}

function TimeGroupedView({list,timeField,onSelect}){
  const groups=useMemo(()=>{
    const g=Array.from({length:24},()=>[]);
    list.forEach(e=>{
      const v=e[timeField];
      if(!v)return;
      const h=parseInt(String(v).split(':')[0],10);
      if(!isNaN(h)&&h>=0&&h<24)g[h].push(e);
    });
    return g;
  },[list,timeField]);
  const refs=useMemo(()=>Array.from({length:24},()=>React.createRef()),[]);
  useEffect(()=>{
    const nowH=new Date().getHours();
    setTimeout(()=>{try{refs[nowH].current&&refs[nowH].current.scrollIntoView({block:'start'})}catch(_e){}},50);
  },[timeField]);
  return(<div className="space-y-1.5">
    {groups.map((entries,h)=>(
      <div key={h} ref={refs[h]}>
        <p className="text-xs font-bold text-gray-700 bg-gray-100 rounded-lg px-2.5 py-1.5">{String(h).padStart(2,'0')}:00（{entries.length}）</p>
        {entries.length>0&&<div className="flex flex-wrap gap-1.5 px-1 py-1.5">{entries.map(e=>(<button key={e.code} onClick={()=>onSelect(e.code)} className="text-[11px] px-2 py-1 rounded-full bg-white border border-gray-200 text-gray-700 active:bg-gray-100">{e.code} {e.nameZh}</button>))}</div>}
      </div>
    ))}
  </div>);
}

function LaborPointsModal({myAuth,stores,onClose}){
  const canPickStore=myAuth.level>=4;
  const now=new Date();
  const[store,setStore]=useState(canPickStore?(stores[0]||''):myAuth.store);
  const[yearMonth,setYearMonth]=useState(now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'));
  const[view,setView]=useState('entry'); // entry/ranking
  const[list,setList]=useState(null);
  const[localPoints,setLocalPoints]=useState({}); // 本機暫存,還沒回存GAS
  const[dirty,setDirty]=useState(false); // 有沒有還沒存檔的變更
  const[saveStatus,setSaveStatus]=useState(''); // ''/saving/done/錯誤訊息
  const[loadStatus,setLoadStatus]=useState('');
  const[page,setPage]=useState(0);
  const[pageSize,setPageSize]=useState(9);
  const[improveTopN,setImproveTopN]=useState(5);
  const[ranking,setRanking]=useState(null);
  const[rankingBusy,setRankingBusy]=useState(false);
  const[copied,setCopied]=useState(false);
  const loadEntry=async()=>{
    if(!store||!yearMonth)return;
    setLoadStatus('loading');setList(null);setPage(0);
    try{
      const[lr,pr]=await Promise.all([gasEmployeeList(myAuth.lineUserId,store),gasLaborPointsGetMonth(myAuth.lineUserId,store,yearMonth)]);
      if(lr&&lr.ok)setList(lr.list.filter(e=>e.role!=='admin').sort((a,b)=>(parseInt(String(a.code).replace(/\D/g,''),10)||0)-(parseInt(String(b.code).replace(/\D/g,''),10)||0)));
      if(pr&&pr.ok)setLocalPoints(pr.points||{});
      setDirty(false);
    }catch(_e){}
    setLoadStatus('');
  };
  useEffect(()=>{if(view==='entry')loadEntry()},[view,store,yearMonth]);
  const updLocal=(code,val)=>{setLocalPoints(p=>({...p,[code]:val}));setDirty(true)};
  const doSave=async()=>{
    setSaveStatus('saving');
    const entries=Object.keys(localPoints).filter(c=>localPoints[c]!==''&&localPoints[c]!=null).map(c=>({code:c,points:parseInt(localPoints[c],10)||0}));
    try{
      const r=await gasLaborPointsSaveBatch(myAuth.lineUserId,store,yearMonth,entries);
      if(r&&r.ok){setSaveStatus('done');setDirty(false)}else{setSaveStatus((r&&r.error)||'存檔失敗')}
    }catch(e){setSaveStatus(String(e))}
    setTimeout(()=>setSaveStatus(''),2500);
  };
  const changePage=(delta)=>{setPage(p=>Math.max(0,p+delta))}; // 换页時資料留在localPoints(本機狀態),不會遺失
  const loadRanking=async()=>{
    setRankingBusy(true);setRanking(null);
    try{const r=await gasLaborPointsRanking(myAuth.lineUserId,store,yearMonth,improveTopN);if(r&&r.ok)setRanking(r)}catch(_e){}
    setRankingBusy(false);
  };
  useEffect(()=>{if(view==='ranking')loadRanking()},[view,store,yearMonth,improveTopN]);
  const genText=()=>{
    if(!ranking)return '';
    const[yy,mm]=yearMonth.split('-');
    const medals=['🥇','🥈','🥉'];
    let s='🔵 【'+yy+'年'+parseInt(mm,10)+'月｜'+store+' 勞點公告】\n🏆 Top 3 表現最佳同仁\n';
    ranking.top3.forEach((e,i)=>{s+=(medals[i]||'')+' '+e.code+' : '+e.points+'點\n';});
    s+='最佳進步同仁\n';
    ranking.improved.forEach(e=>{s+=e.code+' ：'+e.delta+'點\n';});
    s+='各位老師都非常的棒，一直都在努力與進步，各位老師一起努力讓這個大家庭越來越棒(好棒)(好棒)\n📣 辛苦大家了～感謝每一位夥伴的努力與付出，讓我們繼續加油 💪✨';
    return s;
  };
  const doCopy=async()=>{
    const text=genText();
    try{await navigator.clipboard.writeText(text);setCopied(true);setTimeout(()=>setCopied(false),2000)}catch(_e){
      try{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),2000)}catch(_e2){}
    }
  };
  const totalPages=list?Math.max(1,Math.ceil(list.length/pageSize)):1;
  const paged=list?list.slice(page*pageSize,(page+1)*pageSize):[];
  return(<div className="fixed inset-0 z-50 bg-black/40 flex items-end sm:items-center justify-center" onClick={onClose}>
    <div className="bg-white w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl max-h-[90vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
      <div className="p-4 border-b border-gray-200 flex items-center justify-between sticky top-0 bg-white z-10"><h3 className="text-base font-bold text-gray-900">勞點管理</h3><button onClick={onClose} className="text-gray-400">✕</button></div>
      <div className="p-4 space-y-3">
        <div className="grid grid-cols-2 gap-2">
          {canPickStore?(<select value={store} onChange={e=>setStore(e.target.value)} className="bg-gray-100 border border-gray-300 rounded-lg px-2 py-2 text-sm text-gray-900">{stores.map(s=>(<option key={s} value={s}>{s}</option>))}</select>):(<p className="text-sm text-gray-700 px-2 py-2 bg-gray-100 rounded-lg">{myAuth.store}</p>)}
          <input type="month" value={yearMonth} onChange={e=>setYearMonth(e.target.value)} className="bg-gray-100 border border-gray-300 rounded-lg px-2 py-2 text-sm text-gray-900"/>
        </div>
        <div className="grid grid-cols-2 gap-2">
          <button onClick={()=>setView('entry')} className={`py-2 rounded-lg text-xs font-semibold ${view==='entry'?'bg-amber-600 text-white':'bg-gray-100 text-gray-500'}`}>輸入本月勞點</button>
          <button onClick={()=>setView('ranking')} className={`py-2 rounded-lg text-xs font-semibold ${view==='ranking'?'bg-amber-600 text-white':'bg-gray-100 text-gray-500'}`}>分析（排行/進步）</button>
        </div>
        {view==='entry'&&(
          list===null?<p className="text-center py-8"><Spinner size={20}/></p>:list.length===0?<p className="text-sm text-gray-500 text-center py-6">此店面沒有員工資料</p>:(<>
          {dirty&&<p className="text-[11px] text-amber-600 text-center">有尚未存檔的變更，記得按下方「存檔」</p>}
          <div className="space-y-1.5">{paged.map((e,i)=>(
            <div key={e.code} className={`flex items-center gap-2 rounded-lg px-3 py-2 ${i%2===0?'bg-white':'bg-gray-50'} border border-gray-100`}>
              <span className="text-sm font-semibold text-gray-800 w-14 flex-shrink-0">{e.code}</span>
              <span className="text-xs text-gray-500 flex-1 truncate">{e.nameZh}</span>
              <input type="number" value={localPoints[e.code]!=null?localPoints[e.code]:''} onChange={ev=>updLocal(e.code,ev.target.value)} placeholder="點數" className="w-20 bg-gray-100 border border-gray-300 rounded-lg px-2 py-1.5 text-sm text-gray-900 text-center"/>
            </div>
          ))}</div>
          <div className="flex items-center justify-center gap-2 pt-1">
            <button onClick={()=>changePage(-1)} disabled={page===0} className="px-3 py-1.5 rounded-lg bg-gray-100 text-gray-600 text-xs disabled:opacity-40">← 上一頁</button>
            <span className="text-xs text-gray-500">{page+1}/{totalPages}</span>
            <div className="flex items-center gap-1"><span className="text-[10px] text-gray-500">每頁</span><input type="number" value={pageSize} onChange={e=>{setPageSize(Math.max(1,parseInt(e.target.value,10)||1));setPage(0)}} className="w-12 bg-gray-100 border border-gray-300 rounded-lg px-1 py-1 text-xs text-gray-900 text-center"/><span className="text-[10px] text-gray-500">筆</span></div>
            <button onClick={()=>changePage(1)} disabled={page>=totalPages-1} className="px-3 py-1.5 rounded-lg bg-gray-100 text-gray-600 text-xs disabled:opacity-40">下一頁 →</button>
          </div>
          <div className="grid grid-cols-2 gap-2 pt-2 border-t border-gray-200">
            <button onClick={loadEntry} disabled={loadStatus==='loading'} className="py-2.5 rounded-xl bg-gray-100 text-gray-600 text-sm font-semibold disabled:opacity-50 flex items-center justify-center gap-2">{loadStatus==='loading'&&<Spinner size={12}/>}讀取</button>
            <button onClick={doSave} disabled={saveStatus==='saving'} className="py-2.5 rounded-xl bg-emerald-600 text-white text-sm font-bold disabled:opacity-50 flex items-center justify-center gap-2">{saveStatus==='saving'&&<Spinner size={12}/>}{saveStatus==='done'?'✓ 已存檔':'存檔'}</button>
          </div>
          {saveStatus&&saveStatus!=='saving'&&saveStatus!=='done'&&<p className="text-xs text-center text-red-500">{saveStatus}</p>}
          </>)
        )}
        {view==='ranking'&&(<div className="space-y-3">
          <div className="flex items-center gap-2"><label className="text-xs text-gray-500">進步名單顯示</label><input type="number" value={improveTopN} onChange={e=>setImproveTopN(parseInt(e.target.value,10)||1)} className="w-16 bg-gray-100 border border-gray-300 rounded-lg px-2 py-1.5 text-xs text-gray-900 text-center"/><span className="text-xs text-gray-500">位</span><button onClick={loadRanking} disabled={rankingBusy} className="ml-auto text-[11px] px-2.5 py-1.5 rounded-lg bg-gray-100 text-gray-500 disabled:opacity-50">重新整理</button></div>
          {rankingBusy?<p className="text-center py-8"><Spinner size={20}/></p>:ranking&&(<>
            <div className="bg-gray-50 rounded-xl p-3"><pre className="text-xs text-gray-800 whitespace-pre-wrap font-sans">{genText()}</pre></div>
            <button onClick={doCopy} className="w-full py-2.5 rounded-xl bg-amber-600 text-white text-sm font-bold">{copied?'✓ 已複製':'複製公告文字'}</button>
          </>)}
        </div>)}
      </div>
    </div>
  </div>);
}

function EmployeeListPage({myAuth}){
  const[list,setList]=useState(null);
  const[sortMode,setSortMode]=useState('code'); // code/role/shift/gender/lang/time
  const[codeDir,setCodeDir]=useState('asc'); // asc/desc
  const[codeRange,setCodeRange]=useState('all'); // all/0/100/200/300
  const[shiftFilter,setShiftFilter]=useState('all'); // all/day/night/blank
  const[langFilter,setLangFilter]=useState('all'); // all/zh/vi/blank
  const[genderFilter,setGenderFilter]=useState('all'); // all/M/F/blank
  const[timeField,setTimeField]=useState('workStart'); // workStart/workEnd
  const[stores,setStores]=useState([]);
  const[storeFilter,setStoreFilter]=useState('');
  const[viewCode,setViewCode]=useState('');
  const[showCreate,setShowCreate]=useState(false);
  const[showLabor,setShowLabor]=useState(false);
  const[appShareBusy,setAppShareBusy]=useState(false);
  const doShareApp=async()=>{
    if(appShareBusy)return;
    setAppShareBusy(true);
    try{
      if(liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker')){
        const baseUrl='https://liff.line.me/'+LIFF_ID_HARDCODED;
        await liff.shareTargetPicker([{type:'flex',altText:'員工管理',contents:{
          type:'bubble',
          body:{type:'box',layout:'vertical',backgroundColor:'#FFFFFF',paddingAll:'lg',contents:[
            {type:'text',text:'👥 員工管理',weight:'bold',size:'lg',color:'#111111'},
            {type:'text',text:'提供主管級人員使用之員工資料管理系統，並支援每月勞點紀錄的分析與排行功能。',size:'sm',color:'#666666',wrap:true,margin:'md'}
          ]},
          footer:{type:'box',layout:'vertical',paddingAll:'lg',contents:[
            {type:'button',style:'primary',color:'#d97706',height:'sm',action:{type:'uri',label:'員工管理',uri:baseUrl}}
          ]}
        }}]);
      }
    }catch(_e){}
    setAppShareBusy(false);
  };
  const canPickStore=myAuth.level>=4;
  const load=()=>{gasEmployeeList(myAuth.lineUserId,storeFilter).then(r=>{if(r&&r.ok)setList(r.list)})};
  useEffect(()=>{load()},[storeFilter]);
  useEffect(()=>{if(canPickStore)loadStoresLocal().then(setStores)},[]);
  const filtered=useMemo(()=>{
    if(!list)return [];
    let arr=list.slice();
    if(sortMode==='shift'&&shiftFilter!=='all')arr=arr.filter(e=>shiftFilter==='blank'?!e.shift:e.shift===shiftFilter);
    if(sortMode==='lang'&&langFilter!=='all')arr=arr.filter(e=>langFilter==='blank'?!e.lang:e.lang===langFilter);
    if(sortMode==='gender'&&genderFilter!=='all')arr=arr.filter(e=>genderFilter==='blank'?!e.gender:e.gender===genderFilter);
    if(sortMode==='code'&&codeRange!=='all'){
      const lo=parseInt(codeRange,10);
      const hi=lo+99;
      arr=arr.filter(e=>{const n=parseInt(String(e.code).replace(/\D/g,''),10);return !isNaN(n)&&n>=lo&&(codeRange==='300'?true:n<=hi)});
    }
    const numCode=s=>{const n=parseInt(String(s.code).replace(/\D/g,''),10);return isNaN(n)?0:n};
    const sortFns={
      code:(a,b)=>{const na=parseInt(String(a.code).replace(/\D/g,''),10);const nb=parseInt(String(b.code).replace(/\D/g,''),10);let r;if(!isNaN(na)&&!isNaN(nb)&&na!==nb)r=na-nb;else r=String(a.code).localeCompare(String(b.code));return codeDir==='desc'?-r:r},
      role:(a,b)=>(b.level||0)-(a.level||0)||numCode(a)-numCode(b),
      shift:(a,b)=>String(a.shift||'').localeCompare(String(b.shift||''))||numCode(a)-numCode(b),
      gender:(a,b)=>String(a.gender||'').localeCompare(String(b.gender||''))||numCode(a)-numCode(b),
      lang:(a,b)=>String(a.lang||'').localeCompare(String(b.lang||''))||numCode(a)-numCode(b),
    };
    if(sortMode!=='time')arr.sort(sortFns[sortMode]||sortFns.code);
    return arr;
  },[list,sortMode,codeDir,codeRange,shiftFilter,langFilter,genderFilter]);
  return(<div className="min-h-screen p-4">
    <div className="max-w-md mx-auto space-y-3">
      <div className="flex items-center justify-between gap-2">
        <div className="flex items-center gap-2 flex-shrink-0"><h1 className="text-base font-bold text-gray-900">員工列表</h1><button onClick={doShareApp} disabled={appShareBusy} className="w-6 h-6 rounded-full bg-[#06C755] flex items-center justify-center disabled:opacity-50 flex-shrink-0">{appShareBusy?<Spinner size={10}/>:<svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.5 2 2 5.6 2 10c0 3.9 3.6 7.2 8.4 7.9.3.1.8.2.9.5.1.3.1.7 0 1l-.1.9c0 .3-.2 1.1 1 .6 1.1-.5 6.2-3.7 8.5-6.3C22.1 12.6 22 11.3 22 10c0-4.4-4.5-8-10-8z"/></svg>}</button></div>
        <div className="flex gap-1.5"><button onClick={()=>setShowLabor(true)} className="text-xs px-3 py-2 rounded-lg bg-emerald-600 text-white font-semibold">勞點</button><button onClick={()=>setShowCreate(true)} className="text-xs px-3 py-2 rounded-lg bg-amber-600 text-white font-semibold">+ 新增老師</button></div>
      </div>
      {canPickStore&&(<select value={storeFilter} onChange={e=>setStoreFilter(e.target.value)} className="w-full bg-white border border-gray-300 rounded-lg px-2 py-2 text-xs text-gray-800"><option value="">（我的店面：{myAuth.store}）</option>{stores.map(s=>(<option key={s} value={s}>{s}</option>))}</select>)}
      <div className="flex gap-1.5 flex-wrap">
        {[['code','編號'],['role','職務'],['shift','班別'],['lang','語系'],['gender','性別'],['time','上/下工時間']].map(([k,l])=>(<button key={k} onClick={()=>setSortMode(k)} className={`text-[11px] px-2.5 py-1.5 rounded-lg font-semibold ${sortMode===k?'bg-amber-600 text-white':'bg-white text-gray-500 border border-gray-200'}`}>{l}排序</button>))}
      </div>
      {sortMode==='code'&&(<div className="flex gap-1.5 flex-wrap">{[['asc','正序'],['desc','倒序']].map(([k,l])=>(<button key={k} onClick={()=>setCodeDir(k)} className={`text-[10px] px-2 py-1 rounded-full font-semibold ${codeDir===k?'bg-amber-500/20 text-amber-700 border border-amber-300':'bg-white text-gray-500 border border-gray-200'}`}>{l}</button>))}{[['all','全部'],['0','0+'],['100','100+'],['200','200+'],['300','300+']].map(([k,l])=>(<button key={k} onClick={()=>setCodeRange(k)} className={`text-[10px] px-2 py-1 rounded-full font-semibold ${codeRange===k?'bg-amber-500/20 text-amber-700 border border-amber-300':'bg-white text-gray-500 border border-gray-200'}`}>{l}</button>))}</div>)}
      {sortMode==='shift'&&(<div className="flex gap-1.5 flex-wrap">{[['all','全部'],['day','早班'],['night','晚班'],['blank','未填']].map(([k,l])=>(<button key={k} onClick={()=>setShiftFilter(k)} className={`text-[10px] px-2 py-1 rounded-full font-semibold ${shiftFilter===k?'bg-amber-500/20 text-amber-700 border border-amber-300':'bg-white text-gray-500 border border-gray-200'}`}>{l}</button>))}</div>)}
      {sortMode==='lang'&&(<div className="flex gap-1.5 flex-wrap">{[['all','全部'],['zh','中文'],['vi','越南文']].map(([k,l])=>(<button key={k} onClick={()=>setLangFilter(k)} className={`text-[10px] px-2 py-1 rounded-full font-semibold ${langFilter===k?'bg-amber-500/20 text-amber-700 border border-amber-300':'bg-white text-gray-500 border border-gray-200'}`}>{l}</button>))}</div>)}
      {sortMode==='gender'&&(<div className="flex gap-1.5 flex-wrap">{[['all','全部'],['M','男'],['F','女'],['blank','未填']].map(([k,l])=>(<button key={k} onClick={()=>setGenderFilter(k)} className={`text-[10px] px-2 py-1 rounded-full font-semibold ${genderFilter===k?'bg-amber-500/20 text-amber-700 border border-amber-300':'bg-white text-gray-500 border border-gray-200'}`}>{l}</button>))}</div>)}
      {sortMode==='time'&&(<div className="flex gap-1.5 flex-wrap">{[['workStart','上工時間'],['workEnd','下工時間']].map(([k,l])=>(<button key={k} onClick={()=>setTimeField(k)} className={`text-[10px] px-2 py-1 rounded-full font-semibold ${timeField===k?'bg-amber-500/20 text-amber-700 border border-amber-300':'bg-white text-gray-500 border border-gray-200'}`}>{l}</button>))}</div>)}
      {sortMode==='time'?(
        list===null?<p className="text-center py-8"><Spinner size={20}/></p>:<TimeGroupedView list={filtered} timeField={timeField} onSelect={setViewCode}/>
      ):(
      <div className="space-y-1.5">
        {filtered===null||list===null?<p className="text-center py-8"><Spinner size={20}/></p>:filtered.length===0?<p className="text-sm text-gray-500 text-center py-8">沒有符合條件的員工</p>:filtered.map((e,i)=>(
          <div key={e.code} onClick={()=>setViewCode(e.code)} className={`rounded-xl px-3 py-2.5 cursor-pointer active:bg-gray-100 border border-gray-200 ${i%2===0?'bg-white':'bg-gray-50'}`}>
            <div className="flex items-center justify-between"><span className="text-sm font-semibold text-gray-900">{e.code}　{e.nameZh}</span><span className={`text-[10px] px-2 py-0.5 rounded-full font-semibold ${e.role==='supervisor'?'bg-amber-100 text-amber-700':'bg-gray-100 text-gray-500'}`}>{ROLE_LABEL[e.role]||e.role}</span></div>
            <p className="text-[11px] text-gray-500 mt-0.5">{e.store}・{SHIFT_SHORT_LABEL[e.shift]||e.shift||'—'}・{e.gender==='M'?'男':e.gender==='F'?'女':'—'}{e.lang==='vi'?'・越南語系':''}</p>
          </div>
        ))}
      </div>
      )}
    </div>
    {viewCode&&<EmployeeDetailModal code={viewCode} myAuth={myAuth} onClose={()=>{setViewCode('');load()}}/>}
    {showCreate&&<CreateStaffModal myAuth={myAuth} stores={stores} onClose={()=>setShowCreate(false)} onCreated={()=>{setShowCreate(false);load()}}/>}
    {showLabor&&<LaborPointsModal myAuth={myAuth} stores={canPickStore?stores:[myAuth.store]} onClose={()=>setShowLabor(false)}/>}
  </div>);
}

function App(){
  const[phase,setPhase]=useState('liffInit');
  const[myAuth,setMyAuth]=useState(null);
  const[errMsg,setErrMsg]=useState('');
  useEffect(()=>{
    const initLiff=(id)=>liff.init({liffId:id}).then(()=>{
      if(!liff.isLoggedIn()){liff.login({redirectUri:location.href});return}
      return liff.getProfile().then(p=>{
        return gasEmployeeAuth(p.userId).then(r=>{
          if(r&&r.ok){setMyAuth({...r,lineUserId:p.userId});setPhase('main')}
          else{setErrMsg((r&&r.error)||'權限驗證失敗');setPhase('denied')}
        });
      });
    });
    if(!LIFF_ID_HARDCODED){setErrMsg('尚未設定LIFF_ID');setPhase('error');return}
    initLiff(LIFF_ID_HARDCODED).catch(err=>{setErrMsg(String((err&&err.message)||err));setPhase('error')});
  },[]);
  if(phase==='liffInit')return(<div className="min-h-screen flex flex-col items-center justify-center gap-4"><Spinner size={32}/><p className="text-sm text-gray-500">載入中…</p></div>);
  if(phase==='error'||phase==='denied')return(<div className="min-h-screen flex items-center justify-center p-6"><p className="text-sm text-red-500 text-center">{errMsg}</p></div>);
  return(<EmployeeListPage myAuth={myAuth}/>);
}

class __EB extends React.Component{constructor(p){super(p);this.state={e:false}}static getDerivedStateFromError(){return{e:true}}componentDidCatch(err){try{window.__showFallback(3,{lineno:0,msg:(err&&err.message)||String(err)})}catch(e){}}render(){return this.state.e?null:this.props.children}}
ReactDOM.createRoot(document.getElementById('root')).render(<__EB><App/></__EB>);
})();
