<script>
  // ══════════ 全域錯誤攔截(白畫面診斷用) ══════════
  var PAGE="safety",PCODE="02";
  var __fbL={zh:{title:"網站更新中",info:function(p,v,c){return p+" 網頁 v"+v+" 更新中　代碼 "+c},keep:"你所輸入的舊資料仍保存在你的手機暫存檔中。",warn:"資料只存在本機，不會上傳雲端。"}};
  window.__fbLang='zh';
  window.__fbApply=function(){var L=__fbL.zh;var t=document.getElementById('__fbtitle');if(t)t.textContent=L.title;var k=document.getElementById('__fbkeep');if(k)k.textContent=L.keep;var w=document.getElementById('__fbwarn');if(w)w.textContent=L.warn;if(window.__fbData){var info=document.getElementById("__fbinfo");if(info)info.textContent=L.info(window.__fbData.page,window.__fbData.ver,window.__fbData.code);try{var md=document.getElementById("__fbmsg");if(md&&window.__fbData.msg){md.textContent=window.__fbData.msg;md.style.display="block";}}catch(_e){}}};
  window.__showFallback=function(src,detail){
    if(window.__shownFallback)return;window.__shownFallback=true;
    try{
      var ver=(document.title.match(/v?(\d+\.\d+[-.]\d+)/)||[])[1]||"?";
      var line=(detail&&detail.lineno)?detail.lineno:0;
      var ecode=PCODE+String(src).padStart(2,"0")+String(line%10000).padStart(4,"0");
      window.__fbData={page:PAGE,ver:ver,code:ecode,msg:(detail&&detail.msg)||''};
      var el=document.getElementById("__fallback");
      if(el){window.__fbApply();el.style.display="flex";}
    }catch(_e){}
  };
  window.addEventListener("error",function(e){window.__showFallback(1,{lineno:e.lineno,msg:(e.message||'')+(e.filename?(' @'+e.filename.split('/').pop()+':'+e.lineno+':'+e.colno):'')});},true);
</script>

function MiniPinDots({length,total,digits}){
  return(
    <div className="flex gap-3 justify-center py-2">
      {Array.from({length:total}).map((_,i)=>{
        const filled=length>i;const ch=digits&&digits[i];
        return(
          <div key={i} className={`flex items-center justify-center rounded-xl border transition-all duration-200 ${ch?'w-9 h-9 text-base font-bold':'w-4 h-4 my-2.5'} ${filled?'bg-amber-500 border-amber-400 text-slate-950 shadow-lg shadow-amber-500/20':'border-white/20 bg-white/5'}`}>
            {ch||''}
          </div>
        );
      })}
    </div>
  );
}

}

function PendingApprovalScreen({reqId,store,onApproved}){
  const[shareStatus,setShareStatus]=useState('');
  const[checkStatus,setCheckStatus]=useState('');
  const doShare=async()=>{
    setShareStatus('sharing');
    try{
      if(!(liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker'))){setShareStatus('error');return}
      const uri='https://john7t.github.io/massage-pay/auth.html#req='+reqId;
      const res=await liff.shareTargetPicker([{type:'flex',altText:'審核通知',contents:{
        type:'bubble',
        body:{type:'box',layout:'vertical',backgroundColor:'#FFFFFF',paddingAll:'lg',contents:[
          {type:'text',text:'📝 人員登記審核通知',weight:'bold',size:'md',color:'#111111'},
          {type:'text',text:'請主管協助審核此筆登記申請',size:'sm',color:'#666666',wrap:true,margin:'md'},
          {type:'text',text:'審核代碼：'+reqId,size:'xs',color:'#999999',margin:'md'}
        ]},
        footer:{type:'box',layout:'vertical',paddingAll:'lg',contents:[
          {type:'button',style:'primary',color:'#d97706',height:'sm',action:{type:'uri',label:'前往審核',uri:uri}}
        ]}
      }}]);
      setShareStatus(res?'done':'cancelled');
    }catch(_e){setShareStatus('error')}
  };
  const doCheck=async()=>{
    setCheckStatus('checking');
    try{
      const r=await sfCheckPendingStatus(reqId);
      if(r&&r.ok)setCheckStatus(r.status);else setCheckStatus('')
    }catch(_e){setCheckStatus('')}
  };
  if(checkStatus==='approved')return(
    <div className="min-h-screen flex flex-col items-center justify-center gap-4 p-6 text-center animate-fade-in">
      <div className="w-20 h-20 rounded-full bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center text-3xl shadow-lg shadow-emerald-500/10">✓</div>
      <p className="text-lg text-emerald-400 font-bold">已成功核准！</p>
      <button onClick={onApproved} className="px-8 py-3.5 rounded-2xl bg-amber-500 text-slate-950 font-bold text-sm shadow-lg shadow-amber-500/20 active:scale-95 transition-all">開始使用系統</button>
    </div>
  );
  return(
    <div className="min-h-screen flex flex-col items-center justify-center gap-6 p-6 text-center max-w-md mx-auto">
      <div className="w-20 h-20 rounded-3xl bg-amber-500/10 border border-amber-500/20 flex items-center justify-center text-3xl shadow-lg shadow-amber-500/10 animate-pulse">⏳</div>
      <div>
        <h2 className="text-lg text-gray-100 font-bold">查無此編號的員工資料</h2>
        <p className="text-xs text-gray-400 mt-1.5 leading-relaxed">已為您建立審核申請，請點擊下方按鈕分享給主管進行審核開通</p>
      </div>
      <div className="bg-white/[0.04] border border-white/[0.08] backdrop-blur-md rounded-2xl px-6 py-3 w-full">
        <p className="text-[11px] text-gray-500 uppercase tracking-wider">審核代碼</p>
        <p className="text-xl text-amber-400 font-bold font-mono tracking-widest mt-0.5">{reqId}</p>
      </div>
      <div className="w-full space-y-3">
        <button onClick={doShare} disabled={shareStatus==='sharing'} className="w-full py-3.5 rounded-2xl bg-[#06C755] hover:bg-[#05b34c] text-white text-sm font-bold shadow-lg shadow-[#06C755]/20 active:scale-[0.98] transition-all disabled:opacity-50 flex items-center justify-center gap-2">
          {shareStatus==='sharing'?<Spinner size={16}/>:<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 5.6 2 10c0 3.9 3.6 7.2 8.4 7.9.3.1.8.2.9.5.1.3.1.7 0 1l-.1.9c0 .3-.2 1.1 1 .6 1.1-.5 6.2-3.7 8.5-6.3C22.1 12.6 22 11.3 22 10c0-4.4-4.5-8-10-8z"/></svg>}
          分享給主管審核
        </button>
        {shareStatus==='done'&&<p className="text-xs text-emerald-400">✓ 已成功分享通知</p>}
        {shareStatus==='cancelled'&&<p className="text-xs text-gray-500">已取消分享</p>}
        {shareStatus==='error'&&<p className="text-xs text-red-400">分享失敗，請確認是否在 LINE App 內開啟</p>}
        <button onClick={doCheck} disabled={checkStatus==='checking'} className="w-full py-3.5 rounded-2xl bg-white/[0.06] border border-white/[0.08] hover:bg-white/10 text-gray-200 text-sm font-semibold active:scale-[0.98] transition-all disabled:opacity-50 flex items-center justify-center gap-2">
          {checkStatus==='checking'&&<Spinner size={16}/>}檢查核准狀態
        </button>
        <a href="https://lin.ee/58Dsob3" target="_blank" rel="noopener" className="w-full py-3.5 rounded-2xl bg-white/[0.04] border border-white/[0.06] text-gray-300 text-sm font-medium flex items-center justify-center gap-2 hover:bg-white/5 transition-all">
          加入 LINE 官方帳號
        </a>
        {checkStatus==='pending'&&<p className="text-xs text-amber-400/80">尚未核准，請耐心等候主管審核</p>}
        {checkStatus==='rejected'&&<p className="text-xs text-red-400">很抱歉，此筆審核申請已被拒絕</p>}
      </div>
    </div>
  );
}

function RegisterFlow({profile,onDone,sid}){
  const[lang,setLang]=useState('');
  const t=SF_T[lang||'zh'];
  const[store,setStore]=useState('');
  const[personType,setPersonType]=useState('');
  const[subType,setSubType]=useState('');
  const[name,setName]=useState('');
  const[code,setCode]=useState('');
  const[gender,setGender]=useState('');
  const[shift,setShift]=useState('');
  const[city,setCity]=useState('');const[dist,setDist]=useState('');
  const[busy,setBusy]=useState(false);const[err,setErr]=useState('');
  const[checkBusy,setCheckBusy]=useState(false);const[checkMsg,setCheckMsg]=useState('');const[checkFound,setCheckFound]=useState(null);
  const[pendingReqId,setPendingReqId]=useState('');
  const[pwdMode,setPwdMode]=useState('');
  const[pwdInput,setPwdInput]=useState('');const[pwdInput2,setPwdInput2]=useState('');const[pwdErr,setPwdErr]=useState('');const[pwdBusy,setPwdBusy]=useState(false);
  const[pwdVerified,setPwdVerified]=useState(false);const[finalPwd,setFinalPwd]=useState('');
  const[activeField,setActiveField]=useState('');
  const toggleField=(f)=>setActiveField(a=>a===f?'':f);
  const langDone=!!lang;
  const step1Done=langDone&&!!store;
  const canSubmit=(()=>{
    if(!step1Done||!personType)return false;
    if(personType==='manager')return subType&&(code.trim()||name.trim())&&gender&&shift&&city&&dist;
    if(personType==='frontdesk')return code.trim()||name.trim();
    if(personType==='student')return code.trim()||name.trim();
    if(personType==='teacher')return code.trim()&&gender&&shift&&city&&dist&&pwdVerified;
    return false;
  })();
  const doCheck=async()=>{
    if(!code.trim())return;
    setCheckBusy(true);setCheckMsg('');setPwdVerified(false);setPwdInput('');setPwdInput2('');setPwdErr('');setActiveField('');
    try{
      const r=await checkStaffCode(code.trim());
      if(r&&r.ok&&r.found){
        if(r.gender)setGender(r.gender);
        if(r.shift)setShift(r.shift);
        setCheckFound(true);
        if(r.hasLockPwd){setPwdMode('verify');setCheckMsg('✓ 查到員工資料，請輸入原本設定的密碼')}
        else{setPwdMode('setup');setCheckMsg('✓ 查到員工資料，請設定 4 位數密碼')}
      }else{setCheckFound(false);setPwdMode('setup');setCheckMsg('查無此編號，填寫資料後將送交主管審核')}
    }catch(_e){setCheckMsg('查詢失敗')}
    setCheckBusy(false);
  };
  const doPwdVerify=async()=>{
    if(pwdInput.length!==4)return;
    setPwdBusy(true);setPwdErr('');
    try{
      const r=await gasLoginPwd(code.trim(),lockPwdCred(code.trim(),pwdInput));
      if(r&&r.ok){setPwdVerified(true);setFinalPwd(pwdInput)}else{setPwdErr('密碼錯誤');setPwdInput('')}
    }catch(e){setPwdErr(String(e))}
    setPwdBusy(false);
  };
  const pwd1Digit=(d)=>{if(pwdInput.length>=4)return;setPwdInput(pwdInput+d);setPwdErr('')};
  const pwd1Backspace=()=>setPwdInput(v=>v.slice(0,-1));
  const pwd1Clear=()=>setPwdInput('');
  const pwd2Digit=(d)=>{if(pwdInput2.length>=4)return;setPwdInput2(pwdInput2+d);setPwdErr('')};
  const pwd2Backspace=()=>setPwdInput2(v=>v.slice(0,-1));
  const pwd2Clear=()=>setPwdInput2('');
  const pwd1Ok=isValidPin(pwdInput);
  const confirmPwdSetup=()=>{
    if(!pwd1Ok){setPwdErr('密碼不可4碼相同或連續遞增/遞減');return}
    if(pwdInput!==pwdInput2){setPwdErr('兩次密碼輸入不一致');return}
    setPwdVerified(true);setFinalPwd(pwdInput);setPwdErr('');
  };
  const submit=async()=>{
    if(!canSubmit)return;
    setBusy(true);setErr('');
    const payload={lineUserId:profile.userId,displayName:profile.displayName,store,personType,subType,name:personType==='teacher'?code.trim():name.trim(),code:personType==='teacher'?'':code.trim(),lang,gender,shift,city,dist};
    try{
      if(personType==='teacher'&&checkFound===false){
        const r=await sfRegisterRequest({...payload,pwdCred:lockPwdCred(code.trim(),finalPwd)});
        if(r&&r.ok){setPendingReqId(r.reqId);setBusy(false);return}
        setErr((r&&r.error)||'送出失敗');setBusy(false);return;
      }
      const r=await sfRegister(payload);
      if(r&&r.ok){
        if(personType==='teacher'&&checkFound===true&&pwdMode==='setup'){
          try{await gasSetInitialPwd(code.trim(),lockPwdCred(code.trim(),finalPwd))}catch(_e){}
        }
        onDone();return;
      }
      setErr((r&&r.error)||'登記失敗');
    }catch(e){setErr(String(e))}
    setBusy(false);
  };
  if(pendingReqId)return(<PendingApprovalScreen reqId={pendingReqId} store={store} onApproved={onDone}/>);
  return(
    <div className="min-h-screen flex items-center justify-center p-4">
      <div className="w-full max-w-md bg-slate-900/80 backdrop-blur-xl rounded-3xl border border-white/10 p-6 space-y-6 shadow-2xl">
        <div className="text-center space-y-1">
          <h1 className="text-xl font-bold text-gray-100 tracking-tight">{t.appTitle}</h1>
          <p className="text-xs text-gray-400">{t.appSubtitle}</p>
        </div>

        {/* 語系選擇 */}
        <div className="space-y-2">
          <label className="text-xs font-semibold text-gray-400 uppercase tracking-wider block">{SF_T.zh.chooseLang} / {SF_T.vi.chooseLang}</label>
          <div className="grid grid-cols-2 gap-2.5">
            <button onClick={()=>setLang('zh')} className={`py-3 rounded-2xl text-xs font-bold transition-all ${lang==='zh'?'bg-amber-500 text-slate-950 shadow-md shadow-amber-500/20':'bg-white/[0.05] border border-white/[0.08] text-gray-300 hover:bg-white/10'}`}>繁體中文</button>
            <button onClick={()=>setLang('vi')} className={`py-3 rounded-2xl text-xs font-bold transition-all ${lang==='vi'?'bg-amber-500 text-slate-950 shadow-md shadow-amber-500/20':'bg-white/[0.05] border border-white/[0.08] text-gray-300 hover:bg-white/10'}`}>Tiếng Việt</button>
          </div>
        </div>

        {/* 店別選擇 */}
        {langDone&&(
          <div className="space-y-2 animate-fade-in">
            <label className="text-xs font-semibold text-gray-400 uppercase tracking-wider block">{t.chooseStore}</label>
            <div className="grid grid-cols-2 gap-2">
              {STORES.map(s=>(
                <button key={s} onClick={()=>setStore(s)} className={`py-3 rounded-2xl text-xs font-bold transition-all ${store===s?'bg-amber-500 text-slate-950 shadow-md shadow-amber-500/20':'bg-white/[0.05] border border-white/[0.08] text-gray-300 hover:bg-white/10'}`}>{s}</button>
              ))}
            </div>
          </div>
        )}

        {/* 人員類別 */}
        {step1Done&&(
          <div className="space-y-2 animate-fade-in">
            <label className="text-xs font-semibold text-gray-400 uppercase tracking-wider block">{t.choosePersonType}</label>
            <div className="grid grid-cols-2 gap-2">
              <button onClick={()=>setPersonType('manager')} className={`py-3 rounded-2xl text-xs font-bold transition-all ${personType==='manager'?'bg-amber-500 text-slate-950 shadow-md shadow-amber-500/20':'bg-white/[0.05] border border-white/[0.08] text-gray-300 hover:bg-white/10'}`}>{t.typeManager}</button>
              <button onClick={()=>setPersonType('frontdesk')} className={`py-3 rounded-2xl text-xs font-bold transition-all ${personType==='frontdesk'?'bg-amber-500 text-slate-950 shadow-md shadow-amber-500/20':'bg-white/[0.05] border border-white/[0.08] text-gray-300 hover:bg-white/10'}`}>{t.typeFrontdesk}</button>
              <button onClick={()=>setPersonType('teacher')} className={`py-3 rounded-2xl text-xs font-bold transition-all ${personType==='teacher'?'bg-amber-500 text-slate-950 shadow-md shadow-amber-500/20':'bg-white/[0.05] border border-white/[0.08] text-gray-300 hover:bg-white/10'}`}>{t.typeTeacher}</button>
              {store==='教學處'&&<button onClick={()=>setPersonType('student')} className={`py-3 rounded-2xl text-xs font-bold transition-all ${personType==='student'?'bg-amber-500 text-slate-950 shadow-md shadow-amber-500/20':'bg-white/[0.05] border border-white/[0.08] text-gray-300 hover:bg-white/10'}`}>{t.typeStudent}</button>}
            </div>
          </div>
        )}

        {/* 主管動態欄位 */}
        {personType==='manager'&&(
          <div className="space-y-4 pt-2 border-t border-white/10">
            <div>
              <label className="text-xs font-semibold text-gray-400 block mb-1.5">{t.chooseSubType}</label>
              <div className="grid grid-cols-3 gap-1.5">
                {t.subTypes.map((s,i)=>(
                  <button key={s} onClick={()=>setSubType(SF_T.zh.subTypes[i])} className={`py-2 rounded-xl text-xs font-medium transition-all ${subType===SF_T.zh.subTypes[i]?'bg-amber-500/20 border border-amber-500/50 text-amber-300':'bg-white/[0.04] border border-white/[0.06] text-gray-400'}`}>{s}</button>
                ))}
              </div>
            </div>
            <div>
              <label className="text-xs font-semibold text-gray-400 block mb-1">{t.teacherCode}</label>
              <input value={code} onChange={e=>setCode(e.target.value.replace(/[^a-zA-Z0-9]/g,''))} placeholder={t.teacherCodePh} className="w-full bg-white/[0.05] border border-white/10 rounded-2xl px-4 py-3 text-sm text-gray-100 text-center tracking-widest focus:outline-none focus:border-amber-500/50"/>
              <p className="text-[11px] text-amber-400/80 mt-1">{t.codeHintForNonTeacher}</p>
            </div>
            <div>
              <label className="text-xs font-semibold text-gray-400 block mb-1">{t.customNameLabel}</label>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder={t.customNamePh} className="w-full bg-white/[0.05] border border-white/10 rounded-2xl px-4 py-3 text-sm text-gray-100 focus:outline-none focus:border-amber-500/50"/>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs font-semibold text-gray-400 block mb-1.5">{t.gender}</label>
                <div className="grid grid-cols-2 gap-1.5">
                  <button onClick={()=>setGender('M')} className={`py-2.5 rounded-xl text-xs font-bold ${gender==='M'?'bg-amber-500/20 border border-amber-500/50 text-amber-300':'bg-white/[0.04] border border-white/[0.06] text-gray-400'}`}>{t.genderM}</button>
                  <button onClick={()=>setGender('F')} className={`py-2.5 rounded-xl text-xs font-bold ${gender==='F'?'bg-amber-500/20 border border-amber-500/50 text-amber-300':'bg-white/[0.04] border border-white/[0.06] text-gray-400'}`}>{t.genderF}</button>
                </div>
              </div>
              <div>
                <label className="text-xs font-semibold text-gray-400 block mb-1.5">{t.shift}</label>
                <div className="grid grid-cols-2 gap-1.5">
                  <button onClick={()=>setShift('day')} className={`py-2.5 rounded-xl text-xs font-bold ${shift==='day'?'bg-amber-500/20 border border-amber-500/50 text-amber-300':'bg-white/[0.04] border border-white/[0.06] text-gray-400'}`}>{t.shiftDay}</button>
                  <button onClick={()=>setShift('night')} className={`py-2.5 rounded-xl text-xs font-bold ${shift==='night'?'bg-amber-500/20 border border-amber-500/50 text-amber-300':'bg-white/[0.04] border border-white/[0.06] text-gray-400'}`}>{t.shiftNight}</button>
                </div>
              </div>
            </div>
            <div>
              <label className="text-xs font-semibold text-gray-400 block mb-1.5">{t.addr}</label>
              <div className="grid grid-cols-2 gap-2">
                <select value={city} onChange={e=>{setCity(e.target.value);setDist('')}} className="w-full bg-slate-800/80 border border-white/10 rounded-2xl px-3 py-3 text-xs text-gray-200 focus:outline-none"><option value="">{t.addrCity}</option>{CITY_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}</select>
                <select value={dist} onChange={e=>setDist(e.target.value)} disabled={!city} className="w-full bg-slate-800/80 border border-white/10 rounded-2xl px-3 py-3 text-xs text-gray-200 disabled:opacity-40 focus:outline-none"><option value="">{t.addrDist}</option>{(TW_REGIONS&&TW_REGIONS[city]||[]).map(d=><option key={d} value={d}>{d}</option>)}</select>
              </div>
            </div>
          </div>
        )}

        {/* 學生/櫃台動態欄位 */}
        {(personType==='student'||personType==='frontdesk')&&(
          <div className="space-y-3 pt-2 border-t border-white/10">
            <div>
              <label className="text-xs font-semibold text-gray-400 block mb-1">{t.teacherCode}</label>
              <input value={code} onChange={e=>setCode(e.target.value.replace(/[^a-zA-Z0-9]/g,''))} placeholder={t.teacherCodePh} className="w-full bg-white/[0.05] border border-white/10 rounded-2xl px-4 py-3 text-sm text-gray-100 text-center tracking-widest focus:outline-none focus:border-amber-500/50"/>
              <p className="text-[11px] text-amber-400/80 mt-1">{t.codeHintForNonTeacher}</p>
            </div>
            <div>
              <label className="text-xs font-semibold text-gray-400 block mb-1">{t.customNameLabel}</label>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder={t.customNamePh} className="w-full bg-white/[0.05] border border-white/10 rounded-2xl px-4 py-3 text-sm text-gray-100 focus:outline-none focus:border-amber-500/50"/>
            </div>
          </div>
        )}

        {/* 老師動態欄位 */}
        {personType==='teacher'&&(
          <div className="space-y-4 pt-2 border-t border-white/10">
            <div className="space-y-2 text-center">
              <label className="text-xs font-semibold text-gray-400 block">{t.teacherCodePh}</label>
              <MiniPinDotsClickable length={code.length} total={3} digits={code} active={activeField==='code'} onClick={()=>toggleField('code')} onClear={()=>{setCode('');setCheckFound(null);setCheckMsg('');setPwdMode('');setPwdVerified(false);setPwdInput('');setPwdInput2('');setPwdErr('')}}/>
              {activeField==='code'&&<MiniPinKeypad onDigit={d=>{if(code.length>=3)return;setCode(code+d);setCheckFound(null);setCheckMsg('');setPwdMode('');setPwdVerified(false);setPwdInput('');setPwdInput2('');setPwdErr('')}} onBackspace={()=>{setCode(c=>c.slice(0,-1));setCheckFound(null);setCheckMsg('');setPwdMode('');setPwdVerified(false);setPwdInput('');setPwdInput2('');setPwdErr('')}}/>}
              <button onClick={doCheck} disabled={checkBusy||!code.trim()} className="w-full py-2.5 rounded-2xl bg-white/10 text-gray-200 text-xs font-semibold hover:bg-white/15 transition-all disabled:opacity-40">{checkBusy?<Spinner size={14} className="mx-auto"/>:'檢查代碼'}</button>
              {checkMsg&&<p className={`text-xs ${checkFound?'text-emerald-400':'text-amber-400'}`}>{checkMsg}</p>}
            </div>

            {pwdMode==='verify'&&!pwdVerified&&(
              <div className="bg-white/[0.03] border border-white/10 rounded-2xl p-4 space-y-3">
                <p className="text-xs text-gray-400 text-center">請輸入原本設定的 4 位數密碼</p>
                <MiniPinDotsClickable length={pwdInput.length} total={4} active={activeField==='pwd'} onClick={()=>toggleField('pwd')} onClear={()=>{setPwdInput('');setPwdErr('')}}/>
                {activeField==='pwd'&&<MiniPinKeypad onDigit={d=>{if(pwdInput.length>=4)return;setPwdInput(v=>v+d);setPwdErr('')}} onBackspace={()=>{setPwdInput(v=>v.slice(0,-1));setPwdErr('')}}/>}
                {pwdErr&&<p className="text-xs text-red-400 text-center">{pwdErr}</p>}
                <button onClick={doPwdVerify} disabled={pwdBusy||pwdInput.length!==4} className="w-full py-2.5 rounded-xl bg-amber-500 text-slate-950 font-bold text-xs disabled:opacity-40">{pwdBusy?<Spinner size={14} className="mx-auto"/>:'驗證登入'}</button>
              </div>
            )}

            {pwdMode==='setup'&&!pwdVerified&&(
              <div className="bg-white/[0.03] border border-white/10 rounded-2xl p-4 space-y-4">
                <div className="space-y-1">
                  <p className="text-xs text-gray-400 text-center">設定 4 位數密碼</p>
                  <MiniPinDotsClickable length={pwdInput.length} total={4} active={activeField==='pwd'} onClick={()=>toggleField('pwd')} onClear={pwd1Clear}/>
                  {activeField==='pwd'&&<MiniPinKeypad onDigit={pwd1Digit} onBackspace={pwd1Backspace}/>}
                </div>
                <div className="space-y-1">
                  <p className="text-xs text-gray-400 text-center">再次輸入以確認</p>
                  <MiniPinDotsClickable length={pwdInput2.length} total={4} active={activeField==='pwd2'} onClick={()=>toggleField('pwd2')} onClear={pwd2Clear}/>
                  {activeField==='pwd2'&&<MiniPinKeypad onDigit={pwd2Digit} onBackspace={pwd2Backspace}/>}
                </div>
                {pwdErr&&<p className="text-xs text-red-400 text-center">{pwdErr}</p>}
                <button onClick={confirmPwdSetup} disabled={pwdInput.length!==4||pwdInput2.length!==4} className="w-full py-2.5 rounded-xl bg-amber-500 text-slate-950 font-bold text-xs disabled:opacity-40">確認設定</button>
              </div>
            )}

            {pwdVerified&&<p className="text-xs text-emerald-400 text-center font-medium">✓ 密碼{pwdMode==='verify'?'驗證':'設定'}成功</p>}

            {pwdVerified&&(
              <>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-xs font-semibold text-gray-400 block mb-1.5">{t.gender}</label>
                    <div className="grid grid-cols-2 gap-1.5">
                      <button onClick={()=>setGender('M')} className={`py-2.5 rounded-xl text-xs font-bold ${gender==='M'?'bg-amber-500/20 border border-amber-500/50 text-amber-300':'bg-white/[0.04] border border-white/[0.06] text-gray-400'}`}>{t.genderM}</button>
                      <button onClick={()=>setGender('F')} className={`py-2.5 rounded-xl text-xs font-bold ${gender==='F'?'bg-amber-500/20 border border-amber-500/50 text-amber-300':'bg-white/[0.04] border border-white/[0.06] text-gray-400'}`}>{t.genderF}</button>
                    </div>
                  </div>
                  <div>
                    <label className="text-xs font-semibold text-gray-400 block mb-1.5">{t.shift}</label>
                    <div className="grid grid-cols-2 gap-1.5">
                      <button onClick={()=>setShift('day')} className={`py-2.5 rounded-xl text-xs font-bold ${shift==='day'?'bg-amber-500/20 border border-amber-500/50 text-amber-300':'bg-white/[0.04] border border-white/[0.06] text-gray-400'}`}>{t.shiftDay}</button>
                      <button onClick={()=>setShift('night')} className={`py-2.5 rounded-xl text-xs font-bold ${shift==='night'?'bg-amber-500/20 border border-amber-500/50 text-amber-300':'bg-white/[0.04] border border-white/[0.06] text-gray-400'}`}>{t.shiftNight}</button>
                    </div>
                  </div>
                </div>
                <div>
                  <label className="text-xs font-semibold text-gray-400 block mb-1.5">{t.addr}</label>
                  <div className="grid grid-cols-2 gap-2">
                    <select value={city} onChange={e=>{setCity(e.target.value);setDist('')}} className="w-full bg-slate-800/80 border border-white/10 rounded-2xl px-3 py-3 text-xs text-gray-200 focus:outline-none"><option value="">{t.addrCity}</option>{CITY_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}</select>
                    <select value={dist} onChange={e=>setDist(e.target.value)} disabled={!city} className="w-full bg-slate-800/80 border border-white/10 rounded-2xl px-3 py-3 text-xs text-gray-200 disabled:opacity-40 focus:outline-none"><option value="">{t.addrDist}</option>{(TW_REGIONS&&TW_REGIONS[city]||[]).map(d=><option key={d} value={d}>{d}</option>)}</select>
                  </div>
                </div>
              </>
            )}
          </div>
        )}

        {err&&<p className="text-xs text-red-400 text-center">{err}</p>}

        {personType&&(
          <button onClick={submit} disabled={!canSubmit||busy} className={`w-full py-4 rounded-2xl font-bold text-sm transition-all shadow-lg flex items-center justify-center gap-2 active:scale-[0.98] ${canSubmit&&!busy?'bg-amber-500 hover:bg-amber-400 text-slate-950 shadow-amber-500/20':'bg-white/5 border border-white/10 text-gray-500 cursor-not-allowed'}`}>
            {busy&&<Spinner size={16}/>}
            {busy?t.submitting:t.submitBtn}
          </button>
        )}
      </div>
    </div>
  );
}

function ListPage({profile,userProfile,liffId}){
  const t=SF_T[userProfile.lang||'zh'];
  const isRealAdmin=userProfile.personType==='admin';
  const[viewAsRole,setViewAsRole]=useState('');
  const effType=isRealAdmin&&viewAsRole?viewAsRole:userProfile.personType;
  const isManagerLevel=effType==='manager'||effType==='admin';
  const isAdmin=effType==='admin';
  const canSeeAllStores=effType==='admin'||(effType==='manager'&&(userProfile.subType==='執行長'||userProfile.subType==='區經理'));
  const[tab,setTab]=useState('survey');
  const[list,setList]=useState(undefined);
  const[showCreate,setShowCreate]=useState(false);
  const[newTitle,setNewTitle]=useState('');const[createBusy,setCreateBusy]=useState(false);
  const[queryOpenId,setQueryOpenId]=useState('');const[queryResult,setQueryResult]=useState(null);
  const[history,setHistory]=useState(null);const[showHistory,setShowHistory]=useState(false);
  const[users,setUsers]=useState(undefined);const[storeFilter,setStoreFilter]=useState('');
  const[busyUser,setBusyUser]=useState('');
  const load=()=>{
    sfListSurveys(profile.userId).then(r=>{
      if(r&&r.ok&&Array.isArray(r.list)){
        setList(r.list.filter(s=>!s.endDate));
        if(isAdmin)setHistory(r.list.filter(s=>s.endDate));
      }else{setList([])}
    }).catch(()=>setList([]));
  };
  const loadUsers=()=>{
    sfListUsers(profile.userId).then(r=>{if(r&&r.ok)setUsers(r.list||[]);else setUsers([])}).catch(()=>setUsers([]));
  };
  useEffect(()=>{if(isManagerLevel){load();loadUsers()}},[]);
  const doCreate=async()=>{
    if(!newTitle.trim())return;
    setCreateBusy(true);
    try{const r=await sfCreateSurvey(newTitle.trim(),profile.userId);if(r&&r.ok){setShowCreate(false);setNewTitle('');load()}}catch(_e){}
    setCreateBusy(false);
  };
  const[busyEnd,setBusyEnd]=useState('');
  const doEnd=async(id)=>{setBusyEnd(id);try{await sfEndSurvey(id);load()}catch(_e){}setBusyEnd('')};
  const[busyDelHist,setBusyDelHist]=useState('');
  const doDeleteHistory=async(id)=>{setBusyDelHist(id);try{await sfDeleteSurvey(id,profile.userId);load()}catch(_e){}setBusyDelHist('')};
  const doDeleteUser=async(targetId)=>{
    setBusyUser(targetId);
    try{await sfDeleteUser(profile.userId,targetId);loadUsers()}catch(_e){}
    setBusyUser('');
  };
  const doBlockUser=async(targetId)=>{
    setBusyUser(targetId);
    try{await sfBlockUser(profile.userId,targetId);loadUsers()}catch(_e){}
    setBusyUser('');
  };
  const dayOptions=(s)=>{
    const start=new Date(s.createdAt||Date.now());start.setHours(0,0,0,0);
    const now=new Date();now.setHours(0,0,0,0);
    const days=Math.floor((now-start)/86400000)+1;
    const opts=[];
    for(let n=1;n<=Math.max(1,days);n++){
      const d=new Date(start.getTime()+(n-1)*86400000);
      const p=x=>String(x).padStart(2,'0');
      opts.push({n:n,date:d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())});
    }
    return opts;
  };
  const doQuery=async(surveyId,date)=>{
    setQueryOpenId(surveyId);setQueryResult(null);
    if(!date)return;
    const r=await sfDayStatus(surveyId,date,profile.userId);
    if(r&&r.ok)setQueryResult(r);
  };
  const[histQueryOpenId,setHistQueryOpenId]=useState('');
  const[histQueryResult,setHistQueryResult]=useState(null);
  const[histQueryDay,setHistQueryDay]=useState({n:0,date:''});
  const[copyDayMsg,setCopyDayMsg]=useState('');
  const doHistQuery=async(surveyId,dayObj)=>{
    setHistQueryOpenId(surveyId);setHistQueryResult(null);setHistQueryDay(dayObj);
    const r=await sfDayStatus(surveyId,dayObj.date,profile.userId);
    if(r&&r.ok)setHistQueryResult(r);
  };
  const copyDayText=()=>{
    if(!histQueryResult)return;
    const text='day '+histQueryDay.n+' :'+histQueryDay.date+'\n'+t.reportedCount+'：'+histQueryResult.did.length+'人 分別是：'+histQueryResult.did.map(r=>r.display).join('、')+'\n'+t.notReportedCount+'：'+histQueryResult.notDid.length+'人 分別是：'+histQueryResult.notDid.join('、');
    try{navigator.clipboard.writeText(text).then(()=>{setCopyDayMsg(t.copiedMsg);setTimeout(()=>setCopyDayMsg(''),2000)}).catch(()=>{})}catch(_e){}
  };
  const statusLabel=(k)=>t['status'+k[0].toUpperCase()+k.slice(1)]||k;
  const fmtTime=(tm)=>{try{const d=new Date(tm);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')}catch(_e){return ''}};
  const detailUrl=(id)=>'https://liff.line.me/'+liffId+'?sid='+id;
  const[busyPush,setBusyPush]=useState('');const[pushMsg,setPushMsg]=useState('');const[pushErr,setPushErr]=useState('');const[pushAddFriendUrl,setPushAddFriendUrl]=useState('');
  const doPushFlex=async(id)=>{
    setBusyPush(id);setPushErr('');setPushAddFriendUrl('');
    try{
      const r=await sfPushFlexToMe(id,profile.userId);
      if(r&&r.ok){setPushMsg(id);setTimeout(()=>setPushMsg(''),2500)}
      else{setPushErr(id+':'+((r&&r.error)||'推播失敗'));if(r&&r.addFriendUrl)setPushAddFriendUrl(r.addFriendUrl)}
    }catch(e){setPushErr(id+':'+String(e))}
    setBusyPush('');
  };
  const shareSurvey=(s)=>{
    sfGetFlexContent(s.id,liffId).then(r=>{
      if(!r||!r.ok)return;
      if(!(liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker'))){
        location.href='https://line.me/R/share?text='+encodeURIComponent(s.title+'\n'+detailUrl(s.id));
        return;
      }
      liff.shareTargetPicker([{type:'flex',altText:r.title,contents:r.flex}]).catch(()=>{});
    }).catch(()=>{});
  };
  const openDetail=(id)=>{location.href=location.href.split('?')[0]+'?sid='+id};
  const personTypeLabel=(u)=>u.personType==='manager'?(u.subType||t.typeManager):u.personType==='frontdesk'?t.typeFrontdesk:u.personType==='student'?t.typeStudent:u.personType==='admin'?t.typeTeacher:t.typeTeacher;
  const displayNameOf=(u)=>{
    if(u.personType==='teacher')return u.name;
    const code=String(u.code||'').trim();const name=String(u.name||'').trim();
    if(code&&name)return code+'號 '+name;
    if(code)return code+'號';
    if(name)return name;
    return u.displayName||'';
  };
  const USER_TYPE_ORDER={manager:0,admin:0,frontdesk:1,student:2,teacher:3};
  const displayUsers=useMemo(()=>(users||[]).filter(u=>!storeFilter||u.store===storeFilter).slice().sort((a,b)=>{
    const oa=USER_TYPE_ORDER[a.personType]??9;const ob=USER_TYPE_ORDER[b.personType]??9;
    if(oa!==ob)return oa-ob;
    if(a.personType==='teacher'&&b.personType==='teacher'){
      const na=parseInt(String(a.name).replace('-',''),10);const nb=parseInt(String(b.name).replace('-',''),10);
      if(!isNaN(na)&&!isNaN(nb))return na-nb;
    }
    return String(displayNameOf(a)).localeCompare(String(displayNameOf(b)));
  }),[users,storeFilter]);
  const[myReports,setMyReports]=useState(undefined);
  const[showProfileDetail,setShowProfileDetail]=useState(false);
  const[localOverride,setLocalOverride]=useState({});
  const effProfile=useMemo(()=>({...userProfile,...localOverride}),[userProfile,localOverride]);
  const[editing,setEditing]=useState(false);
  const[fCode,setFCode]=useState('');const[fName,setFName]=useState('');const[fCity,setFCity]=useState('');const[fDist,setFDist]=useState('');
  const[saveBusy,setSaveBusy]=useState(false);const[savedMsg,setSavedMsg]=useState('');
  const saveProfile=async()=>{
    if(!fCode.trim()&&!fName.trim())return;
    setSaveBusy(true);
    try{
      const r=await sfRegister({lineUserId:profile.userId,displayName:userProfile.displayName,store:userProfile.store,personType:userProfile.personType,subType:userProfile.subType,name:fName.trim(),code:fCode.trim(),lang:userProfile.lang,gender:userProfile.gender,shift:userProfile.shift,city:fCity,dist:fDist});
      if(r&&r.ok){setLocalOverride({name:fName.trim(),code:fCode.trim(),city:fCity,dist:fDist});setSavedMsg(t.saved);setEditing(false);setTimeout(()=>setSavedMsg(''),2000)}
    }catch(_e){}
    setSaveBusy(false);
  };
  useEffect(()=>{if(!isManagerLevel)sfMyReportedSurveys(profile.userId).then(r=>{if(r&&r.ok)setMyReports(r.list||[])})},[]);

  return(
    <div className="min-h-screen p-4 pb-12 max-w-md mx-auto space-y-4">
      {/* 頂部標題與管理操控 */}
      <div className="flex items-center justify-between pt-2">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 rounded-xl bg-amber-500/10 border border-amber-500/20 flex items-center justify-center text-amber-400 font-bold text-sm">🛡️</div>
          <h1 className="text-base font-bold text-gray-100 tracking-tight">{t.centerTitle}</h1>
        </div>
        <div className="flex items-center gap-2">
          {isRealAdmin&&<select value={viewAsRole} onChange={e=>setViewAsRole(e.target.value)} className="text-xs px-2.5 py-1.5 rounded-xl bg-white/[0.06] border border-white/10 text-gray-300 focus:outline-none"><option value="">{t.switchRoleLabel}</option><option value="manager">{t.roleManager}</option><option value="frontdesk">{t.roleFrontdesk}</option><option value="teacher">{t.roleTeacher}</option></select>}
          {isManagerLevel&&<button onClick={()=>setShowCreate(v=>!v)} className="text-xs px-3.5 py-2 rounded-xl bg-amber-500 text-slate-950 font-bold shadow-md shadow-amber-500/20 active:scale-95 transition-all">{t.createNewBtn}</button>}
        </div>
      </div>

      {/* 我的個人資料卡片 */}
      <div className="bg-slate-900/60 border border-white/10 backdrop-blur-md rounded-2xl p-4 space-y-2 shadow-lg">
        <div className="flex items-center justify-between">
          <p className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">{t.myProfileTitle}</p>
          {userProfile.personType==='manager'&&!editing&&<button onClick={()=>{setFCode(effProfile.code||'');setFName(effProfile.name||'');setFCity(effProfile.city||'');setFDist(effProfile.dist||'');setEditing(true)}} className="text-[11px] px-2.5 py-1 rounded-lg bg-white/10 hover:bg-white/15 text-gray-300 font-medium transition-all">{t.editBtn}</button>}
        </div>
        {!editing?(
          <div>
            <div onClick={()=>setShowProfileDetail(v=>!v)} className="text-sm font-semibold text-gray-200 cursor-pointer flex items-center justify-between py-1">
              <span>{effProfile.store} · {effProfile.personType==='manager'?(effProfile.subType||t.typeManager):personTypeLabel(effProfile)} · {displayNameOf(effProfile)}</span>
              <span className="text-xs text-gray-500">{showProfileDetail?'▲':'▼'}</span>
            </div>
            {showProfileDetail&&(effProfile.personType==='teacher'||effProfile.personType==='manager')&&(
              <p className="text-xs text-gray-400 pt-1 border-t border-white/5 mt-1">
                {effProfile.gender==='M'?t.genderM:effProfile.gender==='F'?t.genderF:''} {effProfile.shift==='day'?t.shiftDay:effProfile.shift==='night'?t.shiftNight:''} {effProfile.city}{effProfile.dist}
              </p>
            )}
          </div>
        ):(
          <div className="space-y-2 pt-2">
            <input value={fCode} onChange={e=>setFCode(e.target.value.replace(/[^a-zA-Z0-9]/g,''))} placeholder={t.teacherCodePh} className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs text-gray-100 text-center tracking-widest focus:outline-none"/>
            <input value={fName} onChange={e=>setFName(e.target.value)} placeholder={t.customNamePh} className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs text-gray-100 focus:outline-none"/>
            <div className="grid grid-cols-2 gap-2">
              <select value={fCity} onChange={e=>{setFCity(e.target.value);setFDist('')}} className="w-full bg-slate-800 border border-white/10 rounded-xl px-2 py-2 text-xs text-gray-200 focus:outline-none"><option value="">{t.addrCity}</option>{CITY_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}</select>
              <select value={fDist} onChange={e=>setFDist(e.target.value)} disabled={!fCity} className="w-full bg-slate-800 border border-white/10 rounded-xl px-2 py-2 text-xs text-gray-200 disabled:opacity-40 focus:outline-none"><option value="">{t.addrDist}</option>{(TW_REGIONS&&TW_REGIONS[fCity]||[]).map(d=><option key={d} value={d}>{d}</option>)}</select>
            </div>
            {savedMsg&&<p className="text-xs text-emerald-400">✓ {savedMsg}</p>}
            <div className="flex gap-2 pt-1">
              <button onClick={()=>setEditing(false)} className="flex-1 py-2 rounded-xl bg-white/5 text-gray-400 text-xs font-semibold">{t.cancelBtn}</button>
              <button onClick={saveProfile} disabled={saveBusy||!fName.trim()} className="flex-1 py-2 rounded-xl bg-amber-500 text-slate-950 text-xs font-bold disabled:opacity-50 flex items-center justify-center gap-1">{saveBusy&&<Spinner size={12}/>}{t.saveBtn}</button>
            </div>
          </div>
        )}
      </div>

      {/* 非主管：只顯示個人歷史回報 */}
      {!isManagerLevel?(
        <div className="space-y-2">
          <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider px-1">{t.myReportsSectionTitle}</p>
          {myReports===undefined?<div className="py-8 text-center text-xs text-gray-500"><Spinner size={20} className="mx-auto mb-2"/>{t.loading}</div>:myReports.length===0?<p className="text-xs text-gray-500 text-center py-8 bg-white/[0.02] border border-white/[0.05] rounded-2xl">{t.noMyReports}</p>:myReports.map(s=>(
            <div key={s.id} onClick={()=>openDetail(s.id)} className="bg-slate-900/40 border border-white/[0.08] hover:border-amber-500/30 rounded-2xl p-3.5 cursor-pointer flex items-center justify-between active:scale-[0.99] transition-all">
              <span className="text-sm font-semibold text-gray-200">{s.title}</span>
              {s.endDate&&<span className="text-[10px] px-2 py-0.5 rounded-full bg-white/10 text-gray-400">{t.ended}</span>}
            </div>
          ))}
        </div>
      ):(
        <>
          {/* 頁籤切換 */}
          <div className="flex gap-2 p-1 bg-white/[0.04] border border-white/[0.06] rounded-2xl">
            <button onClick={()=>setTab('survey')} className={`flex-1 py-2.5 rounded-xl text-xs font-bold transition-all ${tab==='survey'?'bg-amber-500 text-slate-950 shadow-md shadow-amber-500/10':'text-gray-400 hover:text-gray-200'}`}>{t.surveyListTab}</button>
            <button onClick={()=>setTab('users')} className={`flex-1 py-2.5 rounded-xl text-xs font-bold transition-all ${tab==='users'?'bg-amber-500 text-slate-950 shadow-md shadow-amber-500/10':'text-gray-400 hover:text-gray-200'}`}>{t.userListTab}</button>
          </div>

          {tab==='survey'&&(
            <div className="space-y-3">
              {showCreate&&(
                <div className="bg-slate-900/80 border border-amber-500/30 rounded-2xl p-4 space-y-3 shadow-xl animate-fade-in">
                  <label className="text-xs font-semibold text-amber-300 block">{t.createTitleLabel}</label>
                  <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder={t.createTitlePh} className="w-full bg-white/5 border border-white/10 rounded-xl px-3.5 py-2.5 text-sm text-gray-100 focus:outline-none focus:border-amber-500/50"/>
                  <button onClick={doCreate} disabled={createBusy||!newTitle.trim()} className="w-full py-3 rounded-xl bg-amber-500 text-slate-950 text-xs font-bold shadow-md shadow-amber-500/20 disabled:opacity-50 flex items-center justify-center gap-2">
                    {createBusy&&<Spinner size={14}/>}{t.createBtn}
                  </button>
                </div>
              )}

              {list===undefined?<div className="py-12 text-center text-xs text-gray-500"><Spinner size={24} className="mx-auto mb-2 text-amber-500"/>{t.loading}</div>:list.length===0?<p className="text-xs text-gray-500 text-center py-12 bg-white/[0.02] border border-white/[0.05] rounded-2xl">{t.noSurveys}</p>:list.map(s=>(
                <div key={s.id} className="bg-slate-900/50 border border-white/10 rounded-2xl p-4 space-y-3 shadow-md">
                  <div className="flex items-center justify-between gap-2">
                    <h3 onClick={()=>openDetail(s.id)} className="text-sm font-bold text-gray-100 hover:text-amber-400 cursor-pointer flex-1 transition-colors">{s.title}</h3>
                    <div className="flex gap-1.5">
                      <button onClick={()=>doPushFlex(s.id)} disabled={busyPush===s.id} className="text-xs px-2.5 py-1.5 rounded-xl bg-[#06C755] hover:bg-[#05b34c] text-white font-semibold disabled:opacity-50 flex items-center gap-1 shadow-sm transition-all">
                        {busyPush===s.id&&<Spinner size={12}/>}{pushMsg===s.id?t.pushedMsg:t.pushFlexBtn}
                      </button>
                      <button onClick={()=>shareSurvey(s)} className="text-xs px-2.5 py-1.5 rounded-xl bg-white/10 hover:bg-white/15 text-gray-200 font-semibold transition-all">{t.shareBtn}</button>
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <select onChange={e=>doQuery(s.id,e.target.value)} defaultValue="" className="flex-1 bg-white/5 border border-white/10 rounded-xl px-2.5 py-1.5 text-xs text-gray-200 focus:outline-none"><option value="" disabled>{t.selectDay}</option>{dayOptions(s).map(o=>(<option key={o.n} value={o.date}>{'day'+o.n+': '+o.date}</option>))}</select>
                    <button onClick={()=>doEnd(s.id)} disabled={busyEnd===s.id} className="px-3 py-1.5 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-xs font-semibold hover:bg-red-500/20 disabled:opacity-50 flex items-center gap-1 transition-all">{busyEnd===s.id&&<Spinner size={12}/>}{t.endBtn}</button>
                  </div>
                  {pushErr.startsWith(s.id+':')&&(
                    <div className="p-2.5 rounded-xl bg-amber-500/10 border border-amber-500/20 space-y-1.5">
                      {pushAddFriendUrl&&(
                        <>
                          <p className="text-[11px] text-amber-300">推播失敗，可能尚未將官方 Bot 加為好友</p>

                        </>
                      )}
                      <p className="text-[10px] text-gray-400">{pushErr.slice(s.id.length+1)}</p>
                    </div>
                  )}
                  {queryOpenId===s.id&&queryResult&&(
                    <div className="space-y-2 pt-2 border-t border-white/5">
                      <div className="flex justify-between text-[11px] font-medium text-gray-400 px-1">
                        <span>{t.reportedCount} <strong className="text-emerald-400">{queryResult.did.length}</strong> 人</span>
                        <span>{t.notReportedCount} <strong className="text-amber-400">{queryResult.notDid.length}</strong> 人</span>

                      </div>
                      <div className="flex gap-2">
                        <select onChange={e=>{const o=JSON.parse(e.target.value);doHistQuery(s.id,o)}} defaultValue="" className="flex-1 bg-white/5 border border-white/10 rounded-lg px-2 py-1 text-[11px] text-gray-200 focus:outline-none"><option value="" disabled>{t.selectDay}</option>{dayOptions(s).map(o=>(<option key={o.n} value={JSON.stringify(o)}>{'day'+o.n+': '+o.date}</option>))}</select>
                      </div>
                      {histQueryOpenId===s.id&&histQueryResult&&(

function DetailPage({profile,userProfile,sid,liffId}){
  const t=SF_T[userProfile.lang||'zh'];
  const displayName=userProfile.personType==='teacher'?userProfile.name:(userProfile.name||userProfile.displayName);
  const STATUS_OPTS=STATUS_KEYS.map(k=>[k,t['status'+k[0].toUpperCase()+k.slice(1)]]);
  const PERSON_ORDER={manager:0,admin:0,frontdesk:1,teacher:2};
  const[survey,setSurvey]=useState(undefined);
  const[status,setStatus]=useState('');
  const[otherText,setOtherText]=useState('');
  const[reports,setReports]=useState(null);
  const[sortMode,setSortMode]=useState('time');
  const[showOther,setShowOther]=useState(false);
  const[noPermission,setNoPermission]=useState(false);
  const loadReports=()=>sfTodayReports(sid,profile.userId).then(r=>{if(r&&r.ok)setReports(r.list||[])});
  const loadSurvey=()=>{
    sfGetSurvey(sid,profile.userId).then(r=>{
      if(r&&r.ok){
        if(r.noPermission){setNoPermission(true);setSurvey(null);return}
        setSurvey(r.survey||null);
      }else{setSurvey(null)}
    }).catch(()=>setSurvey(null));
    loadReports();
  };
  useEffect(()=>{loadSurvey()},[]);
  const[submitted,setSubmitted]=useState(false);
  const[submitting,setSubmitting]=useState(false);
  const submit=()=>{
    if(!survey||(!status&&!otherText.trim()))return;
    setSubmitting(true);
    sfSubmitReport(survey.id,profile.userId,status,otherText.trim()).catch(()=>{});
    setTimeout(()=>{setSubmitting(false);setSubmitted(true)},1000);
  };
  const statusLabel=(k)=>t['status'+k[0].toUpperCase()+k.slice(1)]||k;
  const fmtTime=(tm)=>{try{const d=new Date(tm);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')}catch(_e){return ''}};
  const sortedReports=useMemo(()=>{
    if(!reports)return null;
    if(sortMode==='time')return [...reports].sort((a,b)=>new Date(b.time)-new Date(a.time));
    if(sortMode==='store')return [...reports].sort((a,b)=>{
      const sc=String(a.store||'').localeCompare(String(b.store||''));
      if(sc!==0)return sc;
      const oa=PERSON_ORDER[a.personType]??9;const ob=PERSON_ORDER[b.personType]??9;
      return oa-ob;
    });
    if(sortMode==='city')return [...reports].sort((a,b)=>String(a.city||'').localeCompare(String(b.city||'')));
    return [...reports].sort((a,b)=>{
      const oa=PERSON_ORDER[a.personType]??9;const ob=PERSON_ORDER[b.personType]??9;
      if(oa!==ob)return oa-ob;
      if(a.personType==='teacher'&&b.personType==='teacher'){
        const na=parseInt(String(a.display).replace('-',''),10);const nb=parseInt(String(b.display).replace('-',''),10);
        if(!isNaN(na)&&!isNaN(nb))return na-nb;
      }
      return String(a.display).localeCompare(String(b.display));
    });
  },[reports,sortMode]);
  const canSeeAllStores=userProfile.personType==='admin'||(userProfile.personType==='manager'&&(userProfile.subType==='執行長'||userProfile.subType==='區經理'));
  const isManagerLevel=userProfile.personType==='manager'||userProfile.personType==='admin';
  const[shareBusy,setShareBusy]=useState(false);
  const shareNotReported=async()=>{
    if(!survey)return;
    setShareBusy(true);
    try{
      const today=new Date().toISOString().slice(0,10);
      const r=await sfDayStatus(survey.id,today,profile.userId);
      if(r&&r.ok){
        const msg=survey.title+'\n未回報人數 '+r.notDid.length+'人：'+r.notDid.join('、')+'\n請儘速至回報網頁進行回報';
        if(liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker')){
          await liff.shareTargetPicker([{type:'text',text:msg}]);
        }else{
          location.href='https://line.me/R/share?text='+encodeURIComponent(msg);
        }
      }
    }catch(_e){}
    setShareBusy(false);
  };
  if(submitting)return(
    <div className="min-h-screen flex flex-col items-center justify-center gap-4 p-6 text-center animate-fade-in">
      <Spinner size={40} className="text-amber-500"/>
      <p className="text-base text-gray-300 font-semibold">正在傳送安全回報…</p>
    </div>
  );
  if(submitted){
    const shareRecord=()=>{
      const now=new Date();
      const p=x=>String(x).padStart(2,'0');
      const timeText=now.getFullYear()+'-'+p(now.getMonth()+1)+'-'+p(now.getDate())+' '+p(now.getHours())+':'+p(now.getMinutes());
      const statusText=statusLabel(status)+(otherText?('、'+otherText):'');
      const statusColor=status==='safe'?'#2ECC71':'#E67E22';
      const flex={
        type:'bubble',size:'giga',
        header:{type:'box',layout:'vertical',backgroundColor:'#096acb',paddingAll:'md',contents:[
          {type:'text',text:'🚨 '+(survey?survey.title:''),weight:'bold',color:'#FFFFFF',wrap:true}
        ]},
        body:{type:'box',layout:'vertical',backgroundColor:'#FFFFFF',paddingAll:'lg',spacing:'md',contents:[
          {type:'text',text:'回報時間：'+timeText+' - '+userProfile.store+' - '+displayName,color:'#555555',size:'sm',align:'start',wrap:true},
          {type:'text',text:statusText,color:statusColor,size:'xxl',weight:'bold',align:'center',margin:'lg'},
          {type:'button',action:{type:'uri',label:'天災安全回報平台',uri:'https://liff.line.me/'+liffId+'?sid='+sid},style:'link',height:'sm',color:'#eeeeff',margin:'none'}
        ]}
      };
      if(liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker')){
        liff.shareTargetPicker([{type:'flex',altText:survey?survey.title:'安全回報',contents:flex}]).catch(()=>{});
      }
    };
    return(
      <div className="min-h-screen flex flex-col items-center justify-center gap-4 p-6 text-center animate-fade-in max-w-sm mx-auto">
        <div className="w-20 h-20 rounded-full bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center text-4xl shadow-lg shadow-emerald-500/10">✅</div>
        <h2 className="text-xl text-gray-100 font-bold">已成功收到您的安全回報！</h2>
        <p className="text-xs text-gray-400">您可以直接關閉此頁面，祝您平安。</p>
        <button onClick={shareRecord} className="w-full py-3.5 rounded-2xl bg-[#06C755] hover:bg-[#05b34c] text-white text-sm font-bold shadow-lg shadow-[#06C755]/20 active:scale-95 transition-all mt-2">分享完成回報紀錄</button>
      </div>
    );
  }
  return(
    <div className="min-h-screen p-4 pb-12 max-w-md mx-auto space-y-4">
      {/* 頁首 */}
      <div className="flex items-center justify-between pt-2">
        <p className="text-xs font-semibold text-gray-400">{userProfile.store} · {displayName}</p>
        <a href={location.href.split('?')[0]} className="text-xs px-3 py-1.5 rounded-xl bg-white/10 hover:bg-white/15 text-gray-200 font-semibold transition-all">{t.backHomeBtn}</a>
      </div>

      {isManagerLevel&&survey&&!survey.endDate&&(
        <button onClick={shareNotReported} disabled={shareBusy} className="w-full py-3 rounded-2xl bg-[#06C755] hover:bg-[#05b34c] text-white text-xs font-bold shadow-lg shadow-[#06C755]/10 disabled:opacity-50 flex items-center justify-center gap-2 transition-all">
          {shareBusy&&<Spinner size={14}/>}{t.notReportedShareBtn}
        </button>
      )}

      {survey===undefined?<div className="py-12 text-center text-xs text-gray-500"><Spinner size={24} className="mx-auto mb-2 text-amber-500"/>{t.loading}</div>:noPermission?(
        <p className="text-sm text-red-400 text-center py-12 bg-white/[0.02] rounded-2xl border border-white/5">{t.invalidParam}</p>
      ):!survey?(
        <p className="text-sm text-gray-500 text-center py-12 bg-white/[0.02] rounded-2xl border border-white/5">{t.noActiveSurvey}</p>
      ):(
        <>
          {survey.endDate?(
            <div className="bg-slate-900/60 border border-white/10 backdrop-blur-md rounded-3xl p-6 text-center space-y-2 shadow-lg">
              <h1 className="text-xl text-gray-200 font-bold leading-snug">{survey.title}</h1>
              <p className="text-sm text-amber-400 font-medium">（{t.thisSurveyEnded||t.ended}）</p>
            </div>
          ):(
            /* 狀態選擇器 */
            <div className="bg-slate-900/80 border border-white/10 backdrop-blur-xl rounded-3xl p-5 space-y-5 shadow-2xl">
              <h1 className="text-xl text-gray-100 font-bold leading-snug text-center tracking-tight">{survey.title}</h1>
              <div className="grid grid-cols-2 gap-3">
                {STATUS_OPTS.map(([k,l])=>(
                  <button key={k} onClick={()=>{setStatus(k);setShowOther(false)}} className={`py-6 rounded-2xl text-base font-bold transition-all border active:scale-95 ${status===k?'bg-amber-500 border-amber-400 text-slate-950 shadow-lg shadow-amber-500/20':'bg-white/[0.04] border-white/[0.08] text-gray-200 hover:bg-white/10'}`}>{l}</button>
                ))}
                <button onClick={()=>{setShowOther(true);setStatus('')}} className={`py-6 rounded-2xl text-base font-bold transition-all border active:scale-95 ${showOther?'bg-amber-500 border-amber-400 text-slate-950 shadow-lg shadow-amber-500/20':'bg-white/[0.04] border-white/[0.08] text-gray-200 hover:bg-white/10'}`}>{t.otherLabel}</button>
              </div>
              {showOther&&<input value={otherText} onChange={e=>setOtherText(e.target.value)} placeholder={t.otherPh} autoFocus className="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-3.5 text-sm text-gray-100 focus:outline-none focus:border-amber-500/50"/>}
              <button onClick={submit} disabled={!status&&!otherText.trim()} className="w-full py-4 rounded-2xl bg-gradient-to-r from-red-600 to-amber-600 hover:from-red-500 hover:to-amber-500 text-white text-base font-bold shadow-lg shadow-red-600/20 disabled:opacity-40 transition-all active:scale-[0.98]">{t.submitReportBtn}</button>
            </div>
          )}

          {/* 回報狀況名單 */}
          <div className="space-y-3 pt-2">
            <div className="flex items-center justify-between flex-wrap gap-2 px-1">
              <p className="text-xs font-bold text-gray-300 uppercase tracking-wider">{(()=>{const d=new Date();return (d.getMonth()+1)+'/'+d.getDate()})()} {t.reportedList}</p>
              <div className="flex gap-1 flex-wrap">
                <button onClick={()=>setSortMode('time')} className={`text-[11px] px-2.5 py-1 rounded-lg font-semibold transition-all ${sortMode==='time'?'bg-amber-500 text-slate-950':'bg-white/5 text-gray-400'}`}>{t.sortByTime}</button>
                {isManagerLevel&&<button onClick={()=>setSortMode('code')} className={`text-[11px] px-2.5 py-1 rounded-lg font-semibold transition-all ${sortMode==='code'?'bg-amber-500 text-slate-950':'bg-white/5 text-gray-400'}`}>{t.sortByCode}</button>}
                {isManagerLevel&&<button onClick={()=>setSortMode('city')} className={`text-[11px] px-2.5 py-1 rounded-lg font-semibold transition-all ${sortMode==='city'?'bg-amber-500 text-slate-950':'bg-white/5 text-gray-400'}`}>{t.sortByCity}</button>}
                {canSeeAllStores&&<button onClick={()=>setSortMode('store')} className={`text-[11px] px-2.5 py-1 rounded-lg font-semibold transition-all ${sortMode==='store'?'bg-amber-500 text-slate-950':'bg-white/5 text-gray-400'}`}>{t.sortByStore}</button>}
              </div>
            </div>

            {sortedReports===null?<div className="py-8 text-center text-xs text-gray-500"><Spinner size={20} className="mx-auto mb-2 text-amber-500"/>{t.loading}</div>:sortedReports.length===0?<p className="text-xs text-gray-500 text-center py-8 bg-white/[0.02] rounded-2xl border border-white/5">{t.noReports}</p>:sortedReports.map((r,i)=>(
              <div key={i} className="bg-slate-900/40 border border-white/[0.08] rounded-2xl px-4 py-3 flex items-center justify-between gap-2 shadow-sm">
                <div>
                  <span className="text-sm font-semibold text-gray-200">{canSeeAllStores&&r.store?('['+r.store+'] '):''}{r.display}{r.personType==='manager'&&r.subType?(' '+r.subType):''}</span>
                  <p className="text-xs text-amber-400 mt-0.5">{statusLabel(r.status)}{r.otherText?('、'+r.otherText):''}{isManagerLevel&&r.city?(' · '+r.city+(r.dist||'')):''}</p>
                </div>
                <span className="text-[10px] text-gray-500 font-mono flex-shrink-0">{fmtTime(r.time)}</span>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

      {status==='cancelled'&&(
        <>
          <div className="w-16 h-16 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-3xl">✕</div>
          <p className="text-sm text-gray-400">已取消分享</p>
        </>
      )}
      {status==='error'&&(
        <>
          <div className="w-16 h-16 rounded-full bg-red-500/10 border border-red-500/20 flex items-center justify-center text-3xl">⚠️</div>
          <p className="text-xs text-red-400 leading-relaxed">{err}</p>
        </>
      )}
      {(status==='done'||status==='cancelled'||status==='error')&&<button onClick={goBack} className="w-full py-3.5 rounded-2xl bg-amber-500 text-slate-950 font-bold text-xs transition-all mt-4">返回</button>}
    </div>
  );
}

function ApproveRegFlow({reqId,profile}){
  const[phase,setPhase]=useState('checking');
  const[detail,setDetail]=useState(null);
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  const load=()=>{
    setPhase('checking');
    sfGetPendingDetail(profile.userId,reqId).then(r=>{
      if(r&&r.ok){setDetail(r.detail);setPhase('detail')}
      else{setErr((r&&r.error)||'查詢失敗');setPhase('denied')}
    }).catch(e=>{setErr(String(e));setPhase('denied')});
  };
  useEffect(()=>{load()},[]);
  const doApprove=async(approve)=>{
    setBusy(true);
    try{
      const r=await sfApprovePendingRegistration(profile.userId,reqId,approve);
      if(r&&r.ok){setPhase('done');setDetail(d=>({...d,status:approve?'approved':'rejected'}))}else{setErr((r&&r.error)||'操作失敗')}
    }catch(e){setErr(String(e))}
    setBusy(false);
  };
  const personTypeLabel=(pt)=>({manager:'主管',frontdesk:'櫃台',teacher:'老師',student:'教學處學生'}[pt]||pt);
  const genderLabel=(g)=>g==='M'?'男':g==='F'?'女':'—';
  const shiftLabel=(s)=>s==='day'?'早班':s==='night'?'晚班':'—';
  if(phase==='checking')return(<div className="min-h-screen flex flex-col items-center justify-center gap-4"><Spinner size={36} className="text-amber-500"/><p className="text-sm text-gray-400">確認審核權限中…</p></div>);
  if(phase==='denied')return(<div className="min-h-screen flex items-center justify-center p-6"><p className="text-sm text-red-400 text-center">{err}</p></div>);
  if(!detail)return null;
  return(
    <div className="min-h-screen p-4 flex flex-col justify-center max-w-sm mx-auto">
      <div className="bg-slate-900/80 border border-white/10 backdrop-blur-xl rounded-3xl p-6 space-y-5 shadow-2xl">
        <h1 className="text-lg font-bold text-gray-100 text-center">登記審核申請</h1>
        <div className="bg-white/[0.03] border border-white/[0.08] rounded-2xl p-4 space-y-2.5 text-xs">
          <div className="flex justify-between"><span className="text-gray-400">審核代碼</span><span className="text-amber-400 font-mono font-bold">{detail.reqId}</span></div>
          <div className="flex justify-between"><span className="text-gray-400">店別</span><span className="text-gray-200">{detail.store}</span></div>
          <div className="flex justify-between"><span className="text-gray-400">身分別</span><span className="text-gray-200">{personTypeLabel(detail.personType)}{detail.subType?('・'+detail.subType):''}</span></div>
          <div className="flex justify-between"><span className="text-gray-400">編號/名稱</span><span className="text-gray-200">{detail.code||detail.name||'—'}</span></div>
          {(detail.personType==='teacher'||detail.personType==='manager')&&(
            <>
              <div className="flex justify-between"><span className="text-gray-400">性別</span><span className="text-gray-200">{genderLabel(detail.gender)}</span></div>
              <div className="flex justify-between"><span className="text-gray-400">班別</span><span className="text-gray-200">{shiftLabel(detail.shift)}</span></div>
              <div className="flex justify-between"><span className="text-gray-400">居住地</span><span className="text-gray-200">{detail.city}{detail.dist}</span></div>
            </>
          )}
          <div className="flex justify-between pt-1 border-t border-white/5"><span className="text-gray-500">申請時間</span><span className="text-gray-400 font-mono text-[10px]">{detail.createdAt}</span></div>
        </div>
        {detail.status==='pending'?(
          <div className="grid grid-cols-2 gap-3 pt-1">
            <button onClick={()=>doApprove(false)} disabled={busy} className="py-3 rounded-2xl bg-red-500/15 border border-red-500/30 text-red-400 font-bold hover:bg-red-500/20 disabled:opacity-50 transition-all">拒絕</button>
            <button onClick={()=>doApprove(true)} disabled={busy} className="py-3 rounded-2xl bg-emerald-500 text-slate-950 font-bold shadow-lg shadow-emerald-500/20 hover:bg-emerald-400 disabled:opacity-50 transition-all">核准</button>
          </div>
        ):(
          <p className={`text-center text-sm font-bold py-2 ${detail.status==='approved'?'text-emerald-400':'text-red-400'}`}>{detail.status==='approved'?'✓ 已核准':'已拒絕申請'}</p>
        )}
        {err&&<p className="text-xs text-red-400 text-center">{err}</p>}
        <button onClick={()=>{try{liff.closeWindow()}catch(_e){}}} className="w-full py-3 rounded-2xl bg-white/5 text-gray-400 text-xs font-semibold hover:bg-white/10 transition-all">關閉視窗</button>
      </div>
    </div>
  );
}

function App(){
  const[phase,setPhase]=useState('liffInit');
  const[profile,setProfile]=useState(null);
  const[userProfile,setUserProfile]=useState(null);
  const[liffErr,setLiffErr]=useState('');
  const[blocked,setBlocked]=useState(false);
  const[liffId,setLiffId]=useState('');
  const sid=new URLSearchParams(location.search).get('sid')||'';
  const action=new URLSearchParams(location.search).get('action')||'';
  const approveReg=new URLSearchParams(location.search).get('approveReg')||'';
  const breakShare=new URLSearchParams(location.search).get('breakShare')||'';
  const breakReqId=new URLSearchParams(location.search).get('reqId')||'';
  const flexTitle=new URLSearchParams(location.search).get('flexTitle')||'';
  const flexBody=new URLSearchParams(location.search).get('flexBody')||'';
  const flexLink=new URLSearchParams(location.search).get('flexLink')||'';

  useEffect(()=>{
    const initLiff=(id)=>{
      setLiffId(id);
      return liff.init({liffId:id}).then(()=>{
        if(!liff.isLoggedIn()){liff.login({redirectUri:location.href});return}
        if(flexTitle&&flexLink){setPhase('ticketFlex');return}
        if(approveReg){return liff.getProfile().then(p=>{setProfile(p);setPhase('approveReg')})}
        if(breakShare){setPhase('breakShare');return}
        if(action==='share'){setPhase('share');return}
        return liff.getProfile().then(p=>{
          setProfile(p);
          setPhase('loading');
          return sfGetUser(p.userId).then(r=>{
            if(r&&r.ok&&r.blocked){setBlocked(true);setPhase('main');return}
            if(r&&r.ok&&r.exists){setUserProfile(r.profile);setPhase('main')}
            else{setPhase('register')}
          });
        });
      });
    };
    if(LIFF_ID_HARDCODED){
      initLiff(LIFF_ID_HARDCODED).catch(err=>{setLiffErr(String(err&&err.message||err));setPhase('error')});
      return;
    }
    sfConfig().then(cfg=>{
      const id=cfg&&cfg.ok?cfg.liffId:'';
      if(!id){setLiffErr('尚未在 GAS 指令碼屬性設定 LIFF_ID，請聯繫管理者');setPhase('error');return}
      return initLiff(id);
    }).catch(err=>{setLiffErr(String(err&&err.message||err));setPhase('error')});
  },[]);

  if(phase==='error')return(<div className="min-h-screen flex items-center justify-center p-6"><p className="text-xs text-red-400 text-center bg-red-500/10 border border-red-500/20 p-4 rounded-2xl">{liffErr}</p></div>);
  if(phase==='liffInit'||phase==='loading')return(<div className="min-h-screen flex flex-col items-center justify-center gap-3"><Spinner size={36} className="text-amber-500"/><p className="text-xs text-gray-400 font-medium tracking-wider">系統載入中…</p></div>);
  if(phase==='share')return(<ShareFlow sid={sid} liffId={liffId}/>);
  if(phase==='approveReg')return(<ApproveRegFlow reqId={approveReg} profile={profile}/>);
  if(phase==='breakShare')return(<BreakShareFlow kind={breakShare} reqId={breakReqId}/>);
  if(phase==='ticketFlex')return(<TicketFlexShare title={flexTitle} body={flexBody} link={flexLink}/>);
  if(blocked)return(<div className="min-h-screen flex items-center justify-center p-6"><p className="text-xs text-red-400 text-center bg-red-500/10 border border-red-500/20 p-4 rounded-2xl">{SF_T.zh.accountBlocked} / {SF_T.vi.accountBlocked}</p></div>);
  if(phase==='register')return(<RegisterFlow profile={profile} sid={sid} onDone={()=>{sfGetUser(profile.userId).then(r=>{if(r&&r.ok&&r.exists){
    if(sid){location.href=location.href.split('?')[0]+'?sid='+sid;return}
    setUserProfile(r.profile);setPhase('main');
  }})}}/>);
  return sid?(<DetailPage profile={profile} userProfile={userProfile} sid={sid} liffId={liffId}/>):(<ListPage profile={profile} userProfile={userProfile} liffId={liffId}/>);
}

class __EB extends React.Component{constructor(p){super(p);this.state={e:false}}static getDerivedStateFromError(){return{e:true}}componentDidCatch(err){try{window.__showFallback(3,{lineno:0,msg:(err&&err.message)||String(err)})}catch(e){}}render(){return this.state.e?null:this.props.children}}
ReactDOM.createRoot(document.getElementById('root')).render(<__EB><App/></__EB>);
})();
</script>
</body>
</html>
