  var PAGE="safety",PCODE="02";
  var __fbL={zh:{title:"網站更新中",info:function(p,v,c){return p+" 網頁 v"+v+" 更新中　代碼 "+c},keep:"你所輸入的舊資料仍保存在你的手機暫存檔中。",warn:"資料只存在本機，不會上傳雲端。"}};
  window.__fbLang='zh';
  window.__fbApply=function(){var L=__fbL.zh;var t=document.getElementById('__fbtitle');if(t)t.textContent=L.title;var k=document.getElementById('__fbkeep');if(k)k.textContent=L.keep;var w=document.getElementById('__fbwarn');if(w)w.textContent=L.warn;if(window.__fbData){var info=document.getElementById("__fbinfo");if(info)info.textContent=L.info(window.__fbData.page,window.__fbData.ver,window.__fbData.code);try{var md=document.getElementById("__fbmsg");if(md&&window.__fbData.msg){md.textContent=window.__fbData.msg;md.style.display="block";}}catch(_e){}}};
  window.__showFallback=function(src,detail){
    if(window.__shownFallback)return;window.__shownFallback=true;
    try{
      var ver=(document.title.match(/v?(\d+\.\d+[-.]\d+)/)||[])[1]||"?";
      var line=(detail&&detail.lineno)?detail.lineno:0;
      var ecode=PCODE+String(src).padStart(2,"0")+String(line%10000).padStart(4,"0");
      window.__fbData={page:PAGE,ver:ver,code:ecode,msg:(detail&&detail.msg)||''};
      var el=document.getElementById("__fallback");
      if(el){window.__fbApply();el.style.display="flex";}
    }catch(_e){}
  };
  window.addEventListener("error",function(e){window.__showFallback(1,{lineno:e.lineno,msg:(e.message||'')+(e.filename?(' @'+e.filename.split('/').pop()+':'+e.lineno+':'+e.colno):'')});},true);
</script>

function PendingApprovalScreen({reqId,store,onApproved}){
  const[shareStatus,setShareStatus]=useState(''); // ''/sharing/done/cancelled/error
  const[checkStatus,setCheckStatus]=useState(''); // ''/checking/pending/approved/rejected
  const doShare=async()=>{
    setShareStatus('sharing');
    try{
      if(!(liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker'))){setShareStatus('error');return}
      const uri='https://liff.line.me/'+LIFF_ID_HARDCODED+'?approveReg='+reqId;
      const res=await liff.shareTargetPicker([{type:'flex',altText:'審核通知',contents:{
        type:'bubble',
        body:{type:'box',layout:'vertical',backgroundColor:'#FFFFFF',paddingAll:'lg',contents:[
          {type:'text',text:'📝 人員登記審核通知',weight:'bold',size:'md',color:'#111111'},
          {type:'text',text:'請主管協助審核此筆登記申請',size:'sm',color:'#666666',wrap:true,margin:'md'},
          {type:'text',text:'審核代碼：'+reqId,size:'xs',color:'#999999',margin:'md'}
        ]},
        footer:{type:'box',layout:'vertical',paddingAll:'lg',contents:[
          {type:'button',style:'primary',color:'#d97706',height:'sm',action:{type:'uri',label:'前往審核',uri:uri}}
        ]}
      }}]);
      setShareStatus(res?'done':'cancelled');
    }catch(_e){setShareStatus('error')}
  };
  const doCheck=async()=>{
    setCheckStatus('checking');
    try{
      const r=await sfCheckPendingStatus(reqId);
      if(r&&r.ok)setCheckStatus(r.status);else setCheckStatus('')
    }catch(_e){setCheckStatus('')}
  };
  if(checkStatus==='approved')return(<div className="min-h-screen flex flex-col items-center justify-center gap-4 p-6 text-center"><p className="text-base text-emerald-500 font-semibold">✓ 已核准！</p><button onClick={onApproved} className="px-6 py-3 rounded-xl bg-amber-600 text-white text-sm font-bold">開始使用</button></div>);
  return(<div className="min-h-screen flex flex-col items-center justify-center gap-5 p-6 text-center">
    <div className="w-16 h-16 rounded-full bg-amber-500/15 flex items-center justify-center text-2xl">⏳</div>
    <div><p className="text-base text-gray-100 font-semibold">查無此編號的員工資料</p><p className="text-sm text-gray-400 mt-1">已建立審核申請，請將下方通知分享給主管審核</p></div>
    <div className="bg-white/[0.04] rounded-xl px-4 py-2.5"><p className="text-xs text-gray-500">審核代碼</p><p className="text-lg text-amber-400 font-bold font-mono">{reqId}</p></div>
    <div className="w-full max-w-xs space-y-2.5">
      <button onClick={doShare} disabled={shareStatus==='sharing'} className="w-full py-3 rounded-xl bg-[#06C755] text-white text-sm font-bold disabled:opacity-50 flex items-center justify-center gap-2">{shareStatus==='sharing'?<Spinner size={14}/>:<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.5 2 2 5.6 2 10c0 3.9 3.6 7.2 8.4 7.9.3.1.8.2.9.5.1.3.1.7 0 1l-.1.9c0 .3-.2 1.1 1 .6 1.1-.5 6.2-3.7 8.5-6.3C22.1 12.6 22 11.3 22 10c0-4.4-4.5-8-10-8z"/></svg>}分享給主管審核</button>
      {shareStatus==='done'&&<p className="text-xs text-emerald-400">✓ 已分享</p>}
      {shareStatus==='cancelled'&&<p className="text-xs text-gray-500">已取消分享</p>}
      {shareStatus==='error'&&<p className="text-xs text-red-400">分享失敗，請確認在LINE App內開啟</p>}
      <button onClick={doCheck} disabled={checkStatus==='checking'} className="w-full py-3 rounded-xl bg-white/[0.06] border border-white/[0.1] text-gray-300 text-sm font-semibold disabled:opacity-50 flex items-center justify-center gap-2">{checkStatus==='checking'&&<Spinner size={14}/>}檢查核准情形</button>
      {checkStatus==='pending'&&<p className="text-xs text-gray-500">尚未核准，請耐心等候</p>}
      {checkStatus==='rejected'&&<p className="text-xs text-red-400">很抱歉，這筆申請已被拒絕</p>}
    </div>
  </div>);
}

  const[pendingReqId,setPendingReqId]=useState(''); // 查無資料時,送出審核請求後拿到的審核代碼
  const[pwdMode,setPwdMode]=useState(''); // ''=不用處理密碼(非老師身分)/verify=既有密碼要先登入/setup1/setup2=設定新密碼(分兩步驟輸入確認)
  const[pwdInput,setPwdInput]=useState('');const[pwdSetup1,setPwdSetup1]=useState('');const[pwdErr,setPwdErr]=useState('');const[pwdBusy,setPwdBusy]=useState(false);
  const[pwdVerified,setPwdVerified]=useState(false);const[finalPwd,setFinalPwd]=useState(''); // 通過驗證/設定完成後的密碼(setup情境下submit時要用)
  const langDone=!!lang;
  const step1Done=langDone&&!!store;
  const canSubmit=(()=>{
    if(!step1Done||!personType)return false;
    if(personType==='manager')return subType&&(code.trim()||name.trim())&&gender&&shift&&city&&dist;
    if(personType==='frontdesk')return code.trim()||name.trim();
    if(personType==='student')return code.trim()||name.trim();
    if(personType==='teacher')return code.trim()&&gender&&shift&&city&&dist&&pwdVerified;
    return false;
  })();
  const doCheck=async()=>{
    if(!code.trim())return;
    setCheckBusy(true);setCheckMsg('');setPwdVerified(false);setPwdInput('');setPwdSetup1('');setPwdErr('');
    try{
      const r=await checkStaffCode(code.trim());
      if(r&&r.ok&&r.found){
        if(r.gender)setGender(r.gender);
        if(r.shift)setShift(r.shift);
        setCheckFound(true);
        if(r.hasLockPwd){setPwdMode('verify');setCheckMsg('✓ 查到員工資料，請輸入你原本設定的密碼')}
        else{setPwdMode('setup1');setCheckMsg('✓ 查到員工資料，請設定4位數密碼')}
      }else{setCheckFound(false);setPwdMode('setup1');setCheckMsg('查無此編號，填完資料後將送交主管審核')}
    }catch(_e){setCheckMsg('查詢失敗')}
    setCheckBusy(false);
  };
  const doPwdVerify=async()=>{
    if(pwdInput.length!==4)return;
    setPwdBusy(true);setPwdErr('');
    try{
      const r=await gasLoginPwd(code.trim(),lockPwdCred(code.trim(),pwdInput));
      if(r&&r.ok){setPwdVerified(true);setFinalPwd(pwdInput)}else{setPwdErr('密碼錯誤');setPwdInput('')}
    }catch(e){setPwdErr(String(e))}
    setPwdBusy(false);
  };
  const doPwdSetupStep=()=>{
    if(pwdMode==='setup1'){
      if(!isValidPin(pwdInput)){setPwdErr('密碼不可4碼相同或連續遞增/遞減');setPwdInput('');return}
      setPwdSetup1(pwdInput);setPwdInput('');setPwdErr('');setPwdMode('setup2');
    }else if(pwdMode==='setup2'){
      if(pwdInput!==pwdSetup1){setPwdErr('兩次輸入不一致，請重新設定');setPwdInput('');setPwdSetup1('');setPwdMode('setup1');return}
      setPwdVerified(true);setFinalPwd(pwdInput);setPwdErr('');
    }
  };
  const submit=async()=>{
    if(!canSubmit)return;
    setBusy(true);setErr('');
    const payload={lineUserId:profile.userId,displayName:profile.displayName,store,personType,subType,name:personType==='teacher'?code.trim():name.trim(),code:personType==='teacher'?'':code.trim(),lang,gender,shift,city,dist};
    try{
      if(personType==='teacher'&&checkFound===false){
        // 查無此編號:不直接登記,改送交主管審核(密碼先存起來,之後這個人正式建檔時再套用)
        const r=await sfRegisterRequest({...payload,pwdCred:lockPwdCred(code.trim(),finalPwd)});
        if(r&&r.ok){setPendingReqId(r.reqId);setBusy(false);return}
        setErr((r&&r.error)||'送出失敗');setBusy(false);return;
      }

      if(r&&r.ok){
        // 老師身分且是第一次設定密碼(setup情境)的話,順便同步存回staff.json
        if(personType==='teacher'&&checkFound===true&&pwdMode==='setup2'){
          try{await gasSetInitialPwd(code.trim(),lockPwdCred(code.trim(),finalPwd))}catch(_e){}
        }
        onDone();return; // 成功就不把busy設回false,按鈕保持灰色直到頁面跳轉,避免誤點兩次

  return(<div className="min-h-screen flex items-center justify-center p-4">

      {langDone&&(<div><label className="text-sm text-gray-400 block mb-2">{t.chooseStore}</label><div className="grid grid-cols-2 gap-2">{STORES.map(s=>(<button key={s} onClick={()=>setStore(s)} className={`py-3 rounded-xl text-sm font-semibold ${store===s?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{s}</button>))}</div></div>)}

      {step1Done&&(<div><label className="text-sm text-gray-400 block mb-2">{t.choosePersonType}</label><div className="grid grid-cols-1 gap-2">

        <button onClick={()=>setPersonType('frontdesk')} className={`py-3 rounded-xl text-sm font-semibold ${personType==='frontdesk'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.typeFrontdesk}</button>

      </div></div>)}

      {personType==='manager'&&(<div className="space-y-3">
        <div><label className="text-sm text-gray-400 block mb-2">{t.chooseSubType}</label><div className="grid grid-cols-2 gap-2">{t.subTypes.map((s,i)=>(<button key={s} onClick={()=>setSubType(SF_T.zh.subTypes[i])} className={`py-2.5 rounded-xl text-xs font-semibold ${subType===SF_T.zh.subTypes[i]?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{s}</button>))}</div></div>

        <div><label className="text-sm text-gray-400 block mb-2">{t.customNameLabel}</label><input value={name} onChange={e=>setName(e.target.value)} placeholder={t.customNamePh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100"/><p className="text-xs text-gray-600 mt-1">{t.codeOrNameHint}</p></div>
        <div><label className="text-sm text-gray-400 block mb-2">{t.gender}</label><div className="grid grid-cols-2 gap-2"><button onClick={()=>setGender('M')} className={`py-2.5 rounded-xl text-sm font-semibold ${gender==='M'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.genderM}</button><button onClick={()=>setGender('F')} className={`py-2.5 rounded-xl text-sm font-semibold ${gender==='F'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.genderF}</button></div></div>
        <div><label className="text-sm text-gray-400 block mb-2">{t.shift}</label><div className="grid grid-cols-2 gap-2"><button onClick={()=>setShift('day')} className={`py-2.5 rounded-xl text-sm font-semibold ${shift==='day'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.shiftDay}</button><button onClick={()=>setShift('night')} className={`py-2.5 rounded-xl text-sm font-semibold ${shift==='night'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.shiftNight}</button></div></div>
        <div><label className="text-sm text-gray-400 block mb-2">{t.addr}</label><div className="grid grid-cols-2 gap-2">
          <select value={city} onChange={e=>{setCity(e.target.value);setDist('')}} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-2 py-3 text-sm text-gray-100"><option value="">{t.addrCity}</option>{CITY_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}</select>
          <select value={dist} onChange={e=>setDist(e.target.value)} disabled={!city} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-2 py-3 text-sm text-gray-100 disabled:opacity-40"><option value="">{t.addrDist}</option>{(TW_REGIONS&&TW_REGIONS[city]||[]).map(d=><option key={d} value={d}>{d}</option>)}</select>
        </div></div>
      </div>)}

      {personType==='student'&&(<div className="space-y-3">
        <div><label className="text-sm text-gray-400 block mb-2">{t.teacherCode}</label><input value={code} onChange={e=>setCode(e.target.value.replace(/[^a-zA-Z0-9]/g,''))} placeholder={t.teacherCodePh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100 text-center tracking-widest"/><p className="text-xs text-red-400 mt-1">{t.codeHintForNonTeacher}</p></div>
        <div><label className="text-sm text-gray-400 block mb-2">{t.customNameLabel}</label><input value={name} onChange={e=>setName(e.target.value)} placeholder={t.customNamePh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100"/><p className="text-xs text-gray-600 mt-1">{t.codeOrNameHint}</p></div>
      </div>)}

      {personType==='frontdesk'&&(<div className="space-y-3">
        <div><label className="text-sm text-gray-400 block mb-2">{t.teacherCode}</label><input value={code} onChange={e=>setCode(e.target.value.replace(/[^a-zA-Z0-9]/g,''))} placeholder={t.teacherCodePh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100 text-center tracking-widest"/><p className="text-xs text-red-400 mt-1">{t.codeHintForNonTeacher}</p></div>
        <div><label className="text-sm text-gray-400 block mb-2">{t.customNameLabel}</label><input value={name} onChange={e=>setName(e.target.value)} placeholder={t.customNamePh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100"/><p className="text-xs text-gray-600 mt-1">{t.codeOrNameHint}</p></div>
      </div>)}

      {personType==='teacher'&&(<div className="space-y-3">
        <div><label className="text-sm text-gray-400 block mb-2">{t.teacherCode}</label><div className="flex gap-2"><input value={code} onChange={e=>{setCode(e.target.value.replace(/[^a-zA-Z0-9]/g,''));setCheckFound(null);setCheckMsg('');setPwdMode('');setPwdVerified(false);setPwdInput('');setPwdSetup1('');setPwdErr('')}} placeholder={t.teacherCodePh} className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100 text-center tracking-widest"/><button onClick={doCheck} disabled={checkBusy||!code.trim()} className="px-4 py-3 rounded-xl bg-white/[0.08] text-gray-300 text-sm font-semibold disabled:opacity-50 flex-shrink-0">{checkBusy?<Spinner size={14}/>:'檢查'}</button></div>{checkMsg&&<p className={`text-xs mt-1 ${checkFound?'text-emerald-400':'text-amber-400'}`}>{checkMsg}</p>}</div>
        {pwdMode==='verify'&&!pwdVerified&&(<div className="bg-white/[0.03] border border-white/[0.08] rounded-xl p-3 space-y-2"><p className="text-xs text-gray-400">請輸入你原本設定的4位數密碼</p><input value={pwdInput} onChange={e=>{setPwdInput(e.target.value.replace(/\D/g,'').slice(0,4));setPwdErr('')}} inputMode="numeric" type="password" maxLength={4} placeholder="••••" className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-3 text-lg text-center text-gray-100 tracking-[0.5em]"/>{pwdErr&&<p className="text-xs text-red-400">{pwdErr}</p>}<button onClick={doPwdVerify} disabled={pwdBusy||pwdInput.length!==4} className="w-full py-2.5 rounded-xl bg-amber-600 text-white text-sm font-bold disabled:opacity-50 disabled:bg-white/[0.06] disabled:text-gray-600">{pwdBusy?<Spinner size={14}/>:'登入'}</button></div>)}
        {(pwdMode==='setup1'||pwdMode==='setup2')&&!pwdVerified&&(<div className="bg-white/[0.03] border border-white/[0.08] rounded-xl p-3 space-y-2"><p className="text-xs text-gray-400">{pwdMode==='setup1'?'請設定4位數密碼（不可4碼相同或連續遞增/遞減）':'請再輸入一次確認'}</p><input value={pwdInput} onChange={e=>{setPwdInput(e.target.value.replace(/\D/g,'').slice(0,4));setPwdErr('')}} inputMode="numeric" type="password" maxLength={4} placeholder="••••" className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-3 text-lg text-center text-gray-100 tracking-[0.5em]"/>{pwdErr&&<p className="text-xs text-red-400">{pwdErr}</p>}<button onClick={doPwdSetupStep} disabled={pwdInput.length!==4} className="w-full py-2.5 rounded-xl bg-amber-600 text-white text-sm font-bold disabled:opacity-50 disabled:bg-white/[0.06] disabled:text-gray-600">{pwdMode==='setup1'?'下一步':'確認設定'}</button></div>)}
        {pwdVerified&&<p className="text-xs text-emerald-400">✓ 密碼{pwdMode==='verify'?'驗證':'設定'}完成</p>}
        <div><label className="text-sm text-gray-400 block mb-2">{t.gender}</label><div className="grid grid-cols-2 gap-2"><button onClick={()=>setGender('M')} className={`py-2.5 rounded-xl text-sm font-semibold ${gender==='M'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.genderM}</button><button onClick={()=>setGender('F')} className={`py-2.5 rounded-xl text-sm font-semibold ${gender==='F'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.genderF}</button></div></div>
        <div><label className="text-sm text-gray-400 block mb-2">{t.shift}</label><div className="grid grid-cols-2 gap-2"><button onClick={()=>setShift('day')} className={`py-2.5 rounded-xl text-sm font-semibold ${shift==='day'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.shiftDay}</button><button onClick={()=>setShift('night')} className={`py-2.5 rounded-xl text-sm font-semibold ${shift==='night'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.shiftNight}</button></div></div>
        <div><label className="text-sm text-gray-400 block mb-2">{t.addr}</label><div className="grid grid-cols-2 gap-2">
          <select value={city} onChange={e=>{setCity(e.target.value);setDist('')}} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-2 py-3 text-sm text-gray-100"><option value="">{t.addrCity}</option>{CITY_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}</select>
          <select value={dist} onChange={e=>setDist(e.target.value)} disabled={!city} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-2 py-3 text-sm text-gray-100 disabled:opacity-40"><option value="">{t.addrDist}</option>{(TW_REGIONS&&TW_REGIONS[city]||[]).map(d=><option key={d} value={d}>{d}</option>)}</select>
        </div></div>
      </div>)}

      {err&&<p className="text-xs text-red-400 text-center">{err}</p>}
      {personType&&<button onClick={submit} disabled={!canSubmit||busy} className={`w-full py-3.5 rounded-xl font-bold transition-all flex items-center justify-center gap-2 ${canSubmit&&!busy?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-600 cursor-not-allowed'}`}>{busy&&<Spinner/>}{busy?t.submitting:t.submitBtn}</button>}
    </div>
  </div>);
}

function ListPage({profile,userProfile,liffId}){
  const t=SF_T[userProfile.lang||'zh'];
  const isRealAdmin=userProfile.personType==='admin';
  const[viewAsRole,setViewAsRole]=useState(''); // admin專用:模擬用其他身分瀏覽,純前端切換,不影響GAS上真正的身分
  const effType=isRealAdmin&&viewAsRole?viewAsRole:userProfile.personType;
  const isManagerLevel=effType==='manager'||effType==='admin';
  const isAdmin=effType==='admin';
  const canSeeAllStores=effType==='admin'||(effType==='manager'&&(userProfile.subType==='執行長'||userProfile.subType==='區經理'));
  const[tab,setTab]=useState('survey'); // survey/users
  const[list,setList]=useState(undefined);
  const[showCreate,setShowCreate]=useState(false);
  const[newTitle,setNewTitle]=useState('');const[createBusy,setCreateBusy]=useState(false);
  const[queryOpenId,setQueryOpenId]=useState('');const[queryResult,setQueryResult]=useState(null);
  const[history,setHistory]=useState(null);const[showHistory,setShowHistory]=useState(false);
  const[users,setUsers]=useState(undefined);const[storeFilter,setStoreFilter]=useState('');
  const[busyUser,setBusyUser]=useState('');
  const load=()=>{
    sfListSurveys(profile.userId).then(r=>{
      if(r&&r.ok&&Array.isArray(r.list)){
        setList(r.list.filter(s=>!s.endDate));
        if(isAdmin)setHistory(r.list.filter(s=>s.endDate));
      }else{setList([])}
    }).catch(()=>setList([]));
  };
  const loadUsers=()=>{
    sfListUsers(profile.userId).then(r=>{if(r&&r.ok)setUsers(r.list||[]);else setUsers([])}).catch(()=>setUsers([]));
  };
  useEffect(()=>{if(isManagerLevel){load();loadUsers()}},[]);
  const doCreate=async()=>{
    if(!newTitle.trim())return;
    setCreateBusy(true);
    try{const r=await sfCreateSurvey(newTitle.trim(),profile.userId);if(r&&r.ok){setShowCreate(false);setNewTitle('');load()}}catch(_e){}
    setCreateBusy(false);
  };
  const[busyEnd,setBusyEnd]=useState('');
  const doEnd=async(id)=>{setBusyEnd(id);try{await sfEndSurvey(id);load()}catch(_e){}setBusyEnd('')};
  const[busyDelHist,setBusyDelHist]=useState('');
  const doDeleteHistory=async(id)=>{setBusyDelHist(id);try{await sfDeleteSurvey(id,profile.userId);load()}catch(_e){}setBusyDelHist('')};
  const doDeleteUser=async(targetId)=>{
    setBusyUser(targetId);
    try{await sfDeleteUser(profile.userId,targetId);loadUsers()}catch(_e){}
    setBusyUser('');
  };
  const doBlockUser=async(targetId)=>{
    setBusyUser(targetId);
    try{await sfBlockUser(profile.userId,targetId);loadUsers()}catch(_e){}
    setBusyUser('');
  };
  const dayOptions=(s)=>{
    const start=new Date(s.createdAt||Date.now());start.setHours(0,0,0,0);
    const now=new Date();now.setHours(0,0,0,0);
    const days=Math.floor((now-start)/86400000)+1;
    const opts=[];
    for(let n=1;n<=Math.max(1,days);n++){
      const d=new Date(start.getTime()+(n-1)*86400000);
      const p=x=>String(x).padStart(2,'0');
      opts.push({n:n,date:d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())});
    }
    return opts;
  };
  const doQuery=async(surveyId,date)=>{
    setQueryOpenId(surveyId);setQueryResult(null);
    if(!date)return;
    const r=await sfDayStatus(surveyId,date,profile.userId);
    if(r&&r.ok)setQueryResult(r);
  };
  const[histQueryOpenId,setHistQueryOpenId]=useState('');
  const[histQueryResult,setHistQueryResult]=useState(null);
  const[histQueryDay,setHistQueryDay]=useState({n:0,date:''});
  const[copyDayMsg,setCopyDayMsg]=useState('');
  const doHistQuery=async(surveyId,dayObj)=>{
    setHistQueryOpenId(surveyId);setHistQueryResult(null);setHistQueryDay(dayObj);
    const r=await sfDayStatus(surveyId,dayObj.date,profile.userId);
    if(r&&r.ok)setHistQueryResult(r);
  };
  const copyDayText=()=>{
    if(!histQueryResult)return;
    const text='day '+histQueryDay.n+' :'+histQueryDay.date+'\n'+t.reportedCount+'：'+histQueryResult.did.length+'人 分別是：'+histQueryResult.did.map(r=>r.display).join('、')+'\n'+t.notReportedCount+'：'+histQueryResult.notDid.length+'人 分別是：'+histQueryResult.notDid.join('、');
    try{navigator.clipboard.writeText(text).then(()=>{setCopyDayMsg(t.copiedMsg);setTimeout(()=>setCopyDayMsg(''),2000)}).catch(()=>{})}catch(_e){}
  };
  const statusLabel=(k)=>t['status'+k[0].toUpperCase()+k.slice(1)]||k;
  const fmtTime=(tm)=>{try{const d=new Date(tm);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')}catch(_e){return ''}};
  const detailUrl=(id)=>'https://liff.line.me/'+liffId+'?sid='+id; // 用LIFF專屬網址格式,確保LINE登入導轉不會弄丟參數
  const[busyPush,setBusyPush]=useState('');const[pushMsg,setPushMsg]=useState('');const[pushErr,setPushErr]=useState('');const[pushAddFriendUrl,setPushAddFriendUrl]=useState('');

  };
  const openDetail=(id)=>{location.href=location.href.split('?')[0]+'?sid='+id};
  const personTypeLabel=(u)=>u.personType==='manager'?(u.subType||t.typeManager):u.personType==='frontdesk'?t.typeFrontdesk:u.personType==='student'?t.typeStudent:u.personType==='admin'?t.typeTeacher:t.typeTeacher;
  const displayNameOf=(u)=>{
    if(u.personType==='teacher')return u.name;
    const code=String(u.code||'').trim();const name=String(u.name||'').trim();
    if(code&&name)return code+'號 '+name;

    return u.displayName||'';
  };
  const USER_TYPE_ORDER={manager:0,admin:0,frontdesk:1,student:2,teacher:3};
  const displayUsers=useMemo(()=>(users||[]).filter(u=>!storeFilter||u.store===storeFilter).slice().sort((a,b)=>{
    const oa=USER_TYPE_ORDER[a.personType]??9;const ob=USER_TYPE_ORDER[b.personType]??9;
    if(oa!==ob)return oa-ob;
    if(a.personType==='teacher'&&b.personType==='teacher'){
      const na=parseInt(String(a.name).replace('-',''),10);const nb=parseInt(String(b.name).replace('-',''),10);
      if(!isNaN(na)&&!isNaN(nb))return na-nb;

    return String(displayNameOf(a)).localeCompare(String(displayNameOf(b)));
  }),[users,storeFilter]);
  const[myReports,setMyReports]=useState(undefined);
  const[showProfileDetail,setShowProfileDetail]=useState(false);
  const[localOverride,setLocalOverride]=useState({});
  const effProfile=useMemo(()=>({...userProfile,...localOverride}),[userProfile,localOverride]);
  const[editing,setEditing]=useState(false);
  const[fCode,setFCode]=useState('');const[fName,setFName]=useState('');const[fCity,setFCity]=useState('');const[fDist,setFDist]=useState('');
  const[saveBusy,setSaveBusy]=useState(false);const[savedMsg,setSavedMsg]=useState('');
  const saveProfile=async()=>{
    if(!fCode.trim()&&!fName.trim())return;
    setSaveBusy(true);
    try{
      const r=await sfRegister({lineUserId:profile.userId,displayName:userProfile.displayName,store:userProfile.store,personType:userProfile.personType,subType:userProfile.subType,name:fName.trim(),code:fCode.trim(),lang:userProfile.lang,gender:userProfile.gender,shift:userProfile.shift,city:fCity,dist:fDist});
      if(r&&r.ok){setLocalOverride({name:fName.trim(),code:fCode.trim(),city:fCity,dist:fDist});setSavedMsg(t.saved);setEditing(false);setTimeout(()=>setSavedMsg(''),2000)}
    }catch(_e){}
    setSaveBusy(false);
  };
  useEffect(()=>{if(!isManagerLevel)sfMyReportedSurveys(profile.userId).then(r=>{if(r&&r.ok)setMyReports(r.list||[])})},[]);

  return(<div className="min-h-screen p-4 pb-10">
    <div className="max-w-md mx-auto space-y-4">
      <div className="flex items-center justify-between pt-2">
        <h1 className="text-lg font-bold text-gray-100">{t.centerTitle}</h1>
        <div className="flex items-center gap-2 flex-shrink-0">
          {isRealAdmin&&<select value={viewAsRole} onChange={e=>setViewAsRole(e.target.value)} className="text-xs px-2 py-2 rounded-lg bg-white/[0.06] border border-white/[0.08] text-gray-300"><option value="">{t.switchRoleLabel}</option><option value="manager">{t.roleManager}</option><option value="frontdesk">{t.roleFrontdesk}</option><option value="teacher">{t.roleTeacher}</option></select>}
          {isManagerLevel&&<button onClick={()=>setShowCreate(v=>!v)} className="text-xs px-3 py-2 rounded-lg bg-amber-600 text-white font-semibold flex-shrink-0">{t.createNewBtn}</button>}

          <p className="text-xs text-gray-500">{t.myProfileTitle}</p>
          {userProfile.personType==='manager'&&!editing&&<button onClick={()=>{setFCode(effProfile.code||'');setFName(effProfile.name||'');setFCity(effProfile.city||'');setFDist(effProfile.dist||'');setEditing(true)}} className="text-[11px] px-2 py-1 rounded-lg bg-white/[0.06] text-gray-400 font-semibold">{t.editBtn}</button>}

          <input value={fName} onChange={e=>setFName(e.target.value)} placeholder={t.customNamePh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-lg px-3 py-2 text-sm text-gray-100"/>
          <div className="grid grid-cols-2 gap-2">
            <select value={fCity} onChange={e=>{setFCity(e.target.value);setFDist('')}} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-lg px-2 py-2 text-xs text-gray-200"><option value="">{t.addrCity}</option>{CITY_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}</select>

          </div>
          {savedMsg&&<p className="text-xs text-emerald-500">✓ {savedMsg}</p>}
          <div className="flex gap-2"><button onClick={()=>setEditing(false)} className="flex-1 py-2 rounded-lg bg-white/[0.06] text-gray-400 text-xs font-semibold">{t.cancelBtn}</button><button onClick={saveProfile} disabled={saveBusy||!fName.trim()} className="flex-1 py-2 rounded-lg bg-amber-600 text-white text-xs font-bold disabled:opacity-50 flex items-center justify-center gap-1">{saveBusy&&<Spinner size={11}/>}{t.saveBtn}</button></div>
        </div>)}
      </div>

      {!isManagerLevel?(<div className="space-y-2">
        <p className="text-xs text-gray-500">{t.myReportsSectionTitle}</p>
        {myReports===undefined?<p className="text-xs text-gray-600 text-center py-3">{t.loading}</p>:myReports.length===0?<p className="text-xs text-gray-600 text-center py-3">{t.noMyReports}</p>:myReports.map(s=>(
          <div key={s.id} onClick={()=>openDetail(s.id)} className="bg-white/[0.03] rounded-lg px-3 py-2.5 cursor-pointer flex items-center justify-between"><span className="text-sm text-gray-200">{s.title}</span>{s.endDate&&<span className="text-[10px] text-gray-500 flex-shrink-0">{t.ended}</span>}</div>
        ))}
      </div>):(<>
        <div className="flex gap-2"><button onClick={()=>setTab('survey')} className={`flex-1 py-2 rounded-lg text-xs font-semibold ${tab==='survey'?'bg-amber-600 text-white':'bg-white/[0.05] text-gray-400'}`}>{t.surveyListTab}</button><button onClick={()=>setTab('users')} className={`flex-1 py-2 rounded-lg text-xs font-semibold ${tab==='users'?'bg-amber-600 text-white':'bg-white/[0.05] text-gray-400'}`}>{t.userListTab}</button></div>

        {tab==='survey'&&(<>
        {showCreate&&(<div className="bg-white/[0.03] border border-amber-500/20 rounded-xl p-3 space-y-2">
          <label className="text-xs text-gray-500 block">{t.createTitleLabel}</label>
          <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder={t.createTitlePh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-lg px-3 py-2.5 text-sm text-gray-100"/>
          <button onClick={doCreate} disabled={createBusy||!newTitle.trim()} className="w-full py-2.5 rounded-xl bg-amber-600 text-white text-sm font-bold disabled:opacity-50 flex items-center justify-center gap-2">{createBusy&&<Spinner/>}{t.createBtn}</button>
        </div>)}

        {list===undefined?<p className="text-sm text-gray-600 text-center py-8">{t.loading}</p>:list.length===0?<p className="text-sm text-gray-500 text-center py-8">{t.noSurveys}</p>:list.map(s=>(
          <div key={s.id} className="bg-white/[0.03] rounded-xl p-3 space-y-2">
            <div className="flex items-center justify-between gap-2">
              <p onClick={()=>openDetail(s.id)} className="text-sm text-gray-200 font-medium cursor-pointer flex-1">{s.title}</p>
              <button onClick={()=>doPushFlex(s.id)} disabled={busyPush===s.id} className="text-xs px-2.5 py-1.5 rounded-lg bg-[#06C755] text-white font-semibold flex-shrink-0 disabled:opacity-50 flex items-center gap-1">{busyPush===s.id&&<Spinner size={11}/>}{pushMsg===s.id?t.pushedMsg:t.pushFlexBtn}</button>
              <button onClick={()=>shareSurvey(s)} className="text-xs px-2.5 py-1.5 rounded-lg bg-white/[0.06] text-gray-300 font-semibold flex-shrink-0">{t.shareBtn}</button>
            </div>
            <div className="flex gap-2">
              <select onChange={e=>doQuery(s.id,e.target.value)} defaultValue="" className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-lg px-2 py-1.5 text-xs text-gray-200"><option value="" disabled>{t.selectDay}</option>{dayOptions(s).map(o=>(<option key={o.n} value={o.date}>{'day'+o.n+': '+o.date}</option>))}</select>
              <button onClick={()=>doEnd(s.id)} disabled={busyEnd===s.id} className="px-3 py-1.5 rounded-lg bg-red-600/20 text-red-400 text-xs font-semibold flex-shrink-0 disabled:opacity-50 flex items-center gap-1">{busyEnd===s.id&&<Spinner/>}{t.endBtn}</button>
            </div>
            {pushErr.startsWith(s.id+':')&&(<div className="space-y-1.5">
              {pushAddFriendUrl?(<>
                <p className="text-[11px] text-amber-400">推播失敗，可能是你還沒把安全回報 Bot 加為好友</p>
                <a href={pushAddFriendUrl} target="_blank" rel="noreferrer" className="block w-full py-2 rounded-lg bg-[#06C755] text-white text-xs font-semibold text-center">➕ 一鍵加好友</a>
              </>):null}
              <p className="text-[10px] text-gray-600">{pushErr.slice(s.id.length+1)}</p>
            </div>)}
            {queryOpenId===s.id&&queryResult&&(<div className="space-y-1.5 pt-1"><p className="text-[11px] text-gray-500">{t.reportedCount} {queryResult.did.length}｜{t.notReportedCount} {queryResult.notDid.length}</p>{queryResult.did.map((r,i)=>(<div key={i} className="flex items-center justify-between bg-white/[0.03] rounded-lg px-2.5 py-1.5"><span className="text-xs text-gray-300">{r.display} {statusLabel(r.status)}{r.otherText?('、'+r.otherText):''}</span><span className="text-[10px] text-gray-500 flex-shrink-0">{fmtTime(r.time)}</span></div>))}</div>)}
          </div>
        ))}

        {isAdmin&&history&&history.length>0&&(<div className="space-y-2 pt-2 border-t border-white/[0.06]">
          <button onClick={()=>setShowHistory(v=>!v)} className="text-xs text-gray-500">{t.historyTitle}（{history.length}）{showHistory?'▲':'▼'}</button>
          {showHistory&&history.map(s=>(<div key={s.id} className="bg-white/[0.03] rounded-lg p-2.5 space-y-1.5">
            <div className="flex items-center justify-between"><span className="text-xs text-gray-400">{s.title}（{t.ended}）</span><button onClick={()=>doDeleteHistory(s.id)} disabled={busyDelHist===s.id} className="text-[10px] px-2 py-1 rounded bg-red-600/20 text-red-400 font-bold flex-shrink-0 disabled:opacity-50 flex items-center gap-1">{busyDelHist===s.id&&<Spinner size={10}/>}✕</button></div>
            <div className="flex gap-1.5"><select onChange={e=>{const o=JSON.parse(e.target.value);doHistQuery(s.id,o)}} defaultValue="" className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-lg px-2 py-1.5 text-[11px] text-gray-200"><option value="" disabled>{t.selectDay}</option>{dayOptions(s).map(o=>(<option key={o.n} value={JSON.stringify(o)}>{'day'+o.n+': '+o.date}</option>))}</select></div>
            {histQueryOpenId===s.id&&histQueryResult&&(<div className="space-y-1.5 pt-1">
              <p className="text-[11px] text-gray-500">{t.reportedCount} {histQueryResult.did.length}｜{t.notReportedCount} {histQueryResult.notDid.length}</p>
              <button onClick={copyDayText} className="w-full py-1.5 rounded bg-amber-600/20 text-amber-400 text-[11px] font-semibold">{copyDayMsg||t.copyDayBtn}</button>
            </div>)}
          </div>))}
        </div>)}
        </>)}

        {tab==='users'&&(<div className="space-y-2">
          {canSeeAllStores&&<select value={storeFilter} onChange={e=>setStoreFilter(e.target.value)} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-lg px-2 py-2 text-xs text-gray-200"><option value="">{t.storeFilterAll}</option>{STORES.map(s=><option key={s} value={s}>{s}</option>)}</select>}
          {users===undefined?<p className="text-sm text-gray-600 text-center py-8">{t.loading}</p>:displayUsers.map(u=>(
            <div key={u.lineUserId} className={`flex items-center justify-between bg-white/[0.03] rounded-lg px-3 py-2 ${u.blocked?'opacity-40':''}`}>
              <span className="text-sm text-gray-200">{canSeeAllStores?'['+u.store+'] ':''}{personTypeLabel(u)} · {displayNameOf(u)}{u.blocked?'（'+t.blockedTag+'）':''}</span>
              <div className="flex gap-1.5 flex-shrink-0">
                <button onClick={()=>doDeleteUser(u.lineUserId)} disabled={busyUser===u.lineUserId} className="text-[10px] px-2 py-1 rounded bg-white/[0.08] text-gray-400 font-bold disabled:opacity-50 flex items-center gap-1">{busyUser===u.lineUserId?<Spinner size={10}/>:'✕'}</button>
                <button onClick={()=>doBlockUser(u.lineUserId)} disabled={busyUser===u.lineUserId} className={`text-[10px] px-2 py-1 rounded font-bold disabled:opacity-50 flex items-center gap-1 ${u.blocked?'bg-emerald-600/20 text-emerald-400':'bg-red-600/20 text-red-400'}`}>{busyUser===u.lineUserId?<Spinner size={10}/>:'🚫'}</button>
              </div>
            </div>
          ))}
        </div>)}
      </>)}
    </div>
  </div>);
}

function DetailPage({profile,userProfile,sid,liffId}){
  const t=SF_T[userProfile.lang||'zh'];
  const displayName=userProfile.personType==='teacher'?userProfile.name:(userProfile.name||userProfile.displayName);
  const STATUS_OPTS=STATUS_KEYS.map(k=>[k,t['status'+k[0].toUpperCase()+k.slice(1)]]);
  const PERSON_ORDER={manager:0,admin:0,frontdesk:1,teacher:2};
  const[survey,setSurvey]=useState(undefined);
  const[status,setStatus]=useState('');
  const[otherText,setOtherText]=useState('');
  const[reports,setReports]=useState(null);
  const[sortMode,setSortMode]=useState('time'); // time/code/city/store
  const[showOther,setShowOther]=useState(false);
  const[noPermission,setNoPermission]=useState(false);
  const loadReports=()=>sfTodayReports(sid,profile.userId).then(r=>{if(r&&r.ok)setReports(r.list||[])});
  const loadSurvey=()=>{
    sfGetSurvey(sid,profile.userId).then(r=>{
      if(r&&r.ok){
        if(r.noPermission){setNoPermission(true);setSurvey(null);return}
        setSurvey(r.survey||null);
      }else{setSurvey(null)}
    }).catch(()=>setSurvey(null));
    loadReports(); // 跟上面sfGetSurvey同時發送,不用等它先回來——這兩個request互不依賴,平行打才不會延遲疊加
  };
  useEffect(()=>{loadSurvey()},[]);
  const[submitted,setSubmitted]=useState(false);
  const[submitting,setSubmitting]=useState(false);
  const submit=()=>{
    if(!survey||(!status&&!otherText.trim()))return;
    // 請求送出後GAS會在伺服器端繼續執行完成,就算使用者馬上關閉分頁也不影響資料寫入。
    // 畫面上先跑1秒轉圈圈再顯示完成訊息,純粹是給使用者一個「有在處理」的感覺,不是真的在等GAS回應。
    setSubmitting(true);
    sfSubmitReport(survey.id,profile.userId,status,otherText.trim()).catch(()=>{});
    setTimeout(()=>{setSubmitting(false);setSubmitted(true)},1000);
  };
  const statusLabel=(k)=>t['status'+k[0].toUpperCase()+k.slice(1)]||k;
  const fmtTime=(tm)=>{try{const d=new Date(tm);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')}catch(_e){return ''}};
  const sortedReports=useMemo(()=>{
    if(!reports)return null;
    if(sortMode==='time')return [...reports].sort((a,b)=>new Date(b.time)-new Date(a.time));
    if(sortMode==='store')return [...reports].sort((a,b)=>{
      const sc=String(a.store||'').localeCompare(String(b.store||''));
      if(sc!==0)return sc;
      const oa=PERSON_ORDER[a.personType]??9;const ob=PERSON_ORDER[b.personType]??9;
      return oa-ob;
    });
    if(sortMode==='city')return [...reports].sort((a,b)=>String(a.city||'').localeCompare(String(b.city||'')));
    // code:依人員別分組,老師組內改用數字比較(不是字串比較,不然"122"會排到"5"前面)
    return [...reports].sort((a,b)=>{
      const oa=PERSON_ORDER[a.personType]??9;const ob=PERSON_ORDER[b.personType]??9;
      if(oa!==ob)return oa-ob;
      if(a.personType==='teacher'&&b.personType==='teacher'){
        const na=parseInt(String(a.display).replace('-',''),10);const nb=parseInt(String(b.display).replace('-',''),10);
        if(!isNaN(na)&&!isNaN(nb))return na-nb;
      }
      return String(a.display).localeCompare(String(b.display));
    });
  },[reports,sortMode]);
  const canSeeAllStores=userProfile.personType==='admin'||(userProfile.personType==='manager'&&(userProfile.subType==='執行長'||userProfile.subType==='區經理'));
  const isManagerLevel=userProfile.personType==='manager'||userProfile.personType==='admin';
  const[shareBusy,setShareBusy]=useState(false);
  const shareNotReported=async()=>{
    if(!survey)return;
    setShareBusy(true);
    try{
      const today=new Date().toISOString().slice(0,10);
      const r=await sfDayStatus(survey.id,today,profile.userId);
      if(r&&r.ok){
        const msg=survey.title+'\n未回報人數 '+r.notDid.length+'人：'+r.notDid.join('、')+'\n請儘速至回報網頁進行回報';
        if(liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker')){
          await liff.shareTargetPicker([{type:'text',text:msg}]);
        }else{
          location.href='https://line.me/R/share?text='+encodeURIComponent(msg);
        }
      }
    }catch(_e){}
    setShareBusy(false);
  };
  if(submitting)return(<div className="min-h-screen flex flex-col items-center justify-center gap-4 p-6"><div className="text-amber-500"><Spinner size={36}/></div><p className="text-base text-gray-400">送出中…</p></div>);
  if(submitted){
    const shareRecord=()=>{
      const now=new Date();
      const p=x=>String(x).padStart(2,'0');
      const timeText=now.getFullYear()+'-'+p(now.getMonth()+1)+'-'+p(now.getDate())+' '+p(now.getHours())+':'+p(now.getMinutes());
      const statusText=statusLabel(status)+(otherText?('、'+otherText):'');
      const statusColor=status==='safe'?'#2ECC71':'#E67E22'; // 安全是綠色,其他狀況(積水/不舒服/其他)用橘色提醒
      const flex={
        type:'bubble',size:'giga',
        header:{type:'box',layout:'vertical',backgroundColor:'#096acb',paddingAll:'md',contents:[
          {type:'text',text:'🚨 '+(survey?survey.title:''),weight:'bold',color:'#FFFFFF',wrap:true}
        ]},
        body:{type:'box',layout:'vertical',backgroundColor:'#FFFFFF',paddingAll:'lg',spacing:'md',contents:[
          {type:'text',text:'回報時間：'+timeText+' - '+userProfile.store+' - '+displayName,color:'#555555',size:'sm',align:'start',wrap:true},
          {type:'text',text:statusText,color:statusColor,size:'xxl',weight:'bold',align:'center',margin:'lg'},
          {type:'button',action:{type:'uri',label:'天災安全回報平台',uri:'https://liff.line.me/'+liffId+'?sid='+sid},style:'link',height:'sm',color:'#eeeeff',margin:'none'}
        ]}
      };
      if(liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker')){
        liff.shareTargetPicker([{type:'flex',altText:survey?survey.title:'安全回報',contents:flex}]).catch(()=>{});
      }
    };
    return(<div className="min-h-screen flex flex-col items-center justify-center gap-3 p-6 text-center">
      <p className="text-2xl">✅</p>
      <p className="text-lg text-gray-100 font-bold">已收到你的回報</p>
      <p className="text-sm text-gray-400">可關閉此頁面，謝謝</p>
      <button onClick={shareRecord} className="mt-4 px-6 py-3 rounded-xl bg-[#06C755] text-white text-sm font-semibold">分享完成回報的紀錄</button>
    </div>);
  }
  return(<div className="min-h-screen p-4 pb-10">
    <div className="max-w-md mx-auto space-y-4">
      <div className="flex items-center justify-between pt-2">
        <p className="text-xs text-gray-500">{userProfile.store} · {displayName}</p>
        <a href={location.href.split('?')[0]} className="text-xs px-3 py-1.5 rounded-lg bg-white/[0.06] text-gray-300 font-semibold flex-shrink-0">{t.backHomeBtn}</a>
      </div>

      {isManagerLevel&&survey&&!survey.endDate&&(<button onClick={shareNotReported} disabled={shareBusy} className="w-full py-2.5 rounded-xl bg-[#06C755] text-white text-sm font-semibold disabled:opacity-50 flex items-center justify-center gap-2">{shareBusy&&<Spinner/>}{t.notReportedShareBtn}</button>)}

      {survey===undefined?<p className="text-base text-gray-600 text-center py-8">{t.loading}</p>:noPermission?(
        <p className="text-base text-red-400 text-center py-8">{t.invalidParam}</p>
      ):!survey?(
        <p className="text-base text-gray-500 text-center py-8">{t.noActiveSurvey}</p>
      ):(<>
        {survey.endDate?(<div className="bg-white/[0.03] rounded-2xl p-5"><p className="text-2xl text-gray-200 text-center font-bold leading-snug">{survey.title}</p><p className="text-lg text-gray-400 text-center mt-2">（{t.thisSurveyEnded||t.ended}）</p></div>):(
        <div className="bg-white/[0.03] rounded-2xl p-4 space-y-4">
          <p className="text-2xl text-gray-100 font-bold leading-snug">{survey.title}</p>
          <div className="grid grid-cols-2 gap-3">
            {STATUS_OPTS.map(([k,l])=>(<button key={k} onClick={()=>{setStatus(k);setShowOther(false)}} className={`py-7 rounded-2xl text-lg font-bold leading-tight transition-all ${status===k?'bg-amber-600 text-white':'bg-white/[0.07] text-gray-200'}`}>{l}</button>))}
            <button onClick={()=>{setShowOther(true);setStatus('')}} className={`py-7 rounded-2xl text-lg font-bold transition-all ${showOther?'bg-amber-600 text-white':'bg-white/[0.07] text-gray-200'}`}>{t.otherLabel}</button>
          </div>
          {showOther&&<input value={otherText} onChange={e=>setOtherText(e.target.value)} placeholder={t.otherPh} autoFocus className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-4 text-lg text-gray-100"/>}
          <button onClick={submit} disabled={!status&&!otherText.trim()} className="w-full py-5 rounded-2xl bg-red-600 text-white text-xl font-bold disabled:opacity-50">{t.submitReportBtn}</button>
        </div>)}

        <div className="space-y-2">
          <div className="flex items-center justify-between flex-wrap gap-2"><p className="text-sm text-gray-400 font-semibold">{(()=>{const d=new Date();return (d.getMonth()+1)+'/'+d.getDate()})()} {t.reportedList}</p><div className="flex gap-1.5 flex-wrap"><button onClick={()=>setSortMode('time')} className={`text-xs px-3 py-2 rounded-lg font-semibold ${sortMode==='time'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.sortByTime}</button>{isManagerLevel&&<button onClick={()=>setSortMode('code')} className={`text-xs px-3 py-2 rounded-lg font-semibold ${sortMode==='code'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.sortByCode}</button>}{isManagerLevel&&<button onClick={()=>setSortMode('city')} className={`text-xs px-3 py-2 rounded-lg font-semibold ${sortMode==='city'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.sortByCity}</button>}{canSeeAllStores&&<button onClick={()=>setSortMode('store')} className={`text-xs px-3 py-2 rounded-lg font-semibold ${sortMode==='store'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.sortByStore}</button>}</div></div>
          {sortedReports===null?<p className="text-sm text-gray-600 text-center py-3">{t.loading}</p>:sortedReports.length===0?<p className="text-sm text-gray-600 text-center py-3">{t.noReports}</p>:sortedReports.map((r,i)=>(
            <div key={i} className="bg-white/[0.04] rounded-xl px-4 py-3.5 border border-white/[0.05]"><div className="flex items-center justify-between gap-2"><span className="text-base text-gray-100 font-semibold">{canSeeAllStores&&r.store?('['+r.store+'] '):''}{r.display}{r.personType==='manager'&&r.subType?(' '+r.subType):''}</span><span className="text-xs text-gray-500 flex-shrink-0">{fmtTime(r.time)}</span></div><p className="text-sm text-gray-400 mt-0.5">{statusLabel(r.status)}{r.otherText?('、'+r.otherText):''}{isManagerLevel&&r.city?('　'+r.city+(r.dist||'')):''}</p></div>
          ))}
        </div>
      </>)}
    </div>
  </div>);
}

function ShareFlow({sid,liffId}){
  const[status,setStatus]=useState('loading'); // loading/picking/done/cancelled/error
  const[err,setErr]=useState('');
  useEffect(()=>{
    sfGetFlexContent(sid,liffId).then(r=>{
      if(!r||!r.ok){setStatus('error');setErr((r&&r.error)||'讀取失敗');return}
      setStatus('picking');
      if(!(liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker'))){setStatus('error');setErr('此環境不支援分享功能，請在LINE App內開啟');return}
      liff.shareTargetPicker([{type:'flex',altText:r.title,contents:r.flex}]).then(res=>{
        setStatus(res?'done':'cancelled');
      }).catch(e=>{setStatus('error');setErr(String(e&&e.message||e))});
    }).catch(e=>{setStatus('error');setErr(String(e))});
  },[]);
  return(<div className="min-h-screen flex flex-col items-center justify-center gap-4 p-6 text-center">
    {status==='loading'&&(<><Spinner size={32}/><p className="text-sm text-gray-400">準備分享內容…</p></>)}
    {status==='picking'&&(<><Spinner size={32}/><p className="text-sm text-gray-400">請選擇要分享的對象…</p></>)}
    {status==='done'&&(<p className="text-base text-emerald-500 font-semibold">✓ 已分享</p>)}
    {status==='cancelled'&&(<p className="text-sm text-gray-500">已取消分享</p>)}
    {status==='error'&&(<p className="text-sm text-red-400">{err}</p>)}
    {(status==='done'||status==='cancelled'||status==='error')&&<button onClick={()=>{try{liff.closeWindow()}catch(_e){location.href=location.href.split('?')[0]}}} className="px-6 py-3 rounded-xl bg-white/[0.06] text-gray-300 text-sm font-semibold">關閉</button>}
  </div>);
}

function ApproveRegFlow({reqId,profile}){
  const[phase,setPhase]=useState('checking'); // checking/denied/detail/done
  const[detail,setDetail]=useState(null);
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  const load=()=>{
    setPhase('checking');
    sfGetPendingDetail(profile.userId,reqId).then(r=>{
      if(r&&r.ok){setDetail(r.detail);setPhase('detail')}
      else{setErr((r&&r.error)||'查詢失敗');setPhase('denied')}
    }).catch(e=>{setErr(String(e));setPhase('denied')});
  };
  useEffect(()=>{load()},[]);
  const doApprove=async(approve)=>{
    setBusy(true);
    try{
      const r=await sfApprovePendingRegistration(profile.userId,reqId,approve);
      if(r&&r.ok){setPhase('done');setDetail(d=>({...d,status:approve?'approved':'rejected'}))}else{setErr((r&&r.error)||'操作失敗')}
    }catch(e){setErr(String(e))}
    setBusy(false);
  };
  const personTypeLabel=(pt)=>({manager:'主管',frontdesk:'櫃台',teacher:'老師',student:'教學處學生'}[pt]||pt);
  const genderLabel=(g)=>g==='M'?'男':g==='F'?'女':'—';
  const shiftLabel=(s)=>s==='day'?'早班':s==='night'?'晚班':'—';
  if(phase==='checking')return(<div className="min-h-screen flex flex-col items-center justify-center gap-4"><Spinner size={32}/><p className="text-sm text-gray-400">確認權限中…</p></div>);
  if(phase==='denied')return(<div className="min-h-screen flex items-center justify-center p-6"><p className="text-sm text-red-400 text-center">{err}</p></div>);
  if(!detail)return null;
  return(<div className="min-h-screen p-4">
    <div className="max-w-sm mx-auto space-y-4">
      <h1 className="text-lg font-bold text-gray-100 text-center pt-4">登記審核</h1>
      <div className="bg-white/[0.03] border border-white/[0.08] rounded-2xl p-4 space-y-2 text-sm">
        <div className="flex justify-between"><span className="text-gray-500">審核代碼</span><span className="text-gray-200 font-mono">{detail.reqId}</span></div>
        <div className="flex justify-between"><span className="text-gray-500">店別</span><span className="text-gray-200">{detail.store}</span></div>
        <div className="flex justify-between"><span className="text-gray-500">身分別</span><span className="text-gray-200">{personTypeLabel(detail.personType)}{detail.subType?('・'+detail.subType):''}</span></div>
        <div className="flex justify-between"><span className="text-gray-500">編號/名稱</span><span className="text-gray-200">{detail.code||detail.name||'—'}</span></div>
        {(detail.personType==='teacher'||detail.personType==='manager')&&(<>
          <div className="flex justify-between"><span className="text-gray-500">性別</span><span className="text-gray-200">{genderLabel(detail.gender)}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">班別</span><span className="text-gray-200">{shiftLabel(detail.shift)}</span></div>
          <div className="flex justify-between"><span className="text-gray-500">居住地</span><span className="text-gray-200">{detail.city}{detail.dist}</span></div>
        </>)}
        <div className="flex justify-between"><span className="text-gray-500">申請時間</span><span className="text-gray-200 text-xs">{detail.createdAt}</span></div>
      </div>
      {detail.status==='pending'?(
        <div className="grid grid-cols-2 gap-3">
          <button onClick={()=>doApprove(false)} disabled={busy} className="py-3 rounded-xl bg-red-500/15 border border-red-500/25 text-red-400 font-semibold disabled:opacity-50">拒絕</button>
          <button onClick={()=>doApprove(true)} disabled={busy} className="py-3 rounded-xl bg-emerald-600 text-white font-bold disabled:opacity-50">核准</button>
        </div>
      ):(
        <p className={`text-center text-sm font-semibold ${detail.status==='approved'?'text-emerald-400':'text-red-400'}`}>{detail.status==='approved'?'✓ 已核准':'已拒絕'}</p>
      )}
      {err&&<p className="text-xs text-red-400 text-center">{err}</p>}
      <button onClick={()=>{try{liff.closeWindow()}catch(_e){}}} className="w-full py-2.5 rounded-xl bg-white/[0.06] text-gray-400 text-sm font-semibold">關閉</button>
    </div>
  </div>);
}

function App(){
  const[phase,setPhase]=useState('liffInit'); // liffInit/loading/register/main/error
  const[profile,setProfile]=useState(null);
  const[userProfile,setUserProfile]=useState(null);
  const[liffErr,setLiffErr]=useState('');
  const[blocked,setBlocked]=useState(false);
  const[liffId,setLiffId]=useState('');
  const sid=new URLSearchParams(location.search).get('sid')||''; // 網址帶?sid=SF0001時直接顯示該筆通報,沒帶就顯示目前進行中的列表頁
  const action=new URLSearchParams(location.search).get('action')||''; // action=share時,Flex卡片上的分享按鈕點進來,直接跳shareTargetPicker
  const approveReg=new URLSearchParams(location.search).get('approveReg')||''; // 待審核登記的審核代碼,FLEX按鈕點進來走這個,不用先走登記流程

  useEffect(()=>{
    const initLiff=(id)=>{
      setLiffId(id);
      return liff.init({liffId:id}).then(()=>{
        if(!liff.isLoggedIn()){liff.login({redirectUri:location.href});return} // 明確帶目前完整網址(含?sid=...),避免LINE登入導轉過程弄丟參數
        if(approveReg){return liff.getProfile().then(p=>{setProfile(p);setPhase('approveReg')})} // 審核模式:不用先查有沒有登記過,直接進審核流程(裡面自己檢查主管權限)
        if(action==='share'){setPhase('share');return} // 分享模式不用先查有沒有登記過,直接進分享流程
        return liff.getProfile().then(p=>{
          setProfile(p);
          setPhase('loading');
          return sfGetUser(p.userId).then(r=>{
            if(r&&r.ok&&r.blocked){setBlocked(true);setPhase('main');return}
            if(r&&r.ok&&r.exists){setUserProfile(r.profile);setPhase('main')}
            else{setPhase('register')}
          });
        });
      });
    };
    if(LIFF_ID_HARDCODED){
      initLiff(LIFF_ID_HARDCODED).catch(err=>{setLiffErr(String(err&&err.message||err));setPhase('error')});
      return;
    }
    sfConfig().then(cfg=>{
      const id=cfg&&cfg.ok?cfg.liffId:'';
      if(!id){setLiffErr('尚未在GAS指令碼屬性設定LIFF_ID,請聯繫系統管理者');setPhase('error');return}
      return initLiff(id);
    }).catch(err=>{setLiffErr(String(err&&err.message||err));setPhase('error')});
  },[]);

  if(phase==='error')return(<div className="min-h-screen flex items-center justify-center p-6"><p className="text-sm text-red-400 text-center">{liffErr}</p></div>);
  if(phase==='liffInit'||phase==='loading')return(<div className="min-h-screen flex flex-col items-center justify-center gap-4"><div className="text-amber-500"><Spinner size={40}/></div><p className="text-base text-gray-400">載入中…</p></div>);
  if(phase==='share')return(<ShareFlow sid={sid} liffId={liffId}/>);
  if(phase==='approveReg')return(<ApproveRegFlow reqId={approveReg} profile={profile}/>);
  if(blocked)return(<div className="min-h-screen flex items-center justify-center p-6"><p className="text-sm text-red-400 text-center">{SF_T.zh.accountBlocked} / {SF_T.vi.accountBlocked}</p></div>);
  if(phase==='register')return(<RegisterFlow profile={profile} sid={sid} onDone={()=>{sfGetUser(profile.userId).then(r=>{if(r&&r.ok&&r.exists){
    // 登記完成導回原本帶的sid頁面(不然使用者原本是要去回報某一項,卻被丟到看不到那項的首頁)
    if(sid){location.href=location.href.split('?')[0]+'?sid='+sid;return}
    setUserProfile(r.profile);setPhase('main');
  }})}}/>);
  return sid?(<DetailPage profile={profile} userProfile={userProfile} sid={sid} liffId={liffId}/>):(<ListPage profile={profile} userProfile={userProfile} liffId={liffId}/>);
}

class __EB extends React.Component{constructor(p){super(p);this.state={e:false}}static getDerivedStateFromError(){return{e:true}}componentDidCatch(err){try{window.__showFallback(3,{lineno:0,msg:(err&&err.message)||String(err)})}catch(e){}}render(){return this.state.e?null:this.props.children}}
ReactDOM.createRoot(document.getElementById('root')).render(<__EB><App/></__EB>);
})();
</script>
</body>
