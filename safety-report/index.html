<title>安全回報</title>
<script>
  // ══════════ 全域錯誤攔截(白畫面診斷用,比照專案裡其他頁面的做法) ══════════
  var PAGE="safety",PCODE="02";
  var __fbL={zh:{title:"網站更新中",info:function(p,v,c){return p+" 網頁 v"+v+" 更新中　代碼 "+c},keep:"你所輸入的舊資料仍保存在你的手機暫存檔中。",warn:"資料只存在本機，不會上傳雲端。"}};
  window.__fbLang='zh';
  window.__fbApply=function(){var L=__fbL.zh;var t=document.getElementById('__fbtitle');if(t)t.textContent=L.title;var k=document.getElementById('__fbkeep');if(k)k.textContent=L.keep;var w=document.getElementById('__fbwarn');if(w)w.textContent=L.warn;if(window.__fbData){var info=document.getElementById("__fbinfo");if(info)info.textContent=L.info(window.__fbData.page,window.__fbData.ver,window.__fbData.code);try{var md=document.getElementById("__fbmsg");if(md&&window.__fbData.msg){md.textContent=window.__fbData.msg;md.style.display="block";}}catch(_e){}}};
  window.__showFallback=function(src,detail){
    if(window.__shownFallback)return;window.__shownFallback=true;
    try{
      var ver=(document.title.match(/v?(\d+\.\d+[-.]\d+)/)||[])[1]||"?";
      var line=(detail&&detail.lineno)?detail.lineno:0;
      var ecode=PCODE+String(src).padStart(2,"0")+String(line%10000).padStart(4,"0");
      window.__fbData={page:PAGE,ver:ver,code:ecode,msg:(detail&&detail.msg)||''};
      var el=document.getElementById("__fallback");
      if(el){window.__fbApply();el.style.display="flex";}
    }catch(_e){}
  };
  window.addEventListener("error",function(e){window.__showFallback(1,{lineno:e.lineno,msg:(e.message||'')+(e.filename?(' @'+e.filename.split('/').pop()+':'+e.lineno+':'+e.colno):'')});},true);
</script>

<!-- 白畫面救援畫面(語法/執行錯誤時顯示) -->
<div id="__fallback" style="display:none;position:fixed;inset:0;z-index:99999;background:#0a0a0f;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;font-family:-apple-system,sans-serif">
  <div style="width:64px;height:64px;border-radius:50%;border:3px solid #d97706;display:flex;align-items:center;justify-content:center;margin-bottom:24px">🔧</div>
  <h1 id="__fbtitle" style="font-size:22px;font-weight:500;color:#f3f4f6;margin:0 0 1rem;line-height:1.3">網站更新中</h1>
  <p id="__fbinfo" style="font-size:12px;color:#6b7280;margin:0 0 2rem;font-family:monospace"></p>
  <div id="__fbmsg" style="display:none;margin:-1rem 0 2rem;padding:10px 12px;background:#1e1b1b;border:1px solid #7f1d1d;border-radius:8px;font-family:monospace;font-size:11px;color:#fca5a5;max-width:90%;word-break:break-all;white-space:pre-wrap"></div>
  <div style="max-width:320px;padding:16px;background:#111114;border-radius:12px;border:1px solid #27272a">
    <p id="__fbkeep" style="font-size:13px;color:#9ca3af;margin:0 0 8px;line-height:1.5"></p>
    <p id="__fbwarn" style="font-size:12px;color:#f59e0b;margin:0">⚠️ <span id="__fbwarn2"></span></p>
  </div>
</div>

<script type="text/babel">
(function(){

const{gasCall,gasCallPost,getGasUrl,setGasUrl,TW_REGIONS,LANG_SCHOOLS}=window.MP||{};

    reportedList:'Người đã báo cáo',noReports:'Chưa có ai báo cáo',loading:'Đang tải…',noActiveSurvey:'Hiện không có thông báo nào',
    historyTitle:'Lịch sử (có thể xóa)',ended:'Đã kết thúc',

const STATUS_KEYS=['safe','flooded','sick'];

async function sfConfig(){const r=await gasCall('sfConfig',{},10000);return r||{ok:false,error:'GAS無回應'};}
async function sfGetUser(lineUserId){const r=await gasCall('sfGetUser',{lineUserId},10000);return r||{ok:false,error:'GAS無回應'};}
async function sfRegister(data){const r=await gasCallPost('sfRegister',data,15000);return r||{ok:false,error:'GAS無回應'};}
async function sfCreateSurvey(title,lineUserId){const r=await gasCallPost('sfCreateSurvey',{title,lineUserId},15000);return r||{ok:false,error:'GAS無回應'};}
async function sfEndSurvey(id){const r=await gasCallPost('sfEndSurvey',{id},10000);return r||{ok:false,error:'GAS無回應'};}
async function sfDeleteSurvey(id,lineUserId){const r=await gasCallPost('sfDeleteSurvey',{id,lineUserId},10000);return r||{ok:false,error:'GAS無回應'};}
async function sfListSurveys(){const r=await gasCall('sfListSurveys',{},10000);return r||{ok:false,error:'GAS無回應'};}
async function sfSubmitReport(surveyId,lineUserId,status,otherText){const r=await gasCallPost('sfSubmitReport',{surveyId,lineUserId,status,otherText},15000);return r||{ok:false,error:'GAS無回應'};}
async function sfTodayReports(surveyId){const r=await gasCall('sfTodayReports',{surveyId},10000);return r||{ok:false,error:'GAS無回應'};}
async function sfDayStatus(surveyId,date){const r=await gasCall('sfDayStatus',{surveyId,date},10000);return r||{ok:false,error:'GAS無回應'};}

function RegisterFlow({profile,onDone}){
  const[lang,setLang]=useState('');
  const t=SF_T[lang||'zh'];
  const[store,setStore]=useState('');
  const[personType,setPersonType]=useState(''); // manager/frontdesk/teacher(admin不開放自選,只能後台改)
  const[subType,setSubType]=useState('');
  const[name,setName]=useState('');
  const[code,setCode]=useState('');
  const[gender,setGender]=useState('');
  const[shift,setShift]=useState('');
  const[city,setCity]=useState('');const[dist,setDist]=useState('');
  const[busy,setBusy]=useState(false);const[err,setErr]=useState('');
  const langDone=!!lang;
  const step1Done=langDone&&!!store;
  const canSubmit=(()=>{
    if(!step1Done||!personType)return false;
    if(personType==='manager')return subType&&name.trim();
    if(personType==='frontdesk')return name.trim();
    if(personType==='teacher')return code.trim()&&gender&&shift&&city&&dist;
    return false;
  })();
  const submit=async()=>{
    if(!canSubmit)return;
    setBusy(true);setErr('');
    try{
      const r=await sfRegister({lineUserId:profile.userId,displayName:profile.displayName,store,personType,subType,name:personType==='teacher'?code.trim():name.trim(),lang,gender,shift,city,dist});
      if(r&&r.ok){onDone();return} // 成功就不把busy設回false,按鈕保持灰色直到頁面跳轉,避免誤點兩次
      setErr((r&&r.error)||'登記失敗');
    }catch(e){setErr(String(e))}
    setBusy(false);
  };
  return(<div className="min-h-screen flex items-center justify-center p-4">
    <div className="w-full max-w-md bg-gray-900 rounded-2xl border border-white/[0.08] p-5 space-y-5">
      <div className="text-center"><h1 className="text-lg font-bold text-gray-100">{t.appTitle}</h1><p className="text-xs text-gray-500 mt-1">{t.appSubtitle}</p></div>

      <div><label className="text-sm text-gray-400 block mb-2">{SF_T.zh.chooseLang} / {SF_T.vi.chooseLang}</label><div className="grid grid-cols-2 gap-2"><button onClick={()=>setLang('zh')} className={`py-3 rounded-xl text-sm font-semibold ${lang==='zh'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>中文</button><button onClick={()=>setLang('vi')} className={`py-3 rounded-xl text-sm font-semibold ${lang==='vi'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>Tiếng Việt</button></div></div>

      {langDone&&(<div><label className="text-sm text-gray-400 block mb-2">{t.chooseStore}</label><div className="grid grid-cols-2 gap-2">{STORES.map(s=>(<button key={s} onClick={()=>setStore(s)} className={`py-3 rounded-xl text-sm font-semibold ${store===s?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{s}</button>))}</div></div>)}

      {step1Done&&(<div><label className="text-sm text-gray-400 block mb-2">{t.choosePersonType}</label><div className="grid grid-cols-1 gap-2">
        <button onClick={()=>setPersonType('manager')} className={`py-3 rounded-xl text-sm font-semibold ${personType==='manager'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.typeManager}</button>
        <button onClick={()=>setPersonType('frontdesk')} className={`py-3 rounded-xl text-sm font-semibold ${personType==='frontdesk'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.typeFrontdesk}</button>
        <button onClick={()=>setPersonType('teacher')} className={`py-3 rounded-xl text-sm font-semibold ${personType==='teacher'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.typeTeacher}</button>
      </div></div>)}

      {personType==='manager'&&(<div className="space-y-3">
        <div><label className="text-sm text-gray-400 block mb-2">{t.chooseSubType}</label><div className="grid grid-cols-2 gap-2">{t.subTypes.map((s,i)=>(<button key={s} onClick={()=>setSubType(SF_T.zh.subTypes[i])} className={`py-2.5 rounded-xl text-xs font-semibold ${subType===SF_T.zh.subTypes[i]?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{s}</button>))}</div></div>
        <div><label className="text-sm text-gray-400 block mb-2">{t.customNameLabel}</label><input value={name} onChange={e=>setName(e.target.value)} placeholder={t.customNamePh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100"/></div>
      </div>)}

      {personType==='frontdesk'&&(<div><label className="text-sm text-gray-400 block mb-2">{t.customNameLabel}</label><input value={name} onChange={e=>setName(e.target.value)} placeholder={t.customNamePh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100"/></div>)}

      {personType==='teacher'&&(<div className="space-y-3">
        <div><label className="text-sm text-gray-400 block mb-2">{t.teacherCode}</label><input value={code} onChange={e=>setCode(e.target.value.replace(/[^a-zA-Z0-9]/g,''))} placeholder={t.teacherCodePh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100 text-center tracking-widest"/></div>
        <div><label className="text-sm text-gray-400 block mb-2">{t.gender}</label><div className="grid grid-cols-2 gap-2"><button onClick={()=>setGender('M')} className={`py-2.5 rounded-xl text-sm font-semibold ${gender==='M'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.genderM}</button><button onClick={()=>setGender('F')} className={`py-2.5 rounded-xl text-sm font-semibold ${gender==='F'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.genderF}</button></div></div>
        <div><label className="text-sm text-gray-400 block mb-2">{t.shift}</label><div className="grid grid-cols-2 gap-2"><button onClick={()=>setShift('day')} className={`py-2.5 rounded-xl text-sm font-semibold ${shift==='day'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.shiftDay}</button><button onClick={()=>setShift('night')} className={`py-2.5 rounded-xl text-sm font-semibold ${shift==='night'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.shiftNight}</button></div></div>
        <div><label className="text-sm text-gray-400 block mb-2">{t.addr}</label><div className="grid grid-cols-2 gap-2">
          <select value={city} onChange={e=>{setCity(e.target.value);setDist('')}} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-2 py-3 text-sm text-gray-100"><option value="">{t.addrCity}</option>{CITY_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}</select>
          <select value={dist} onChange={e=>setDist(e.target.value)} disabled={!city} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-2 py-3 text-sm text-gray-100 disabled:opacity-40"><option value="">{t.addrDist}</option>{(TW_REGIONS&&TW_REGIONS[city]||[]).map(d=><option key={d} value={d}>{d}</option>)}</select>
        </div></div>
      </div>)}

      {err&&<p className="text-xs text-red-400 text-center">{err}</p>}
      {personType&&<button onClick={submit} disabled={!canSubmit||busy} className={`w-full py-3.5 rounded-xl font-bold transition-all ${canSubmit&&!busy?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-600 cursor-not-allowed'}`}>{busy?t.submitting:t.submitBtn}</button>}
    </div>
  </div>);
}

function ListPage({profile,userProfile}){
  const t=SF_T[userProfile.lang||'zh'];
  const isManagerLevel=userProfile.personType==='manager'||userProfile.personType==='admin';
  const isAdmin=userProfile.personType==='admin';
  const[list,setList]=useState(undefined);
  const[showCreate,setShowCreate]=useState(false);
  const[newTitle,setNewTitle]=useState('');const[createBusy,setCreateBusy]=useState(false);
  const[queryOpenId,setQueryOpenId]=useState('');const[queryResult,setQueryResult]=useState(null);
  const[history,setHistory]=useState(null);const[showHistory,setShowHistory]=useState(false);
  const load=()=>{
    sfListSurveys().then(r=>{
      if(r&&r.ok&&Array.isArray(r.list)){
        setList(r.list.filter(s=>!s.endDate));
        if(isAdmin)setHistory(r.list.filter(s=>s.endDate));
      }else{setList([])}
    }).catch(()=>setList([]));
  };
  useEffect(()=>{if(isManagerLevel)load()},[]);
  const doCreate=async()=>{
    if(!newTitle.trim())return;
    setCreateBusy(true);
    try{const r=await sfCreateSurvey(newTitle.trim(),profile.userId);if(r&&r.ok){setShowCreate(false);setNewTitle('');load()}}catch(_e){}
    setCreateBusy(false);
  };
  const doEnd=async(id)=>{try{await sfEndSurvey(id);load()}catch(_e){}};
  const doDeleteHistory=async(id)=>{try{await sfDeleteSurvey(id,profile.userId);load()}catch(_e){}};
  const dayOptions=(s)=>{
    const start=new Date(s.createdAt||Date.now());start.setHours(0,0,0,0);
    const now=new Date();now.setHours(0,0,0,0);
    const days=Math.floor((now-start)/86400000)+1;
    const opts=[];
    for(let n=1;n<=Math.max(1,days);n++){
      const d=new Date(start.getTime()+(n-1)*86400000);
      const p=x=>String(x).padStart(2,'0');
      opts.push({n:n,date:d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())});
    }
    return opts;
  };
  const doQuery=async(surveyId,date)=>{
    setQueryOpenId(surveyId);setQueryResult(null);
    if(!date)return;
    const r=await sfDayStatus(surveyId,date);
    if(r&&r.ok)setQueryResult(r);
  };
  const statusLabel=(k)=>t['status'+k[0].toUpperCase()+k.slice(1)]||k;
  const fmtTime=(tm)=>{try{const d=new Date(tm);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')}catch(_e){return ''}};
  const detailUrl=(id)=>location.href.split('?')[0]+'?sid='+id;
  const shareSurvey=(s)=>{
    const msg=s.title+'\n'+detailUrl(s.id);
    location.href='https://line.me/R/share?text='+encodeURIComponent(msg);
  };
  const openDetail=(id)=>{location.href=location.href.split('?')[0]+'?sid='+id};

  return(<div className="min-h-screen p-4 pb-10">
    <div className="max-w-md mx-auto space-y-4">
      <div className="flex items-center justify-between pt-2">
        <h1 className="text-lg font-bold text-gray-100">{t.centerTitle}</h1>
        {isManagerLevel&&<button onClick={()=>setShowCreate(v=>!v)} className="text-xs px-3 py-2 rounded-lg bg-amber-600 text-white font-semibold flex-shrink-0">{t.createNewBtn}</button>}
      </div>

      {!isManagerLevel?null:(<>
        {showCreate&&(<div className="bg-white/[0.03] border border-amber-500/20 rounded-xl p-3 space-y-2">
          <label className="text-xs text-gray-500 block">{t.createTitleLabel}</label>
          <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder={t.createTitlePh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-lg px-3 py-2.5 text-sm text-gray-100"/>
          <button onClick={doCreate} disabled={createBusy||!newTitle.trim()} className="w-full py-2.5 rounded-xl bg-amber-600 text-white text-sm font-bold disabled:opacity-50">{createBusy?t.submitting2:t.createBtn}</button>
        </div>)}

        {list===undefined?<p className="text-sm text-gray-600 text-center py-8">{t.loading}</p>:list.length===0?<p className="text-sm text-gray-500 text-center py-8">{t.noSurveys}</p>:list.map(s=>(
          <div key={s.id} className="bg-white/[0.03] rounded-xl p-3 space-y-2">
            <div className="flex items-center justify-between gap-2">
              <p onClick={()=>openDetail(s.id)} className="text-sm text-gray-200 font-medium cursor-pointer flex-1">{s.title}</p>
              <button onClick={()=>shareSurvey(s)} className="text-xs px-2.5 py-1.5 rounded-lg bg-[#06C755] text-white font-semibold flex-shrink-0">{t.shareBtn}</button>
            </div>
            <div className="flex gap-2">
              <select onChange={e=>doQuery(s.id,e.target.value)} defaultValue="" className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-lg px-2 py-1.5 text-xs text-gray-200"><option value="" disabled>{t.selectDay}</option>{dayOptions(s).map(o=>(<option key={o.n} value={o.date}>{'day'+o.n+': '+o.date}</option>))}</select>
              <button onClick={()=>doEnd(s.id)} className="px-3 py-1.5 rounded-lg bg-red-600/20 text-red-400 text-xs font-semibold flex-shrink-0">{t.endBtn}</button>
            </div>
            {queryOpenId===s.id&&queryResult&&(<div className="space-y-1.5 pt-1"><p className="text-[11px] text-gray-500">{t.reportedCount} {queryResult.did.length}｜{t.notReportedCount} {queryResult.notDid.length}</p>{queryResult.did.map((r,i)=>(<div key={i} className="flex items-center justify-between bg-white/[0.03] rounded-lg px-2.5 py-1.5"><span className="text-xs text-gray-300">{r.display} {statusLabel(r.status)}{r.otherText?('、'+r.otherText):''}</span><span className="text-[10px] text-gray-500 flex-shrink-0">{fmtTime(r.time)}</span></div>))}</div>)}
          </div>
        ))}

        {isAdmin&&history&&history.length>0&&(<div className="space-y-2 pt-2 border-t border-white/[0.06]">
          <button onClick={()=>setShowHistory(v=>!v)} className="text-xs text-gray-500">{t.historyTitle}（{history.length}）{showHistory?'▲':'▼'}</button>
          {showHistory&&history.map(s=>(<div key={s.id} className="flex items-center justify-between bg-white/[0.03] rounded-lg px-3 py-2"><span className="text-xs text-gray-400">{s.title}（{t.ended}）</span><button onClick={()=>doDeleteHistory(s.id)} className="text-[10px] px-2 py-1 rounded bg-red-600/20 text-red-400 font-bold flex-shrink-0">✕</button></div>))}
        </div>)}
      </>)}
    </div>
  </div>);
}

function DetailPage({profile,userProfile,sid}){
  const t=SF_T[userProfile.lang||'zh'];
  const displayName=userProfile.personType==='teacher'?userProfile.name:(userProfile.name||userProfile.displayName);
  const STATUS_OPTS=STATUS_KEYS.map(k=>[k,t['status'+k[0].toUpperCase()+k.slice(1)]]);
  const PERSON_ORDER={manager:0,admin:0,frontdesk:1,teacher:2};
  const[survey,setSurvey]=useState(undefined);
  const[status,setStatus]=useState('');
  const[otherText,setOtherText]=useState('');
  const[busy,setBusy]=useState(false);const[err,setErr]=useState('');
  const[reports,setReports]=useState(null);
  const[sortMode,setSortMode]=useState('time'); // time/code
  const loadReports=()=>sfTodayReports(sid).then(r=>{if(r&&r.ok)setReports(r.list||[])});
  const loadSurvey=()=>{
    sfListSurveys().then(r=>{
      if(r&&r.ok&&Array.isArray(r.list)){
        const target=r.list.find(s=>s.id===sid);
        setSurvey(target||null);
        if(target)loadReports();
      }else{setSurvey(null)}
    }).catch(()=>setSurvey(null));
  };
  useEffect(()=>{loadSurvey()},[]);
  const submit=async()=>{
    if(!survey||(!status&&!otherText.trim()))return;
    setBusy(true);setErr('');
    try{
      const r=await sfSubmitReport(survey.id,profile.userId,status,otherText.trim());
      if(r&&r.ok){setStatus('');setOtherText('');loadReports()}else{setErr((r&&r.error)||'送出失敗')}
    }catch(e){setErr(String(e))}
    setBusy(false);
  };
  const statusLabel=(k)=>t['status'+k[0].toUpperCase()+k.slice(1)]||k;
  const fmtTime=(tm)=>{try{const d=new Date(tm);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')}catch(_e){return ''}};
  const sortedReports=useMemo(()=>{
    if(!reports)return null;
    if(sortMode==='time')return [...reports].sort((a,b)=>new Date(b.time)-new Date(a.time));
    return [...reports].sort((a,b)=>{
      const oa=PERSON_ORDER[a.personType]??9;const ob=PERSON_ORDER[b.personType]??9;
      if(oa!==ob)return oa-ob;
      return String(a.display).localeCompare(String(b.display));
    });
  },[reports,sortMode]);

  return(<div className="min-h-screen p-4 pb-10">
    <div className="max-w-md mx-auto space-y-4">
      <div className="flex items-center justify-between pt-2">
        <a href={location.href.split('?')[0]} className="text-xs text-gray-500">{t.backToList}</a>
        <p className="text-xs text-gray-500">{userProfile.store} · {displayName}</p>
      </div>

      {survey===undefined?<p className="text-sm text-gray-600 text-center py-8">{t.loading}</p>:!survey?(
        <p className="text-sm text-gray-500 text-center py-8">{t.noActiveSurvey}</p>
      ):(<>
        {survey.endDate?(<div className="bg-white/[0.03] rounded-xl p-3"><p className="text-sm text-gray-400 text-center">{survey.title}（{t.ended}）</p></div>):(
        <div className="bg-white/[0.03] rounded-xl p-3 space-y-3">
          <p className="text-sm text-gray-300 font-medium">{survey.title}</p>
          <div className="grid grid-cols-1 gap-2">{STATUS_OPTS.map(([k,l])=>(<button key={k} onClick={()=>setStatus(k)} className={`py-3 rounded-xl text-sm font-semibold ${status===k?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{l}</button>))}</div>
          <div><label className="text-[11px] text-gray-500 block mb-1">{t.otherLabel}</label><input value={otherText} onChange={e=>setOtherText(e.target.value)} placeholder={t.otherPh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-lg px-3 py-2 text-sm text-gray-100"/></div>
          {err&&<p className="text-xs text-red-400 text-center">{err}</p>}
          <button onClick={submit} disabled={busy||(!status&&!otherText.trim())} className="w-full py-3 rounded-xl bg-red-600 text-white font-bold disabled:opacity-50">{busy?t.submitting2:t.submitReportBtn}</button>
        </div>)}

        <div className="space-y-2">
          <div className="flex items-center justify-between"><p className="text-xs text-gray-500">{t.reportedList}</p><div className="flex gap-1"><button onClick={()=>setSortMode('time')} className={`text-[11px] px-2 py-1 rounded ${sortMode==='time'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.sortByTime}</button><button onClick={()=>setSortMode('code')} className={`text-[11px] px-2 py-1 rounded ${sortMode==='code'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{t.sortByCode}</button></div></div>
          {sortedReports===null?<p className="text-xs text-gray-600 text-center py-3">{t.loading}</p>:sortedReports.length===0?<p className="text-xs text-gray-600 text-center py-3">{t.noReports}</p>:sortedReports.map((r,i)=>(
            <div key={i} className="flex items-center justify-between bg-white/[0.03] rounded-lg px-3 py-2"><span className="text-sm text-gray-200">{r.display}: {statusLabel(r.status)}{r.otherText?('、'+r.otherText):''}</span><span className="text-xs text-gray-500 flex-shrink-0">{fmtTime(r.time)}</span></div>
          ))}
        </div>
      </>)}
    </div>
  </div>);
}

function App(){
  const[phase,setPhase]=useState('liffInit'); // liffInit/loading/register/main/error
  const[profile,setProfile]=useState(null);
  const[userProfile,setUserProfile]=useState(null);
  const[liffErr,setLiffErr]=useState('');
  const sid=new URLSearchParams(location.search).get('sid')||''; // 網址帶?sid=SF0001時直接顯示該筆通報,沒帶就顯示目前進行中的列表頁

  useEffect(()=>{
    sfConfig().then(cfg=>{
      const liffId=cfg&&cfg.ok?cfg.liffId:'';
      if(!liffId){setLiffErr('尚未在GAS指令碼屬性設定LIFF_ID,請聯繫系統管理者');setPhase('error');return}
      return liff.init({liffId}).then(()=>{
        if(!liff.isLoggedIn()){liff.login();return}
        return liff.getProfile().then(p=>{
          setProfile(p);
          setPhase('loading');
          return sfGetUser(p.userId).then(r=>{
            if(r&&r.ok&&r.exists){setUserProfile(r.profile);setPhase('main')}
            else{setPhase('register')}
          });
        });
      });
    }).catch(err=>{setLiffErr(String(err&&err.message||err));setPhase('error')});
  },[]);

  if(phase==='error')return(<div className="min-h-screen flex items-center justify-center p-6"><p className="text-sm text-red-400 text-center">{liffErr}</p></div>);
  if(phase==='liffInit'||phase==='loading')return(<div className="min-h-screen flex items-center justify-center"><p className="text-sm text-gray-500">載入中…</p></div>);
  if(phase==='register')return(<RegisterFlow profile={profile} onDone={()=>{sfGetUser(profile.userId).then(r=>{if(r&&r.ok&&r.exists){setUserProfile(r.profile);setPhase('main')}})}}/>);
  return sid?(<DetailPage profile={profile} userProfile={userProfile} sid={sid}/>):(<ListPage profile={profile} userProfile={userProfile}/>);
}

class __EB extends React.Component{constructor(p){super(p);this.state={e:false}}static getDerivedStateFromError(){return{e:true}}componentDidCatch(err){try{window.__showFallback(3,{lineno:0,msg:(err&&err.message)||String(err)})}catch(e){}}render(){return this.state.e?null:this.props.children}}
ReactDOM.createRoot(document.getElementById('root')).render(<__EB><App/></__EB>);
})();
</script>
