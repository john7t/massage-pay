<script type="text/babel">
const{LS,getKeyConfig,saveKeyConfig,buildDynamicKey,getCK,xEnc,xDec,fnv,adminHash,genAdminAct,revokeHash,approveHash,supApproveHash,genSimpleAct,encWithKey,decWithKey,actKey,genActWithToken,verifyActToken,genUUID,getDeviceId,SUP_LEVELS,supLevelName,getGHConfig,saveGHConfigLocal,saveGHConfig,ghReadFile,ghWriteFile,ghAppendLine,ghRemoveLine,readStaff,writeStaff,checkApproved,writeApproval,loadStores,saveStores,getApproved,saveApproved,addApproved,addLog,getLogs,fmtLog,fmtDate,THEMES,SKILL_KEYS,SKILL_SHORT,SKILL_PRICES,SKILL_COLORS,SK,SBG,STC,canWork,toB36,fromB36,dim,dow,bizDate,bizParts,dk,eDay,stamp,calcSal,eMon,encMonth,decBackup,T}=window.MP;

const goHome=()=>{location.href='./index.html'};


function StaffListSection({t,staffList,sortMode,setSortMode,onEdit,myCode,myLevel,myStore}){
  const[page,setPage]=useState(0);const[selected,setSelected]=useState(null);const PER_PAGE=10;
  if(!staffList.length)return(<div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4"><h3 className="text-sm font-semibold text-amber-400">{t.staffList}</h3><p className="text-xs text-gray-600 text-center">{t.staffEmpty}</p></div>);
  const roleOrder=s=>s.role==='admin'?99:s.role==='supervisor'?(10+(s.level||0)):0;
  const filtered=(myLevel<=2)?staffList.filter(s=>s.store===myStore||s.role==='admin'):staffList;
  const numCode=s=>parseInt(s.code)||0;
  const sorted=sortMode==='store'?[...filtered].sort((a,b)=>(a.store||'').localeCompare(b.store||'')||numCode(a)-numCode(b)):sortMode==='role'?[...filtered].sort((a,b)=>roleOrder(b)-roleOrder(a)||numCode(a)-numCode(b)):[...filtered].sort((a,b)=>numCode(a)-numCode(b));
  const totalPages=Math.ceil(sorted.length/PER_PAGE);const paged=sorted.slice(page*PER_PAGE,(page+1)*PER_PAGE);let lastStore='';
  const lvIcon=s=>{if(s.role==='admin')return'⚙️';if(s.role==='supervisor')return{4:'⭐',3:'💎',2:'🔷',1:'🔹'}[s.level]||'👔';return'👤'};
  const handleClick=(s)=>{if(selected===s.code)return;setSelected(s.code);if(onEdit)onEdit(s)};
  return(<div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4">
    <div className="flex items-center justify-between"><h3 className="text-sm font-semibold text-amber-400">{t.staffList}</h3><div className="flex gap-1"><button onClick={()=>{setSortMode('store');setPage(0)}} className={`px-2 py-1 rounded text-[10px] ${sortMode==='store'?'bg-amber-600 text-white':'bg-white/[0.04] text-gray-500'}`}>{t.sortByStore}</button><button onClick={()=>{setSortMode('role');setPage(0)}} className={`px-2 py-1 rounded text-[10px] ${sortMode==='role'?'bg-amber-600 text-white':'bg-white/[0.04] text-gray-500'}`}>{t.sortByRole}</button><button onClick={()=>{setSortMode('code');setPage(0)}} className={`px-2 py-1 rounded text-[10px] ${sortMode==='code'?'bg-amber-600 text-white':'bg-white/[0.04] text-gray-500'}`}>{t.sortByCode}</button></div></div>
    <div className="space-y-1">{paged.map((s,i)=>{const lvName=s.level?supLevelName(s.level,t===T.zh?'zh':'vi'):'';const showH=sortMode==='store'&&(s.store||'')!==lastStore;if(showH)lastStore=s.store||'';const isSel=selected===s.code;return(<React.Fragment key={s.code}>{showH&&<p className="text-[11px] text-gray-500 font-semibold pt-2 pb-1">{s.store||'—'}</p>}<div className={`py-2 px-3 rounded-xl transition-all ${isSel?'bg-amber-600/10 border border-amber-500/30':'bg-white/[0.02]'}`}><div className="flex items-center justify-between"><div className="flex items-center gap-2"><span className="text-[12px]">{lvIcon(s)}</span><button onClick={()=>handleClick(s)} disabled={isSel} className={`text-sm font-bold font-mono ${isSel?'text-amber-300 cursor-default':'text-amber-400 active:text-amber-300'}`}>{s.code}{isSel?' (編輯模式)':''}</button>{!isSel&&sortMode!=='store'&&s.store&&<span className="text-[10px] text-gray-600">{s.store}</span>}</div><div className="flex items-center gap-1.5">{s.supRequest&&<span className="text-[10px] px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-300 animate-pulse">{t.adminApply}</span>}{lvName&&<span className="text-[10px] px-1.5 py-0.5 rounded bg-amber-500/10 text-amber-400">{lvName}</span>}<span className="text-[11px]">{s.hasToken?'☁️':'📥'}</span></div></div></div></React.Fragment>)})}</div>
    {totalPages>1&&(<div className="flex items-center justify-center gap-3 pt-2"><button onClick={()=>setPage(Math.max(0,page-1))} disabled={page===0} className={`px-3 py-1.5 rounded-lg text-xs ${page===0?'text-gray-700':'text-gray-400 bg-white/[0.04] active:bg-white/[0.08]'}`}>←</button><span className="text-xs text-gray-500">{page+1} / {totalPages}</span><button onClick={()=>setPage(Math.min(totalPages-1,page+1))} disabled={page>=totalPages-1} className={`px-3 py-1.5 rounded-lg text-xs ${page>=totalPages-1?'text-gray-700':'text-gray-400 bg-white/[0.04] active:bg-white/[0.08]'}`}>→</button></div>)}
  </div>)}

function LogSection({t,filterLevel}){const[logs]=useState(()=>getLogs(filterLevel));if(!logs.length)return null;return(<div className="space-y-2 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4"><h3 className="text-sm font-semibold text-amber-400">{t.actionLog}</h3><div className="max-h-60 overflow-y-auto space-y-1 no-sb">{logs.map((l,i)=>(<div key={i} className="text-[11px] py-1 border-b border-white/[0.03]"><span className="text-gray-600 font-mono">{fmtDate(l.ts)}</span><span className="text-gray-400 ml-2">{l.msg}</span>{l.op&&filterLevel==='admin'&&<span className="text-gray-700 ml-1">[{l.op}]</span>}</div>))}</div></div>)}

function ApprovedList({t,isAdmin}){
  const[list,setList]=useState(getApproved);const[revokedHash,setRevokedHash]=useState(null);const[copiedIdx,setCopiedIdx]=useState(-1);const[writeStatus,setWriteStatus]=useState('');
  const doRevoke=async(i)=>{const item=list[i];const h=revokeHash(item.code);const updated=[...list];updated[i]={...item,revoked:true,revokedAt:Date.now()};setList(updated);saveApproved(updated);setRevokedHash({idx:i,hash:h});addLog(fmtLog(t.logRevoke,[item.code,item.devName||'']),'supervisor');const gh=getGHConfig();if(gh.token&&gh.owner&&gh.repo){setWriteStatus(t.ghWriting);const ok=await ghAppendLine(gh,'revoked.cfg',h,'revoke '+item.code);setWriteStatus(ok?.ok?t.ghWriteOk:t.ghWriteFail)}};
  const copyRvHash=async(h,i)=>{try{await navigator.clipboard.writeText(h)}catch{};setCopiedIdx(i);setTimeout(()=>setCopiedIdx(-1),2000)};
  const active=list.filter(x=>!x.revoked);const revoked=list.filter(x=>x.revoked);
  if(!list.length)return null;
  return(<div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4"><h3 className="text-sm font-semibold text-amber-400">{t.supervisorList||t.adminList}</h3>{active.map((item,i)=>{const realIdx=list.indexOf(item);return(<div key={realIdx} className="flex items-center justify-between py-2 border-b border-white/[0.04]"><div><span className="text-sm text-gray-200 font-semibold">{item.code}</span>{item.devName&&<span className="text-[10px] text-gray-600 ml-2">{item.devName}</span>}<div className="text-[10px] text-gray-700">{fmtDate(item.ts)}</div></div><button onClick={()=>doRevoke(realIdx)} className="px-3 py-1.5 rounded-lg bg-red-500/10 text-red-400 text-xs font-medium active:bg-red-500/20">{t.revoke}</button></div>)})}{revokedHash&&(<div className="fi bg-red-500/10 border border-red-500/20 rounded-xl p-3 space-y-2"><p className="text-xs text-gray-400">{isAdmin?(writeStatus.includes('✓')?writeStatus:t.revokeHint):t.revokeToAdmin}</p><div className="flex items-center gap-2"><span className="text-sm font-bold text-red-400 font-mono select-all flex-1 text-center">{revokedHash.hash}</span><button onClick={()=>copyRvHash(revokedHash.hash,revokedHash.idx)} className={`px-3 py-1.5 rounded-lg text-xs font-medium ${copiedIdx===revokedHash.idx?'bg-emerald-600/20 text-emerald-400':'bg-white/10 text-gray-300'}`}>{copiedIdx===revokedHash.idx?'✓':'📋'}</button></div>{writeStatus&&!writeStatus.includes('✓')&&<p className="text-xs text-center text-red-400">{writeStatus}</p>}</div>)}{revoked.length>0&&(<div className="pt-2"><p className="text-[10px] text-gray-700 mb-1">{t.revokedList}</p>{revoked.map((item,i)=>(<div key={i} className="flex items-center justify-between py-1"><span className="text-xs text-gray-600 line-through">{item.code} {item.devName&&`(${item.devName})`}</span><span className="text-[10px] text-red-400/50">{t.expired}</span></div>))}</div>)}</div>)}

/* ══════════ Onboarding ══════════ */
function SupervisorPage({t,onBack}){
  const[encInput,setEncInput]=useState('');const[actResult,setActResult]=useState('');const[decodedInfo,setDecodedInfo]=useState('');const[supInput,setSupInput]=useState('');const[supResult,setSupResult]=useState('');const[supInfo,setSupInfo]=useState(null);const[revoked,setRevoked]=useState(false);const[staffList,setStaffList]=useState([]);const[sortMode,setSortMode]=useState('store');const[storeList,setStoreList]=useState([]);const[newStore,setNewStore]=useState('');const[storeStatus,setStoreStatus]=useState('');const[genConnInput,setGenConnInput]=useState('');const[genConnResult,setGenConnResult]=useState('');const[genConnCopied,setGenConnCopied]=useState(false);
  useEffect(()=>{(async()=>{try{const s=LS.get('app-settings');if(!s)return;const res=await fetch('./revoked.cfg',{cache:'no-store'});if(!res.ok)return;const text=(await res.text()).trim();const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));const myHash=revokeHash(s.code);if(lines.some(l=>l===myHash)){LS.set(`supervisor-${s.code}`,null);setRevoked(true)}}catch{}const gh=getGHConfig();if(gh.token){try{const s=await readStaff(gh);setStaffList(s)}catch{}}try{const st=await loadStores();setStoreList(st)}catch{}})()},[]);
  if(revoked)return(<div className="min-h-screen flex items-center justify-center p-8"><div className="text-center"><div className="w-16 h-16 bg-red-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4"><span className="text-3xl">⚠️</span></div><p className="text-red-400 text-lg font-bold mb-4">{t.expired}</p><button onClick={onBack} className="px-6 py-3 bg-white/[0.06] rounded-xl text-gray-300">{t.ok}</button></div></div>);
  const gh=getGHConfig();
  const genCode=()=>{try{const dec=xDec(encInput.trim());const idx=dec.indexOf(':');if(idx<1){setActResult('Error');setDecodedInfo('');return}const code=dec.substring(0,idx);setDecodedInfo(code);setActResult(genSimpleAct(code));addLog(fmtLog(t.logGenUser,[code]),'supervisor')}catch{setActResult('Error');setDecodedInfo('')}};
  const parseSup=()=>{try{const dec=xDec(supInput.trim());const parts=dec.split(':');if(parts.length<2){setSupInfo(null);setSupResult('Error');return}const code=parts[0],uuid=parts[1],devName=parts.slice(2).join(':')||'unknown';setSupInfo({code,uuid:uuid.substring(0,8)+'...',devName});setSupResult(genAdminAct(code,uuid));addApproved(code,devName);addLog(fmtLog(t.logGenSup,[code,devName]),'supervisor')}catch{setSupInfo(null);setSupResult('Error')}};
  return(<div className="p-5 max-w-md mx-auto fi space-y-6">
    <div className="flex items-center gap-3"><button onClick={onBack} className="text-gray-500"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg></button><h2 className="text-xl font-bold text-gray-100">{t.supervisorTitle}</h2></div>

  const[showSupervisor,setShowSupervisor]=useState(false);
  const[checkState,setCheckState]=useState('idle');
  const supKey=`supervisor-${settings.code}`;
  const[supStatus,setSupStatus]=useState(()=>LS.get(supKey)||null);
  const[applyStep,setApplyStep]=useState(false);
  const[devNameInput,setDevNameInput]=useState('');
  const[supErr,setSupErr]=useState('');
  const[appCopied,setAppCopied]=useState(false);
  const[supCheckStatus,setSupCheckStatus]=useState('');

  // 沒有有效身份時導回首頁
  if(!settings.code)return(<div className="min-h-screen flex items-center justify-center p-8"><div className="text-center"><p className="text-gray-400 mb-4">無使用者資料</p><button onClick={goHome} className="px-6 py-3 bg-white/[0.06] rounded-xl text-gray-300">{t.home}</button></div></div>);

  const tryCheck=async()=>{if(checkState==='ok'){setShowAdmin(true);return}if(checkState==='denied')return;setCheckState('checking');try{const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),5000);const res=await fetch('./admin.cfg',{cache:'no-store',signal:ctrl.signal});clearTimeout(timer);if(!res.ok)throw new Error();const text=(await res.text()).trim();const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));const myHash=adminHash(settings.code);const match=lines.some(l=>{const parts=l.split(':');const h=parts.length>=2?parts[parts.length-1]:parts[0];return h===myHash});setCheckState(match?'ok':'denied')}catch{setCheckState('denied')}};
  const doApply=async()=>{const payload=`${settings.code}:${devId}:${devNameInput.trim()||'unknown'}`;const appCode=xEnc(payload);const data={status:'pending',deviceName:devNameInput.trim()||'',appCode,appliedAt:Date.now()};LS.set(supKey,data);setSupStatus(data);setApplyStep(false);try{navigator.clipboard.writeText(appCode)}catch{}const gh=getGHConfig();if(gh.token){try{const staff=await readStaff(gh);const existing=staff.find(s=>s.code===settings.code);if(existing){existing.supRequest=true;existing.supRequestAt=Date.now();await writeStaff(gh,staff)}}catch{}}};
  const checkSupOnline=async()=>{setSupCheckStatus(t.checking);const gh=getGHConfig();if(gh.token){try{const staff=await readStaff(gh);const me=staff.find(s=>s.code===settings.code);if(me&&me.role==='supervisor'&&me.status==='active'){const data={...supStatus,status:'approved',approvedAt:Date.now(),level:me.level||0};LS.set(supKey,data);setSupStatus(data);setSupCheckStatus(t.approved);addLog(fmtLog(t.logTeacherActivate,[settings.code,supStatus?.deviceName||'']),'teacher');return}}catch{}}try{const result=await checkApproved('s',supApproveHash(settings.code));if(result){const data={...supStatus,status:'approved',approvedAt:Date.now(),level:result.level||0};LS.set(supKey,data);setSupStatus(data);setSupCheckStatus(t.approved);addLog(fmtLog(t.logTeacherActivate,[settings.code,supStatus?.deviceName||'']),'teacher');return}}catch{}setSupCheckStatus('');setSupErr(t.waitHint)};
  const copyAppCode=async()=>{if(supStatus?.appCode){try{await navigator.clipboard.writeText(supStatus.appCode)}catch{}}setAppCopied(true);setTimeout(()=>setAppCopied(false),2000)};

  if(showAdmin)return<AdminPage t={t} onBack={()=>setShowAdmin(false)}/>;
  if(showSupervisor)return<SupervisorPage t={t} onBack={()=>{setShowSupervisor(false);setSupStatus(LS.get(supKey)||null)}}/>;

  const checkBtnClass={idle:'bg-white/[0.03] border border-white/[0.06] text-gray-400 active:bg-white/[0.06]',checking:'bg-white/[0.03] border border-white/[0.06] text-gray-600',ok:'bg-emerald-600/20 border border-emerald-500/30 text-emerald-400 active:bg-emerald-600/30',denied:'bg-gray-800/50 border border-gray-700/30 text-gray-600 cursor-not-allowed'}[checkState];
  const checkLabel={idle:t.adminCheck,checking:'...',ok:t.adminEnter,denied:t.adminFail}[checkState];
  const isPending=supStatus?.status==='pending';const isApproved=supStatus?.status==='approved'||checkState==='ok';
  const ghLocal=getGHConfig();const hasConn=!!(ghLocal&&ghLocal.token);

  return(<div className="p-5 max-w-md mx-auto fi space-y-6">
    <div className="flex items-center gap-3"><button onClick={goHome} className="text-gray-500"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg></button><h2 className="text-xl font-bold text-gray-100">{t.admin} / {t.supervisor}</h2></div>
    <div className="bg-white/[0.03] border border-white/[0.06] rounded-2xl p-4 space-y-1"><div className="flex justify-between"><span className="text-sm text-gray-500">{t.teacherCode}</span><span className="text-sm text-gray-200 font-mono font-bold">{settings.code}</span></div><div className="flex justify-between"><span className="text-sm text-gray-500">{t.store}</span><span className="text-sm text-gray-300">{settings.store||'—'}</span></div><div className="flex justify-between"><span className="text-sm text-gray-500">{t.connStatus}</span><span className="text-xs">{hasConn?t.connOnline:t.connOffline}</span></div></div>
    <div className="space-y-3"><div className="flex gap-2"><button onClick={tryCheck} disabled={checkState==='checking'||checkState==='denied'} className={`flex-1 py-3 rounded-xl text-sm font-semibold transition-all ${checkBtnClass}`}>{checkLabel}</button>{isApproved?(<button onClick={()=>setShowSupervisor(true)} className="flex-1 py-3 rounded-xl text-sm font-semibold bg-emerald-600/20 border border-emerald-500/30 text-emerald-400 active:bg-emerald-600/30">{t.supervisor}</button>):(<button onClick={()=>{if(!isPending)setApplyStep(!applyStep)}} disabled={isPending} className={`flex-1 py-3 rounded-xl text-sm font-semibold transition-all ${isPending?'bg-gray-800/50 border border-gray-700/30 text-gray-600 cursor-not-allowed':'bg-white/[0.03] border border-white/[0.06] text-gray-400 active:bg-white/[0.06]'}`}>{isPending?t.adminPending:t.adminApply}</button>)}</div>
    {applyStep&&!isPending&&!isApproved&&(hasConn?(<div className="fi space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-xl p-4"><p className="text-sm text-gray-400">{t.adminApplyDesc}</p><input value={devNameInput} onChange={e=>setDevNameInput(e.target.value)} placeholder={t.deviceName} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100 focus:outline-none focus:border-amber-500"/><button onClick={doApply} className="w-full py-3 rounded-xl bg-amber-600 text-white font-bold">{t.confirm}</button></div>):(<div className="bg-red-500/5 border border-red-500/20 rounded-xl p-4 text-center"><p className="text-xs text-red-300">{t.needConnFirst}</p></div>))}
    {isPending&&(<div className="fi space-y-3"><div className="bg-white/[0.03] border border-white/[0.06] rounded-xl p-3"><p className="text-[10px] text-gray-600 break-all font-mono select-all mb-2">{supStatus.appCode}</p><button onClick={copyAppCode} className={`w-full py-2 rounded-lg text-xs font-medium ${appCopied?'bg-emerald-600/20 text-emerald-400':'bg-amber-600/20 text-amber-400'}`}>{appCopied?'✓ '+t.copyDone:'📋 '+t.adminAppCopy}</button></div><div className="bg-amber-500/5 border border-amber-500/20 rounded-xl p-3 text-center space-y-2"><div className="flex items-center justify-center gap-2"><div className="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></div><p className="text-xs text-amber-400 font-semibold">{t.waitApproval}</p></div><button onClick={checkSupOnline} className="w-full py-2.5 rounded-xl bg-amber-600/20 text-amber-400 font-medium text-sm active:bg-amber-600/30">{supCheckStatus||t.checkApproval}</button><button onClick={()=>{LS.set(supKey,null);setSupStatus(null);setSupErr('');setSupCheckStatus('')}} className="w-full py-2 text-[11px] text-gray-600 active:text-gray-400">{t.resetApp}</button>{supErr&&<p className="text-amber-400/60 text-xs mt-1">{supErr}</p>}</div></div>)}
    </div>
  </div>);
}

/* ══════════ Auth App root ══════════ */
function AuthApp(){
  const[theme]=useState(()=>localStorage.getItem('app-theme')||'black');
  const bgColor=THEMES[theme]||THEMES.black;const isLight=theme==='white'||theme==='pink';
  const settings=LS.get('app-settings')||{};const lang=settings.lang||'zh';const t=T[lang];
  useEffect(()=>{document.body.style.backgroundColor=bgColor;buildDynamicKey()},[]);
  return(<div className={`min-h-screen ${isLight?'text-gray-900':'text-gray-100'}`} style={{backgroundColor:bgColor}} data-light={isLight||undefined}><AuthGate t={t}/></div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<AuthApp/>);
</script>
</body>
</html>
