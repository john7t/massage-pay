/* ── 錯誤兜底攔截器（最早執行） ── */
(function(){
  var PAGE="auth",PCODE="01";
  window.__shownFallback=false;
  var __fbL={zh:{title:"網站更新中",info:function(p,v,c){return p+" 網頁 v"+v+" 更新中　代碼 "+c},keep:"<span id="__fbkeep">你所輸入的舊資料仍保存在你的手機暫存檔中。</span>",warn:"<span id="__fbwarn">資料只存在本機，不會上傳雲端。</span>"},vi:{title:"Đang cập nhật",info:function(p,v,c){return p+" v"+v+" đang cập nhật　Mã "+c},keep:"Dữ liệu bạn nhập vẫn được lưu trong bộ nhớ tạm của điện thoại.",warn:"Dữ liệu chỉ lưu trên máy, không tải lên đám mây."}};
  window.__fbLang=(function(){try{var s=localStorage.getItem('app-settings');if(s){var o=JSON.parse(s);if(o&&o.lang)return o.lang}}catch(e){}return 'zh'})();
  window.__fbApply=function(){var L=__fbL[window.__fbLang]||__fbL.zh;var t=document.getElementById('__fbtitle');if(t)t.textContent=L.title;var k=document.getElementById('__fbkeep');if(k)k.textContent=L.keep;var w=document.getElementById('__fbwarn');if(w)w.textContent=L.warn;var b1=document.getElementById('__fblang_zh'),b2=document.getElementById('__fblang_vi');if(b1)b1.style.color=window.__fbLang==='zh'?'#f3f4f6':'#4b5563';if(b2)b2.style.color=window.__fbLang==='vi'?'#f3f4f6':'#4b5563';if(window.__fbData){var info=document.getElementById("__fbinfo");if(info)info.textContent=L.info(window.__fbData.page,window.__fbData.ver,window.__fbData.code)}};
  window.__fbSetLang=function(lang){window.__fbLang=lang;window.__fbApply()};
  window.__showFallback=function(src,detail){
    if(window.__shownFallback)return;window.__shownFallback=true;
    try{
      var ver=(document.title.match(/v?(\d+\.\d+[-.]\d+)/)||[])[1]||"?";
      var line=(detail&&detail.lineno)?detail.lineno:0;
      var ecode=PCODE+String(src).padStart(2,"0")+String(line%10000).padStart(4,"0");
      window.__fbData={page:PAGE,ver:ver,code:ecode};
      var el=document.getElementById("__fallback");
      if(el){window.__fbApply();el.style.display="flex";}
      var root=document.getElementById("root");if(root)root.style.display="none";
    }catch(e){}
  };
  window.addEventListener("error",function(e){window.__showFallback(1,{lineno:e.lineno})},true);
  window.addEventListener("unhandledrejection",function(e){try{console.warn("unhandledrejection:",e&&e.reason)}catch(_e){}try{if(e&&e.preventDefault)e.preventDefault()}catch(_e){}});
})();
</script>

/* ══════════ 手輸編號發碼（離線用，只算啟動碼） ══════════ */
// 產金鑰區塊(可重用):管理者用adminSecret對指定編號產金鑰,adminSecret存本機
function KeyGenBlock({t,presetCode}){
  const[sec,setSec]=React.useState(()=>getAdminSecret());
  const[code,setCode]=React.useState(presetCode||'');
  const[result,setResult]=React.useState(null);
  React.useEffect(()=>{if(presetCode)setCode(presetCode)},[presetCode]);
  if(!getGasUrl())return null;
  const gen=async()=>{const c=(code||'').trim();const s=(sec||'').trim();if(!c||!s){return}setResult({loading:true});const r=await issueKey(c,s);if(r&&r.ok){setAdminSecret(s)}setResult(r)};
  return(<div className="space-y-2 bg-white/[0.02] border border-emerald-500/20 rounded-xl p-3">
    <label className="text-xs text-emerald-400 font-semibold block">{t.keyGenTitle}</label>
    {!hasAdminSecret()&&<input value={sec} onChange={e=>setSec(e.target.value)} type="password" placeholder={t.keyAdminSecPh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-xs text-gray-100 focus:outline-none focus:border-emerald-500"/>}
    {!presetCode&&<input value={code} onChange={e=>setCode(e.target.value)} placeholder={t.keyGenCodePh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-xs text-gray-100 focus:outline-none focus:border-emerald-500"/>}

  </div>);
}

  const[loading,setLoading]=React.useState(false);

    <label className="text-xs text-purple-400 font-semibold block">{t.keyDiagTitle||'金鑰領取診斷'}</label>

    {result&&<div className={`rounded-lg p-2.5 text-[11px] font-mono space-y-1 ${result.result==='ok'?'bg-emerald-500/10':'bg-red-500/10'}`}>

/* ══════════ QR 掃描鈕（共用） ══════════ */
function QrScanButton({onScan,size}){
  const[open,setOpen]=useState(false);
  const[err,setErr]=useState('');
  const videoRef=React.useRef(null);
  const streamRef=React.useRef(null);
  const rafRef=React.useRef(0);
  const stop=()=>{cancelAnimationFrame(rafRef.current);if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null}};
  const close=()=>{stop();setOpen(false);setErr('')};
  useEffect(()=>{
    if(!open)return;
    let cancelled=false;
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d',{willReadFrequently:true});
    (async()=>{
      if(typeof jsQR==='undefined'){setErr('QR 函式庫未載入');return}
      try{
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
        if(cancelled){stream.getTracks().forEach(t=>t.stop());return}
        streamRef.current=stream;
        const v=videoRef.current;v.srcObject=stream;v.setAttribute('playsinline','');await v.play();
        const tick=()=>{
          if(cancelled||!streamRef.current)return;
          if(v.readyState===v.HAVE_ENOUGH_DATA){
            canvas.width=v.videoWidth;canvas.height=v.videoHeight;
            ctx.drawImage(v,0,0,canvas.width,canvas.height);
            const img=ctx.getImageData(0,0,canvas.width,canvas.height);
            const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
            if(code&&code.data){const val=code.data;onScan(val);close();return}
          }
          rafRef.current=requestAnimationFrame(tick);
        };
        rafRef.current=requestAnimationFrame(tick);
      }catch(e){
        if(e&&e.name==='NotAllowedError')setErr('相機權限被拒，請允許相機');
        else if(e&&e.name==='NotFoundError')setErr('找不到相機');
        else setErr('無法開啟相機（需 HTTPS）');
      }
    })();
    return()=>{cancelled=true;stop()};
  },[open]);
  const sz=size||'w-9 h-9';
  return(<>
    <button type="button" onClick={()=>setOpen(true)} title="掃描 QR"
      className={`${sz} flex-shrink-0 flex items-center justify-center rounded-xl bg-white/[0.06] border border-white/[0.08] text-gray-300 active:bg-white/[0.12]`}>
      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M3 9V5a2 2 0 012-2h4M3 15v4a2 2 0 002 2h4m6-18h4a2 2 0 012 2v4m0 6v4a2 2 0 01-2 2h-4M4 12h16"/></svg>
    </button>
    {open&&(
      <div className="fixed inset-0 z-[60] bg-black" onClick={e=>e.stopPropagation()}>
        <video ref={videoRef} className="absolute inset-0 w-full h-full object-cover" muted playsInline/>
        {/* 取景框 */}
        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
          <div className="w-64 h-64 border-2 border-white/80 rounded-2xl shadow-[0_0_0_9999px_rgba(0,0,0,0.5)]"></div>
        </div>
        <p className="absolute top-12 left-0 right-0 text-center text-white/90 text-sm font-medium z-10">將 QR Code 對準框內</p>
        {err&&<div className="absolute bottom-32 left-6 right-6 bg-red-500/90 text-white text-sm text-center rounded-xl py-3 px-4 z-10">{err}</div>}
        <button onClick={close} className="absolute bottom-8 left-5 right-5 py-4 rounded-2xl bg-white/15 text-white text-lg font-semibold active:bg-white/25 z-10">取消</button>
      </div>
    )}
  </>);
}



/* ══════════ 上下工時間圖表(主管/管理):圖A上工分布 圖B各時段在線人數 ══════════ */
function WorkHoursChart({t,staffList,myStore,gh}){
  const[mode,setMode]=useState('online'); // online=圖B在線人數, start=圖A上工分布
  const[storeFilter,setStoreFilter]=useState('');
  const[publishMsg,setPublishMsg]=useState('');
  const[publishing,setPublishing]=useState(false);
  const[lastStats,setLastStats]=useState(undefined);
  const[pickHour,setPickHour]=useState(null);
  // 載入目前已發布的快照(顯示更新時間)
  useEffect(()=>{let a=true;loadStats().then(s=>{if(a)setLastStats(s)});return()=>{a=false}},[]);
  // 主管手動更新:重算 staff → 推 stats.json
  const doPublish=async()=>{if(!gh||!gh.token){setPublishMsg('fail');setTimeout(()=>setPublishMsg(''),2500);return}setPublishing(true);const stats=computeStats(staffList,'');const ok=await publishStats(gh,stats);if(ok){setLastStats(stats);setPublishMsg('ok')}else{setPublishMsg('fail')}setPublishing(false);setTimeout(()=>setPublishMsg(''),2500)};
  // 取有工時的老師(可選店篩選)
  const rows=(staffList||[]).filter(s=>s.workStart&&(!storeFilter||s.store===storeFilter));
  const stores=Array.from(new Set((staffList||[]).map(s=>s.store).filter(Boolean)));
  const hourOf=(hhmm)=>{if(!hhmm)return null;const h=Number(String(hhmm).split(':')[0]);return isNaN(h)?null:h};
  // 計算 0~23 每小時人數
  const counts=Array.from({length:24},()=>0);
  rows.forEach(s=>{const sh=hourOf(s.workStart);if(sh===null)return;if(mode==='start'){counts[sh]++}else{let eh=hourOf(s.workEnd);if(eh===null)eh=(sh+12)%24;let h=sh;for(let i=0;i<24;i++){counts[h]++;if(h===eh)break;h=(h+1)%24;if(h===sh)break}}});
  const maxC=Math.max(1,...counts);
  // 時段順序:早7→隔天早6
  const HOURS=Array.from({length:24},(_,i)=>(i+7)%24);
  // 點某時段，列出該時段的老師（編號:上工時間）
  const hourDetail=(h)=>{if(mode==='start'){return rows.filter(s=>hourOf(s.workStart)===h).map(s=>({code:s.code,ws:s.workStart}))}else{return rows.filter(s=>{const sh=hourOf(s.workStart);if(sh===null)return false;let eh=hourOf(s.workEnd);if(eh===null)eh=(sh+12)%24;let hh=sh;for(let i=0;i<24;i++){if(hh===h)return true;if(hh===eh)break;hh=(hh+1)%24;if(hh===sh)break}return false}).map(s=>({code:s.code,ws:s.workStart,we:s.workEnd}))}};
  const detail=pickHour!==null?hourDetail(pickHour):[];
  return(<div className="space-y-3 bg-white/[0.03] border border-white/[0.08] rounded-2xl p-4">
    <div className="flex items-center justify-between flex-wrap gap-2">
      <div className="flex-1"><h3 className="text-sm font-semibold text-gray-200">{t.workChartTitle}</h3><p className="text-[10px] text-gray-500 mt-0.5">{t.chartUpdatedAt}：{lastStats&&lastStats.updatedAt?new Date(lastStats.updatedAt).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'—'}</p></div>
      <button onClick={doPublish} disabled={publishing} className={`px-3 py-1.5 rounded-lg text-[11px] font-bold ${publishing?'bg-gray-600 text-gray-400':publishMsg==='ok'?'bg-emerald-600 text-white':publishMsg==='fail'?'bg-red-600 text-white':'bg-amber-600 text-white active:bg-amber-700'}`}>{publishing?'...':publishMsg==='ok'?'✓ '+t.chartPublished:publishMsg==='fail'?'✗':t.chartUpdate}</button>
      <div className="flex gap-1 bg-white/[0.04] rounded-lg p-0.5">
        <button onClick={()=>{setMode('online');setPickHour(null)}} className={`px-2.5 py-1 rounded-md text-[11px] font-medium ${mode==='online'?'bg-amber-600 text-white':'text-gray-400'}`}>{t.workChartOnline}</button>
        <button onClick={()=>{setMode('start');setPickHour(null)}} className={`px-2.5 py-1 rounded-md text-[11px] font-medium ${mode==='start'?'bg-amber-600 text-white':'text-gray-400'}`}>{t.workChartStart}</button>
      </div>
    </div>
    {stores.length>1&&<select value={storeFilter} onChange={e=>{setStoreFilter(e.target.value);setPickHour(null)}} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-lg px-2 py-1.5 text-xs text-gray-200 focus:outline-none"><option value="">{t.allStores||'全部店家'}</option>{stores.map(st=><option key={st} value={st}>{st}</option>)}</select>}
    <p className="text-[11px] text-gray-500">{mode==='online'?t.workChartOnlineDesc:t.workChartStartDesc}（{rows.length} {t.peopleUnit}）</p>
    <div className="space-y-1">{HOURS.map(h=>{const c=counts[h]||0;const on=pickHour===h;return(<div key={h} onClick={()=>setPickHour(on?null:h)} className="flex items-center gap-2 active:opacity-70 cursor-pointer"><span className={`text-[10px] tabular-nums w-7 text-right ${on?'text-amber-300 font-bold':'text-gray-500'}`}>{String(h).padStart(2,'0')}</span><div className="flex-1 h-4 bg-white/[0.03] rounded-sm overflow-hidden"><div className="h-full rounded-sm transition-all" style={{width:(c/maxC*100)+'%',background:on?'#fbbf24':'#D97706'}}></div></div><span className={`text-[10px] tabular-nums w-5 ${on?'text-amber-300 font-bold':'text-gray-500'}`}>{c||''}</span></div>)})}</div>
    {pickHour!==null&&(<div className="bg-amber-600/10 border border-amber-500/25 rounded-xl px-3 py-2.5 fi"><p className="text-xs text-amber-300 font-semibold mb-1.5">{String(pickHour).padStart(2,'0')}:00 — {detail.length} {t.peopleUnit}</p>{detail.length===0?<p className="text-[11px] text-gray-500">{t.noData}</p>:<div className="space-y-1">{detail.map((d,i)=>(<div key={i} className="flex items-center gap-2 text-[11px]"><span className="font-mono text-gray-300 w-12">#{d.code}</span><span className="text-gray-400">{d.ws}{d.we?'～'+d.we:''}</span></div>))}</div>}</div>)}
  </div>);
}
/* ══════════ 申請碼處理(主管/管理共用):刷碼→看內容→同意寫入→產生確認碼 ══════════ */
function ReqCodeProcessor({t,gh,staffList,setStaffList}){
  const[input,setInput]=useState('');
  const[parsed,setParsed]=useState(null);
  const[err,setErr]=useState('');
  useEffect(()=>{try{const rq=sessionStorage.getItem('__reqFromLink');if(rq){const id=identifyReqCode(rq);if(id&&(id.cat==='basic'||id.cat==='store')){setInput(rq);sessionStorage.removeItem('__reqFromLink')}}}catch(e){}},[]);
  const[confirmCode,setConfirmCode]=useState('');
  const[writing,setWriting]=useState(false);
  const[copied,setCopied]=useState(false);
  const doParse=(val)=>{const raw=(val!==undefined?val:input).trim();if(!raw){setErr(t.confirmFail);return}const d=decReqCode(raw);if(!d){setParsed(null);setErr(t.confirmFail);return}setErr('');setConfirmCode('');setParsed(d)};
  const fieldRows=()=>{if(!parsed)return[];const f=parsed.fields;const labelMap={nameZh:t.nameZh,nameVi:t.nameVi,phone:t.phone2,addrCity:t.city,addrDist:t.district,addrDetail:t.addrDetail,school:t.school,major:t.major,schoolType:t.schoolType,permitNo:t.permitNoLabel,permitDate:t.permitDate,permitExpiry:t.permitExpiry,permitOrg:t.permitOrgOpt,gender:t.gender,store:t.storeName,shift:t.shift,workStart:t.workStartH,workEnd:t.workEndH,workNote:t.workNote,unitPrice:t.unitPrice};return Object.keys(f).filter(k=>k!=='skills').map(k=>({k,label:labelMap[k]||k,val:typeof f[k]==='object'?JSON.stringify(f[k]):String(f[k]||'—')}))};
  const doAgree=async()=>{if(!parsed)return;setWriting(true);try{const idx=staffList.findIndex(s=>s.code===parsed.code);if(idx<0){setErr(t.confirmFail);setWriting(false);return}const updated=staffList.slice();const patch={...parsed.fields};if(parsed.uuid)patch.uuid=parsed.uuid;updated[idx]={...updated[idx],...patch};const ok=await writeStaff(gh,updated);if(ok){setStaffList(updated);const cc=genConfirmCode(parsed.cat,parsed.code,parsed.fields);setConfirmCode(cc);try{addLog(fmtLog(t.logReqWritten||'寫入{0}申請:{1}',[parsed.cat==='basic'?t.reqBasic:t.reqStore,parsed.code]),'admin')}catch(_e){}}else{setErr(t.confirmFail)}}catch(e){setErr(t.confirmFail)}setWriting(false)};
  return(<div className="space-y-3 bg-white/[0.03] border border-white/[0.08] rounded-2xl p-4">
    <h3 className="text-sm font-semibold text-gray-200">{t.scanReqEntry}</h3>
    <div className="flex gap-2">
      <input value={input} onChange={e=>setInput(e.target.value)} placeholder={t.basicApplyCode+' / '+t.storeApplyCode} className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500"/>
      <QrScanButton onScan={(v)=>{setInput(v);doParse(v)}}/>
      <button onClick={()=>doParse()} className="px-4 py-2 rounded-xl bg-white/[0.06] border border-white/[0.08] text-gray-300 text-sm font-medium">{t.confirm}</button>
    </div>
    {err&&<p className="text-xs text-red-400">{err}</p>}
    {parsed&&(<div className="space-y-2 bg-white/[0.02] border border-white/[0.06] rounded-xl p-3 fi">
      <div className="flex items-center justify-between"><span className="text-xs font-semibold text-amber-400">{parsed.cat==='basic'?t.reqBasic:t.reqStore} · {t.teacherCode} {parsed.code}</span>{parsed.uuid&&<span className={`text-[10px] px-2 py-0.5 rounded-full ${parsed.boundClaim?'bg-emerald-600/15 text-emerald-400':'bg-amber-600/15 text-amber-400'}`}>{parsed.boundClaim?t.uuidBound:t.uuidNew}</span>}</div>
      <div className="space-y-1">{fieldRows().map(r=>(<div key={r.k} className="flex justify-between text-xs border-b border-white/[0.04] py-1"><span className="text-gray-500">{r.label}</span><span className="text-gray-200 font-medium text-right ml-2 break-all">{r.val}</span></div>))}</div>
      {!confirmCode?(
        <div className="flex gap-2 pt-1">
          <button onClick={()=>{setParsed(null);setInput('')}} className="flex-1 py-2.5 rounded-xl bg-white/[0.04] text-gray-400 text-sm font-medium">{t.disagree}</button>
          <button onClick={doAgree} disabled={writing} className={`flex-1 py-2.5 rounded-xl text-sm font-bold ${writing?'bg-gray-600 text-gray-400':'bg-amber-600 text-white active:bg-amber-700'}`}>{writing?'...':t.agreeWrite}</button>
        </div>
      ):(
        <div className="space-y-2 pt-1 fi">
          <div className="bg-emerald-500/15 border border-emerald-500/30 rounded-xl p-3 text-center">
            <p className="text-[11px] text-emerald-500 mb-1">{t.writeOk}</p>
            <p className="text-3xl font-bold font-mono text-emerald-500 tracking-wider" style={{letterSpacing:'0.15em'}}>{confirmCode}</p>
            <p className="text-[10px] text-gray-500 mt-1">{t.giveConfirmCode}</p>
          </div>
          <div className="grid grid-cols-2 gap-2"><button onClick={()=>{navigator.clipboard.writeText(confirmCode).catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),2000)}} className="py-2 rounded-xl bg-white/[0.06] border border-white/[0.08] text-gray-300 text-sm">{copied?'✓':t.copyBtn}</button><button onClick={()=>{location.href='https://line.me/R/share?text='+encodeURIComponent(t.lineConfirmPrefix+'\n'+confirmCode)}} className="py-2 rounded-xl text-white text-sm font-bold bg-[#06C755] active:bg-[#05b34c]">{t.sendViaLine}</button></div>
          <button onClick={()=>{setParsed(null);setInput('');setConfirmCode('')}} className="w-full py-2 rounded-xl bg-white/[0.04] text-gray-400 text-sm">{t.closeThis}</button>
        </div>
      )}
    </div>)}
  </div>);
}
function StaffListSection({t,staffList,sortMode,setSortMode,onEdit,myCode,myLevel,myStore}){

    {totalPages>1&&(<div className="flex items-center justify-center gap-3 pt-2"><button onClick={()=>setPage(Math.max(0,page-1))} disabled={page===0} className={`px-3 py-1.5 rounded-lg text-xs ${page===0?'text-gray-700':'text-gray-400 bg-white/[0.04] active:bg-white/[0.08]'}`}>←</button><span className="text-xs text-gray-500">{page+1} / {totalPages}</span><button onClick={()=>setPage(Math.min(totalPages-1,page+1))} disabled={page>=totalPages-1} className={`px-3 py-1.5 rounded-lg text-xs ${page>=totalPages-1?'text-gray-700':'text-gray-400 bg-white/[0.04] active:bg-white/[0.08]'}`}>→</button></div>)}
  </div>)}

function LogSection({t,filterLevel}){const[logs]=useState(()=>getLogs(filterLevel));if(!logs.length)return null;return(<div className="space-y-2 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4"><h3 className="text-sm font-semibold text-amber-400">{t.actionLog}</h3><div className="max-h-60 overflow-y-auto space-y-1 no-sb">{logs.map((l,i)=>(<div key={i} className="text-[11px] py-1 border-b border-white/[0.03]"><span className="text-gray-600 font-mono">{fmtDate(l.ts)}</span><span className="text-gray-400 ml-2">{l.msg}</span>{l.op&&filterLevel==='admin'&&<span className="text-gray-700 ml-1">[{l.op}]</span>}</div>))}</div></div>)}

function ApprovedList({t,isAdmin}){

  const doRevoke=async(i)=>{const item=list[i];const h=revokeHash(item.code);const updated=[...list];updated[i]={...item,revoked:true,revokedAt:Date.now()};setList(updated);saveApproved(updated);setRevokedHash({idx:i,hash:h});addLog(fmtLog(t.logRevoke,[item.code,item.devName||'']),'supervisor');const gh=getGHConfig();if(gh.token&&gh.owner&&gh.repo){setWriteStatus(t.ghWriting);const ok=await ghAppendLine(gh,'revoked.cfg',h,'revoke '+item.code);setWriteStatus(ok?.ok?t.ghWriteOk:t.ghWriteFail)}};

// 行為代碼+流水 票證查詢與核准(主管/管理者共用)
function ActionTicketBlock({t,myCode}){
  const[seqInput,setSeqInput]=useState('');const[info,setInfo]=useState(null);const[status,setStatus]=useState('');const[approveStatus,setApproveStatus]=useState('');
  const lookup=async(overrideSeq)=>{
    const seq=(overrideSeq||seqInput).trim().toUpperCase();if(!seq)return;
    setStatus('...');setInfo(null);setApproveStatus('');
    try{
      const r=await gasCheckAction(seq);
      if(r&&r.ok){let payload={};try{payload=JSON.parse(r.payload||'{}')}catch(_e){}setInfo({seq:r.seq,actionCode:r.actionCode,code:r.code,payload,status:r.status});setStatus('')}
      else{setStatus((r&&r.error)||t.ticketNotFound)}
    }catch(e){setStatus(t.ticketNotFound+'（'+e+'）')}
  };
  // 老師傳來的LINE連結(auth.html#req=N000001)進站時自動帶入+自動查詢,不用手動貼
  useEffect(()=>{
    try{
      const raw=parseReqHash(window.location.hash||'');
      if(raw&&/^[A-Za-z]\d{6}$/.test(raw.trim())){
        const seq=raw.trim().toUpperCase();
        setSeqInput(seq);
        lookup(seq);
      }
    }catch(_e){}
  },[]);
  const approve=async()=>{
    if(!info)return;setApproveStatus('...');
    try{
      const r=await gasApproveAction(info.seq,myCode);
      if(r&&r.ok){setApproveStatus(t.ticketApproveOk);setInfo({...info,status:'approved'})}
      else{setApproveStatus(t.ticketApproveFail+(r&&r.error?'：'+r.error:''))}
    }catch(e){setApproveStatus(t.ticketApproveFail)}
  };
  return(<div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4"><h3 className="text-sm font-semibold text-amber-400">{t.ticketLookup}</h3>
    <div className="flex gap-2"><input value={seqInput} onChange={e=>setSeqInput(e.target.value)} placeholder={t.ticketLookupPh} className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500"/><button onClick={lookup} className="px-4 py-2.5 rounded-xl bg-amber-600 text-white text-sm font-bold">{t.ticketLookupBtn}</button></div>
    {status&&<p className="text-xs text-center text-red-400">{status}</p>}
    {info&&(<div className="bg-white/[0.03] rounded-xl p-3 space-y-1.5 fi">
      <p className="text-sm text-amber-400 font-bold text-center">{info.actionCode==='N'?t.ticketTypeN:info.actionCode==='F'?t.ticketTypeF:info.actionCode}</p>
      <p className="text-xs text-gray-400 text-center">{t.ticketInfoTeacher}：{info.code}</p>
      {info.actionCode==='N'&&(<>
        {info.payload.store&&<p className="text-xs text-gray-500 text-center">{t.ticketInfoStore}：{info.payload.store}</p>}
        {info.payload.gender&&<p className="text-xs text-gray-500 text-center">{t.ticketInfoGender}：{info.payload.gender==='M'?t.genderM:t.genderF}</p>}
        {info.payload.shift&&<p className="text-xs text-gray-500 text-center">{t.ticketInfoShift}：{info.payload.shift==='day'?t.shiftDay:t.shiftNight}</p>}
        {info.payload.workStart&&<p className="text-xs text-gray-500 text-center">{t.ticketInfoWork}：{info.payload.workStart}-{info.payload.workEnd}</p>}
      </>)}
      {info.status!=='pending'?(<p className="text-xs text-center text-gray-500">{t.ticketAlreadyDone}（{info.status}）</p>):(
        <button onClick={approve} disabled={approveStatus==='...'} className="w-full py-2.5 rounded-xl bg-emerald-600 text-white text-sm font-bold active:bg-emerald-700 disabled:opacity-50">{approveStatus==='...'?t.approving:t.ticketApproveBtn}</button>
      )}
      {approveStatus&&approveStatus!=='...'&&<p className={`text-xs text-center ${approveStatus.includes('✓')?'text-emerald-400':'text-red-400'}`}>{approveStatus}</p>}
    </div>)}
  </div>);
}

function SupervisorPage({t,onBack}){
  const gh=getGHConfig();
  const _ms=LS.get('app-settings')||{};
  const[encInput,setEncInput]=useState('');const[actResult,setActResult]=useState('');const[decodedInfo,setDecodedInfo]=useState('');const[supInput,setSupInput]=useState('');const[supResult,setSupResult]=useState('');const[supInfo,setSupInfo]=useState(null);const[revoked,setRevoked]=useState(false);const[staffList,setStaffList]=useState([]);const[sortMode,setSortMode]=useState('store');const[storeList,setStoreList]=useState([]);const[newStore,setNewStore]=useState('');const[storeStatus,setStoreStatus]=useState('');const[genConnInput,setGenConnInput]=useState('');const[genConnResult,setGenConnResult]=useState('');const[genConnCopied,setGenConnCopied]=useState(false);const[supEditStaff,setSupEditStaff]=useState(null);const[supEditWS,setSupEditWS]=useState('');const[supEditWE,setSupEditWE]=useState('');const[supEditStatus,setSupEditStatus]=useState('');const[supEditStoreVal,setSupEditStoreVal]=useState('');const[supEditLevel,setSupEditLevel]=useState(1);const[supConnDevInput,setSupConnDevInput]=useState('');const[supConnResult,setSupConnResult]=useState('');const[supLevel,setSupLevel]=useState(1);const[supApproveStatus,setSupApproveStatus]=useState('');
  useEffect(()=>{(async()=>{try{const s=LS.get('app-settings');if(!s)return;
    // 管理員豁免 revoke 檢查
    try{const ar=await fetch('./admin.cfg',{cache:'no-store'});if(ar.ok){const at=(await ar.text()).trim();const al=at.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));const mh=adminHash(s.code);if(al.some(l=>{const p=l.split(':');return (p.length>=2?p[p.length-1]:p[0])===mh})){return}}}catch(_e){}
    const res=await fetch('./revoked.cfg',{cache:'no-store'});if(!res.ok)return;const text=(await res.text()).trim();const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));const myHash=revokeHash(s.code);if(lines.some(l=>l===myHash)){LS.set(`supervisor-${s.code}`,null);setRevoked(true)}}catch(_e){}const gh=getGHConfig();if(gh.token){try{const s=await readStaff(gh);setStaffList(s)}catch(_e){}}try{const st=await loadStores();setStoreList(st)}catch(_e){}try{const rq=sessionStorage.getItem('__reqFromLink');if(rq){const id=identifyReqCode(rq);if(id){if(id.cat==='conn')setGenConnInput(rq);else if(id.cat==='supapply')setSupInput(rq);sessionStorage.removeItem('__reqFromLink')}}}catch(_e){}})()},[]);
  if(revoked)return(<div className="min-h-screen flex items-center justify-center p-8"><div className="text-center"><div className="w-16 h-16 bg-red-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4"><span className="text-3xl">⚠️</span></div><p className="text-red-400 text-lg font-bold mb-4">{t.expired}</p><button onClick={onBack} className="px-6 py-3 bg-white/[0.06] rounded-xl text-gray-300">{t.ok}</button></div></div>);

    <div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4"><div className="flex items-center justify-between"><h3 className="text-sm font-semibold text-amber-400">{t.ghConfig}</h3>{!ghEditing&&gh.token&&<button onClick={()=>setGhEditing(true)} className="px-3 py-1 rounded-lg bg-white/[0.06] text-amber-400 text-xs font-medium active:bg-white/[0.1]">{t.ghEdit}</button>}</div>{ghEditing?(<><input value={gh.owner||''} onChange={e=>setGh({...gh,owner:e.target.value.trim()})} placeholder={t.ghOwner+" (ex: john7t)"} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500"/><input value={gh.repo||''} onChange={e=>setGh({...gh,repo:e.target.value.trim()})} placeholder={t.ghRepo+" (ex: massage-pay)"} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500"/><input value={gh.token||''} onChange={e=>setGh({...gh,token:e.target.value.trim()})} placeholder={t.ghToken} type="password" className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500"/><div className="flex gap-2"><button onClick={saveGH} className="flex-1 py-2.5 bg-amber-600 rounded-xl text-white text-sm font-bold">{t.ghSave}</button><button onClick={testGH} className="flex-1 py-2.5 bg-white/[0.06] rounded-xl text-gray-300 text-sm font-medium">{t.ghTest}</button></div></>):(<><input value={gh.owner||''} disabled className="w-full bg-white/[0.03] border border-white/[0.04] rounded-xl px-3 py-2.5 text-sm text-gray-500 font-mono cursor-not-allowed"/><input value={gh.repo||''} disabled className="w-full bg-white/[0.03] border border-white/[0.04] rounded-xl px-3 py-2.5 text-sm text-gray-500 font-mono cursor-not-allowed"/><input value={'●'.repeat(12)} disabled type="text" className="w-full bg-white/[0.03] border border-white/[0.04] rounded-xl px-3 py-2.5 text-sm text-gray-500 font-mono cursor-not-allowed"/><div className="flex gap-2"><button onClick={testGH} className="flex-1 py-2.5 bg-white/[0.06] rounded-xl text-gray-300 text-sm font-medium">{t.ghTest}</button></div></>)}{ghStatus&&<p className={`text-xs text-center ${ghStatus.includes('✓')?'text-emerald-400':'text-amber-400'}`}>{ghStatus}</p>}
      {gh.token&&<div className="mt-2 pt-3 border-t border-white/[0.06] space-y-2"><p className="text-[11px] text-sky-400 font-semibold">給 GAS 屬性用（本機已存的 Token）</p><button onClick={()=>setShowToken(!showToken)} className="w-full py-2 rounded-lg bg-white/[0.06] text-gray-300 text-xs font-medium active:bg-white/[0.1]">{showToken?'隱藏 Token':'顯示本機 Token'}</button>{showToken&&<div className="space-y-1"><div className="bg-white/[0.04] rounded-lg p-2.5 text-[11px] text-gray-300 font-mono break-all select-all">{gh.token}</div><button onClick={()=>{try{navigator.clipboard.writeText(gh.token);setGhStatus('已複製 Token ✓')}catch(_e){setGhStatus('請長按上方文字複製')}}} className="w-full py-2 rounded-lg bg-sky-600 text-white text-xs font-semibold active:bg-sky-700">複製 Token</button><p className="text-[10px] text-gray-500">貼到 GAS 指令碼屬性的 GH_TOKEN。另 GH_OWNER={gh.owner||'john7t'}、GH_REPO={gh.repo||'massage-pay'}</p></div>}</div>}</div>
    <div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4"><h3 className="text-sm font-semibold text-amber-400">{t.keyConfig}</h3>{keyRules.map((r,i)=>(<div key={i} className="flex gap-1.5 items-center"><select value={r.file} onChange={e=>updateRule(i,'file',e.target.value)} className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-lg px-2 py-2 text-xs text-gray-200 focus:outline-none">{['key.cfg','admin.cfg','revoked.cfg','index.html'].map(f=><option key={f} value={f}>{f}</option>)}</select><input type="number" value={r.start} onChange={e=>updateRule(i,'start',e.target.value)} placeholder={t.keyStart} className="w-14 bg-white/[0.06] border border-white/[0.08] rounded-lg px-2 py-2 text-xs text-center text-gray-200 font-mono focus:outline-none"/><input type="number" value={r.len} onChange={e=>updateRule(i,'len',e.target.value)} placeholder={t.keyLen} className="w-12 bg-white/[0.06] border border-white/[0.08] rounded-lg px-2 py-2 text-xs text-center text-gray-200 font-mono focus:outline-none"/>{keyRules.length>1&&<button onClick={()=>delRule(i)} className="text-red-400/50 text-xs px-1">✕</button>}</div>))}<button onClick={addRule} className="text-xs text-amber-400/60 active:text-amber-400">+ {t.keyAddRule}</button><div className="flex gap-2"><button onClick={testKey} className="flex-1 py-2 bg-white/[0.06] rounded-xl text-gray-300 text-sm font-medium">{t.keyTest}</button><button onClick={saveKeyRules} className="flex-1 py-2 bg-amber-600 rounded-xl text-white text-sm font-bold">{t.keySave}</button></div>{keySaveStatus&&<p className="text-xs text-center text-emerald-400">{keySaveStatus}</p>}{keyChecks.length>0&&(<div className="space-y-1 pt-2 border-t border-white/[0.04]">{keyChecks.map((c,i)=>(<div key={i} className="flex items-start gap-2 text-[11px]"><span className={c.ok?'text-emerald-400':'text-red-400'}>{c.ok?'✓':'✗'}</span><span className={c.ok?'text-gray-400':'text-red-300'}>{c.msg}</span></div>))}{builtKey&&(<div className="mt-2 bg-white/[0.04] rounded-lg p-2"><p className="text-[10px] text-gray-600 mb-1">{t.keyResult}</p><p className="text-sm font-mono text-amber-400 select-all text-center">{builtKey}</p></div>)}{needMigrate&&gh.token&&(<button onClick={migrateAdminCfg} className="w-full mt-2 py-2.5 bg-red-500/20 border border-red-500/30 rounded-xl text-red-300 text-sm font-medium active:bg-red-500/30">{t.keyMigrate}</button>)}{migrateStatus&&<p className={`text-xs text-center ${migrateStatus.includes('✓')?'text-emerald-400':'text-amber-400'}`}>{migrateStatus}</p>}</div>)}</div>
    <LogSection t={t} filterLevel="admin"/>
  </div>)}


/* ══════════ Auth Gate (原 SettingsPage 後台入口邏輯) ══════════ */
function AuthGate({t}){
  const settings=LS.get('app-settings')||{};
  const devId=getDeviceId();
  const[showAdmin,setShowAdmin]=useState(false);
  const[showSupervisor,setShowSupervisor]=useState(false);
  const[checkState,setCheckState]=useState('idle');
  const supKey=`supervisor-${settings.code}`;
  const[supStatus,setSupStatus]=useState(()=>LS.get(supKey)||null);
  const[applyStep,setApplyStep]=useState(false);
  const[devNameInput,setDevNameInput]=useState('');
  const[supErr,setSupErr]=useState('');
  const[appCopied,setAppCopied]=useState(false);
  const[supCheckStatus,setSupCheckStatus]=useState('');

  // 沒有有效身份時導回首頁
  if(!settings.code)return(<div className="min-h-screen flex items-center justify-center p-8"><div className="text-center"><p className="text-gray-400 mb-4">無使用者資料</p><button onClick={goHome} className="px-6 py-3 bg-white/[0.06] rounded-xl text-gray-300">{t.home}</button></div></div>);

  const tryCheck=async()=>{if(checkState==='ok'){setShowAdmin(true);return}if(checkState==='denied')return;setCheckState('checking');try{const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),5000);const res=await fetch('./admin.cfg',{cache:'no-store',signal:ctrl.signal});clearTimeout(timer);if(!res.ok)throw new Error('http');const text=(await res.text()).trim();const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));const myHash=adminHash(settings.code);const match=lines.some(l=>{const parts=l.split(':');const h=parts.length>=2?parts[parts.length-1]:parts[0];return h===myHash});setCheckState(match?'ok':'denied')}catch(e){setCheckState('idle')}};
  const doApply=async()=>{const payload=`${settings.code}:${devId}:${devNameInput.trim()||'unknown'}`;const appCode=xEnc(payload);const data={status:'pending',deviceName:devNameInput.trim()||'',appCode,appliedAt:Date.now()};LS.set(supKey,data);setSupStatus(data);setApplyStep(false);try{navigator.clipboard.writeText(appCode).catch(()=>{})}catch(_e){}const gh=getGHConfig();if(gh.token){try{const staff=await readStaff(gh);const existing=staff.find(s=>s.code===settings.code);if(existing){existing.supRequest=true;existing.supRequestAt=Date.now();await writeStaff(gh,staff)}}catch(_e){}}};
  const checkSupOnline=async()=>{setSupCheckStatus(t.checking);const gh=getGHConfig();if(gh.token){try{const staff=await readStaff(gh);const me=staff.find(s=>s.code===settings.code);if(me&&me.role==='supervisor'&&me.status==='active'){const data={...supStatus,status:'approved',approvedAt:Date.now(),level:me.level||0};LS.set(supKey,data);setSupStatus(data);setSupCheckStatus(t.approved);addLog(fmtLog(t.logTeacherActivate,[settings.code,supStatus?.deviceName||'']),'teacher');return}}catch(_e){}}try{const result=await checkApproved('s',supApproveHash(settings.code));if(result){const data={...supStatus,status:'approved',approvedAt:Date.now(),level:result.level||0};LS.set(supKey,data);setSupStatus(data);setSupCheckStatus(t.approved);addLog(fmtLog(t.logTeacherActivate,[settings.code,supStatus?.deviceName||'']),'teacher');return}}catch(_e){}setSupCheckStatus('');setSupErr(t.waitHint)};
  const copyAppCode=async()=>{if(supStatus?.appCode){try{await navigator.clipboard.writeText(supStatus.appCode).catch(()=>{})}catch(_e){}}setAppCopied(true);setTimeout(()=>setAppCopied(false),2000)};

  const[reqLinkInfo,setReqLinkInfo]=useState(false);
  // 連結帶 req 申請碼 可能多段 req/req2/req3 進來 → 接回完整碼,暫存
  useEffect(()=>{
    try{
      const hash=window.location.hash||'';
      const raw=parseReqHash(hash);
      if(!raw)return;
      const id=identifyReqCode(raw);
      if(id){sessionStorage.setItem('__reqFromLink',raw);setReqLinkInfo(true)}
    }catch(e){}
  },[]);

  // 從 index 帶 auto=1 進來(已預檢有權限)→ 自動驗證並直接進管理頁,省去手動按檢查
  useEffect(()=>{
    const hash=window.location.hash||'';
    if(hash.indexOf('auto=1')===-1)return;
    const hideBoot=()=>{try{if(window.__hideBootScreen)window.__hideBootScreen()}catch(e){}};
    if(!settings.code){hideBoot();return}
    (async()=>{
      try{const sup=LS.get('supervisor-'+settings.code);if(sup&&sup.status==='approved'){setShowSupervisor(true);hideBoot();return}}catch(_e){}
      try{const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),5000);const res=await fetch('./admin.cfg',{cache:'no-store',signal:ctrl.signal});clearTimeout(timer);if(res.ok){const text=(await res.text()).trim();const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));const myHash=adminHash(settings.code);if(lines.some(l=>{const parts=l.split(':');const h=parts.length>=2?parts[parts.length-1]:parts[0];return h===myHash})){setCheckState('ok');setShowAdmin(true);hideBoot();return}}}catch(_e){}
      hideBoot();
    })();
  },[]);

  if(showAdmin)return<AdminPage t={t} onBack={goHome}/>;
  if(showSupervisor)return<SupervisorPage t={t} onBack={goHome}/>;

  const checkBtnClass={idle:'bg-white/[0.03] border border-white/[0.06] text-gray-400 active:bg-white/[0.06]',checking:'bg-white/[0.03] border border-white/[0.06] text-gray-600',ok:'bg-emerald-600/20 border border-emerald-500/30 text-emerald-400 active:bg-emerald-600/30',denied:'bg-gray-800/50 border border-gray-700/30 text-gray-600 cursor-not-allowed'}[checkState];
  const checkLabel={idle:t.adminCheck,checking:'...',ok:t.adminEnter,denied:t.adminFail}[checkState];
  const isPending=supStatus?.status==='pending';const isApproved=supStatus?.status==='approved'||checkState==='ok';
  const ghLocal=getGHConfig();const hasConn=!!(ghLocal&&ghLocal.token);

  return(<div className="p-5 max-w-md mx-auto fi space-y-6">
    <div className="flex items-center gap-3"><button onClick={goHome} className="text-gray-500"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button><h2 className="text-xl font-bold text-gray-100">{t.admin} / {t.supervisor}</h2></div>
    {reqLinkInfo&&(<div className="bg-amber-500/5 border border-amber-500/20 rounded-2xl p-4 fi"><p className="text-sm text-amber-300 font-semibold mb-1">{t.reqLinkTitle}</p><p className="text-xs text-gray-400 leading-relaxed">{t.reqLinkDesc}</p></div>)}
    <div className="bg-white/[0.03] border border-white/[0.06] rounded-2xl p-4 space-y-1"><div className="flex justify-between"><span className="text-sm text-gray-500">{t.teacherCode}</span><span className="text-sm text-gray-200 font-mono font-bold">{settings.code}</span></div><div className="flex justify-between"><span className="text-sm text-gray-500">{t.store}</span><span className="text-sm text-gray-300">{settings.store||'—'}</span></div><div className="flex justify-between"><span className="text-sm text-gray-500">{t.connStatus}</span><span className="text-xs">{hasConn?t.connOnline:t.connOffline}</span></div></div>
    <div className="space-y-3"><div className="flex gap-2"><button onClick={tryCheck} disabled={checkState==='checking'||checkState==='denied'} className={`flex-1 py-3 rounded-xl text-sm font-semibold transition-all ${checkBtnClass}`}>{checkLabel}</button>{isApproved?(<button onClick={()=>setShowSupervisor(true)} className="flex-1 py-3 rounded-xl text-sm font-semibold bg-emerald-600/20 border border-emerald-500/30 text-emerald-400 active:bg-emerald-600/30">{t.supervisor}</button>):(<button onClick={()=>{if(!isPending)setApplyStep(!applyStep)}} disabled={isPending} className={`flex-1 py-3 rounded-xl text-sm font-semibold transition-all ${isPending?'bg-gray-800/50 border border-gray-700/30 text-gray-600 cursor-not-allowed':'bg-white/[0.03] border border-white/[0.06] text-gray-400 active:bg-white/[0.06]'}`}>{isPending?t.adminPending:t.adminApply}</button>)}</div>
    {applyStep&&!isPending&&!isApproved&&(hasConn?(<div className="fi space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-xl p-4"><p className="text-sm text-gray-400">{t.adminApplyDesc}</p><input value={devNameInput} onChange={e=>setDevNameInput(e.target.value)} placeholder={t.deviceName} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100 focus:outline-none focus:border-amber-500"/><button onClick={doApply} className="w-full py-3 rounded-xl bg-amber-600 text-white font-bold">{t.confirm}</button></div>):(<div className="bg-red-500/5 border border-red-500/20 rounded-xl p-4 text-center"><p className="text-xs text-red-300">{t.needConnFirst}</p></div>))}
    {isPending&&(<div className="fi space-y-3"><div className="bg-white/[0.03] border border-white/[0.06] rounded-xl p-3"><p className="text-[10px] text-gray-600 break-all font-mono select-all mb-2">{supStatus.appCode}</p><button onClick={copyAppCode} className={`w-full py-2 rounded-lg text-xs font-medium ${appCopied?'bg-emerald-600/20 text-emerald-400':'bg-amber-600/20 text-amber-400'}`}>{appCopied?'✓ '+t.copyDone:'📋 '+t.adminAppCopy}</button><button onClick={()=>{location.href='https://line.me/R/share?text='+encodeURIComponent(t.lineConnReqPrefix+'\n'+supStatus.appCode)}} className="w-full mt-2 py-2.5 rounded-xl text-white text-sm font-bold bg-[#06C755] active:bg-[#05b34c]">{t.sendLineToSup}</button></div><div className="bg-amber-500/5 border border-amber-500/20 rounded-xl p-3 text-center space-y-2"><div className="flex items-center justify-center gap-2"><div className="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></div><p className="text-xs text-amber-400 font-semibold">{t.waitApproval}</p></div><button onClick={checkSupOnline} className="w-full py-2.5 rounded-xl bg-amber-600/20 text-amber-400 font-medium text-sm active:bg-amber-600/30">{supCheckStatus||t.checkApproval}</button><button onClick={()=>{LS.set(supKey,null);setSupStatus(null);setSupErr('');setSupCheckStatus('')}} className="w-full py-2 text-[11px] text-gray-600 active:text-gray-400">{t.resetApp}</button>{supErr&&<p className="text-amber-400/60 text-xs mt-1">{supErr}</p>}</div></div>)}
    </div>
  </div>);
}

/* ══════════ Auth App root ══════════ */
function AuthApp(){
  const[theme]=useState(()=>localStorage.getItem('app-theme')||'black');
  useEffect(()=>{const onScroll=(e)=>{const st=(e.target&&e.target.scrollTop)||window.scrollY||0;const hdrs=document.querySelectorAll('.sticky-hdr');hdrs.forEach(h=>{if(st>20)h.classList.add('shrink');else h.classList.remove('shrink')})};document.addEventListener('scroll',onScroll,true);window.addEventListener('scroll',onScroll);return()=>{document.removeEventListener('scroll',onScroll,true);window.removeEventListener('scroll',onScroll)}},[]);
  const bgColor=THEMES[theme]||THEMES.black;const isLight=theme==='white'||theme==='pink';
  useEffect(()=>{try{document.documentElement.style.setProperty('--bg',bgColor)}catch(_e){}},[bgColor]);
  const settings=LS.get('app-settings')||{};const lang=settings.lang||'zh';const t=T[lang];
  useEffect(()=>{document.body.style.backgroundColor=bgColor;buildDynamicKey();try{if((window.location.hash||'').indexOf('auto=1')===-1){if(window.__hideBootScreen)window.__hideBootScreen()}}catch(e){}},[]);
  return(<div className={`min-h-screen ${isLight?'text-gray-900':'text-gray-100'}`} style={{backgroundColor:bgColor}} data-light={isLight||undefined}><AuthGate t={t}/></div>);
}

class __EB extends React.Component{constructor(p){super(p);this.state={e:false}}static getDerivedStateFromError(){return{e:true}}componentDidCatch(err){try{window.__showFallback(3,{lineno:0})}catch(e){}}render(){return this.state.e?null:this.props.children}}
ReactDOM.createRoot(document.getElementById('root')).render(<__EB><AuthApp/></__EB>);
