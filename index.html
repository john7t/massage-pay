<script>
/* ── 錯誤兜底攔截器（最早執行） ── */
(function(){
  var PAGE="index",PCODE="00";
  window.__shownFallback=false;
  window.__showFallback=function(src,detail){
    if(window.__shownFallback)return;window.__shownFallback=true;
    try{
      var ver=(document.title.match(/v?(\d+\.\d+[-.]\d+)/)||[])[1]||"?";
      var line=(detail&&detail.lineno)?detail.lineno:0;
      var ecode=PCODE+String(src).padStart(2,"0")+String(line%10000).padStart(4,"0");
      var el=document.getElementById("__fallback");
      if(el){
        var info=document.getElementById("__fbinfo");
        if(info)info.textContent=PAGE+" 網頁 v"+ver+" 更新中　代碼 "+ecode;
        el.style.display="flex";
      }
      var root=document.getElementById("root");if(root)root.style.display="none";
    }catch(e){}
  };
  window.addEventListener("error",function(e){window.__showFallback(1,{lineno:e.lineno})},true);
  window.addEventListener("unhandledrejection",function(e){window.__showFallback(2,{})});
})();
</script>

/* ══════════ StaffListSection ══════════ */
function Onboarding({onComplete}){
  const[step,setStep]=useState(1);const[lang,setLang]=useState('zh');const[code,setCode]=useState('');const[actInput,setActInput]=useState('');const[err,setErr]=useState('');const[checking,setChecking]=useState(false);const[copied,setCopied]=useState(false);const[devId]=useState(()=>getDeviceId());const[stores,setStores]=useState(['龍山寺店']);const[store,setStore]=useState('龍山寺店');const[waitStatus,setWaitStatus]=useState('');
  const t=T[lang];
  useEffect(()=>{loadStores().then(s=>{setStores(s);setStore(s[0]||'龍山寺店')})},[]);
  const encReg=code?xEnc(`${code}:${devId}:${lang}:${encodeURIComponent(store)}`):'';
  const qrUrl=encReg?`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(encReg)}&bgcolor=030712&color=f3f4f6`:'';
  const doActivate=(settings)=>{LS.set('app-settings',settings);LS.set(`activated-${code}`,{deviceId:devId,ts:Date.now()});onComplete(settings)};
  const goStep2=async()=>{
    if(!code.trim())return;setChecking(true);
    try{const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),5000);const res=await fetch('./admin.cfg',{cache:'no-store',signal:ctrl.signal});clearTimeout(timer);if(res.ok){const text=(await res.text()).trim();const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));const myHash=adminHash(code);const match=lines.some(l=>{const parts=l.split(':');const h=parts.length>=2?parts[parts.length-1]:parts[0];return h===myHash});if(match){doActivate({code,unitPrice:250,lang,store,year:bizParts().y,deviceId:devId});return}}}catch{}
    try{const result=await checkApproved('t',approveHash(code,devId));if(result){doActivate({code,unitPrice:250,lang,store,year:bizParts().y,deviceId:devId});return}}catch{}
    setChecking(false);setStep(2);setErr('');
    const enc=xEnc(`${code}:${devId}:${lang}:${encodeURIComponent(store)}`);try{navigator.clipboard.writeText(enc)}catch{}
    setCopied(true);setTimeout(()=>setCopied(false),2000);
  };
  const verify=()=>{const input=actInput.replace(/[\s-]/g,'').trim();const correct=genSimpleAct(code).replace(/-/g,'');if(input===correct){doActivate({code,unitPrice:250,lang,store,year:bizParts().y,deviceId:devId})}else{setErr(t.activationFail)}};
  return(<div className="min-h-screen flex items-center justify-center p-6"><div className="w-full max-w-sm fi">
    {step===1&&(<div className="space-y-6"><div className="text-center"><div className="w-16 h-16 bg-amber-600/20 rounded-2xl flex items-center justify-center mx-auto mb-4"><svg className="w-8 h-8 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg></div><h1 className="text-xl font-bold text-gray-100 mb-1">{t.welcome}</h1></div>
    <div><label className="text-sm text-gray-400 mb-1.5 block">{t.language}</label><div className="grid grid-cols-2 gap-2">{[['zh','中文'],['vi','Tiếng Việt']].map(([c,l])=>(<button key={c} onClick={()=>setLang(c)} className={`py-3 rounded-xl text-sm font-semibold transition-all ${lang===c?'bg-amber-600 text-white':'bg-white/[0.04] text-gray-500'}`}>{l}</button>))}</div></div>
    <div><label className="text-sm text-gray-400 mb-1.5 block">{t.store}</label><select value={store} onChange={e=>setStore(e.target.value)} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3.5 text-lg text-gray-100 focus:outline-none focus:border-amber-500 appearance-none">{stores.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
    <div><label className="text-sm text-gray-400 mb-1.5 block">{t.enterCode}</label><input value={code} onChange={e=>setCode(e.target.value.replace(/[^a-zA-Z0-9]/g,''))} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3.5 text-xl text-center text-gray-100 tracking-widest focus:outline-none focus:border-amber-500" placeholder="122"/></div>
    <button onClick={goStep2} disabled={!code.trim()||checking} className={`w-full py-4 rounded-xl font-bold text-lg transition-all ${code.trim()&&!checking?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-600 cursor-not-allowed'}`}>{checking?t.adminWelcome:t.confirm}</button>
    <NoticeBox t={t}/></div>)}
    {step===2&&(<div className="space-y-5">
      <div className="flex justify-center"><div className="bg-white p-2.5 rounded-xl"><img src={qrUrl} alt="QR" className="w-44 h-44"/></div></div>
      <p className="text-sm text-amber-400 text-center font-medium">{t.showQR}</p>
      <div className="bg-white/[0.03] rounded-xl p-3 text-center"><p className="text-[10px] text-gray-600 break-all font-mono select-all mb-2">{encReg}</p><button onClick={async()=>{try{await navigator.clipboard.writeText(encReg)}catch{};setCopied(true);setTimeout(()=>setCopied(false),2000)}} className={`px-4 py-2 rounded-lg text-xs font-medium transition-all ${copied?'bg-emerald-600/20 text-emerald-400':'bg-amber-600/20 text-amber-400 active:bg-amber-600/30'}`}>{copied?'✓ '+t.copyDone:'📋 '+t.copyToLine}</button></div>
      <div><label className="text-sm text-gray-400 mb-1.5 block">{t.enterActivation}</label><input value={actInput} onChange={e=>setActInput(e.target.value.replace(/[^0-9-]/g,''))} placeholder="xxx-xxx-xxx" maxLength={11} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3.5 text-xl text-center text-gray-100 font-mono tracking-widest focus:outline-none focus:border-amber-500"/></div>
      {err&&<p className="text-red-400 text-sm text-center fi">{err}</p>}
      <div className="flex gap-2"><button onClick={()=>{setStep(1);setErr('')}} className="flex-1 py-4 rounded-xl bg-white/[0.05] text-gray-400 font-semibold">{t.cancel}</button><button onClick={verify} className="flex-1 py-4 rounded-xl bg-amber-600 text-white font-bold text-lg">{t.confirm}</button></div>
      <NoticeBox t={t}/></div>)}
  </div></div>)}

/* ══════════ Home Page ══════════ */
function HomePage({settings,t,refreshKey}){
  const now=bizDate();const bp=bizParts();const ty=settings.year||bp.y,tm=bp.m,td=bp.d;
  const[data,setData]=useState(null);const[prev,setPrev]=useState(null);const[otherMode,setOtherMode]=useState(false);const[otherVal,setOtherVal]=useState('');const[editPrev,setEditPrev]=useState(false);
  const load=()=>{const md=LS.get(dk(settings.code,ty,tm));setData(md);let found=false;if(md?.days){for(let d=td-1;d>=1;d--){const day=md.days[d];if(day&&(day.total>0||day.status>0)){setPrev({day:d,month:tm,year:ty,...day});found=true;break}}}if(!found){for(let pm=tm-1;pm>=1;pm--){const pmd=LS.get(dk(settings.code,ty,pm));if(!pmd)continue;for(let d=dim(ty,pm);d>=1;d--){const day=pmd.days?.[d];if(day&&(day.total>0||day.status>0)){setPrev({day:d,month:pm,year:ty,...day});found=true;break}}if(found)break}}if(!found)setPrev(null)};
  useEffect(load,[settings.code,refreshKey]);
  const todayData=data?.days?.[td]||eDay();const hasToday=todayData.total>0||todayData.status>0||(todayData.skills&&Object.values(todayData.skills).some(v=>v>0));const sal=calcSal(todayData,settings.unitPrice,settings.skills);
  const addUnits=(n)=>{const md=data?JSON.parse(JSON.stringify(data)):eMon();const dd=md.days[td]||eDay();dd.total+=n;dd.groups=[...dd.groups,n];stamp(dd);md.days[td]=dd;setData({...md});LS.set(dk(settings.code,ty,tm),md);setOtherMode(false);setOtherVal('')};
  const addLaodian=(n)=>{const md=data?JSON.parse(JSON.stringify(data)):eMon();const dd=md.days[td]||eDay();dd.laodian+=n;stamp(dd);md.days[td]=dd;setData({...md});LS.set(dk(settings.code,ty,tm),md)};

function BackupSection({settings,t}){
  const[input,setInput]=useState('');const[result,setResult]=useState(null);const[expCode,setExpCode]=useState('');const[expM,setExpM]=useState(bizParts().m);

      {subTab==='violation'&&(<div className="space-y-6 fi">
        <div>
          <h2 className="text-lg font-bold text-gray-100 mb-3">{t.violationTitle}</h2>

        </div>

          <p className="text-sm text-gray-400 font-medium">{t.violationCode}</p>
          <textarea rows={2} placeholder={t.connInput} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500 resize-none"/>
          <div className="flex gap-2">
            <button className="flex-1 py-2.5 rounded-xl bg-white/[0.04] border border-white/[0.08] text-gray-400 text-sm flex items-center justify-center gap-1"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 4v12m0 0l-4-4m4 4l4-4"/></svg></button>
            <button className="flex-1 py-2.5 rounded-xl bg-white/[0.04] border border-white/[0.08] text-gray-400 text-sm">{t.pasteBtn}</button>

        </div>
        <div className="pt-4 border-t border-white/[0.06]">
          <h2 className="text-lg font-bold text-gray-100 mb-3">{t.dutyTitle}</h2>
          <div className="bg-white/[0.02] border border-white/[0.06] rounded-xl px-4 py-6 text-center"><p className="text-sm text-gray-500">{t.noDuty}</p></div>
        </div>
      </div>)}

      {subTab==='manage'&&(<div className="space-y-5 fi">
        <h2 className="text-lg font-bold text-gray-100">{t.manageCenter}</h2>
        {(()=>{const ghLocal=getGHConfig();const hasConn=!!(ghLocal&&ghLocal.token);return(
          <div className="space-y-3">
            <div className="flex items-center justify-between"><p className="text-sm text-gray-500 font-medium">{t.connection}</p><span className="text-xs">{hasConn?t.connOnline:t.connOffline}</span></div>
            {!hasConn&&!connMode&&(<button onClick={()=>setConnMode('apply')} className="w-full py-3 rounded-xl bg-amber-600/20 border border-amber-500/30 text-amber-400 text-sm font-semibold active:bg-amber-600/30">{t.connApply}</button>)}
            {connMode==='apply'&&(<div className="space-y-3 fi">
              <div className="flex justify-center"><div className="bg-white p-2.5 rounded-xl"><img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(settings.code+':'+devId)}`} alt="QR" className="w-40 h-40"/></div></div>
              <p className="text-[10px] text-gray-600 text-center font-mono select-all break-all">{settings.code}:{devId}</p>
              <div><label className="text-xs text-gray-500 mb-1 block">{t.connCode}</label><textarea value={connInput} onChange={e=>setConnInput(e.target.value)} rows={2} placeholder={t.connInput} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500 resize-none"/></div>
              <div className="flex gap-2"><button onClick={()=>{setConnMode(null);setConnInput('');setConnStatus('')}} className="flex-1 py-2.5 bg-white/[0.04] rounded-xl text-gray-500 text-sm">{t.cancel}</button><button onClick={()=>{const ghCfg=verifyActToken(connInput.trim(),settings.code,devId);if(ghCfg){saveGHConfigLocal(ghCfg);setConnStatus(t.connOk);setConnMode(null);setConnInput('')}else{setConnStatus(t.connFail)}}} className="flex-1 py-2.5 bg-amber-600 rounded-xl text-white text-sm font-bold">{t.confirm}</button></div>
              {connStatus&&<p className={`text-xs text-center ${connStatus.includes('✓')?'text-emerald-400':'text-red-400'}`}>{connStatus}</p>}
            </div>)}
          </div>
        )})()}
        <div className="pt-4 border-t border-white/[0.06] space-y-2">
          <button onClick={goAuth} className="w-full py-3.5 rounded-xl bg-white/[0.04] border border-white/[0.08] text-gray-300 text-sm font-semibold active:bg-white/[0.08] flex items-center justify-center gap-2">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            {t.admin} / {t.supervisor}
          </button>
        </div>
        <div className="text-[10px] text-gray-700 font-mono break-all">{t.deviceId}: {devId}</div>
      </div>)}
      </div>
    </div>
  );
}

/* ══════════ Icons ══════════ */
const IC={
  home:<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>,

};

/* ══════════ App ══════════ */
function App(){
  const[settings,setSettings]=useState(null);const[tab,setTab]=useState('home');const[curM,setCurM]=useState(bizParts().m);const[ready,setReady]=useState(false);const[needOnboard,setNeedOnboard]=useState(false);const[refreshKey,setRefreshKey]=useState(0);const[theme,setTheme]=useState(()=>localStorage.getItem('app-theme')||'pink');
  const bgColor=THEMES[theme]||THEMES.black;const isLight=theme==='white'||theme==='pink';
  useEffect(()=>{document.body.style.backgroundColor=bgColor},[bgColor]);
  useEffect(()=>{localStorage.setItem('app-theme',theme)},[theme]);
  useEffect(()=>{buildDynamicKey()},[]);
  useEffect(()=>{if(!settings||!settings.code)return;const gh=getGHConfig();if(!gh.token)return;const lastCheck=localStorage.getItem('conn-check-date');const _bd=bizDate();const today=_bd.getFullYear()+'-'+String(_bd.getMonth()+1).padStart(2,'0')+'-'+String(_bd.getDate()).padStart(2,'0');if(lastCheck===today)return;(async()=>{try{const staff=await readStaff(gh);const me=staff.find(s=>s.code===settings.code);if(me&&me.hasToken===false){saveGHConfigLocal({});localStorage.removeItem('conn-check-date')}else{localStorage.setItem('conn-check-date',today)}}catch{}})()},[settings]);
  useEffect(()=>{const s=LS.get('app-settings');if(s&&s.code){const act=LS.get(`activated-${s.code}`);if(act){setSettings(s);setReady(true);return}}const hash=window.location.hash;if(hash&&hash.length>5){const p=decBackup(hash.slice(1));if(p){LS.set(dk(p.code,p.year,p.month),p.data);const ns={code:p.code,unitPrice:250,lang:'zh',year:p.year,deviceId:getDeviceId()};LS.set('app-settings',ns);LS.set(`activated-${p.code}`,{deviceId:getDeviceId(),ts:Date.now()});setSettings(ns);setCurM(p.month);setTab('monthly');setReady(true);history.replaceState(null,'',location.pathname);return}}setNeedOnboard(true);setReady(true)},[]);
  const onOnboardComplete=(s)=>{setSettings(s);setNeedOnboard(false)};
  const updateSettings=(s)=>{setSettings(s);LS.set('app-settings',s)};
  const handleTab=(id)=>{setTab(id);if(id==='home')setRefreshKey(k=>k+1)};
  if(!ready)return<div className="min-h-screen flex items-center justify-center" style={{backgroundColor:bgColor}}><div className="w-8 h-8 border-2 border-amber-500 border-t-transparent rounded-full animate-spin"/></div>;
  if(needOnboard)return<Onboarding onComplete={onOnboardComplete}/>;
  if(!settings)return null;
  const lang=settings.lang||'zh';const t=T[lang];
  const tabs=[{id:'home',label:t.home},{id:'monthly',label:t.monthly},{id:'yearly',label:t.yearly},{id:'settings',label:t.settings}];
  // 底部設定❗:基資或店資有未確認變動(主管除外)
  const settingsAlert=(()=>{const gh=getGHConfig();if(gh&&gh.token)return false;const cp=settings.confirmedProfile,cs=settings.confirmedStore;const pf=['gender','nameZh','nameVi','address','school','major','permitDate','permitOrg'];const sf=['storeSel','shift','workStart','workEnd','workNote','unitPrice'];const chg=(snap,fs)=>{if(!snap)return fs.some(k=>{const v=settings[k];return v!==undefined&&v!==''&&v!==null});return fs.some(k=>(snap[k]||'')!==((settings[k]!==undefined?settings[k]:'')||''))};return chg(cp,pf)||chg(cs,sf)})();
  return(<div className={`${isLight?'text-gray-900':'text-gray-100'} flex flex-col`} style={{backgroundColor:bgColor,height:'100dvh'}} data-light={isLight||undefined}>
    <div className="flex-1 overflow-y-auto">
      {tab==='home'&&<HomePage settings={settings} t={t} refreshKey={refreshKey}/>}
      {tab==='monthly'&&<MonthlyPage settings={settings} curM={curM} setCurM={setCurM} t={t}/>}
      {tab==='yearly'&&<YearlyPage settings={settings} t={t}/>}
      {tab==='settings'&&<SettingsPage settings={settings} onUpdate={updateSettings} t={t} theme={theme} setTheme={setTheme}/>}
    </div>
    <nav className="flex-shrink-0 backdrop-blur-xl border-t border-white/[0.06] flex" style={{backgroundColor:bgColor+'ee',paddingBottom:'env(safe-area-inset-bottom)'}}>
      {tabs.map(({id,label})=>(<button key={id} onClick={()=>handleTab(id)} className={`relative flex-1 flex flex-col items-center pt-2 pb-1.5 gap-0.5 transition-all ${tab===id?'text-amber-400':'text-gray-500 active:text-gray-400'}`}>{IC[id]}<span className="text-[10px] font-medium">{label}</span>{id==='settings'&&settingsAlert&&<span className="absolute top-1 right-1/4 text-red-500 text-[10px]">❗</span>}</button>))}
    </nav>
  </div>)}

class __EB extends React.Component{constructor(p){super(p);this.state={e:false}}static getDerivedStateFromError(){return{e:true}}componentDidCatch(err){try{window.__showFallback(3,{lineno:0})}catch(e){}}render(){return this.state.e?null:this.props.children}}
ReactDOM.createRoot(document.getElementById('root')).render(<__EB><App/></__EB>);
</script>
