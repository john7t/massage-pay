const CK_DEFAULT="STK2026X";
let CK=CK_DEFAULT;

// Dynamic key builder: extract chars from cfg files
const KC_KEY='key-config';
function getKeyConfig(){return LS.get(KC_KEY)||null}
function saveKeyConfig(cfg){LS.set(KC_KEY,cfg)}

async function buildDynamicKey(){
  const cfg=getKeyConfig();
  if(!cfg||!cfg.rules||!cfg.rules.length){CK=CK_DEFAULT;return}
  try{
    const parts=[];
    for(const r of cfg.rules){
      if(!r.file||r.start==null||!r.len)continue;
      const res=await fetch('./'+r.file,{cache:'no-store'});
      if(!res.ok){CK=CK_DEFAULT;return}
      const text=await res.text();
      const firstLine=text.split('\n')[0]||'';
      if(firstLine.length<r.start+r.len){CK=CK_DEFAULT;return}
      parts.push(firstLine.substring(r.start,r.start+r.len));
    }
    const built=parts.join('');
    if(built.length>=4)CK=built; else CK=CK_DEFAULT;
  }catch{CK=CK_DEFAULT}
}

function xEnc(t){return Array.from(t).map((c,i)=>(c.charCodeAt(0)^CK.charCodeAt(i%CK.length)).toString(16).padStart(2,'0')).join('')}
function xDec(h){try{return h.match(/.{2}/g).map((x,i)=>String.fromCharCode(parseInt(x,16)^CK.charCodeAt(i%CK.length))).join('')}catch{return''}}
function fnv(s){let h=0x811c9dc5;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193);h=h&0x7fffffff}return h}
function adminHash(code){const S="MassagePay2026!Adm";let h=fnv(S+code+S);for(let i=0;i<200;i++)h=fnv(String(h)+S+code);return h.toString(36).padStart(6,'0')}

// ── Staff management (encrypted staff.json, UTF-8 safe) ──
async function readStaff(gh){
  try{
    const res=await fetch('./staff.json',{cache:'no-store'});
    if(!res.ok)return[];
    const enc=(await res.text()).trim();
    if(!enc)return[];
    const raw=xDec(enc);
    // Try new format (URI-encoded) then old format
    try{return JSON.parse(decodeURIComponent(raw))}
    catch{try{return JSON.parse(raw)}catch{return[]}}
  }catch{return[]}
}
async function writeStaff(gh,staffList){
  if(!gh.token||!gh.owner||!gh.repo)return false;
  const json=JSON.stringify(staffList);
  const enc=xEnc(encodeURIComponent(json));
  const file=await ghReadFile(gh,'staff.json');
  if(file)return ghWriteFile(gh,'staff.json',enc,file.sha,'update staff');
  // Create new file
  try{
    const res=await fetch(`https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/staff.json`,{
      method:'PUT',headers:{'Authorization':'token '+gh.token,'Content-Type':'application/json'},
      body:JSON.stringify({message:'create staff.json',content:btoa(unescape(encodeURIComponent(enc)))})
    });
    return res.ok;
  }catch{return false}
}

// Action log with levels: 'teacher' | 'supervisor' | 'admin'
function addLog(msg,level='admin'){
  const logs=LS.get('admin-log')||[];
  const s=LS.get('app-settings');
  const operator=s?.code||'';
  logs.push({ts:Date.now(),msg,level:level||'admin',op:operator});
  if(logs.length>200)logs.splice(0,logs.length-200);
  LS.set('admin-log',logs);
}
function getLogs(filterLevel){
  const logs=(LS.get('admin-log')||[]).reverse();
  if(!filterLevel)return logs;
  // teacher sees only teacher, supervisor sees teacher+supervisor, admin sees all
  if(filterLevel==='teacher')return logs.filter(l=>l.level==='teacher');
  if(filterLevel==='supervisor')return logs.filter(l=>l.level==='teacher'||l.level==='supervisor');
  return logs;
}
function fmtLog(s,args){return args.reduce((r,a,i)=>r.replace(`{${i}}`,a),s)}
function fmtDate(ts){const d=new Date(ts);return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}

// ── Store management ──
async function loadStores(){
  try{
    const res=await fetch('./stores.cfg',{cache:'no-store'});
    if(!res.ok)return['龍山寺店'];
    const text=(await res.text()).trim();
    const stores=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
    return stores.length?stores:['龍山寺店'];
  }catch{return['龍山寺店']}
}
async function saveStores(gh,stores){
  if(!gh.token)return false;
  const content=stores.join('\n')+'\n';
  const file=await ghReadFile(gh,'stores.cfg');
  if(file)return ghWriteFile(gh,'stores.cfg',content,file.sha,'update stores');
  try{
    const res=await fetch(`https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/stores.cfg`,{
      method:'PUT',headers:{'Authorization':'token '+gh.token,'Content-Type':'application/json'},
      body:JSON.stringify({message:'create stores.cfg',content:btoa(unescape(encodeURIComponent(content)))})
    });
    return res.ok;
  }catch{return false}
}

function StaffListSection({t,staffList,sortMode,setSortMode,onEdit,myCode,myLevel,myStore}){
  const[page,setPage]=useState(0);
  const[selected,setSelected]=useState(null);
  const PER_PAGE=10;
  if(!staffList.length)return(
    <div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4">
      <h3 className="text-sm font-semibold text-amber-400">{t.staffList}</h3>
      <p className="text-xs text-gray-600 text-center">{t.staffEmpty}</p>
    </div>
  );
  const roleOrder=s=>s.role==='admin'?99:s.role==='supervisor'?(10+(s.level||0)):0;
  // 副理(1)/經理(2) only see own store
  const filtered=(myLevel<=2)?staffList.filter(s=>s.store===myStore||s.role==='admin'):staffList;
  const numCode=s=>parseInt(s.code)||0;
  const sorted=sortMode==='store'
    ?[...filtered].sort((a,b)=>(a.store||'').localeCompare(b.store||'')||numCode(a)-numCode(b))
    :sortMode==='role'
    ?[...filtered].sort((a,b)=>roleOrder(b)-roleOrder(a)||numCode(a)-numCode(b))
    :[...filtered].sort((a,b)=>numCode(a)-numCode(b));
  const totalPages=Math.ceil(sorted.length/PER_PAGE);
  const paged=sorted.slice(page*PER_PAGE,(page+1)*PER_PAGE);
  let lastStore='';
  const lvIcon=s=>{if(s.role==='admin')return'⚙️';if(s.role==='supervisor')return{4:'⭐',3:'💎',2:'🔷',1:'🔹'}[s.level]||'👔';return'👤'};
  const handleClick=(s)=>{
    if(selected===s.code)return; // already selected, no re-click
    setSelected(s.code);
    if(onEdit)onEdit(s);
  };
  return(
    <div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4">
      <div className="flex items-center justify-between">
        <h3 className="text-sm font-semibold text-amber-400">{t.staffList}</h3>
        <div className="flex gap-1">
          <button onClick={()=>{setSortMode('store');setPage(0)}} className={`px-2 py-1 rounded text-[10px] ${sortMode==='store'?'bg-amber-600 text-white':'bg-white/[0.04] text-gray-500'}`}>{t.sortByStore}</button>
          <button onClick={()=>{setSortMode('role');setPage(0)}} className={`px-2 py-1 rounded text-[10px] ${sortMode==='role'?'bg-amber-600 text-white':'bg-white/[0.04] text-gray-500'}`}>{t.sortByRole}</button>
          <button onClick={()=>{setSortMode('code');setPage(0)}} className={`px-2 py-1 rounded text-[10px] ${sortMode==='code'?'bg-amber-600 text-white':'bg-white/[0.04] text-gray-500'}`}>{t.sortByCode}</button>
        </div>
      </div>
      <div className="space-y-1">
        {paged.map((s,i)=>{
          const lvName=s.level?supLevelName(s.level,t===T.zh?'zh':'vi'):'';
          const showH=sortMode==='store'&&(s.store||'')!==lastStore;
          if(showH)lastStore=s.store||'';
          const isSel=selected===s.code;
          return(
            <React.Fragment key={s.code}>
              {showH&&<p className="text-[11px] text-gray-500 font-semibold pt-2 pb-1">{s.store||'—'}</p>}
              <div className={`py-2 px-3 rounded-xl transition-all ${isSel?'bg-amber-600/10 border border-amber-500/30':'bg-white/[0.02]'}`}>
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <span className="text-[12px]">{lvIcon(s)}</span>
                    <button onClick={()=>handleClick(s)} disabled={isSel}
                      className={`text-sm font-bold font-mono ${isSel?'text-amber-300 cursor-default':'text-amber-400 active:text-amber-300'}`}>
                      {s.code}{isSel?' (編輯模式)':''}
                    </button>
                    {!isSel&&sortMode!=='store'&&s.store&&<span className="text-[10px] text-gray-600">{s.store}</span>}
                  </div>
                  <div className="flex items-center gap-1.5">
                    {s.supRequest&&<span className="text-[10px] px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-300 animate-pulse">{t.adminApply}</span>}
                    {lvName&&<span className="text-[10px] px-1.5 py-0.5 rounded bg-amber-500/10 text-amber-400">{lvName}</span>}
                    <span className="text-[11px]">{s.hasToken?'☁️':'📥'}</span>
                  </div>
                </div>
              </div>
            </React.Fragment>
          );
        })}
      </div>
      {/* Pagination */}
      {totalPages>1&&(
        <div className="flex items-center justify-center gap-3 pt-2">
          <button onClick={()=>setPage(Math.max(0,page-1))} disabled={page===0} className={`px-3 py-1.5 rounded-lg text-xs ${page===0?'text-gray-700':'text-gray-400 bg-white/[0.04] active:bg-white/[0.08]'}`}>←</button>
          <span className="text-xs text-gray-500">{page+1} / {totalPages}</span>
          <button onClick={()=>setPage(Math.min(totalPages-1,page+1))} disabled={page>=totalPages-1} className={`px-3 py-1.5 rounded-lg text-xs ${page>=totalPages-1?'text-gray-700':'text-gray-400 bg-white/[0.04] active:bg-white/[0.08]'}`}>→</button>
        </div>
      )}
    </div>
  );
}

// ── Simple 9-digit activation code (identity only, no token) ──
function genSimpleAct(code){
  const S="MassagePay2026!SimpleAct";
  let h=fnv(S+code+S);
  for(let i=0;i<50;i++)h=fnv(String(h)+S+code);
  const n=h%1000000000;
  const s=String(n).padStart(9,'0');
  return s.substring(0,3)+'-'+s.substring(3,6)+'-'+s.substring(6,9);
}

// ── Device-specific encryption for connection codes (carries token) ──
// Encrypts GitHub token into activation code, bound to code+deviceId
function encWithKey(text,key){return Array.from(text).map((c,i)=>(c.charCodeAt(0)^key.charCodeAt(i%key.length)).toString(16).padStart(2,'0')).join('')}
function decWithKey(hex,key){try{return hex.match(/.{2}/g).map((x,i)=>String.fromCharCode(parseInt(x,16)^key.charCodeAt(i%key.length))).join('')}catch{return''}}
function actKey(code,devId){return code+':'+devId+':ACT2026'}

// Generate activation code containing encrypted GitHub config
function genActWithToken(code,devId,ghCfg){
  const payload=JSON.stringify({t:ghCfg.token,o:ghCfg.owner,r:ghCfg.repo});
  return encWithKey(payload,actKey(code,devId));
}

// Verify activation code and extract GitHub config
function verifyActToken(actCode,code,devId){
  try{
    const json=decWithKey(actCode.trim(),actKey(code,devId));
    const d=JSON.parse(json);
    if(d.t&&d.o&&d.r)return{token:d.t,owner:d.o,repo:d.r};
    return null;
  }catch{return null}
}

async function ghReadFile(cfg,path){
  const res=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`,{
    headers:{'Authorization':`token ${cfg.token}`,'Accept':'application/vnd.github.v3+json'}
  });
  if(!res.ok)return null;
  const data=await res.json();
  return{content:atob(data.content.replace(/\n/g,'')),sha:data.sha};
}

async function ghWriteFile(cfg,path,content,sha,msg){
  const res=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`,{
    method:'PUT',
    headers:{'Authorization':`token ${cfg.token}`,'Content-Type':'application/json'},
    body:JSON.stringify({message:msg||'update '+path,content:btoa(unescape(encodeURIComponent(content))),sha})
  });
  return res.ok;
}

async function ghAppendLine(cfg,path,line,msg){
  const file=await ghReadFile(cfg,path);
  if(!file){
    // File doesn't exist, create it
    try{
      const res=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`,{
        method:'PUT',headers:{'Authorization':'token '+cfg.token,'Content-Type':'application/json'},
        body:JSON.stringify({message:msg||'create '+path,content:btoa(unescape(encodeURIComponent(line+'\n')))})
      });
      if(res.ok)return{ok:true};
      const err=await res.json().catch(()=>({}));
      return{ok:false,reason:err.message||'HTTP '+res.status};
    }catch(e){return{ok:false,reason:e.message||'network error'}}
  }
  const newContent=file.content.trim()+'\n'+line+'\n';
  const ok=await ghWriteFile(cfg,path,newContent,file.sha,msg);
  return ok?{ok:true}:{ok:false,reason:'write failed (SHA conflict?)'};
}

async function ghRemoveLine(cfg,path,line,msg){
  const file=await ghReadFile(cfg,path);
  if(!file)return false;
  const lines=file.content.split('\n').filter(l=>l.trim()!==line.trim());
  return ghWriteFile(cfg,path,lines.join('\n'),file.sha,msg);

/* ══════════ Helpers ══════════ */
const SKILL_KEYS=['guasha','baguang','xiujiao'];
const SKILL_SHORT=['gs','bg','xj'];
const SKILL_PRICES=[250,250,300];
const SKILL_COLORS=['text-cyan-400','text-violet-400','text-pink-400'];
const SK=["normal","sick","late","rest","personal","early"];
const SBG=["","bg-red-500/20","bg-yellow-500/20","bg-blue-500/20","bg-purple-500/20","bg-orange-500/20"];
const STC=["","text-red-300","text-yellow-300","text-blue-300","text-purple-300","text-orange-300"];
const canWork=[true,false,true,false,false,true]; // which statuses allow recording
const toB36=n=>Math.min(Math.max(Math.round(n),0),35).toString(36);
const fromB36=c=>parseInt(c,36)||0;
const dim=(y,m)=>new Date(y,m,0).getDate();
const dow=(y,m,d)=>new Date(y,m-1,d).getDay();

const LS={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){console.error(e)}},
};
const dk=(c,y,m)=>`data-${c}-${y}-${String(m).padStart(2,'0')}`;
const eDay=()=>({groups:[],total:0,laodian:0,status:0,skills:{guasha:0,baguang:0,xiujiao:0},did:'',ts:0});
const stamp=(dd)=>{dd.did=getDeviceId();dd.ts=Date.now();return dd};
const calcSal=(day,unitPrice,enabledSkills)=>{
  let sal=day.total*unitPrice;
  const sk=day.skills||{};
  SKILL_KEYS.forEach((k,i)=>{if(enabledSkills?.[k])sal+=(sk[k]||0)*SKILL_PRICES[i]});
  return sal;
};
const eMon=()=>{const d={};for(let i=1;i<=31;i++)d[i]=eDay();return{days:d}};

function encMonth(code,y,m,data){
  let u="",l="",s="",sg="",sb="",sx="";
  for(let d=1;d<=31;d++){const day=d<=dim(y,m)&&data.days[d]?data.days[d]:eDay();const sk=day.skills||{};
    u+=toB36(day.total);l+=toB36(day.laodian);s+=day.status.toString();
    sg+=toB36(sk.guasha||0);sb+=toB36(sk.baguang||0);sx+=toB36(sk.xiujiao||0);
  }
  // Only append skill fields if any non-zero
  const hasSkills=sg.replace(/0/g,'')||sb.replace(/0/g,'')||sx.replace(/0/g,'');
  return`${code}-${y}-${String(m).padStart(2,'0')}:${u}:${l}:${s}${hasSkills?`:${sg}:${sb}:${sx}`:''}`;
}
function decBackup(str){
  try{const c=str.replace(/^#/,'').trim();const parts=c.split(':');const hd=parts[0],units=parts[1],laodian=parts[2],status=parts[3];
  const sg=parts[4]||'',sb=parts[5]||'',sx=parts[6]||'';
  const p=hd.split('-');const m=parseInt(p.pop());const y=parseInt(p.pop());const code=p.join('-');
  if(!y||!m||m<1||m>12||!code)return null;const data=eMon();const dm=dim(y,m);
  for(let d=1;d<=dm;d++)data.days[d]={groups:[],total:fromB36(units?.[d-1]||'0'),laodian:fromB36(laodian?.[d-1]||'0'),status:parseInt(status?.[d-1]||'0')||0,
    skills:{guasha:fromB36(sg?.[d-1]||'0'),baguang:fromB36(sb?.[d-1]||'0'),xiujiao:fromB36(sx?.[d-1]||'0')}};
  return{code,year:y,month:m,data}}catch{return null}
}

/* ══════════ Onboarding ══════════ */
function Onboarding({onComplete}){
  const[step,setStep]=useState(1);
  const[lang,setLang]=useState('zh');
  const[code,setCode]=useState('');
  const[actInput,setActInput]=useState('');
  const[err,setErr]=useState('');
  const[checking,setChecking]=useState(false);
  const[copied,setCopied]=useState(false);
  const[devId]=useState(()=>getDeviceId());
  const[stores,setStores]=useState(['龍山寺店']);
  const[store,setStore]=useState('龍山寺店');
  const t=T[lang];

  useEffect(()=>{loadStores().then(s=>{setStores(s);setStore(s[0]||'龍山寺店')})},[]);

  const encReg=code?xEnc(`${code}:${devId}:${lang}:${encodeURIComponent(store)}`):'';
  const qrUrl=encReg?`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(encReg)}&bgcolor=030712&color=f3f4f6`:'';

  const doActivate=(settings)=>{
    LS.set('app-settings',settings);
    LS.set(`activated-${code}`,{deviceId:devId,ts:Date.now()});
    onComplete(settings);
  };

  const goStep2=async()=>{
    if(!code.trim())return;
    setChecking(true);
    try{
      // Check admin.cfg (admin auto-activate)
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),5000);
      const res=await fetch('./admin.cfg',{cache:'no-store',signal:ctrl.signal});
      clearTimeout(timer);
      if(res.ok){
        const text=(await res.text()).trim();
        const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
        const myHash=adminHash(code);
        const match=lines.some(l=>{const parts=l.split(':');const h=parts.length>=2?parts[parts.length-1]:parts[0];return h===myHash});
        if(match){
          doActivate({code,unitPrice:250,lang,store,year:new Date().getFullYear(),deviceId:devId});return;
        }
      }
    }catch{}

    setChecking(false);
    setStep(2);
    setErr('');
    // Auto-copy registration code
    const enc=xEnc(`${code}:${devId}:${lang}:${store}`);
    try{navigator.clipboard.writeText(enc)}catch{}
    setCopied(true);setTimeout(()=>setCopied(false),2000);
  };

  const checkOnlineApproval=async()=>{
    setWaitStatus(t.checking);
    // Check staff.json if we have GitHub config
    const gh=getGHConfig();
    if(gh.token){
      try{
        const staff=await readStaff(gh);
        const me=staff.find(s=>s.code===code&&s.status==='active');
        if(me){
          setWaitStatus(t.approved);
          setTimeout(()=>doActivate({code,unitPrice:250,lang,store,year:new Date().getFullYear(),deviceId:devId}),800);
          return;
        }
      }catch{}
    }

    setWaitStatus('');
    setErr(t.waitHint);
  };

  const verify=()=>{
    const input=actInput.replace(/[\s-]/g,'').trim();
    // Simple 9-digit activation code
    const correct=genSimpleAct(code).replace(/-/g,'');
    if(input===correct){
      doActivate({code,unitPrice:250,lang,store,year:new Date().getFullYear(),deviceId:devId});
    }else{setErr(t.activationFail)}
  };

  return(
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="w-full max-w-sm fi">
        {step===1&&(
          <div className="space-y-6">
            <div className="text-center">
              <div className="w-16 h-16 bg-amber-600/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg className="w-8 h-8 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
              </div>
              <h1 className="text-xl font-bold text-gray-100 mb-1">{t.welcome}</h1>
            </div>
            <div>
              <label className="text-sm text-gray-400 mb-1.5 block">{t.language}</label>
              <div className="grid grid-cols-2 gap-2">
                {[['zh','中文'],['vi','Tiếng Việt']].map(([c,l])=>(
                  <button key={c} onClick={()=>setLang(c)} className={`py-3 rounded-xl text-sm font-semibold transition-all ${lang===c?'bg-amber-600 text-white':'bg-white/[0.04] text-gray-500'}`}>{l}</button>
                ))}
              </div>
            </div>
            <div>
              <label className="text-sm text-gray-400 mb-1.5 block">{t.store}</label>
              <select value={store} onChange={e=>setStore(e.target.value)}
                className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3.5 text-lg text-gray-100 focus:outline-none focus:border-amber-500 appearance-none">
                {stores.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div>
              <label className="text-sm text-gray-400 mb-1.5 block">{t.enterCode}</label>
              <input value={code} onChange={e=>setCode(e.target.value.replace(/[^a-zA-Z0-9]/g,''))}
                className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3.5 text-xl text-center text-gray-100 tracking-widest focus:outline-none focus:border-amber-500" placeholder="122"/>
            </div>
            <button onClick={goStep2} disabled={!code.trim()||checking}
              className={`w-full py-4 rounded-xl font-bold text-lg transition-all ${code.trim()&&!checking?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-600 cursor-not-allowed'}`}>
              {checking?t.adminWelcome:t.confirm}
            </button>
            <NoticeBox t={t}/>
          </div>
        )}

        {step===2&&(
          <div className="space-y-5">
            <div className="flex justify-center">
              <div className="bg-white p-2.5 rounded-xl"><img src={qrUrl} alt="QR" className="w-44 h-44"/></div>
            </div>
            <p className="text-sm text-amber-400 text-center font-medium">{t.showQR}</p>
            <div className="bg-white/[0.03] rounded-xl p-3 text-center">
              <p className="text-[10px] text-gray-600 break-all font-mono select-all mb-2">{encReg}</p>
              <button onClick={async()=>{try{await navigator.clipboard.writeText(encReg)}catch{};setCopied(true);setTimeout(()=>setCopied(false),2000)}}
                className={`px-4 py-2 rounded-lg text-xs font-medium transition-all ${copied?'bg-emerald-600/20 text-emerald-400':'bg-amber-600/20 text-amber-400 active:bg-amber-600/30'}`}>
                {copied?'✓ '+t.copyDone:'📋 '+t.copyToLine}
              </button>
            </div>

            {/* Activation code input */}
            <div>
              <label className="text-sm text-gray-400 mb-1.5 block">{t.enterActivation}</label>
              <input value={actInput} onChange={e=>setActInput(e.target.value.replace(/[^0-9-]/g,''))} placeholder="xxx-xxx-xxx" maxLength={11}
                className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3.5 text-xl text-center text-gray-100 font-mono tracking-widest focus:outline-none focus:border-amber-500"/>
            </div>
            {err&&<p className="text-red-400 text-sm text-center fi">{err}</p>}
            <div className="flex gap-2">
              <button onClick={()=>{setStep(1);setErr('')}} className="flex-1 py-4 rounded-xl bg-white/[0.05] text-gray-400 font-semibold">{t.cancel}</button>
              <button onClick={verify} className="flex-1 py-4 rounded-xl bg-amber-600 text-white font-bold text-lg">{t.confirm}</button>
            </div>
            <NoticeBox t={t}/>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════ Home Page ══════════ */
function HomePage({settings,t,refreshKey}){
  const now=new Date();
  const ty=settings.year||now.getFullYear(),tm=now.getMonth()+1,td=now.getDate();
  const[data,setData]=useState(null);
  const[prev,setPrev]=useState(null);
  const[otherMode,setOtherMode]=useState(false);
  const[otherVal,setOtherVal]=useState('');
  const[editPrev,setEditPrev]=useState(false);

  const load=()=>{
    const md=LS.get(dk(settings.code,ty,tm));
    setData(md);
    let found=false;
    if(md?.days){for(let d=td-1;d>=1;d--){const day=md.days[d];if(day&&(day.total>0||day.status>0)){setPrev({day:d,month:tm,year:ty,...day});found=true;break}}}
    if(!found){for(let pm=tm-1;pm>=1;pm--){const pmd=LS.get(dk(settings.code,ty,pm));if(!pmd)continue;for(let d=dim(ty,pm);d>=1;d--){const day=pmd.days?.[d];if(day&&(day.total>0||day.status>0)){setPrev({day:d,month:pm,year:ty,...day});found=true;break}}if(found)break}}
    if(!found)setPrev(null);
  };
  useEffect(load,[settings.code,refreshKey]);

  const todayData=data?.days?.[td]||eDay();
  const hasToday=todayData.total>0||todayData.status>0||(todayData.skills&&Object.values(todayData.skills).some(v=>v>0));
  const sal=calcSal(todayData,settings.unitPrice,settings.skills);

  const addUnits=(n)=>{
    const md=data?JSON.parse(JSON.stringify(data)):eMon();
    const dd=md.days[td]||eDay();
    dd.total+=n;dd.groups=[...dd.groups,n];
    stamp(dd);md.days[td]=dd;setData({...md});
    LS.set(dk(settings.code,ty,tm),md);
    setOtherMode(false);setOtherVal('');
  };
  const addLaodian=(n)=>{
    const md=data?JSON.parse(JSON.stringify(data)):eMon();
    const dd=md.days[td]||eDay();
    dd.laodian+=n;stamp(dd);md.days[td]=dd;setData({...md});
    LS.set(dk(settings.code,ty,tm),md);
  };

  const setTodayStatus=(s)=>{
    const md=data?JSON.parse(JSON.stringify(data)):eMon();
    const dd=md.days[td]||eDay();
    dd.status=s;
    if(!canWork[s]){dd.total=0;dd.laodian=0;dd.groups=[];dd.skills={guasha:0,baguang:0,xiujiao:0};}
    stamp(dd);md.days[td]=dd;setData({...md});
    LS.set(dk(settings.code,ty,tm),md);
  };

  const addSkill=(key)=>{
    const md=data?JSON.parse(JSON.stringify(data)):eMon();
    const dd=md.days[td]||eDay();
    if(!dd.skills)dd.skills={guasha:0,baguang:0,xiujiao:0};
    dd.skills[key]=(dd.skills[key]||0)+1;
    stamp(dd);md.days[td]=dd;setData({...md});
    LS.set(dk(settings.code,ty,tm),md);
  };

  const savePrevDay=(d,dd)=>{
    if(!prev)return;
    const key=dk(settings.code,prev.year,prev.month);
    const md=JSON.parse(JSON.stringify(LS.get(key)||eMon()));
    md.days[d]=dd;
    LS.set(key,md);
    setPrev({...prev,...dd});
    if(prev.month===tm)setData(md);
    setEditPrev(false);
  };

  const prevDow=prev?dow(prev.year,prev.month,prev.day):0;

  return(
    <div className="p-5 max-w-md mx-auto fi">
      {/* Previous day - always show, clickable */}
      {prev&&(
        <div onClick={()=>setEditPrev(true)} className="bg-white/[0.03] border border-white/[0.05] rounded-2xl p-4 mb-4 active:bg-white/[0.06] cursor-pointer">
          <div className="flex items-center justify-between">
            <div>
              <span className="text-lg font-bold text-gray-400">{prev.month}/{prev.day}</span>
              <span className="text-sm text-gray-600 ml-1">({t.dn[prevDow]})</span>
            </div>
            <div className="text-right">
              {canWork[prev.status||0]?(
                <span className="text-xl font-bold text-gray-400 tabular-nums">${calcSal(prev,settings.unitPrice,settings.skills).toLocaleString()}</span>
              ):(
                <span className={`text-sm px-2 py-0.5 rounded-full ${SBG[prev.status]} ${STC[prev.status]}`}>{t[SK[prev.status]]}</span>
              )}
            </div>
          </div>
          {canWork[prev.status||0]&&(
            <div className="flex items-center justify-between mt-0.5">
              <span className="text-xs text-gray-600">{prev.total}{t.units}{prev.laodian>0?` · ${prev.laodian}${t.laodian}`:''}</span>
              <svg className="w-3.5 h-3.5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
            </div>
          )}
        </div>
      )}

      {/* Today header */}
      <div className="flex items-center justify-between mb-5">
        <div>
          <h1 className="text-2xl font-bold text-gray-100">{tm}/{td} <span className="text-gray-500 font-normal text-lg">({t.dn[now.getDay()]})</span></h1>
          <p className="text-xs text-gray-600 font-mono">#{settings.code}</p>
        </div>
        <div className="text-right">
          <div className="text-3xl font-bold text-emerald-400 tabular-nums">${sal.toLocaleString()}</div>
          <div className="text-xs text-gray-600">{todayData.total} {t.units}</div>
        </div>
      </div>

      {/* Today status */}
      {hasToday&&(
        <div className="bg-emerald-500/10 border border-emerald-500/20 rounded-2xl p-4 mb-5">
          <div className="flex items-center justify-between">
            <span className="text-sm text-emerald-400 font-medium">{t.todayDone}</span>
            <div className="flex items-baseline gap-2">
              <span className="text-emerald-300 font-bold text-lg">{todayData.total}{t.units}</span>
              <span className="text-emerald-400 font-bold text-lg">${sal.toLocaleString()}</span>
            </div>
          </div>
          {todayData.laodian>0&&<div className="mt-1 text-sm text-orange-400">{t.laodian}: {todayData.laodian}</div>}
          {todayData.groups.length>1&&<div className="mt-1 text-xs text-gray-600">{todayData.groups.join(' + ')} = {todayData.total}</div>}
          {todayData.skills&&SKILL_KEYS.map((k,i)=>(settings.skills?.[k]&&todayData.skills[k]>0)?
            <span key={k} className={`inline-block mt-1 mr-2 text-xs ${SKILL_COLORS[i]}`}>{t[SKILL_SHORT[i]]}×{todayData.skills[k]}</span>:null
          )}
        </div>
      )}

      {/* Quick add units */}
      <div className="mb-6">
        <p className="text-sm text-gray-400 mb-3">{hasToday?t.continueAdd:t.startAdd}</p>
        <div className="grid grid-cols-4 gap-2">
          {[1,2,3,4,5,6].map(n=>(
            <button key={n} onClick={()=>addUnits(n)}
              className="py-4 rounded-xl bg-amber-600/15 border border-amber-600/20 text-amber-300 text-lg font-bold active:bg-amber-600/30 transition-all">+{n}</button>
          ))}
          {!otherMode?(
            <button onClick={()=>setOtherMode(true)}
              className="py-4 rounded-xl bg-white/[0.04] border border-white/[0.06] text-gray-500 text-sm font-medium active:bg-white/[0.08] col-span-2">{t.other}</button>
          ):(
            <div className="col-span-2 flex gap-1">
              <input type="number" inputMode="numeric" value={otherVal} onChange={e=>setOtherVal(e.target.value)} autoFocus
                className="flex-1 bg-white/[0.06] border border-amber-500/50 rounded-xl px-2 py-2 text-center text-lg text-gray-100 font-bold focus:outline-none" placeholder="?"/>
              <button onClick={()=>{const v=parseInt(otherVal);if(v>0)addUnits(v)}}
                className="px-4 rounded-xl bg-amber-600 text-white font-bold text-sm">OK</button>
            </div>
          )}
        </div>
      </div>

      {/* Quick add laodian */}
      <div className="mb-6">
        <p className="text-sm text-gray-400 mb-3">{t.addLaodian}</p>
        <div className="grid grid-cols-6 gap-2">
          {[1,2,3,4,5,6].map(n=>(
            <button key={n} onClick={()=>addLaodian(n)}
              className="py-3.5 rounded-xl bg-orange-500/10 border border-orange-500/15 text-orange-400 font-bold active:bg-orange-500/25 transition-all">+{n}</button>
          ))}
        </div>
      </div>

      {/* Skill buttons */}
      {SKILL_KEYS.some(k=>settings.skills?.[k])&&(
        <div className="mb-6">
          <p className="text-sm text-gray-400 mb-3">{t.skills}</p>
          <div className="grid grid-cols-3 gap-2">
            {SKILL_KEYS.map((k,i)=>settings.skills?.[k]?(
              <button key={k} onClick={()=>addSkill(k)}
                className={`py-3 rounded-xl bg-white/[0.04] border border-white/[0.06] active:bg-white/[0.08] transition-all text-center`}>
                <div className={`text-sm font-bold ${SKILL_COLORS[i]}`}>{t[SKILL_SHORT[i]]}{(todayData.skills?.[k]||0)>0?` ×${todayData.skills[k]}`:''}</div>
                <div className="text-[10px] text-gray-600">{t[k]} ${SKILL_PRICES[i]}</div>
              </button>
            ):null)}
          </div>
        </div>
      )}

      {/* Status buttons */}
      <div>
        <p className="text-sm text-gray-400 mb-3">{t.status}</p>
        <div className="grid grid-cols-3 gap-2">
          {[0,3,4,1,2,5].map(s=>(
            <button key={s} onClick={()=>setTodayStatus(s)}
              className={`py-2.5 rounded-xl text-sm font-semibold transition-all ${
                todayData.status===s
                  ? (s===0?'bg-gray-600 text-white ring-2 ring-gray-500':`${SBG[s].replace('/20','/30')} ${STC[s]} ring-2 ring-current`)
                  : 'bg-white/[0.04] text-gray-600'
              }`}>{t[SK[s]]}</button>
          ))}
        </div>
      </div>

      {/* Edit previous day modal */}
      {editPrev&&prev&&(
        <DayEditor day={{groups:prev.groups||[],total:prev.total,laodian:prev.laodian,status:prev.status,skills:prev.skills||{}}}
          d={prev.day} y={prev.year} m={prev.month} t={t} up={settings.unitPrice} sk={settings.skills}
          onSave={savePrevDay} onCancel={()=>setEditPrev(false)}/>
      )}
    </div>
  );
}

/* ══════════ Shared ══════════ */
function SummaryTable({prev,next,month,t}){
  const Row=({label,data,bold})=>(
    <div className={`flex items-center py-2.5 ${bold?'':'border-b border-white/[0.04]'}`}>
      <div className={`w-16 text-sm font-semibold ${bold?'text-amber-300':'text-gray-400'}`}>{label}</div>
      <div className={`flex-1 text-right text-lg font-bold tabular-nums ${bold?'text-emerald-400':'text-emerald-400/80'}`}>${data.salary.toLocaleString()}</div>
      <div className="w-14 text-right text-sm text-gray-400 tabular-nums">{data.units}</div>
      <div className="w-10 text-right text-sm text-orange-400 tabular-nums">{data.laodian}</div>
    </div>
  );
  return(
    <div className="bg-white/[0.02] border border-white/[0.06] rounded-xl px-3 py-1">
      <div className="flex items-center pt-1.5 pb-1 text-[10px] text-gray-600">
        <div className="w-16"></div>
        <div className="flex-1 text-right">{t.salary}</div>
        <div className="w-14 text-right">{t.units}</div>
        <div className="w-10 text-right">{t.laodian}</div>
      </div>
      <Row label={t.prevPeriod} data={prev}/>
      <Row label={t.nextPeriod} data={next}/>
      <div className="border-t border-amber-500/30 mt-0.5 pt-0.5">
        <Row label={t.monthTotal} data={month} bold/>
      </div>
    </div>
  );
}

function DayRow({day,d,y,m,t,up,sk,onEdit}){
  const dw=dow(y,m,d),we=dw===0||dw===6,nw=!canWork[day.status];
  const sal=calcSal(day,up,sk);
  return(
    <div onClick={()=>onEdit(d)} className={`flex items-center px-3 py-2.5 border-b border-white/[0.04] active:bg-white/[0.06] cursor-pointer ${nw?'opacity-50':''}`}>
      <div className="w-14 flex-shrink-0">
        <span className="text-sm font-semibold text-gray-200">{d}</span>
        <span className={`text-[11px] ml-1 ${we?'text-amber-500':'text-gray-600'}`}>{t.dn[dw]}</span>
      </div>
      <div className="flex-1 flex items-center gap-2 min-w-0">
        {nw?(<span className={`text-xs px-2 py-0.5 rounded-full ${SBG[day.status]} ${STC[day.status]}`}>{t[SK[day.status]]}</span>):(
          <>
            <span className="text-sm text-gray-200 w-8 text-right tabular-nums font-medium">{day.total||''}</span>
            <span className="text-sm text-emerald-400/80 w-16 text-right tabular-nums">{sal>0?'$'+sal.toLocaleString():''}</span>
            <span className="text-sm text-orange-400/80 w-5 text-center tabular-nums">{day.laodian||''}</span>
            {(day.status===2||day.status===5)&&<span className={`text-[10px] px-1.5 py-0.5 rounded-full ${SBG[day.status]} ${STC[day.status]}`}>{t[SK[day.status]]}</span>}
            {day.skills&&SKILL_KEYS.map((k,i)=>(sk?.[k]&&day.skills[k]>0)?<span key={k} className={`text-[10px] ${SKILL_COLORS[i]}`}>{t[SKILL_SHORT[i]]}{day.skills[k]}</span>:null)}
            {day.groups.length>1&&<span className="text-[10px] text-gray-600 truncate">{day.groups.join('+')}</span>}
          </>
        )}
      </div>
      <svg className="w-3.5 h-3.5 text-gray-700 flex-shrink-0 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
    </div>
  );
}

function DayEditor({day,d,y,m,t,up,sk,onSave,onCancel}){
  const[mode,setMode]=useState(day.groups.length>1?'group':'direct');
  const[groups,setGroups]=useState(day.groups.length>0?[...day.groups]:[]);
  const[dt,setDt]=useState(day.total);
  const[lo,setLo]=useState(day.laodian);
  const[st,setSt]=useState(day.status);
  const[skCounts,setSkCounts]=useState(()=>{const s=day.skills||{};return{guasha:s.guasha||0,baguang:s.baguang||0,xiujiao:s.xiujiao||0}});
  const dw=dow(y,m,d);
  const gt=groups.reduce((a,b)=>a+(parseInt(b)||0),0);
  const ct=(!canWork[st])?0:(mode==='group'?gt:(parseInt(dt)||0));
  const sw=canWork[st];
  const previewSal=ct*up+SKILL_KEYS.reduce((a,k,i)=>a+(sk?.[k]?(skCounts[k]||0)*SKILL_PRICES[i]:0),0);

  const save=()=>{const nr=!canWork[st];onSave(d,{
    groups:nr?[]:(mode==='group'?groups.map(g=>parseInt(g)||0).filter(g=>g>0):[]),
    total:nr?0:ct,laodian:nr?0:(parseInt(lo)||0),status:st,
    skills:nr?{guasha:0,baguang:0,xiujiao:0}:skCounts,
    did:getDeviceId(),ts:Date.now()
  })};

  const clearAll=()=>{setDt(0);setLo(0);setSt(0);setGroups([]);setSkCounts({guasha:0,baguang:0,xiujiao:0})};
  const skAdj=(k,delta)=>setSkCounts(p=>({...p,[k]:Math.max(0,(p[k]||0)+delta)}));

  return(
    <div className="fixed inset-0 z-50 bg-black/80 flex items-end sm:items-center justify-center" onClick={onCancel}>
      <div className="su bg-gray-900 w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl max-h-[90vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
        <div className="p-4 border-b border-white/[0.06] flex items-center justify-between">
          <h3 className="text-lg font-bold text-gray-100">{m}/{d} <span className="text-gray-500 font-normal">({t.dn[dw]})</span></h3>
          <div className="text-right"><div className="text-emerald-400 text-xl font-bold tabular-nums">${previewSal.toLocaleString()}</div></div>
        </div>
        <div className="p-4 space-y-5">
          <div>
            <label className="text-xs text-gray-500 mb-2 block font-medium">{t.status}</label>
            <div className="grid grid-cols-3 gap-2">
              {[0,3,4,1,2,5].map(s=>(<button key={s} onClick={()=>setSt(s)} className={`py-2.5 rounded-xl text-sm font-semibold transition-all ${st===s?(s===0?'bg-gray-600 text-white ring-2 ring-gray-500':`${SBG[s].replace('/20','/30')} ${STC[s]} ring-2 ring-current`):'bg-white/[0.04] text-gray-600'}`}>{t[SK[s]]}</button>))}
            </div>
          </div>
          {sw&&(<>
            <div className="flex bg-white/[0.04] rounded-xl p-1">
              <button onClick={()=>setMode('direct')} className={`flex-1 py-2.5 rounded-lg text-sm font-medium ${mode==='direct'?'bg-amber-600 text-white':'text-gray-500'}`}>{t.directMode}</button>
              <button onClick={()=>{setMode('group');if(!groups.length)setGroups([0])}} className={`flex-1 py-2.5 rounded-lg text-sm font-medium ${mode==='group'?'bg-amber-600 text-white':'text-gray-500'}`}>{t.groupMode}</button>
            </div>
            {mode==='direct'?(
              <div><label className="text-xs text-gray-500 mb-2 block">{t.totalUnits}</label>
              <input type="number" inputMode="numeric" value={dt||''} onChange={e=>setDt(e.target.value)} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-4 text-3xl text-center text-gray-100 font-bold focus:outline-none focus:border-amber-500"/></div>
            ):(
              <div>
                <div className="flex justify-between mb-2"><label className="text-xs text-gray-500">{t.groupMode}</label><span className="text-sm text-amber-400 font-bold">{t.totalUnits}: {gt}</span></div>
                <div className="space-y-2">{groups.map((g,i)=>(<div key={i} className="flex items-center gap-2 fi"><span className="text-xs text-gray-600 w-10 text-right">{t.groupLabel}{i+1}</span><input type="number" inputMode="numeric" value={g||''} onChange={e=>{const ng=[...groups];ng[i]=e.target.value;setGroups(ng)}} className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-3 text-xl text-center text-gray-100 font-semibold focus:outline-none focus:border-amber-500"/>{groups.length>1&&<button onClick={()=>setGroups(groups.filter((_,j)=>j!==i))} className="w-10 h-10 flex items-center justify-center rounded-xl bg-red-500/10 text-red-400 text-lg font-bold">×</button>}</div>))}</div>
                <button onClick={()=>setGroups([...groups,0])} className="mt-3 w-full py-2.5 border-2 border-dashed border-white/10 rounded-xl text-sm text-gray-500 active:bg-white/[0.03]">+ {t.addGroup}</button>
              </div>
            )}
            <div><label className="text-xs text-gray-500 mb-2 block">{t.laodian}</label>
            <input type="number" inputMode="numeric" value={lo||''} onChange={e=>setLo(e.target.value)} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-xl text-center text-gray-100 font-semibold focus:outline-none focus:border-amber-500"/></div>
            {/* Skills */}
            {SKILL_KEYS.some(k=>sk?.[k])&&(
              <div>
                <label className="text-xs text-gray-500 mb-2 block">{t.skills}</label>
                <div className="space-y-2">
                  {SKILL_KEYS.map((k,i)=>sk?.[k]?(
                    <div key={k} className="flex items-center gap-2">
                      <span className={`text-sm flex-1 ${SKILL_COLORS[i]}`}>{t[k]} <span className="text-xs text-gray-600">${SKILL_PRICES[i]}</span></span>
                      <button onClick={()=>skAdj(k,-1)} className="w-10 h-10 rounded-xl bg-white/[0.06] text-gray-400 text-lg font-bold active:bg-white/[0.1]">−</button>
                      <span className={`w-8 text-center text-lg font-bold ${SKILL_COLORS[i]}`}>{skCounts[k]||0}</span>
                      <button onClick={()=>skAdj(k,1)} className="w-10 h-10 rounded-xl bg-white/[0.06] text-gray-400 text-lg font-bold active:bg-white/[0.1]">+</button>
                    </div>
                  ):null)}
                </div>
              </div>
            )}
          </>)}
        </div>
        <div className="p-4 border-t border-white/[0.06] space-y-2">
          <div className="flex gap-3">
            <button onClick={onCancel} className="flex-1 py-3.5 rounded-xl bg-white/[0.05] text-gray-400 font-semibold">{t.cancel}</button>
            <button onClick={save} className="flex-1 py-3.5 rounded-xl bg-amber-600 text-white font-bold">{t.done}</button>
          </div>
          <button onClick={clearAll} className="w-full py-2.5 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm font-medium active:bg-red-500/20">🗑 {t.clearAll}</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════ Monthly ══════════ */
function MonthlyPage({settings,curM,setCurM,t}){
  const[data,setData]=useState(null);
  const[editDay,setEditDay]=useState(null);
  const y=settings.year||new Date().getFullYear();
  useEffect(()=>{setData(LS.get(dk(settings.code,y,curM))||eMon())},[settings.code,y,curM]);
  const saveDay=(d,dd)=>{const nd={...data,days:{...data.days,[d]:dd}};setData(nd);setEditDay(null);LS.set(dk(settings.code,y,curM),nd)};
  const dm=dim(y,curM);
  const calc=useMemo(()=>{
    if(!data)return{prev:{units:0,salary:0,laodian:0},next:{units:0,salary:0,laodian:0},month:{units:0,salary:0,laodian:0}};
    let pu=0,ps=0,pl=0,nu=0,ns=0,nl=0;
    for(let d=1;d<=dm;d++){const day=data.days[d]||eDay();const u=day.total||0,lo=day.laodian||0,s=calcSal(day,settings.unitPrice,settings.skills);if(d<=15){pu+=u;ps+=s;pl+=lo}else{nu+=u;ns+=s;nl+=lo}}
    return{prev:{units:pu,salary:ps,laodian:pl},next:{units:nu,salary:ns,laodian:nl},month:{units:pu+nu,salary:ps+ns,laodian:pl+nl}};
  },[data,dm,settings.unitPrice,settings.skills]);

  return(
    <div className="max-w-lg mx-auto fi">
      <div className="sticky top-0 z-10 bg-gray-950 pb-1">
        <div className="px-2 py-2 flex gap-1 overflow-x-auto no-sb">
          {Array.from({length:12},(_,i)=>i+1).map(m=>(<button key={m} onClick={()=>setCurM(m)} className={`px-3 py-1.5 rounded-full text-xs font-semibold flex-shrink-0 ${m===curM?'bg-amber-600 text-white':'bg-white/[0.04] text-gray-600'}`}>{t.months[m-1]}</button>))}
        </div>
        <div className="px-3 py-2">
          <SummaryTable prev={calc.prev} next={calc.next} month={calc.month} t={t}/>
        </div>
      </div>
      <div className="px-3 py-1.5 bg-amber-600/[0.06] border-b border-amber-500/10"><span className="text-[11px] text-amber-500/80 font-semibold">{t.p1}</span></div>
      {Array.from({length:Math.min(15,dm)},(_,i)=>i+1).map(d=>(<DayRow key={d} d={d} day={data?.days[d]||eDay()} y={y} m={curM} t={t} up={settings.unitPrice} sk={settings.skills} onEdit={setEditDay}/>))}
      {dm>15&&(<>
        <div className="px-3 py-1.5 bg-amber-600/[0.06] border-b border-amber-500/10 mt-0.5"><span className="text-[11px] text-amber-500/80 font-semibold">{t.p2}</span></div>
        {Array.from({length:dm-15},(_,i)=>i+16).map(d=>(<DayRow key={d} d={d} day={data?.days[d]||eDay()} y={y} m={curM} t={t} up={settings.unitPrice} sk={settings.skills} onEdit={setEditDay}/>))}
      </>)}
      {editDay&&data&&<DayEditor day={data.days[editDay]||eDay()} d={editDay} y={y} m={curM} t={t} up={settings.unitPrice} sk={settings.skills} onSave={saveDay} onCancel={()=>setEditDay(null)}/>}
    </div>
  );
}

/* ══════════ Yearly ══════════ */
function YearlyPage({settings,t}){
  const y=settings.year||new Date().getFullYear();
  const rows=useMemo(()=>{
    const r=[];for(let m=1;m<=12;m++){const d=LS.get(dk(settings.code,y,m));let u=0,lo=0,sal=0;if(d?.days){for(let i=1;i<=dim(y,m);i++){const day=d.days[i];if(day){u+=day.total||0;lo+=day.laodian||0;sal+=calcSal(day,settings.unitPrice,settings.skills)}}}r.push({month:m,units:u,salary:sal,laodian:lo})}return r;
  },[settings.code,y,settings.unitPrice]);
  const tot=rows.reduce((a,r)=>({u:a.u+r.units,s:a.s+r.salary,l:a.l+r.laodian}),{u:0,s:0,l:0});

  return(
    <div className="max-w-lg mx-auto fi">
      <div className="px-4 py-3 flex items-baseline justify-between"><h2 className="text-xl font-bold text-gray-100">{y} {t.yearly}</h2><span className="text-xs text-gray-600 font-mono">#{settings.code}</span></div>
      <div className="flex px-3 py-2 border-b border-white/[0.06] text-[11px] text-gray-600 font-medium">
        <div className="w-12"></div><div className="flex-1 text-right">{t.units}</div><div className="flex-1 text-right">{t.salary}</div><div className="w-12 text-right">{t.laodian}</div><div className="flex-1 text-right">{t.subtotal}</div>
      </div>
      {rows.map(r=>(<div key={r.month} className={`flex items-center px-3 py-3 border-b border-white/[0.03] ${r.units>0?'':'opacity-30'}`}>
        <div className="w-12 text-sm font-medium text-gray-300">{t.months[r.month-1]}</div>
        <div className="flex-1 text-right text-sm text-gray-400 tabular-nums">{r.units}</div>
        <div className="flex-1 text-right text-sm text-emerald-400/80 tabular-nums">{r.salary.toLocaleString()}</div>
        <div className="w-12 text-right text-sm text-orange-400/80 tabular-nums">{r.laodian}</div>
        <div className="flex-1 text-right text-sm text-emerald-400 font-semibold tabular-nums">{r.salary.toLocaleString()}</div>
      </div>))}
      <div className="flex items-center px-3 py-3.5 bg-amber-600/10 border-t-2 border-amber-500/40">
        <div className="w-12 text-sm font-bold text-amber-400">{t.total}</div>
        <div className="flex-1 text-right text-sm text-amber-300 font-bold tabular-nums">{tot.u}</div>
        <div className="flex-1 text-right text-sm text-emerald-400 font-bold tabular-nums">{tot.s.toLocaleString()}</div>
        <div className="w-12 text-right text-sm text-orange-400 font-bold tabular-nums">{tot.l}</div>
        <div className="flex-1 text-right text-sm text-emerald-400 font-bold tabular-nums">{tot.s.toLocaleString()}</div>
      </div>
    </div>
  );
}

/* ══════════ Settings ══════════ */
function SettingsPage({settings,onUpdate,t,theme,setTheme}){
  const[form,setForm]=useState({...settings});
  const[saved,setSaved]=useState(false);
  const[showAdmin,setShowAdmin]=useState(false);
  const[showSupervisor,setShowSupervisor]=useState(false);
  const[checkState,setCheckState]=useState('idle');
  const devId=getDeviceId();

  // Supervisor application state
  const supKey=`supervisor-${settings.code}`;
  const[supStatus,setSupStatus]=useState(()=>LS.get(supKey)||null);
  const[applyStep,setApplyStep]=useState(false);
  const[devNameInput,setDevNameInput]=useState('');
  const[supErr,setSupErr]=useState('');
  const[appCopied,setAppCopied]=useState(false);
  const[supCheckStatus,setSupCheckStatus]=useState('');
  const[connMode,setConnMode]=useState(null);
  const[connInput,setConnInput]=useState('');
  const[connStatus,setConnStatus]=useState('');

  const handleSave=()=>{onUpdate(form);setSaved(true);setTimeout(()=>setSaved(false),2000)};

  const tryCheck=async()=>{
    if(checkState==='ok'){setShowAdmin(true);return}
    if(checkState==='denied')return;
    setCheckState('checking');
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),5000);
      const res=await fetch('./admin.cfg',{cache:'no-store',signal:ctrl.signal});
      clearTimeout(timer);
      if(!res.ok)throw new Error();
      const text=(await res.text()).trim();
      const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
      const myHash=adminHash(settings.code);
      // Support both formats: "encCode:hash" and legacy "hash"
      const match=lines.some(l=>{const parts=l.split(':');const h=parts.length>=2?parts[parts.length-1]:parts[0];return h===myHash});
      setCheckState(match?'ok':'denied');
    }catch{setCheckState('denied')}
  };

  // Generate application code + write request to GitHub if possible
  const doApply=async()=>{
    const payload=`${settings.code}:${devId}:${devNameInput.trim()||'unknown'}`;
    const appCode=xEnc(payload);
    const data={status:'pending',deviceName:devNameInput.trim()||'',appCode,appliedAt:Date.now()};
    LS.set(supKey,data);
    setSupStatus(data);
    setApplyStep(false);
    // Auto-copy application code
    try{navigator.clipboard.writeText(appCode)}catch{}
    // Try to write request to GitHub staff.json
    const gh=getGHConfig();
    if(gh.token){
      try{
        const staff=await readStaff(gh);
        const existing=staff.find(s=>s.code===settings.code);
        if(existing){
          existing.supRequest=true;
          existing.supRequestAt=Date.now();
          await writeStaff(gh,staff);
        }
      }catch{}
    }
  };

  // Check online supervisor approval
  const checkSupOnline=async()=>{
    setSupCheckStatus(t.checking);
    // Check staff.json for role update
    const gh=getGHConfig();
    if(gh.token){
      try{
        const staff=await readStaff(gh);
        const me=staff.find(s=>s.code===settings.code);
        if(me&&me.role==='supervisor'&&me.status==='active'){
          const data={...supStatus,status:'approved',approvedAt:Date.now(),level:me.level||0};
          LS.set(supKey,data);setSupStatus(data);setSupCheckStatus(t.approved);
          addLog(fmtLog(t.logTeacherActivate,[settings.code,supStatus?.deviceName||'']),'teacher');
          return;
        }
      }catch{}
    }

    setSupCheckStatus('');
    setSupErr(t.waitHint);
  };



  const copyAppCode=async()=>{
    if(supStatus?.appCode){try{await navigator.clipboard.writeText(supStatus.appCode)}catch{}}
    setAppCopied(true);setTimeout(()=>setAppCopied(false),2000);
  };

  if(showAdmin)return<AdminPage t={t} onBack={()=>setShowAdmin(false)}/>;
  if(showSupervisor)return<SupervisorPage t={t} onBack={()=>{setShowSupervisor(false);setSupStatus(LS.get(supKey)||null)}}/>;

  const checkBtnClass={
    idle:'bg-white/[0.03] border border-white/[0.06] text-gray-400 active:bg-white/[0.06]',
    checking:'bg-white/[0.03] border border-white/[0.06] text-gray-600',
    ok:'bg-emerald-600/20 border border-emerald-500/30 text-emerald-400 active:bg-emerald-600/30',
    denied:'bg-gray-800/50 border border-gray-700/30 text-gray-600 cursor-not-allowed',
  }[checkState];
  const checkLabel={idle:t.adminCheck,checking:'...',ok:t.adminEnter,denied:t.adminFail}[checkState];

  const isPending=supStatus?.status==='pending';
  const isApproved=supStatus?.status==='approved'||checkState==='ok'; // admin auto-supervisor

  return(
    <div className="p-5 max-w-md mx-auto fi space-y-6">
      <h2 className="text-2xl font-bold text-gray-100">{t.settings}</h2>
      <div><label className="text-sm text-gray-400 mb-1.5 block">{t.store}</label><div className="bg-white/[0.04] rounded-xl px-4 py-2.5 text-sm text-gray-400">{settings.store||'—'}</div></div>
      <div><label className="text-sm text-gray-400 mb-1.5 block">{t.teacherCode}</label><div className="bg-white/[0.04] rounded-xl px-4 py-3.5 text-lg text-gray-300 font-mono">{settings.code}</div></div>
      <div><label className="text-sm text-gray-400 mb-1.5 block">{t.unitPrice}</label>
        <div className="relative"><span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">$</span>
        <input type="number" inputMode="numeric" value={form.unitPrice} onChange={e=>setForm({...form,unitPrice:parseInt(e.target.value)||0})}
          className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl pl-9 pr-4 py-3.5 text-lg text-gray-100 focus:outline-none focus:border-amber-500"/></div>
      </div>
      <div><label className="text-sm text-gray-400 mb-1.5 block">{t.language}</label>
        <div className="grid grid-cols-2 gap-2">{[['zh','中文'],['vi','Tiếng Việt']].map(([c,l])=>(<button key={c} onClick={()=>{setForm({...form,lang:c});onUpdate({...form,lang:c})}} className={`py-3.5 rounded-xl text-sm font-semibold ${form.lang===c?'bg-amber-600 text-white':'bg-white/[0.04] text-gray-500'}`}>{l}</button>))}</div>
      </div>
      <div><label className="text-sm text-gray-400 mb-1.5 block">{t.theme}</label>
        <div className="grid grid-cols-4 gap-2">
          {[['pink',t.themePink,'#fce4f6'],['black',t.themeBlack,'#030712'],['gray',t.themeGray,'#1f2937'],['white',t.themeWhite,'#f9fafb']].map(([k,l,c])=>(
            <button key={k} onClick={()=>setTheme(k)} className={`py-3 rounded-xl text-xs font-semibold border-2 ${theme===k?'border-amber-500':'border-transparent'}`} style={{backgroundColor:c,color:k==='black'||k==='gray'?'#ccc':'#333'}}>{l}</button>
          ))}
        </div>
      </div>
      <div><label className="text-sm text-gray-400 mb-1.5 block">{t.year}</label>
        <div className="flex items-center gap-3">
          <button onClick={()=>setForm({...form,year:form.year-1})} className="w-14 h-14 rounded-xl bg-white/[0.04] text-gray-300 text-2xl active:bg-white/[0.08]">−</button>
          <span className="text-3xl font-bold text-gray-100 flex-1 text-center tabular-nums">{form.year}</span>
          <button onClick={()=>setForm({...form,year:form.year+1})} className="w-14 h-14 rounded-xl bg-white/[0.04] text-gray-300 text-2xl active:bg-white/[0.08]">+</button>
        </div>
      </div>
      <div className="text-[10px] text-gray-700 font-mono break-all">{t.deviceId}: {devId}</div>
      {/* Skills */}
      <div>
        <label className="text-sm text-gray-400 mb-2 block">{t.skills}</label>
        <div className="space-y-2">
          {SKILL_KEYS.map((k,i)=>{
            const checked=form.skills?.[k]||false;
            return(
              <button key={k} onClick={()=>{const ns={...form,skills:{...(form.skills||{}), [k]:!checked}};setForm(ns);onUpdate(ns)}}
                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${checked?'bg-white/[0.06] border border-amber-500/30':'bg-white/[0.02] border border-white/[0.06]'}`}>
                <div className={`w-5 h-5 rounded flex items-center justify-center text-xs ${checked?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-700'}`}>{checked?'✓':''}</div>
                <span className={`text-sm ${checked?'text-gray-200':'text-gray-500'}`}>{t[k]}</span>
                <span className="text-xs text-gray-600 ml-auto">${SKILL_PRICES[i]}</span>
              </button>
            );
          })}
        </div>
      </div>
      <NoticeBox t={t}/>
      <BackupSection settings={settings} t={t}/>
      <button onClick={handleSave} className={`w-full py-4 rounded-xl font-bold text-white text-lg ${saved?'bg-emerald-600':'bg-amber-600 active:bg-amber-700'}`}>{saved?t.saved:t.save}</button>

      {/* Connection section */}
      {(()=>{
        const ghLocal=getGHConfig();
        const hasConn=!!(ghLocal&&ghLocal.token);
        return(
          <div className="pt-4 border-t border-white/[0.06] space-y-3">
            <div className="flex items-center justify-between">
              <p className="text-sm text-gray-500 font-medium">{t.connection}</p>
              <span className="text-xs">{hasConn?t.connOnline:t.connOffline}</span>
            </div>
            {!hasConn&&!connMode&&(
              <button onClick={()=>setConnMode('apply')} className="w-full py-3 rounded-xl bg-amber-600/20 border border-amber-500/30 text-amber-400 text-sm font-semibold active:bg-amber-600/30">{t.connApply}</button>
            )}
            {connMode==='apply'&&(
              <div className="space-y-3 fi">
                <div className="flex justify-center">
                  <div className="bg-white p-2.5 rounded-xl">
                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(settings.code+':'+devId)}`} alt="QR" className="w-40 h-40"/>
                  </div>
                </div>
                <p className="text-[10px] text-gray-600 text-center font-mono select-all break-all">{settings.code}:{devId}</p>
                <div>
                  <label className="text-xs text-gray-500 mb-1 block">{t.connCode}</label>
                  <textarea value={connInput} onChange={e=>setConnInput(e.target.value)} rows={2} placeholder={t.connInput}
                    className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500 resize-none"/>
                </div>
                <div className="flex gap-2">
                  <button onClick={()=>{setConnMode(null);setConnInput('');setConnStatus('')}} className="flex-1 py-2.5 bg-white/[0.04] rounded-xl text-gray-500 text-sm">{t.cancel}</button>
                  <button onClick={()=>{
                    const ghCfg=verifyActToken(connInput.trim(),settings.code,devId);
                    if(ghCfg){saveGHConfigLocal(ghCfg);setConnStatus(t.connOk);setConnMode(null);setConnInput('')}
                    else{setConnStatus(t.connFail)}
                  }} className="flex-1 py-2.5 bg-amber-600 rounded-xl text-white text-sm font-bold">{t.confirm}</button>
                </div>
                {connStatus&&<p className={`text-xs text-center ${connStatus.includes('✓')?'text-emerald-400':'text-red-400'}`}>{connStatus}</p>}
              </div>
            )}
          </div>
        );
      })()}

      {/* Admin / Supervisor section */}
      <div className="pt-4 border-t border-white/[0.06] space-y-3">
        <p className="text-sm text-gray-500 font-medium">{t.admin}</p>
        <div className="flex gap-2">
          {/* Admin check button */}
          <button onClick={tryCheck} disabled={checkState==='checking'||checkState==='denied'}
            className={`flex-1 py-3 rounded-xl text-sm font-semibold transition-all ${checkBtnClass}`}>
            {checkLabel}
          </button>

          {/* Supervisor: approved → green enter button */}
          {isApproved?(
            <button onClick={()=>setShowSupervisor(true)}
              className="flex-1 py-3 rounded-xl text-sm font-semibold bg-emerald-600/20 border border-emerald-500/30 text-emerald-400 active:bg-emerald-600/30">
              {t.supervisor}
            </button>
          ):(
            /* Apply or pending */
            <button onClick={()=>{if(!isPending)setApplyStep(!applyStep)}} disabled={isPending}
              className={`flex-1 py-3 rounded-xl text-sm font-semibold transition-all ${
                isPending?'bg-gray-800/50 border border-gray-700/30 text-gray-600 cursor-not-allowed'
                :'bg-white/[0.03] border border-white/[0.06] text-gray-400 active:bg-white/[0.06]'
              }`}>
              {isPending?t.adminPending:t.adminApply}
            </button>
          )}
        </div>

        {/* Apply form - requires connection */}
        {applyStep&&!isPending&&!isApproved&&(
          (()=>{const ghLocal=getGHConfig();const hasConn=!!(ghLocal&&ghLocal.token);
          return hasConn?(
            <div className="fi space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-xl p-4">
              <p className="text-sm text-gray-400">{t.adminApplyDesc}</p>
              <input value={devNameInput} onChange={e=>setDevNameInput(e.target.value)} placeholder={t.deviceName}
                className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100 focus:outline-none focus:border-amber-500"/>
              <button onClick={doApply} className="w-full py-3 rounded-xl bg-amber-600 text-white font-bold">{t.confirm}</button>
            </div>
          ):(
            <div className="bg-red-500/5 border border-red-500/20 rounded-xl p-4 text-center">
              <p className="text-xs text-red-300">{t.needConnFirst}</p>
            </div>
          )})()
        )}

        {/* Pending: show app code + online check */}
        {isPending&&(
          <div className="fi space-y-3">
            <div className="bg-white/[0.03] border border-white/[0.06] rounded-xl p-3">
              <p className="text-[10px] text-gray-600 break-all font-mono select-all mb-2">{supStatus.appCode}</p>

  const[storeStatus,setStoreStatus]=useState('');

  // My info

  const myCode=mySettings.code||'';
  const myStore=staffList.find(s=>s.code===myCode)?.store||'';

  // Reset all staff data except admin 122
  const resetAllData=async()=>{
    setResetPending(null);

    const ok=await writeStaff(gh,cleaned);

    if(ok){setStaffList(cleaned);setResetStatus(t.resetAllOk);addLog('還原初始設定 (管理員122)','admin')}
    setTimeout(()=>setResetStatus(''),3000);
  };

  // Remove all supervisor rights

    setResetPending(null);
    const updated=staffList.map(s=>s.role==='supervisor'?{...s,role:'teacher',level:0,supRequest:false}:s);
    const ok=await writeStaff(gh,updated);

    setTimeout(()=>setResetStatus(''),3000);
  };

  // Remove single employee or revoke supervisor (no confirm needed - handled by StaffListSection inline)
  const onRemoveStaff=async(s)=>{
    let updated;
    if(s.role==='supervisor'){
      updated=staffList.map(x=>x.code===s.code?{...x,role:'teacher',level:0,supRequest:false}:x);
      addLog(fmtLog(t.logRevoke,[s.code,s.store||'']),'admin');
    }else{
      updated=staffList.filter(x=>x.code!==s.code);
      addLog('移除員工 '+s.code,'admin');
    }
    await writeStaff(gh,updated);
    setStaffList(updated);
  };

  // Edit employee

  const[connResult,setConnResult]=useState('');
  const[editStoreVal,setEditStoreVal]=useState('');
