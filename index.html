  const[editLevel,setEditLevel]=useState(1);
  const[genConnInput,setGenConnInput]=useState('');
  const[genConnResult,setGenConnResult]=useState('');
  const[genConnCopied,setGenConnCopied]=useState(false);

  // Parse admin.cfg entries: support "encCode:hash" and legacy "hash"
  const parseEntries=(text)=>{
    const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
    return lines.map(line=>{
      const parts=line.split(':');
      if(parts.length>=2){
        const encCode=parts.slice(0,-1).join(':');
        const hash=parts[parts.length-1];
        const code=xDec(encCode)||'?';
        return{line,hash,code};
      }
      return{line,hash:line,code:'?'};
    });
  };

  useEffect(()=>{
    (async()=>{
      try{const res=await fetch('./admin.cfg',{cache:'no-store'});if(!res.ok)return;
        const text=(await res.text()).trim();
        setCfgEntries(parseEntries(text));
      }catch{}
      // Load staff
      try{setStaffLoading(true);const s=await readStaff(gh);setStaffList(s);setStaffLoading(false)}catch{setStaffLoading(false)}
      // Load stores
      try{const st=await loadStores();setStoreList(st)}catch{}
    })();
  },[]);

  // Decode teacher encrypted string: code:deviceId:lang:store(URI-encoded)
  const decodeTeacher=(enc)=>{
    try{
      const dec=xDec(enc.trim());
      const parts=dec.split(':');
      if(parts.length<2)return null;
      let store='';try{store=decodeURIComponent(parts.slice(3).join(':'))}catch{store=parts[3]||''}
      return{code:parts[0],devId:parts[1],lang:parts[2]||'zh',store};
    }catch{return null}
  };

  const genCode=()=>{
    const info=decodeTeacher(encInput);
    if(!info){setActResult('Error');setDecodedInfo('');setTeacherDecoded(null);return}
    setDecodedInfo(info.code);
    setTeacherDecoded(info);
    setActResult(genSimpleAct(info.code));
    addLog(fmtLog(t.logGenUser,[info.code]),'admin');
  };

  // Online teacher approval
  const approveTeacherOnline=async()=>{
    if(!teacherDecoded){setTeacherApproveStatus(t.approveFail+': no data');return}
    if(!gh.token){setTeacherApproveStatus(t.approveFail+': no GitHub Token');return}
    setTeacherApproveStatus(t.approving);
    // Write to staff.json
    const newStaff={code:teacherDecoded.code,store:teacherDecoded.store||'',lang:teacherDecoded.lang,
      skills:[],role:'teacher',level:0,status:'active',approvedAt:Date.now()};
    const updated=[...staffList.filter(s=>s.code!==teacherDecoded.code),newStaff];
    const r2=await writeStaff(gh,updated);
    if(!r2){setTeacherApproveStatus(t.approveFail+': staff.json error');return}
    setStaffList(updated);
    addLog(fmtLog(t.logApproveTeacher,[teacherDecoded.code,teacherDecoded.store||'']),'admin');
    setTeacherApproveStatus(t.approveOk);
    // Copy activation code to clipboard (admin sends this to teacher)
    if(actResult)try{await navigator.clipboard.writeText(actResult+'\n\n'+t.approveMsg)}catch{}
    setMsgCopied('teacher');setTimeout(()=>setMsgCopied(''),3000);
  };

  const runTool=()=>{if(toolMode==='enc')setToolResult(xEnc(toolInput));else setToolResult(xDec(toolInput.trim()))};

  const parseSup=()=>{
    try{
      const dec=xDec(supInput.trim());
      const parts=dec.split(':');
      if(parts.length<2){setSupInfo(null);setSupResult('Error');return}
      const code=parts[0],uuid=parts[1],devName=parts.slice(2).join(':')||'unknown';
      setSupInfo({code,uuid:uuid.substring(0,8)+'...',fullUuid:uuid,devName});
      addLog(fmtLog(t.logGenSup,[code,devName]),'admin');
    }catch{setSupInfo(null);setSupResult('Error')}
  };

  // Online supervisor approval
  const approveSupOnline=async()=>{
    if(!supInfo){setSupApproveStatus(t.approveFail+': no data');return}
    if(!gh.token){setSupApproveStatus(t.approveFail+': no GitHub Token');return}
    setSupApproveStatus(t.approving);
    // Write to staff.json
    const existing=staffList.find(s=>s.code===supInfo.code);
    const entry={...(existing||{code:supInfo.code,store:'',lang:'zh',skills:[]}),
      role:'supervisor',level:supLevel,status:'active',approvedAt:Date.now()};
    const updated=[...staffList.filter(s=>s.code!==supInfo.code),entry];
    await writeStaff(gh,updated);
    setStaffList(updated);
    const lvName=supLevelName(supLevel,t===T.zh?'zh':'vi');
    addLog(fmtLog(t.logApproveSupervisor,[supInfo.code,supInfo.devName||'',lvName]),'admin');
    setSupApproveStatus(t.approveOk);
    try{await navigator.clipboard.writeText(t.approveMsg)}catch{}
    setMsgCopied('sup');setTimeout(()=>setMsgCopied(''),3000);
  };

  // Write new format: encCode:hash
  const genAdminHashAndWrite=async()=>{
    if(!newCode.trim())return;
    const code=newCode.trim();
    const h=adminHash(code);
    const encCode=xEnc(code);
    const newLine=`${encCode}:${h}`;
    setNewHash(h);
    if(gh.token&&gh.owner&&gh.repo){
      setNewHashStatus(t.ghWriting);
      const ok=await ghAppendLine(gh,'admin.cfg',newLine,'add admin '+code);
      setNewHashStatus(ok?.ok?t.ghWriteOk:t.ghWriteFail);
      if(ok?.ok)setCfgEntries(prev=>[...prev,{line:newLine,hash:h,code}]);
    }else{setNewHashStatus('')}
  };

  // Delete admin from admin.cfg via GitHub
  const doDeleteAdmin=async(entry,idx)=>{
    if(cfgEntries.length<=1){setDelStatus(t.adminDelLast);setTimeout(()=>setDelStatus(''),2000);return}
    if(!confirm(t.adminDelConfirm))return;
    if(gh.token&&gh.owner&&gh.repo){
      setDelStatus(t.ghWriting);
      const ok=await ghRemoveLine(gh,'admin.cfg',entry.line,'remove admin '+(entry.code||entry.hash));
      if(ok){
        setCfgEntries(prev=>prev.filter((_,i)=>i!==idx));
        setDelStatus(t.adminDelOk);
        addLog(fmtLog('刪除管理者 {0}',[entry.code||'?']),'admin');
      }else{setDelStatus(t.adminDelFail)}
      setTimeout(()=>setDelStatus(''),2000);
    }
  };

  const saveGH=()=>{saveGHConfig(gh);setGhStatus(t.ghSaved);setGhEditing(false);setTimeout(()=>setGhStatus(''),2000)};
  const testGH=async()=>{setGhStatus('...');try{const f=await ghReadFile(gh,'admin.cfg');setGhStatus(f?t.ghOk:t.ghFail)}catch{setGhStatus(t.ghFail)}};

  // Key config helpers
  const updateRule=(idx,field,val)=>{const r=[...keyRules];r[idx]={...r[idx],[field]:field==='file'?val:parseInt(val)||0};setKeyRules(r)};
  const addRule=()=>setKeyRules([...keyRules,{file:'key.cfg',start:0,len:1}]);
  const delRule=(i)=>setKeyRules(keyRules.filter((_,j)=>j!==i));

  // Comprehensive key test
  const[keyChecks,setKeyChecks]=useState([]);
  const[builtKey,setBuiltKey]=useState('');
  const[needMigrate,setNeedMigrate]=useState(false);
  const[migrateStatus,setMigrateStatus]=useState('');

  const testKey=async()=>{
    const checks=[];let parts=[];let allOk=true;
    // Step 1 & 2: Check each file exists and first line length
    for(const r of keyRules){
      if(!r.file||r.start==null||!r.len){checks.push({ok:false,msg:'Error: missing rule fields'});allOk=false;continue}
      try{
        const res=await fetch('./'+r.file,{cache:'no-store'});
        if(!res.ok){checks.push({ok:false,msg:fmtLog(t.keyFileFail,[r.file])});allOk=false;continue}
        checks.push({ok:true,msg:fmtLog(t.keyFileOk,[r.file])});
        const text=await res.text();
        const fl=text.split('\n')[0]||'';
        const need=r.start+r.len;
        if(fl.length<need){
          checks.push({ok:false,msg:fmtLog(t.keyLenFail,[r.file,String(fl.length),String(need)])});
          allOk=false;continue;
        }
        checks.push({ok:true,msg:fmtLog(t.keyLenOk,[r.file,String(fl.length),String(need)])});
        parts.push(fl.substring(r.start,r.start+r.len));
      }catch{checks.push({ok:false,msg:fmtLog(t.keyFileFail,[r.file])});allOk=false}
    }
    if(!allOk||!parts.length){setKeyChecks(checks);setBuiltKey('');setNeedMigrate(false);return}
    // Step 3: Show built key
    const built=parts.join('');
    setBuiltKey(built);
    checks.push({ok:true,msg:fmtLog(t.keyBuilt,[String(built.length)])});

    // Step 4 & 5: Check admin.cfg entries against this key
    try{
      const res=await fetch('./admin.cfg',{cache:'no-store'});
      if(res.ok){
        const text=(await res.text()).trim();
        const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
        let matched=0;
        for(const line of lines){
          const ps=line.split(':');
          if(ps.length>=2){
            const encCode=ps.slice(0,-1).join(':');
            const hash=ps[ps.length-1];
            // Try decrypt with the new key
            const dec=Array.from({length:encCode.length/2},(_,i)=>
              String.fromCharCode(parseInt(encCode.substr(i*2,2),16)^built.charCodeAt((i)%built.length))
            ).join('');
            if(adminHash(dec)===hash)matched++;
          }
        }
        if(lines.length===0){checks.push({ok:true,msg:'admin.cfg: 0 entries'})}
        else if(matched===lines.length){checks.push({ok:true,msg:fmtLog(t.keyAdminOk,[String(lines.length)])});setNeedMigrate(false)}
        else if(matched>0){checks.push({ok:false,msg:fmtLog(t.keyAdminPartial,[String(matched),String(lines.length)])});setNeedMigrate(true)}
        else{checks.push({ok:false,msg:fmtLog(t.keyAdminNone,[String(lines.length)])});setNeedMigrate(true)}
      }
    }catch{}
    setKeyChecks(checks);
  };

  // Migrate admin.cfg entries: decrypt with OLD key, re-encrypt with NEW key
  const migrateAdminCfg=async()=>{
    if(!builtKey||!gh.token||!gh.owner||!gh.repo)return;
    setMigrateStatus(t.keyMigrating);
    try{
      const file=await ghReadFile(gh,'admin.cfg');
      if(!file){setMigrateStatus(t.keyMigrateFail);return}
      const allLines=file.content.split('\n');
      const newLines=[];
      for(const line of allLines){
        const trimmed=line.trim();
        if(!trimmed||trimmed.startsWith('#')){newLines.push(line);continue}
        const ps=trimmed.split(':');
        if(ps.length>=2){
          const encCode=ps.slice(0,-1).join(':');
          const hash=ps[ps.length-1];
          // Decrypt with current (old) key
          const oldDec=xDec(encCode);
          if(oldDec&&adminHash(oldDec)===hash){
            // Re-encrypt with new key
            const newEnc=Array.from(oldDec).map((c,i)=>(c.charCodeAt(0)^builtKey.charCodeAt(i%builtKey.length)).toString(16).padStart(2,'0')).join('');
            newLines.push(newEnc+':'+hash);
            continue;
          }
          // Try: maybe it's legacy format (hash only) - can't migrate, keep as is
          newLines.push(line);
        }else{newLines.push(line)}
      }
      const ok=await ghWriteFile(gh,'admin.cfg',newLines.join('\n'),file.sha,'migrate admin.cfg key');
      if(ok){
        setMigrateStatus(t.keyMigrateOk);
        // Now save new key config and rebuild
        saveKeyConfig({rules:keyRules});
        await buildDynamicKey();
        // Refresh entries display
        setCfgEntries(parseEntries(newLines.filter(l=>l.trim()&&!l.trim().startsWith('#')).join('\n')));
      }else{setMigrateStatus(t.keyMigrateFail)}
    }catch{setMigrateStatus(t.keyMigrateFail)}
    setTimeout(()=>setMigrateStatus(''),3000);
  };

  const saveKeyRules=()=>{saveKeyConfig({rules:keyRules});buildDynamicKey();setKeySaveStatus(t.keySaved);setTimeout(()=>setKeySaveStatus(''),2000)};


  return(
    <div className="p-5 max-w-md mx-auto fi space-y-6">
      <div className="flex items-center gap-3">
        <button onClick={onBack} className="text-gray-500"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg></button>
        <h2 className="text-xl font-bold text-gray-100">{t.adminTitle}</h2>
      </div>

      {/* Staff List - at top */}
      <StaffListSection t={t} staffList={staffList} sortMode={sortMode} setSortMode={setSortMode}
        onEdit={s=>{setEditStaff(s);setConnDevInput('');setConnResult('');setEditStoreVal(s.store||'');setEditStatus('')}} myCode={myCode} myLevel={myLevel} myStore={myStore}/>

      {/* Employee edit panel */}
      {editStaff&&(
        <div className="space-y-3 bg-white/[0.02] border border-amber-500/20 rounded-2xl p-4">
          <div className="flex items-center justify-between">
            <h3 className="text-sm font-semibold text-amber-400">{t.editStaff}: {editStaff.code}</h3>
            <button onClick={()=>{setEditStaff(null);setConnDevInput('');setConnResult('');setEditStatus('')}} className="text-gray-500 text-sm">✕</button>
          </div>

          {/* Activation code */}
          <div className="flex items-center justify-between bg-white/[0.03] rounded-xl p-3">
            <div><p className="text-[10px] text-gray-600">{t.teacherActivation}</p><p className="text-lg font-bold text-emerald-400 font-mono">{genSimpleAct(editStaff.code)}</p></div>
            <button onClick={async()=>{try{await navigator.clipboard.writeText(genSimpleAct(editStaff.code))}catch{}}} className="px-3 py-1.5 bg-emerald-600/20 rounded-lg text-emerald-400 text-xs">📋</button>
          </div>

          {/* Connection devices */}
          <div className="space-y-2">
            <p className="text-[10px] text-gray-500">{t.editDevices}</p>
            {connDevInput&&connResult&&connResult!=='Error'?(
              <div className="space-y-2">
                <p className="text-[10px] text-emerald-400 font-mono break-all select-all bg-white/[0.03] rounded-lg p-2">{connResult}</p>
                <div className="flex justify-center"><div className="bg-white p-2 rounded-xl"><img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(connResult)}`} alt="QR" className="w-36 h-36"/></div></div>
                <button onClick={async()=>{try{await navigator.clipboard.writeText(connResult)}catch{}}} className="w-full py-2 bg-emerald-600 rounded-xl text-white text-xs font-semibold">📋 Copy</button>
              </div>
            ):(
              <div className="flex gap-2">
                <input value={connDevInput} onChange={e=>setConnDevInput(e.target.value)} placeholder={t.genConnHint}
                  className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2 text-xs text-gray-100 font-mono focus:outline-none focus:border-amber-500"/>
                <button onClick={()=>{
                  const parts=connDevInput.trim().split(':');
                  if(parts.length<2||parts[0]!==editStaff.code){setConnResult('Error');return}
                  setConnResult(genActWithToken(parts[0],parts.slice(1).join(':'),gh));
                }} className="px-4 py-2 bg-amber-600 rounded-xl text-white text-xs font-bold">{t.genConn}</button>
              </div>
            )}
            {connResult==='Error'&&<p className="text-xs text-red-400">code 不符或格式錯誤</p>}
            {editStaff.hasToken&&(
              <button onClick={async()=>{
                setEditStatus('...');
                const updated=staffList.map(x=>x.code===editStaff.code?{...x,hasToken:false}:x);
                const ok=await writeStaff(gh,updated);
                if(ok){setStaffList(updated);setEditStaff({...editStaff,hasToken:false})}
                setEditStatus(ok?'✓':'✗');setTimeout(()=>setEditStatus(''),2000);
              }} className="w-full py-2 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-xs font-medium">{t.editRevokeConn}</button>
            )}
          </div>

          {/* Change store */}
          <div className="flex gap-2 items-center">
            <select value={editStoreVal||editStaff.store||''} onChange={e=>setEditStoreVal(e.target.value)}
              className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2 text-sm text-gray-200 focus:outline-none">
              {storeList.map(st=><option key={st} value={st}>{st}</option>)}
            </select>
            <button onClick={async()=>{
              setEditStatus('...');
              const sv=editStoreVal||editStaff.store||'';
              const updated=staffList.map(x=>x.code===editStaff.code?{...x,store:sv}:x);
              const ok=await writeStaff(gh,updated);
              if(ok){setStaffList(updated);setEditStaff({...editStaff,store:sv})}
              setEditStatus(ok?'✓':'✗');setTimeout(()=>setEditStatus(''),2000);
            }} className={`px-4 py-2 rounded-xl text-xs font-bold ${editStatus==='...'?'bg-gray-600 text-gray-400 cursor-not-allowed':'bg-amber-600 text-white'}`}
              disabled={editStatus==='...'}>更改門店</button>
          </div>

          {/* Revoke supervisor / promote / delete */}
          <div className="space-y-2 pt-2 border-t border-white/[0.04]">
            {editStaff.role==='teacher'&&(
              <div className="flex gap-2 items-center">
                <select value={editLevel} onChange={e=>setEditLevel(parseInt(e.target.value)||1)}
                  className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2 text-sm text-gray-200 focus:outline-none">
                  {SUP_LEVELS.filter(lv=>lv.id<=myLevel).map(lv=>(
                    <option key={lv.id} value={lv.id}>{lv[t===T.zh?'zh':'vi']}</option>
                  ))}
                </select>
                <button onClick={async()=>{
                  setEditStatus('...');
                  const updated=staffList.map(x=>x.code===editStaff.code?{...x,role:'supervisor',level:editLevel}:x);
                  const ok=await writeStaff(gh,updated);
                  if(ok){setStaffList(updated);setEditStaff({...editStaff,role:'supervisor',level:editLevel})}
                  addLog('任命主管 '+editStaff.code+' Lv'+editLevel,'admin');
                  setEditStatus(ok?'✓':'✗');setTimeout(()=>setEditStatus(''),2000);
                }} className={`px-4 py-2 rounded-xl text-xs font-bold ${editStatus==='...'?'bg-gray-600 text-gray-400':'bg-emerald-600 text-white'}`}
                  disabled={editStatus==='...'}>任命主管</button>
              </div>
            )}
            <div className="flex gap-2">
              {editStaff.role==='supervisor'&&<button onClick={async()=>{
              setEditStatus('...');
              const updated=staffList.map(x=>x.code===editStaff.code?{...x,role:'teacher',level:0}:x);
              const ok=await writeStaff(gh,updated);
              if(ok){setStaffList(updated);setEditStaff({...editStaff,role:'teacher',level:0})}
              addLog(fmtLog(t.logRevoke,[editStaff.code,editStaff.store||'']),'admin');
              setEditStatus(ok?'✓':'✗');setTimeout(()=>setEditStatus(''),2000);
            }} className={`flex-1 py-2 rounded-xl text-xs font-medium ${editStatus==='...'?'bg-gray-600/10 text-gray-500':'bg-amber-500/10 text-amber-400'}`}
              disabled={editStatus==='...'}>{t.removeSup}</button>}
            {editStaff.role!=='admin'&&<button onClick={async()=>{
              setEditStatus('...');
              const updated=staffList.filter(x=>x.code!==editStaff.code);
              const ok=await writeStaff(gh,updated);
              if(ok){setStaffList(updated);setEditStaff(null)}
              addLog('刪除員工 '+editStaff.code,'admin');
            }} className={`flex-1 py-2 rounded-xl text-xs font-medium ${editStatus==='...'?'bg-gray-600/10 text-gray-500':'bg-red-500/10 text-red-400'}`}
              disabled={editStatus==='...'}>{t.editDel}</button>}
          </div>
          {editStatus&&editStatus!=='...'&&<p className={`text-xs text-center ${editStatus==='✓'?'text-emerald-400':'text-red-400'}`}>{editStatus}</p>}
        </div>
      </div>
      )}

      {/* Test/Reset tools */}
      <div className="space-y-2 bg-white/[0.02] border border-red-500/10 rounded-2xl p-4">
        <h3 className="text-[10px] text-gray-600 uppercase tracking-wider">測試工具</h3>
        {!resetPending&&(
          <div className="flex gap-2">
            <button onClick={()=>setResetPending('all')} className="flex-1 py-2 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-xs font-medium active:bg-red-500/20">{t.resetAll}</button>
            <button onClick={()=>setResetPending('sup')} className="flex-1 py-2 bg-amber-500/10 border border-amber-500/20 rounded-xl text-amber-400 text-xs font-medium active:bg-amber-500/20">{t.resetSup}</button>
          </div>
        )}
        {resetPending==='all'&&(
          <div className="space-y-2">
            <p className="text-xs text-red-300">{t.resetAllConfirm}</p>
            <div className="flex gap-2">
              <button onClick={resetAllData} className="flex-1 py-2 bg-red-500/20 rounded-xl text-red-400 text-xs font-bold">{t.confirm}</button>
              <button onClick={()=>setResetPending(null)} className="flex-1 py-2 bg-white/[0.04] rounded-xl text-gray-500 text-xs">{t.cancel}</button>
            </div>
          </div>
        )}
        {resetPending==='sup'&&(
          <div className="space-y-2">
            <p className="text-xs text-amber-300">{t.resetSupConfirm}</p>
            <div className="flex gap-2">
              <button onClick={resetAllSup} className="flex-1 py-2 bg-amber-500/20 rounded-xl text-amber-400 text-xs font-bold">{t.confirm}</button>
              <button onClick={()=>setResetPending(null)} className="flex-1 py-2 bg-white/[0.04] rounded-xl text-gray-500 text-xs">{t.cancel}</button>
            </div>
          </div>
        )}
        {resetStatus&&<p className={`text-xs text-center ${resetStatus.includes('✓')?'text-emerald-400':'text-red-400'}`}>{resetStatus}</p>}
      </div>

      {/* Store management */}
      <div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4">
        <h3 className="text-sm font-semibold text-amber-400">{t.storeManage}</h3>
        <div className="space-y-1.5">
          {storeList.map((s,i)=>(
            <div key={i} className="flex items-center justify-between py-1.5 px-3 bg-white/[0.02] rounded-lg">
              <span className="text-sm text-gray-300">{s}</span>
              {storeList.length>1&&<button onClick={async()=>{const ns=storeList.filter((_,j)=>j!==i);setStoreList(ns);await saveStores(gh,ns)}} className="text-red-400/50 text-xs px-1">✕</button>}
            </div>
          ))}
        </div>
        <div className="flex gap-2">
          <input value={newStore} onChange={e=>setNewStore(e.target.value)} placeholder={t.storeAdd}
            className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-amber-500"/>
          <button onClick={async()=>{if(!newStore.trim())return;const ns=[...storeList,newStore.trim()];setStoreList(ns);setNewStore('');const ok=await saveStores(gh,ns);setStoreStatus(ok?t.storeSaved:'');setTimeout(()=>setStoreStatus(''),2000)}}
            className="px-4 py-2 bg-amber-600 rounded-xl text-white text-sm font-bold">+</button>
        </div>
        {storeStatus&&<p className="text-xs text-center text-emerald-400">{storeStatus}</p>}
      </div>

      {/* Add admin - generate hash */}
      <div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4">
        <h3 className="text-sm font-semibold text-amber-400">{t.adminAdd}</h3>
        <div className="flex gap-2">
          <input value={newCode} onChange={e=>setNewCode(e.target.value.replace(/[^a-zA-Z0-9]/g,''))} placeholder={t.teacherCode+" (ex: 205)"}
            className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-lg text-center text-gray-100 font-mono focus:outline-none focus:border-amber-500"/>
          <button onClick={genAdminHashAndWrite} className="px-5 py-2.5 bg-amber-600 rounded-xl text-white font-bold">{t.genActivation.substring(0,2)}</button>
        </div>
        {newHash&&(
          <div className="fi space-y-2">
            <p className="text-xs text-gray-500">{gh.token?t.ghAuto:t.adminAddHint}</p>
            <div className="relative">
              <div className="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-3 text-center">
                <p className="text-lg font-bold text-emerald-400 font-mono select-all">{newHash}</p>
              </div>
              <button onClick={async()=>{try{await navigator.clipboard.writeText(newHash)}catch{}}} className="absolute top-2 right-2 px-2 py-1 bg-white/10 rounded text-xs text-gray-300">📋</button>
            </div>
            {newHashStatus&&<p className={`text-xs text-center ${newHashStatus.includes('✓')?'text-emerald-400':'text-red-400'}`}>{newHashStatus}</p>}
          </div>
        )}
        {/* Current admins in admin.cfg - show decoded teacher codes */}
        {cfgEntries.length>0&&(
          <div className="pt-2 border-t border-white/[0.04]">
            <p className="text-[10px] text-gray-600 mb-1">{t.adminCfg}</p>
            {cfgEntries.map((entry,i)=>(
              <div key={i} className="flex items-center justify-between py-1.5">
                <div className="flex items-center gap-2">
                  <span className="text-sm text-amber-400 font-bold font-mono">{entry.code!=='?'?entry.code:'—'}</span>
                  <span className="text-[10px] text-gray-600 font-mono">({entry.hash})</span>
                </div>
                {gh.token&&gh.owner&&gh.repo?(
                  cfgEntries.length>1?(
                    <button onClick={()=>doDeleteAdmin(entry,i)} className="px-2 py-1 rounded-lg bg-red-500/10 text-red-400 text-[10px] font-medium active:bg-red-500/20">{t.adminDel}</button>
                  ):<span className="text-[10px] text-gray-700">🔒</span>
                ):<span className="text-[10px] text-gray-700">🔒</span>}
              </div>
            ))}
            {delStatus&&<p className={`text-xs text-center mt-1 ${delStatus.includes('✓')?'text-emerald-400':delStatus.includes('失敗')||delStatus.includes('thất')?'text-red-400':'text-amber-400'}`}>{delStatus}</p>}
          </div>
        )}
      </div>

      {/* Connection code generator */}
      <div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4">
        <h3 className="text-sm font-semibold text-amber-400">{t.genConn}</h3>
        <div className="relative">
          <input value={genConnInput} onChange={e=>setGenConnInput(e.target.value)} placeholder={t.genConnHint}
            className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500"/>
          {genConnInput&&<button onClick={()=>{setGenConnInput('');setGenConnResult('')}} className="absolute top-2 right-2 w-7 h-7 flex items-center justify-center rounded-full bg-white/10 text-gray-400 text-xs">✕</button>}
        </div>
        <button onClick={()=>{
          const parts=genConnInput.trim().split(':');
          if(parts.length<2||!gh.token){setGenConnResult('Error');return}
          setGenConnResult(genActWithToken(parts[0],parts.slice(1).join(':'),gh));
        }} className="w-full py-3 rounded-xl bg-amber-600 text-white font-bold">{t.genConn}</button>
        {genConnResult&&genConnResult!=='Error'&&(
          <div className="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-4 fi space-y-3">
            <p className="text-[10px] text-emerald-400 font-mono break-all select-all bg-white/[0.03] rounded-lg p-2">{genConnResult}</p>
            <div className="flex justify-center"><div className="bg-white p-2 rounded-xl"><img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(genConnResult)}`} alt="QR" className="w-36 h-36"/></div></div>
            <button onClick={async()=>{try{await navigator.clipboard.writeText(genConnResult)}catch{};setGenConnCopied(true);setTimeout(()=>setGenConnCopied(false),2000)}}
              className="w-full py-2 bg-emerald-600 rounded-xl text-white text-sm font-semibold">
              {genConnCopied?'✓':'📋 Copy'}
            </button>
          </div>
        )}
        {genConnResult==='Error'&&<p className="text-xs text-red-400 text-center">格式錯誤或 Token 未設定</p>}
      </div>

      {/* Supervisor application approval + online approve */}
      <div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4">
        <h3 className="text-sm font-semibold text-amber-400">{t.supervisorApprove}</h3>
        <div className="relative">
          <textarea value={supInput} onChange={e=>setSupInput(e.target.value)} rows={2} placeholder={t.supervisorApproveHint} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 pr-10 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500 resize-none"/>
          {supInput&&<button onClick={()=>{setSupInput('');setSupResult('');setSupInfo(null);setSupApproveStatus('')}} className="absolute top-2 right-2 w-7 h-7 flex items-center justify-center rounded-full bg-white/10 text-gray-400 text-xs">✕</button>}
        </div>
        <button onClick={parseSup} className="w-full py-3 rounded-xl bg-amber-600 text-white font-bold">{t.supervisorApprove}</button>
        {supInfo&&supResult&&supResult!=='Error'&&(
          <div className="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-4 fi space-y-3">
            <p className="text-xs text-gray-500">{t.supervisorInfo}</p>
            <div className="space-y-1">
              <p className="text-sm text-gray-300">{t.teacherCode}: <span className="text-amber-400 font-bold">{supInfo.code}</span></p>
              <p className="text-sm text-gray-300">{t.deviceName}: <span className="text-gray-400">{supInfo.devName}</span></p>
            </div>
            {/* Online approve section */}
            {gh.token&&(
              <div className="pt-3 border-t border-white/[0.06] space-y-2">
                <p className="text-xs text-emerald-400 font-semibold">{t.onlineApprove}</p>
                <div>
                  <label className="text-[10px] text-gray-500 block mb-1">{t.approveLevel}</label>
                  <div className="grid grid-cols-2 gap-1.5">
                    {SUP_LEVELS.filter(lv=>lv.id<=myLevel).map(lv=>(
                      <button key={lv.id} onClick={()=>setSupLevel(lv.id)}
                        className={`py-2 rounded-lg text-xs font-medium ${supLevel===lv.id?'bg-emerald-600 text-white':'bg-white/[0.04] text-gray-500'}`}>
                        {lv[t===T.zh?'zh':'vi']}
                      </button>
                    ))}
                  </div>
                </div>
                <button onClick={approveSupOnline} className="w-full py-3 rounded-xl bg-emerald-600 text-white font-bold active:bg-emerald-700">
                  {supApproveStatus||t.approveBtn}
                </button>
                {msgCopied==='sup'&&<p className="text-xs text-center text-emerald-400">{t.approveCopied}</p>}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Teacher activation + online approve */}
      <div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4">
        <h3 className="text-sm font-semibold text-amber-400">{t.teacherActivation}</h3>
        <div className="relative">
          <textarea value={encInput} onChange={e=>setEncInput(e.target.value)} rows={2} placeholder={t.pasteEncrypted} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 pr-10 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500 resize-none"/>
          {encInput&&<button onClick={()=>{setEncInput('');setActResult('');setDecodedInfo('');setTeacherDecoded(null);setTeacherApproveStatus('')}} className="absolute top-2 right-2 w-7 h-7 flex items-center justify-center rounded-full bg-white/10 text-gray-400 text-xs">✕</button>}
        </div>
        <button onClick={genCode} className="w-full py-3 rounded-xl bg-amber-600 text-white font-bold">{t.teacherActivation}</button>
        {actResult&&actResult!=='Error'&&(
          <div className="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-4 fi space-y-3">
            {decodedInfo&&<p className="text-sm text-amber-400 font-bold text-center">{t.teacherCode}: {decodedInfo}{teacherDecoded?.store?' · '+teacherDecoded.store:''}</p>}
            {/* Step 1: Approve button */}
            {gh.token&&teacherDecoded&&!teacherApproveStatus.includes('✓')&&(
              <div className="space-y-2">
                <button onClick={approveTeacherOnline} className="w-full py-3 rounded-xl bg-emerald-600 text-white font-bold active:bg-emerald-700">
                  {teacherApproveStatus||t.approveBtn}
                </button>
              </div>
            )}
            {/* Step 2: After approve, show simple activation code */}
            {teacherApproveStatus.includes('✓')&&(
              <div className="space-y-3">
                <p className="text-xs text-center text-emerald-400">{t.approveOk}</p>
                <p className="text-3xl font-bold text-emerald-400 font-mono tracking-widest select-all text-center">{actResult}</p>
                <button onClick={async()=>{try{await navigator.clipboard.writeText(actResult+'\n\n'+t.approveMsg)}catch{};setMsgCopied('teacher');setTimeout(()=>setMsgCopied(''),3000)}} className="w-full py-2 bg-emerald-600 rounded-xl text-white text-sm font-semibold active:bg-emerald-700">📋 Copy</button>
                {msgCopied==='teacher'&&<p className="text-xs text-center text-emerald-400">{t.approveCopied}</p>}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Encrypt/Decrypt tool */}
      <div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4">
        <h3 className="text-sm font-semibold text-amber-400">{t.encryptTool}</h3>
        <div className="flex bg-white/[0.04] rounded-xl p-1">
          <button onClick={()=>setToolMode('enc')} className={`flex-1 py-2 rounded-lg text-sm font-medium ${toolMode==='enc'?'bg-amber-600 text-white':'text-gray-500'}`}>{t.encryptLabel}</button>
          <button onClick={()=>setToolMode('dec')} className={`flex-1 py-2 rounded-lg text-sm font-medium ${toolMode==='dec'?'bg-amber-600 text-white':'text-gray-500'}`}>{t.decryptLabel}</button>
        </div>
        <input value={toolInput} onChange={e=>setToolInput(e.target.value)} placeholder={t.inputText} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500"/>
        <button onClick={runTool} className="w-full py-2.5 rounded-xl bg-white/[0.06] text-gray-300 font-medium text-sm active:bg-white/[0.1]">{t.confirm}</button>
        {toolResult&&<div className="bg-white/[0.04] rounded-xl p-3 text-sm text-gray-300 font-mono break-all select-all fi">{toolResult}</div>}
      </div>

      {/* GitHub Config - locked by default */}
      <div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4">
        <div className="flex items-center justify-between">
          <h3 className="text-sm font-semibold text-amber-400">{t.ghConfig}</h3>
          {!ghEditing&&gh.token&&<button onClick={()=>setGhEditing(true)} className="px-3 py-1 rounded-lg bg-white/[0.06] text-amber-400 text-xs font-medium active:bg-white/[0.1]">{t.ghEdit}</button>}
        </div>
        {ghEditing?(
          <>
            <input value={gh.owner||''} onChange={e=>setGh({...gh,owner:e.target.value.trim()})} placeholder={t.ghOwner+" (ex: john7t)"}
              className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500"/>
            <input value={gh.repo||''} onChange={e=>setGh({...gh,repo:e.target.value.trim()})} placeholder={t.ghRepo+" (ex: massage-pay)"}
              className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500"/>
            <input value={gh.token||''} onChange={e=>setGh({...gh,token:e.target.value.trim()})} placeholder={t.ghToken} type="password"
              className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-2.5 text-sm text-gray-100 font-mono focus:outline-none focus:border-amber-500"/>
            <div className="flex gap-2">
              <button onClick={saveGH} className="flex-1 py-2.5 bg-amber-600 rounded-xl text-white text-sm font-bold">{t.ghSave}</button>
              <button onClick={testGH} className="flex-1 py-2.5 bg-white/[0.06] rounded-xl text-gray-300 text-sm font-medium">{t.ghTest}</button>
            </div>
          </>
        ):(
          <>
            <input value={gh.owner||''} disabled className="w-full bg-white/[0.03] border border-white/[0.04] rounded-xl px-3 py-2.5 text-sm text-gray-500 font-mono cursor-not-allowed"/>
            <input value={gh.repo||''} disabled className="w-full bg-white/[0.03] border border-white/[0.04] rounded-xl px-3 py-2.5 text-sm text-gray-500 font-mono cursor-not-allowed"/>
            <input value={'●'.repeat(12)} disabled type="text" className="w-full bg-white/[0.03] border border-white/[0.04] rounded-xl px-3 py-2.5 text-sm text-gray-500 font-mono cursor-not-allowed"/>
            <div className="flex gap-2">
              <button onClick={testGH} className="flex-1 py-2.5 bg-white/[0.06] rounded-xl text-gray-300 text-sm font-medium">{t.ghTest}</button>
            </div>
          </>
        )}
        {ghStatus&&<p className={`text-xs text-center ${ghStatus.includes('✓')?'text-emerald-400':'text-amber-400'}`}>{ghStatus}</p>}
      </div>

      {/* Key Config */}
      <div className="space-y-3 bg-white/[0.02] border border-white/[0.06] rounded-2xl p-4">
        <h3 className="text-sm font-semibold text-amber-400">{t.keyConfig}</h3>
        {keyRules.map((r,i)=>(
          <div key={i} className="flex gap-1.5 items-center">
            <select value={r.file} onChange={e=>updateRule(i,'file',e.target.value)}
              className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-lg px-2 py-2 text-xs text-gray-200 focus:outline-none">
              {['key.cfg','admin.cfg','stores.cfg','index.html'].map(f=><option key={f} value={f}>{f}</option>)}
            </select>
            <input type="number" value={r.start} onChange={e=>updateRule(i,'start',e.target.value)} placeholder={t.keyStart}
              className="w-14 bg-white/[0.06] border border-white/[0.08] rounded-lg px-2 py-2 text-xs text-center text-gray-200 font-mono focus:outline-none"/>
            <input type="number" value={r.len} onChange={e=>updateRule(i,'len',e.target.value)} placeholder={t.keyLen}
              className="w-12 bg-white/[0.06] border border-white/[0.08] rounded-lg px-2 py-2 text-xs text-center text-gray-200 font-mono focus:outline-none"/>
            {keyRules.length>1&&<button onClick={()=>delRule(i)} className="text-red-400/50 text-xs px-1">✕</button>}
          </div>
        ))}
        <button onClick={addRule} className="text-xs text-amber-400/60 active:text-amber-400">+ {t.keyAddRule}</button>
        <div className="flex gap-2">
          <button onClick={testKey} className="flex-1 py-2 bg-white/[0.06] rounded-xl text-gray-300 text-sm font-medium">{t.keyTest}</button>
          <button onClick={saveKeyRules} className="flex-1 py-2 bg-amber-600 rounded-xl text-white text-sm font-bold">{t.keySave}</button>
        </div>
        {keySaveStatus&&<p className="text-xs text-center text-emerald-400">{keySaveStatus}</p>}

        {/* Test results checklist */}
        {keyChecks.length>0&&(
          <div className="space-y-1 pt-2 border-t border-white/[0.04]">
            {keyChecks.map((c,i)=>(
              <div key={i} className="flex items-start gap-2 text-[11px]">
                <span className={c.ok?'text-emerald-400':'text-red-400'}>{c.ok?'✓':'✗'}</span>
                <span className={c.ok?'text-gray-400':'text-red-300'}>{c.msg}</span>
              </div>
            ))}
            {builtKey&&(
              <div className="mt-2 bg-white/[0.04] rounded-lg p-2">
                <p className="text-[10px] text-gray-600 mb-1">{t.keyResult}</p>
                <p className="text-sm font-mono text-amber-400 select-all text-center">{builtKey}</p>
              </div>
            )}
            {needMigrate&&gh.token&&(
              <button onClick={migrateAdminCfg} className="w-full mt-2 py-2.5 bg-red-500/20 border border-red-500/30 rounded-xl text-red-300 text-sm font-medium active:bg-red-500/30">{t.keyMigrate}</button>
            )}
            {migrateStatus&&<p className={`text-xs text-center ${migrateStatus.includes('✓')?'text-emerald-400':'text-amber-400'}`}>{migrateStatus}</p>}
          </div>
        )}
      </div>

      <LogSection t={t} filterLevel="admin"/>
    </div>
  );
}

/* ══════════ Icons ══════════ */
const IC={
  home:<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>,
  monthly:<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>,
  yearly:<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>,
  settings:<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>,
};

/* ══════════ App ══════════ */
function App(){
  const[settings,setSettings]=useState(null);
  const[tab,setTab]=useState('home');
  const[curM,setCurM]=useState(new Date().getMonth()+1);
  const[ready,setReady]=useState(false);
  const[needOnboard,setNeedOnboard]=useState(false);
  const[refreshKey,setRefreshKey]=useState(0);
  const[theme,setTheme]=useState(()=>localStorage.getItem('app-theme')||'black');

  const bgColor=THEMES[theme]||THEMES.black;
  const isLight=theme==='white'||theme==='pink';

  useEffect(()=>{document.body.style.backgroundColor=bgColor},[bgColor]);
  useEffect(()=>{localStorage.setItem('app-theme',theme)},[theme]);

  useEffect(()=>{buildDynamicKey()},[]);

  // Daily connection check for teachers with token
  useEffect(()=>{
    if(!settings||!settings.code)return;
    const gh=getGHConfig();
    if(!gh.token)return; // offline user, skip
    const lastCheck=localStorage.getItem('conn-check-date');
    const today=new Date().toISOString().slice(0,10);
    if(lastCheck===today)return; // already checked today
    (async()=>{
      try{
        const staff=await readStaff(gh);
        const me=staff.find(s=>s.code===settings.code);
        if(me&&me.hasToken===false){
          // Connection revoked by admin
          saveGHConfigLocal({});
          localStorage.removeItem('conn-check-date');
          alert(T[settings.lang||'zh'].connExpired);
        }else{
          localStorage.setItem('conn-check-date',today);
        }
      }catch{}
    })();
  },[settings]);

  useEffect(()=>{
    const s=LS.get('app-settings');
    if(s&&s.code){const act=LS.get(`activated-${s.code}`);if(act){setSettings(s);setReady(true);return}}
    const hash=window.location.hash;
    if(hash&&hash.length>5){const p=decBackup(hash.slice(1));if(p){LS.set(dk(p.code,p.year,p.month),p.data);const ns={code:p.code,unitPrice:250,lang:'zh',year:p.year,deviceId:getDeviceId()};LS.set('app-settings',ns);LS.set(`activated-${p.code}`,{deviceId:getDeviceId(),ts:Date.now()});setSettings(ns);setCurM(p.month);setTab('monthly');setReady(true);history.replaceState(null,'',location.pathname);return}}
    setNeedOnboard(true);setReady(true);
  },[]);

  const onOnboardComplete=(s)=>{setSettings(s);setNeedOnboard(false)};
  const updateSettings=(s)=>{setSettings(s);LS.set('app-settings',s)};
  const handleTab=(id)=>{setTab(id);if(id==='home')setRefreshKey(k=>k+1)};

  if(!ready)return<div className="min-h-screen flex items-center justify-center" style={{backgroundColor:bgColor}}><div className="w-8 h-8 border-2 border-amber-500 border-t-transparent rounded-full animate-spin"/></div>;
  if(needOnboard)return<Onboarding onComplete={onOnboardComplete}/>;
  if(!settings)return null;

  const lang=settings.lang||'zh';const t=T[lang];
  const tabs=[{id:'home',label:t.home},{id:'monthly',label:t.monthly},{id:'yearly',label:t.yearly},{id:'settings',label:t.settings}];

  return(
    <div className={`min-h-screen ${isLight?'text-gray-900':'text-gray-100'} flex flex-col`} style={{backgroundColor:bgColor}} data-light={isLight||undefined}>
      <div className="flex-1 pb-[72px] overflow-y-auto">
        {tab==='home'&&<HomePage settings={settings} t={t} refreshKey={refreshKey}/>}
        {tab==='monthly'&&<MonthlyPage settings={settings} curM={curM} setCurM={setCurM} t={t}/>}
        {tab==='yearly'&&<YearlyPage settings={settings} t={t}/>}
        {tab==='settings'&&<SettingsPage settings={settings} onUpdate={updateSettings} t={t} theme={theme} setTheme={setTheme}/>}
      </div>
      <nav className="fixed bottom-0 left-0 right-0 backdrop-blur-xl border-t border-white/[0.06] flex z-40" style={{backgroundColor:bgColor+'ee',paddingBottom:'env(safe-area-inset-bottom)'}}>
        {tabs.map(({id,label})=>(<button key={id} onClick={()=>handleTab(id)} className={`flex-1 flex flex-col items-center pt-2 pb-1.5 gap-0.5 transition-all ${tab===id?'text-amber-400':'text-gray-500 active:text-gray-400'}`}>{IC[id]}<span className="text-[10px] font-medium">{label}</span></button>))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
