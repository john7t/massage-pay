<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#030712">
<title>薪資追蹤</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#030712;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#f3f4f6}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
.ring{animation:spin 1.8s linear infinite}
.d1{animation:pulse 1.4s ease-in-out infinite}
.d2{animation:pulse 1.4s ease-in-out .2s infinite}
.d3{animation:pulse 1.4s ease-in-out .4s infinite}
</style>
</head>
<body>
<div style="min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem;text-align:center">
  <div style="position:relative;width:72px;height:72px;margin-bottom:2rem">
    <svg class="ring" viewBox="0 0 72 72" width="72" height="72" style="position:absolute;top:0;left:0">
      <circle cx="36" cy="36" r="30" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>
      <circle cx="36" cy="36" r="30" fill="none" stroke="#BA7517" stroke-width="3" stroke-dasharray="60 130" stroke-linecap="round"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
    </div>
  </div>
  <h1 style="font-size:22px;font-weight:500;color:#f3f4f6;margin:0 0 2rem;line-height:1.3">網站更新中</h1>
  <div style="display:flex;gap:6px;margin-bottom:3rem">
    <span class="d1" style="width:7px;height:7px;border-radius:50%;background:#BA7517;display:block"></span>
    <span class="d2" style="width:7px;height:7px;border-radius:50%;background:#BA7517;display:block"></span>
    <span class="d3" style="width:7px;height:7px;border-radius:50%;background:#BA7517;display:block"></span>
  </div>
  <div style="border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:1rem 1.25rem;max-width:300px;text-align:left">
    <p style="font-size:13px;color:#9ca3af;margin:0 0 .5rem;line-height:1.7">你所輸入的舊資料仍保存在你的手機暫存檔中。</p>
    <p style="font-size:12px;color:#6b7280;margin:0;display:flex;align-items:flex-start;gap:6px"><span style="flex-shrink:0">⚠️</span><span>資料只存在本機，不會上傳雲端。</span></p>
  </div>
</div>
</body>
</html>
