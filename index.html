/* ── 錯誤兜底攔截器（最早執行） ── */
(function(){
  var PAGE="index",PCODE="00";
  window.__shownFallback=false;
  var __fbL={zh:{title:"網站更新中",info:function(p,v,c){return p+" 網頁 v"+v+" 更新中　代碼 "+c},keep:"你所輸入的舊資料仍保存在你的手機暫存檔中。",warn:"資料只存在本機，不會上傳雲端。"},vi:{title:"Đang cập nhật",info:function(p,v,c){return p+" v"+v+" đang cập nhật　Mã "+c},keep:"Dữ liệu bạn nhập vẫn được lưu trong bộ nhớ tạm của điện thoại.",warn:"Dữ liệu chỉ lưu trên máy, không tải lên đám mây."}};
  window.__fbLang=(function(){try{var s=localStorage.getItem('app-settings');if(s){var o=JSON.parse(s);if(o&&o.lang)return o.lang}}catch(e){}return 'zh'})();
  window.__fbApply=function(){var L=__fbL[window.__fbLang]||__fbL.zh;var t=document.getElementById('__fbtitle');if(t)t.textContent=L.title;var k=document.getElementById('__fbkeep');if(k)k.textContent=L.keep;var w=document.getElementById('__fbwarn');if(w)w.textContent=L.warn;var b1=document.getElementById('__fblang_zh'),b2=document.getElementById('__fblang_vi');if(b1)b1.style.color=window.__fbLang==='zh'?'#f3f4f6':'#4b5563';if(b2)b2.style.color=window.__fbLang==='vi'?'#f3f4f6':'#4b5563';if(window.__fbData){var L2=__fbL[window.__fbLang]||__fbL.zh;var info=document.getElementById("__fbinfo");if(info)info.textContent=L2.info(window.__fbData.page,window.__fbData.ver,window.__fbData.code)}};
  window.__fbSetLang=function(lang){window.__fbLang=lang;try{}catch(e){}window.__fbApply()};
  window.__showFallback=function(src,detail){
    if(window.__shownFallback)return;window.__shownFallback=true;
    try{
      var ver=(document.title.match(/v?(\d+\.\d+[-.]\d+(?:\.\d+)?)/)||[])[1]||"?";
      var line=(detail&&detail.lineno)?detail.lineno:0;
      var ecode=PCODE+String(src).padStart(2,"0")+String(line%10000).padStart(4,"0");
      window.__fbData={page:PAGE,ver:ver,code:ecode,msg:(detail&&detail.msg)||''};
      var el=document.getElementById("__fallback");
      if(el){
        window.__fbApply();
        try{var md=document.getElementById("__fbmsg");if(md&&window.__fbData.msg){md.textContent=window.__fbData.msg;md.style.display="block";}}catch(_e){}
        el.style.display="flex";
      }
      var root=document.getElementById("root");if(root)root.style.display="none";
    }catch(e){}
  };
  window.addEventListener("error",function(e){window.__showFallback(1,{lineno:e.lineno})},true);
  window.addEventListener("unhandledrejection",function(e){try{console.warn('unhandledrejection:',e&&e.reason)}catch(_e){}try{if(e&&e.preventDefault)e.preventDefault()}catch(_e){}});
})();
</script>

function Onboarding({onComplete}){
  const[step,setStep]=useState(1);const[lang,setLang]=useState('zh');const[code,setCode]=useState('');const[actInput,setActInput]=useState('');const[err,setErr]=useState('');const[checking,setChecking]=useState(false);const[copied,setCopied]=useState(false);const[devId]=useState(()=>getDeviceId());const[stores,setStores]=useState(['龍山寺店']);const[store,setStore]=useState('龍山寺店');const[waitStatus,setWaitStatus]=useState('');const[agreed,setAgreed]=useState(false);const[agreeErr,setAgreeErr]=useState(false);

    try{const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),5000);const res=await fetch('./admin.cfg',{cache:'no-store',signal:ctrl.signal});clearTimeout(timer);if(res.ok){const text=(await res.text()).trim();const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));const myHash=adminHash(code);const match=lines.some(l=>{const parts=l.split(':');const h=parts.length>=2?parts[parts.length-1]:parts[0];return h===myHash});if(match){doActivate({code,unitPrice:250,lang,store,year:bizParts().y,deviceId:devId});return}}}catch(_e){}

    setChecking(false);setStep(2);setErr('');

/* ══════════ Home Page ══════════ */
function HomePage({settings,t,refreshKey,onGotoProfile,onGotoNotices}){

  const setTodayStatus=(s)=>{const md=data?JSON.parse(JSON.stringify(data)):eMon();const dd=md.days[td]||eDay();dd.status=s;if(!canWork[s]){dd.total=0;dd.laodian=0;dd.groups=[];dd.skills={guasha:0,baguang:0,xiujiao:0}}stamp(dd);md.days[td]=dd;setData({...md});LS.set(dk(settings.code,ty,tm),md)};
  const addSkill=(key)=>{const md=data?JSON.parse(JSON.stringify(data)):eMon();const dd=md.days[td]||eDay();if(!dd.skills)dd.skills={guasha:0,baguang:0,xiujiao:0};dd.skills[key]=(dd.skills[key]||0)+1;stamp(dd);md.days[td]=dd;setData({...md});LS.set(dk(settings.code,ty,tm),md)};
  const savePrevDay=(d,dd)=>{if(!prev)return;const key=dk(settings.code,prev.year,prev.month);const md=JSON.parse(JSON.stringify(LS.get(key)||eMon()));md.days[d]=dd;LS.set(key,md);setPrev({...prev,...dd});if(prev.month===tm)setData(md);setEditPrev(false)};
  const saveTodayDay=(d,dd)=>{const md=data?JSON.parse(JSON.stringify(data)):eMon();md.days[d]=dd;LS.set(dk(settings.code,ty,tm),md);setData({...md});setEditToday(false)};

    <div onClick={()=>setEditToday(true)} className="bg-emerald-500/10 border border-emerald-500/25 rounded-2xl p-4 mb-4 active:bg-emerald-500/15 cursor-pointer"><div className="flex items-center justify-between"><div className="flex items-center gap-2"><span className={`w-2.5 h-2.5 rounded-full flex-shrink-0 ${(canWork[todayData.status||0]&&todayData.total>0)?'led-green':'led-gray'}`}/><span className="text-lg font-bold text-gray-100">{tm}/{td}</span><span className="text-sm text-gray-500 ml-0.5">({t.dn[now.getDay()]})</span></div><div className="text-right">{canWork[todayData.status||0]?(<span className="text-xl font-bold text-emerald-400 tabular-nums">${sal.toLocaleString()}</span>):(<span className={`text-sm px-2 py-0.5 rounded-full ${SBG[todayData.status]} ${STC[todayData.status]}`}>{t[SK[todayData.status]]}</span>)}</div></div>{canWork[todayData.status||0]&&(<div className="flex items-center justify-between mt-0.5"><span className="text-xs text-gray-500">{todayData.total}{t.units}{todayData.laodian>0?` · ${todayData.laodian}${t.laodian}`:''}</span><svg className={`w-3.5 h-3.5 ${todayData.total>0?'text-red-500 arrow-blink':'text-gray-600'}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg></div>)}</div>
    {false&&hasToday&&(<div className="bg-emerald-500/10 border border-emerald-500/20 rounded-2xl p-4 mb-5"><div className="flex items-center justify-between"><span className="text-sm text-emerald-400 font-medium">{t.todayDone}</span><div className="flex items-baseline gap-2"><span className="text-emerald-300 font-bold text-lg">{todayData.total}{t.units}</span><span className="text-emerald-400 font-bold text-lg">${sal.toLocaleString()}</span></div></div>{todayData.laodian>0&&<div className="mt-1 text-sm text-orange-400">{t.laodian}: {todayData.laodian}</div>}{(todayData.groups||[]).length>1&&<div className="mt-1 text-xs text-gray-600">{(todayData.groups||[]).join(' + ')} = {todayData.total}</div>}{todayData.skills&&SKILL_KEYS.map((k,i)=>(settings.skills?.[k]&&todayData.skills[k]>0)?<span key={k} className={`inline-block mt-1 mr-2 text-xs ${SKILL_COLORS[i]}`}>{t[SKILL_SHORT[i]]}×{todayData.skills[k]}</span>:null)}</div>)}

function SlipTags({slip,t,code,onAdd,onDel}){
  const[input,setInput]=useState('');
  const hist=loadTagHistory(code).filter(h=>!(slip.tags||[]).includes(h)).slice(0,12);
  const submit=(val)=>{const parts=(val||input).split(/[\s,，]+/).filter(Boolean);parts.forEach(p=>onAdd(slip.id,p));setInput('')};
  return(<div className="space-y-1.5">
    <label className="text-xs text-gray-500 block">{t.slipTags}</label>
    <div className="flex gap-2"><input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();submit()}}} placeholder={t.slipTagsPlaceholder} className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-lg px-2 py-1.5 text-sm text-gray-100 focus:outline-none focus:border-amber-500"/><button onClick={()=>submit()} disabled={!input.trim()} className={`px-3 py-1.5 rounded-lg text-sm font-bold ${input.trim()?'bg-amber-600 text-white active:bg-amber-700':'bg-white/[0.05] text-gray-600'}`}>＋</button></div>
    {slip.tags&&slip.tags.length>0&&<div className="flex flex-wrap gap-1.5">{slip.tags.map(tag=>(<span key={tag} className="inline-flex items-center gap-1 bg-amber-600/15 text-amber-300 rounded-full pl-2 pr-1 py-0.5 text-xs">#{tag}<button onClick={()=>onDel(slip.id,tag)} className="w-4 h-4 flex items-center justify-center rounded-full bg-amber-600/30 text-amber-200 text-[10px]">×</button></span>))}</div>}
    {hist.length>0&&<div className="flex flex-wrap gap-1"><span className="text-[10px] text-gray-600 w-full">{t.slipTagHistory}</span>{hist.map(h=>(<button key={h} onClick={()=>onAdd(slip.id,h)} className="bg-white/[0.05] text-gray-400 rounded-full px-2 py-0.5 text-[11px] active:bg-white/[0.1]">#{h}</button>))}</div>}
  </div>);
}

  const save=()=>{const nr=!canWork[st];if(!nr){(slips||[]).forEach(s=>{if((s.laodian||0)>=1&&(s.custName||'').trim()&&(s.custTitle||'').trim()){if(!s.tags)s.tags=[];if(!s.tags.includes('老點'))s.tags.push('老點')}});if(editorCode){(slips||[]).forEach(s=>{if((s.custName||'').trim()||(s.custPhone||'').trim()){try{upsertCust(editorCode,s)}catch(e){}}})}}onSave(d,{groups:[],total:nr?0:ct,laodian:nr?0:laodianTotal,status:st,skills:nr?{guasha:0,baguang:0,xiujiao:0}:skCounts,slips:nr?[]:(slips||[]),did:getDeviceId(),ts:Date.now()})};
  const clearAll=()=>{setLo(0);setSt(0);setGroups([]);setSlips([]);setSkCounts({guasha:0,baguang:0,xiujiao:0})};
  const skAdj=(k,delta)=>setSkCounts(p=>({...p,[k]:Math.max(0,(p[k]||0)+delta)}));
  const[eOtherMode,setEOtherMode]=useState(false);const[eOtherVal,setEOtherVal]=useState('');

  const delSlip=(id)=>setSlips(slips.filter(s=>s.id!==id));

function MonthlyPage({settings,curM,setCurM,t,onGotoYear}){
  const[data,setData]=useState(null);const[editDay,setEditDay]=useState(null);const y=settings.year||bizParts().y;
  useEffect(()=>{setData(LS.get(dk(settings.code,y,curM))||eMon())},[settings.code,y,curM]);
  useEffect(()=>{if(data&&curM===bizParts().m&&y===bizParts().y){const el=document.querySelector('[data-today-row]');if(el)setTimeout(()=>{try{el.scrollIntoView({block:'center',behavior:'smooth'})}catch(_e){}},150)}},[data,curM,y]);
  const saveDay=(d,dd)=>{const nd={...data,days:{...data.days,[d]:dd}};setData(nd);setEditDay(null);LS.set(dk(settings.code,y,curM),nd)};
  const dm=dim(y,curM);
  const calc=useMemo(()=>{if(!data)return{prev:{units:0,salary:0,laodian:0},next:{units:0,salary:0,laodian:0},month:{units:0,salary:0,laodian:0}};let pu=0,ps=0,pl=0,nu=0,ns=0,nl=0;for(let d=1;d<=dm;d++){const day=data.days[d]||eDay();const u=day.total||0,lo=day.laodian||0,s=calcSal(day,settings.unitPrice,settings.skills);if(d<=15){pu+=u;ps+=s;pl+=lo}else{nu+=u;ns+=s;nl+=lo}}return{prev:{units:pu,salary:ps,laodian:pl},next:{units:nu,salary:ns,laodian:nl},month:{units:pu+nu,salary:ps+ns,laodian:pl+nl}}},[data,dm,settings.unitPrice,settings.skills]);
  return(<div className="max-w-lg mx-auto fi"><div className="sticky top-0 z-10 bg-gray-950 pb-1"><div className="px-2 py-2 flex gap-1 overflow-x-auto no-sb"><button onClick={()=>onGotoYear&&onGotoYear()} className="px-3 py-1.5 rounded-full text-xs font-semibold flex-shrink-0 bg-emerald-600 text-white">{t.yearly}</button>{Array.from({length:12},(_,i)=>i+1).map(m=>(<button key={m} onClick={()=>setCurM(m)} className={`px-3 py-1.5 rounded-full text-xs font-semibold flex-shrink-0 ${m===curM?'bg-amber-600 text-white':'bg-white/[0.04] text-gray-600'}`}>{t.months[m-1]}</button>))}<button onClick={()=>onGotoYear&&onGotoYear()} className="px-3 py-1.5 rounded-full text-xs font-semibold flex-shrink-0 bg-emerald-600 text-white">{t.yearly}</button></div><div className="px-3 py-2"><SummaryTable prev={calc.prev} next={calc.next} month={calc.month} t={t}/></div></div>
  <div className="px-3 py-1.5 bg-amber-600/[0.06] border-b border-amber-500/10"><span className="text-[11px] text-amber-500/80 font-semibold">{t.p1}</span></div>
  {Array.from({length:Math.min(15,dm)},(_,i)=>i+1).map(d=>(<DayRow key={d} d={d} day={data?.days[d]||eDay()} y={y} m={curM} t={t} up={settings.unitPrice} sk={settings.skills} onEdit={setEditDay} isToday={curM===bizParts().m&&y===bizParts().y&&d===bizParts().d}/>))}
  {dm>15&&(<><div className="px-3 py-1.5 bg-amber-600/[0.06] border-b border-amber-500/10 mt-0.5"><span className="text-[11px] text-amber-500/80 font-semibold">{t.p2}</span></div>{Array.from({length:dm-15},(_,i)=>i+16).map(d=>(<DayRow key={d} d={d} day={data?.days[d]||eDay()} y={y} m={curM} t={t} up={settings.unitPrice} sk={settings.skills} onEdit={setEditDay} isToday={curM===bizParts().m&&y===bizParts().y&&d===bizParts().d}/>))}</>)}
  {editDay&&data&&<DayEditor day={data.days[editDay]||eDay()} d={editDay} y={y} m={curM} t={t} up={settings.unitPrice} sk={settings.skills} code={settings.code} onSave={saveDay} onCancel={()=>setEditDay(null)}/>}
  </div>)}

/* ══════════ Yearly ══════════ */
function YearlyPage({settings,t,onBack}){
  const y=settings.year||bizParts().y;
  const rows=useMemo(()=>{const r=[];for(let m=1;m<=12;m++){const d=LS.get(dk(settings.code,y,m));let u=0,lo=0,sal=0;if(d?.days){for(let i=1;i<=dim(y,m);i++){const day=d.days[i];if(day){u+=day.total||0;lo+=day.laodian||0;sal+=calcSal(day,settings.unitPrice,settings.skills)}}}r.push({month:m,units:u,salary:sal,laodian:lo})}return r},[settings.code,y,settings.unitPrice]);
  const tot=rows.reduce((a,r)=>({u:a.u+r.units,s:a.s+r.salary,l:a.l+r.laodian}),{u:0,s:0,l:0});
  return(<div className="max-w-lg mx-auto fi"><div className="px-4 py-3 flex items-baseline justify-between"><h2 className="text-xl font-bold text-gray-100"><button onClick={()=>onBack&&onBack()} className="mr-2 text-gray-500 active:text-gray-300 align-middle"><svg className="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg></button>{y} {t.yearly}</h2><span className="text-xs text-gray-600 font-mono">#{settings.code}</span></div><div className="flex px-3 py-2 border-b border-white/[0.06] text-[11px] text-gray-600 font-medium"><div className="w-12"></div><div className="flex-1 text-right">{t.units}</div><div className="flex-1 text-right">{t.salary}</div><div className="w-12 text-right">{t.laodian}</div><div className="flex-1 text-right">{t.subtotal}</div></div>{rows.map(r=>(<div key={r.month} className={`flex items-center px-3 py-3 border-b border-white/[0.03] ${r.units>0?'':'opacity-30'}`}><div className="w-12 text-sm font-medium text-gray-300">{t.months[r.month-1]}</div><div className="flex-1 text-right text-sm text-gray-400 tabular-nums">{r.units}</div><div className="flex-1 text-right text-sm text-emerald-400/80 tabular-nums">{r.salary.toLocaleString()}</div><div className="w-12 text-right text-sm text-orange-400/80 tabular-nums">{r.laodian}</div><div className="flex-1 text-right text-sm text-emerald-400 font-semibold tabular-nums">{r.salary.toLocaleString()}</div></div>))}<div className="flex items-center px-3 py-3.5 bg-amber-600/10 border-t-2 border-amber-500/40"><div className="w-12 text-sm font-bold text-amber-400">{t.total}</div><div className="flex-1 text-right text-sm text-amber-300 font-bold tabular-nums">{tot.u}</div><div className="flex-1 text-right text-sm text-emerald-400 font-bold tabular-nums">{tot.s.toLocaleString()}</div><div className="w-12 text-right text-sm text-orange-400 font-bold tabular-nums">{tot.l}</div><div className="flex-1 text-right text-sm text-emerald-400 font-bold tabular-nums">{tot.s.toLocaleString()}</div></div></div>)}

function App(){
  const[settings,setSettings]=useState(null);const[tab,setTab]=useState('home');const[curM,setCurM]=useState(bizParts().m);const[ready,setReady]=useState(false);const[needOnboard,setNeedOnboard]=useState(false);const[refreshKey,setRefreshKey]=useState(0);const[theme,setTheme]=useState(()=>localStorage.getItem('app-theme')||'pink');
  const bgColor=THEMES[theme]||THEMES.black;const isLight=theme==='white'||theme==='pink';
  useEffect(()=>{try{gasWarmup()}catch(_e){}},[]);
  const[keyClaim,setKeyClaim]=useState('');const[keyErr,setKeyErr]=useState('');
  const doClaimKey=async()=>{if(!settings||!settings.code)return;setKeyClaim('...');setKeyErr('');const r=await autoClaimKey(settings.code);if(r&&r.ok){setKeyClaim('ok');setTimeout(()=>setKeyClaim('done'),2000)}else{setKeyClaim('fail');setKeyErr((r&&r.error)||'unknown')}};
  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);document.documentElement.style.setProperty('--bg',bgColor)},[bgColor,theme]);
  useEffect(()=>{localStorage.setItem('app-theme',theme)},[theme]);
  useEffect(()=>{buildDynamicKey()},[]);
  useEffect(()=>{if(!settings||!settings.code)return;const _bd=bizDate();const today=_bd.getFullYear()+'-'+String(_bd.getMonth()+1).padStart(2,'0')+'-'+String(_bd.getDate()).padStart(2,'0');const lastCheck=localStorage.getItem('staff-sync-date');(async()=>{
    try{const staff=await readStaff({});const me=Array.isArray(staff)?staff.find(s=>String(s.code)===String(settings.code)):null;
      if(me){
        // token綁定檢查(原邏輯)
        const gh=getGHConfig();if(gh.token&&me.hasToken===false){saveGHConfigLocal({})}
        // 每日同步基資/店資:老師沒改過的欄位跟staff一致;改過且不一致的保留本機值(UI下方紅字顯示staff值)
        const SYNC_FIELDS=['nameZh','nameVi','phone','email','store','storeSel','shift','permitNo','permitExpiry','permitDate','permitOrg','gender','school','major','schoolType','workStart','workEnd'];
        const confP=settings.confirmedProfile||{};const confS=settings.confirmedStore||{};
        const ns={...settings};const staffVals={};let changed=false;
        SYNC_FIELDS.forEach(k=>{
          if(me[k]===undefined||me[k]===null)return;
          staffVals[k]=me[k];
          const confVal=(confP[k]!==undefined?confP[k]:confS[k]);
          const localVal=settings[k];
          // 老師沒改過(本機值=上次確認值),用staff覆蓋
          if(localVal===undefined||localVal===''||localVal===confVal){
            if(ns[k]!==me[k]){ns[k]=me[k];changed=true}
          }
          // 否則保留本機(老師改過未送出)→ 紅字由staffVals提供
        });
        ns.staffValues=staffVals;
        localStorage.setItem('staff-sync-date',today);
        setSettings(ns);LS.set('app-settings',ns);
      }
    }catch(_e){}
  })()},[settings&&settings.code]);
  useEffect(()=>{const s=LS.get('app-settings');if(s&&s.code){const act=LS.get(`activated-${s.code}`);if(act){setSettings(s);setReady(true);return}}
    const hash=window.location.hash;
    // #conn=編號:連線碼(或分段 &conn2= ...) → 自動連線啟用(含token)
    if(hash&&hash.indexOf('conn=')>=0){try{const reassembled=parseReqHash(hash,'conn');const raw=reassembled||decodeURIComponent(hash.replace(/^#/,'').split('conn=')[1]||'');const ci=raw.indexOf(':');if(ci>0){const c=raw.slice(0,ci);const actCode=raw.slice(ci+1);const did=getDeviceId();const tk=verifyActToken(actCode,c,did);if(tk){saveGHConfigLocal({owner:tk.owner,repo:tk.repo,token:tk.token});const ns={code:c,unitPrice:250,lang:'zh',store:'龍山寺店',year:bizParts().y,deviceId:did};LS.set('app-settings',ns);LS.set(`activated-${c}`,{deviceId:did,ts:Date.now()});setSettings(ns);setReady(true);history.replaceState(null,'',location.pathname);return}}}catch(_e){}}
    if(hash&&hash.length>5&&hash.indexOf('conn=')<0){const p=decBackup(hash.slice(1));if(p){LS.set(dk(p.code,p.year,p.month),p.data);const ns={code:p.code,unitPrice:250,lang:'zh',year:p.year,deviceId:getDeviceId()};LS.set('app-settings',ns);LS.set(`activated-${p.code}`,{deviceId:getDeviceId(),ts:Date.now()});setSettings(ns);setCurM(p.month);setTab('monthly');setReady(true);history.replaceState(null,'',location.pathname);return}}setNeedOnboard(true);setReady(true)},[]);
  const onOnboardComplete=(s)=>{setSettings(s);setNeedOnboard(false)};
  const updateSettings=(s)=>{setSettings(s);LS.set('app-settings',s)};
  // ===== 引導學習點A 已移除(7/1後):不再自動填工作證到期日,尊重使用者留空 =====
  const handleTab=(id)=>{setTab(id);if(id==='home')setRefreshKey(k=>k+1)};
  if(!ready)return<div className="min-h-screen flex items-center justify-center" style={{backgroundColor:bgColor}}><div className="w-8 h-8 border-2 border-amber-500 border-t-transparent rounded-full animate-spin"/></div>;
  if(needOnboard)return<Onboarding onComplete={onOnboardComplete}/>;
  if(!settings)return null;
  const lang=settings.lang||'zh';const t=T[lang];
  const tabs=[{id:'home',label:t.home},{id:'monthly',label:t.monthly},{id:'customers',label:t.custManage},{id:'settings',label:t.settings}];
  const IC={
    home:(<svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>),
    monthly:(<svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2" strokeWidth={1.8}/><path strokeLinecap="round" strokeWidth={1.8} d="M3 9h18M8 2v4M16 2v4"/></svg>),
    customers:(<svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM3 21v-1a6 6 0 0112 0v1"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M17 11a3 3 0 003-3M19 21v-1a5 5 0 00-3-4.6"/></svg>),
    settings:(<svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" strokeWidth={1.8}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-2.82 1.17V21a2 2 0 01-4 0v-.09A1.65 1.65 0 006.6 19.4l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 8.6l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 6.6a1.65 1.65 0 001-1.51V5a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>)
  };
  // 底部設定❗:基資或店資有未確認變動(主管除外)
  const settingsAlert=(()=>{const permExp=(()=>{if(!settings.permitExpiry)return false;const days=(new Date(settings.permitExpiry)-new Date())/86400000;return days<=30})();const gh=getGHConfig();if(gh&&gh.token)return permExp;const cp=settings.confirmedProfile,cs=settings.confirmedStore;const pf=['gender','nameZh','nameVi','phone','email','addrCity','addrDist','addrDetail','school','major','schoolType','permitNo','permitDate','permitExpiry','permitOrg'];const sf=['storeSel','shift','workStart','workEnd','workNote','unitPrice','preg','oil','techMentor','lockerNo'];const chg=(snap,fs)=>{if(!snap)return fs.some(k=>{const v=settings[k];return v!==undefined&&v!==''&&v!==null});return fs.some(k=>(snap[k]||'')!==((settings[k]!==undefined?settings[k]:'')||''))};return chg(cp,pf)||chg(cs,sf)||permExp})();
  return(<div className={`${isLight?'text-gray-900':'text-gray-100'} flex flex-col`} style={{backgroundColor:bgColor,height:'100vh',maxHeight:'100dvh'}} data-light={isLight||undefined}>
    <div className="flex-1 overflow-y-auto">
      {tab==='home'&&<HomePage settings={settings} t={t} refreshKey={refreshKey} onGotoProfile={()=>{try{sessionStorage.setItem('__settingsSub','basic')}catch(e){}handleTab('settings')}}/>}
      {tab==='monthly'&&<MonthlyPage settings={settings} curM={curM} setCurM={setCurM} t={t} onGotoYear={()=>handleTab('yearly')}/>}
      {tab==='yearly'&&<YearlyPage settings={settings} t={t} onBack={()=>handleTab('monthly')}/>}
      {tab==='customers'&&(()=>{const CP=(window.__V&&window.__V.CustomerPage)||(()=>null);return<CP settings={settings} t={t}/>})()}
      {tab==='settings'&&(()=>{const SP=(window.__V&&window.__V.SettingsPage)||(()=>null);return<SP settings={settings} onUpdate={updateSettings} t={t} theme={theme} setTheme={setTheme}/>})()}
    </div>
    {settings&&settings.code&&shouldClaimKey(settings.code)&&keyClaim!=='done'&&(<div onClick={keyClaim===''||keyClaim==='fail'?doClaimKey:undefined} className="flex-shrink-0 px-4 py-3 bg-emerald-600 flex items-center gap-2 cursor-pointer active:bg-emerald-700"><span className="text-lg">🔄</span><span className="text-sm text-white font-semibold flex-1">{keyClaim==='...'?t.keyUpdating:keyClaim==='ok'?t.keyUpdateOk:keyClaim==='fail'?(t.keyUpdateFail+'：'+(keyErr==='bad batch'?t.keyErrBatch:keyErr==='no key yet'?t.keyErrNoKey:keyErr==='revoked'?t.keyErrRevoked:keyErr==='network'?t.keyErrNetwork:keyErr==='missing'?t.keyErrMissing:keyErr)):t.keyUpdateFound}</span></div>)}
    <nav className="flex-shrink-0 backdrop-blur-xl border-t border-white/[0.06] flex" style={{backgroundColor:bgColor+'ee',paddingBottom:'env(safe-area-inset-bottom)'}}>
      {tabs.map(({id,label})=>(<button key={id} onClick={()=>handleTab(id)} className={`relative flex-1 flex flex-col items-center pt-2 pb-1.5 gap-0.5 transition-all ${tab===id?'text-amber-400':'text-gray-500 active:text-gray-400'}`}>{IC[id]}<span className="text-[10px] font-medium">{label}</span>{id==='settings'&&settingsAlert&&<span className="absolute top-1 right-1/4 text-red-500 text-[10px]">❗</span>}</button>))}
    </nav>
  </div>)}

class __EB extends React.Component{constructor(p){super(p);this.state={e:false}}static getDerivedStateFromError(){return{e:true}}componentDidCatch(err){try{window.__showFallback(3,{lineno:0,msg:(err&&err.message)||String(err)})}catch(e){}}render(){return this.state.e?null:this.props.children}}
ReactDOM.createRoot(document.getElementById('root')).render(<__EB><App/></__EB>);
</script>
