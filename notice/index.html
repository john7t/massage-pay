<script>
  var PAGE="notice-liff",PCODE="03";
  window.__fbLang='zh';
  window.__fbApply=function(){var t=document.getElementById('__fbtitle');if(t)t.textContent='網站更新中';if(window.__fbData){var info=document.getElementById("__fbinfo");if(info)info.textContent=window.__fbData.page+" 網頁 v"+window.__fbData.ver+" 更新中　代碼 "+window.__fbData.code;try{var md=document.getElementById("__fbmsg");if(md&&window.__fbData.msg){md.textContent=window.__fbData.msg;md.style.display="block";}}catch(_e){}}};
  window.__showFallback=function(src,detail){
    if(window.__shownFallback)return;window.__shownFallback=true;
    try{
      var ver=(document.title.match(/v?(\d+\.\d+[-.]\d+)/)||[])[1]||"?";
      var line=(detail&&detail.lineno)?detail.lineno:0;
      var ecode=PCODE+String(src).padStart(2,"0")+String(line%10000).padStart(4,"0");
      window.__fbData={page:PAGE,ver:ver,code:ecode,msg:(detail&&detail.msg)||''};
      var el=document.getElementById("__fallback");
      if(el){window.__fbApply();el.style.display="flex";}
    }catch(_e){}
  };
  window.addEventListener("error",function(e){window.__showFallback(1,{lineno:e.lineno,msg:(e.message||'')+(e.filename?(' @'+e.filename.split('/').pop()+':'+e.lineno+':'+e.colno):'')});},true);
</script>

<script type="text/babel">
(function(){
const{useState,useEffect}=React;
const{gasCall,TW_REGIONS,T}=window.MP||{};

// 測速用:填了就跳過問GAS要LIFF ID那一次來回。這個頁面需要一個「Endpoint URL指到這個頁面網址」的LIFF App,
// 不能直接沿用安全回報的LIFF ID(那個的Endpoint URL指到別的網址),要另外在LINE Developers Console申請一個。
const LIFF_ID_HARDCODED='2010673151-PEhuHeqe';

const STORES=['龍山寺店','東門店','古亭店','公館店','本部','教學處'];
const CITY_PRIORITY=['桃園市','新北市','臺北市','宜蘭縣'];
const CITY_OPTIONS=[...CITY_PRIORITY,...Object.keys(TW_REGIONS||{}).filter(c=>!CITY_PRIORITY.includes(c))];
const SUBTYPES_ZH=['執行長','區經理','經理','副理','實習副理','櫃台組長'];
const SUBTYPES_VI=['Giám đốc điều hành','Quản lý khu vực','Quản lý','Phó quản lý','Phó quản lý thực tập','Tổ trưởng lễ tân'];

async function sfConfig(){const r=await gasCall('sfConfig',{app:'notice'},10000);return r||{ok:false,error:'GAS無回應'};}
async function getNoticeFlexContent(noticeId,liffId){const r=await gasCall('getNoticeFlexContent',{noticeId,liffId},10000);return r||{ok:false,error:'GAS無回應'};}
async function gasAnalyzeNotice(content,code){const r=await window.MP.gasCallPost('analyzeNotice',{content,code,feature:'LIFF新增公告'},20000);return r||{ok:false,error:'GAS無回應'};}
async function gasAddNoticeLiff(data){const r=await window.MP.gasCallPost('addNotice',data,15000);return r||{ok:false,error:'GAS無回應'};}
async function gasNoticeUnread(noticeId){const r=await gasCall('noticeUnread',{noticeId},10000);return r||{ok:false,error:'GAS無回應'};}
async function gasNoticeReads(noticeId){const r=await gasCall('noticeReads',{noticeId,detail:true},10000);return r||{ok:false,error:'GAS無回應'};}
async function noticeLiffMarkRead(noticeId,lineUserId){const r=await window.MP.gasCallPost('noticeLiffMarkRead',{noticeId,lineUserId},15000);return r||{ok:false,error:'GAS無回應'};}
async function sfGetUser(lineUserId){const r=await gasCall('sfGetUser',{lineUserId},10000);return r||{ok:false,error:'GAS無回應'};}
async function sfRegister(data){const r=await window.MP.gasCallPost('sfRegister',data,15000);return r||{ok:false,error:'GAS無回應'};}
async function checkStaffCode(code){const r=await gasCall('checkStaffCode',{code},10000);return r||{ok:false,error:'GAS無回應'};}

const Spinner=({size})=>(<svg className="animate-spin" width={size||14} height={size||14} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeOpacity="0.3"/><path d="M12 2a10 10 0 0110 10" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/></svg>);
// LIFF的access token過期/被撤銷是LINE平台常見的行為(關閉LIFF App當下token就會失效),不是我們程式碼能完全避免的問題,
// 但可以偵測到這種情況時給明確的中文指引,不要讓使用者看到一串看不懂的英文錯誤訊息。
function _fmtLiffErr(err){
  const msg=String((err&&err.message)||err||'');
  if(/access token|token expired|token revoked/i.test(msg)){
    return '登入狀態已過期，請完全關閉LINE App後重新開啟再試一次\n（技術訊息：'+msg+'）';
  }
  return msg;
}

function RegisterFlow({profile,onDone,staticMode}){
  const[lang,setLang]=useState('');
  const[store,setStore]=useState('');
  const[personType,setPersonType]=useState('');
  const[subType,setSubType]=useState('');
  const[name,setName]=useState('');
  const[code,setCode]=useState('');
  const[gender,setGender]=useState('');
  const[shift,setShift]=useState('');
  const[city,setCity]=useState('');const[dist,setDist]=useState('');
  const[busy,setBusy]=useState(false);const[err,setErr]=useState('');
  const[checkBusy,setCheckBusy]=useState(false);const[checkMsg,setCheckMsg]=useState('');
  const langDone=!!lang;
  const step1Done=langDone&&!!store;
  const canSubmit=(()=>{
    if(!step1Done||!personType)return false;
    if(personType==='manager')return subType&&(code.trim()||name.trim())&&gender&&shift&&city&&dist;
    if(personType==='frontdesk'||personType==='student')return code.trim()||name.trim();
    if(personType==='teacher')return code.trim()&&gender&&shift&&city&&dist;
    return false;
  })();
  const doCheck=async()=>{
    if(!code.trim())return;
    setCheckBusy(true);setCheckMsg('');
    try{
      const r=await checkStaffCode(code.trim());
      if(r&&r.ok&&r.found){
        if(r.store)setStore(r.store);
        if(r.gender)setGender(r.gender);
        if(r.shift)setShift(r.shift);
        setCheckMsg('✓ 已自動帶出你的資料，請確認居住地');
      }else{setCheckMsg('查無此編號，請確認輸入正確或手動選擇店別')}
    }catch(_e){setCheckMsg('查詢失敗')}
    setCheckBusy(false);
  };
  const submitData={lineUserId:profile.userId,displayName:profile.displayName,store,personType,subType,name:personType==='teacher'?code.trim():name.trim(),code:personType==='teacher'?'':code.trim(),lang,gender,shift,city,dist};
  const submit=async()=>{
    if(!canSubmit)return;
    setBusy(true);setErr('');
    if(staticMode){
      // 靜態模式:送出後不等GAS回應,GAS會在伺服器端繼續執行完成,就算提前關閉分頁也不影響資料寫入。
      // 短暫轉圈圈純粹是給使用者「有在處理」的感覺。
      sfRegister(submitData).catch(()=>{});
      setTimeout(()=>{onDone()},800);
      return;
    }
    try{
      const r=await sfRegister(submitData);
      if(r&&r.ok){onDone();return}
      setErr((r&&r.error)||'登記失敗');
    }catch(e){setErr(String(e))}
    setBusy(false);
  };
  const tt=lang==='vi'?{appTitle:'Đăng ký',chooseLang:'Chọn ngôn ngữ',chooseStore:'Chọn cửa hàng',choosePersonType:'Chọn loại nhân sự',typeManager:'Quản lý',typeFrontdesk:'Lễ tân',typeTeacher:'Nhân viên kỹ thuật',typeStudent:'Học viên',chooseSubType:'Chọn cấp bậc',customNameLabel:'Tên tùy chỉnh',customNamePh:'Nhập tên (hoặc mã số)',teacherCode:'Mã nhân viên',teacherCodePh:'Mã số',checkBtn:'Kiểm tra',gender:'Giới tính',genderM:'Nam',genderF:'Nữ',shift:'Ca làm',shiftDay:'Ca sáng',shiftNight:'Ca tối',addr:'Khu vực',addrCity:'Tỉnh/Thành',addrDist:'Quận/Huyện',submitBtn:'Hoàn tất',submitting:'Đang xử lý…'}:{appTitle:'人員登記',chooseLang:'選擇語系',chooseStore:'選擇店別',choosePersonType:'選擇人員別',typeManager:'主管',typeFrontdesk:'櫃台',typeTeacher:'老師',typeStudent:'教學處學生',chooseSubType:'選擇主管別',customNameLabel:'自訂名稱',customNamePh:'請輸入自訂名稱(或直接輸入編號)',teacherCode:'老師編號',teacherCodePh:'編號',checkBtn:'檢查',gender:'性別',genderM:'男',genderF:'女',shift:'班別',shiftDay:'早班',shiftNight:'晚班',addr:'居住地區',addrCity:'縣市',addrDist:'鄉鎮市區',submitBtn:'完成登記',submitting:'處理中…'};

  return(<div className="min-h-screen flex items-center justify-center p-4">
    <div className="w-full max-w-md bg-gray-900 rounded-2xl border border-white/[0.08] p-5 space-y-5">
      <div className="text-center"><h1 className="text-lg font-bold text-gray-100">{tt.appTitle}</h1></div>
      <div><label className="text-sm text-gray-400 block mb-2">選擇語系 / {tt.chooseLang}</label><div className="grid grid-cols-2 gap-2"><button onClick={()=>setLang('zh')} className={`py-3 rounded-xl text-sm font-semibold ${lang==='zh'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>中文</button><button onClick={()=>setLang('vi')} className={`py-3 rounded-xl text-sm font-semibold ${lang==='vi'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>Tiếng Việt</button></div></div>
      {langDone&&(<div><label className="text-sm text-gray-400 block mb-2">{tt.chooseStore}</label><div className="grid grid-cols-2 gap-2">{STORES.map(s=>(<button key={s} onClick={()=>setStore(s)} className={`py-3 rounded-xl text-sm font-semibold ${store===s?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{s}</button>))}</div></div>)}
      {step1Done&&(<div><label className="text-sm text-gray-400 block mb-2">{tt.choosePersonType}</label><div className="grid grid-cols-1 gap-2">
        <button onClick={()=>setPersonType('manager')} className={`py-3 rounded-xl text-sm font-semibold ${personType==='manager'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{tt.typeManager}</button>
        <button onClick={()=>setPersonType('frontdesk')} className={`py-3 rounded-xl text-sm font-semibold ${personType==='frontdesk'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{tt.typeFrontdesk}</button>
        <button onClick={()=>setPersonType('teacher')} className={`py-3 rounded-xl text-sm font-semibold ${personType==='teacher'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{tt.typeTeacher}</button>
        {store==='教學處'&&<button onClick={()=>setPersonType('student')} className={`py-3 rounded-xl text-sm font-semibold ${personType==='student'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{tt.typeStudent}</button>}
      </div></div>)}

      {personType==='manager'&&(<div className="space-y-3">
        <div><label className="text-sm text-gray-400 block mb-2">{tt.chooseSubType}</label><div className="grid grid-cols-2 gap-2">{(lang==='vi'?SUBTYPES_VI:SUBTYPES_ZH).map((s,i)=>(<button key={s} onClick={()=>setSubType(SUBTYPES_ZH[i])} className={`py-2.5 rounded-xl text-xs font-semibold ${subType===SUBTYPES_ZH[i]?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{s}</button>))}</div></div>
        <div className="flex gap-2"><input value={code} onChange={e=>setCode(e.target.value.replace(/[^a-zA-Z0-9]/g,''))} placeholder={tt.teacherCodePh} className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100 text-center"/><button onClick={doCheck} disabled={checkBusy||!code.trim()} className="px-4 rounded-xl bg-white/[0.08] text-gray-300 text-sm font-semibold disabled:opacity-50">{checkBusy?<Spinner/>:tt.checkBtn}</button></div>
        {checkMsg&&<p className="text-xs text-amber-400">{checkMsg}</p>}
        <input value={name} onChange={e=>setName(e.target.value)} placeholder={tt.customNamePh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100"/>
        <div className="grid grid-cols-2 gap-2"><button onClick={()=>setGender('M')} className={`py-2.5 rounded-xl text-sm font-semibold ${gender==='M'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{tt.genderM}</button><button onClick={()=>setGender('F')} className={`py-2.5 rounded-xl text-sm font-semibold ${gender==='F'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{tt.genderF}</button></div>
        <div className="grid grid-cols-2 gap-2"><button onClick={()=>setShift('day')} className={`py-2.5 rounded-xl text-sm font-semibold ${shift==='day'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{tt.shiftDay}</button><button onClick={()=>setShift('night')} className={`py-2.5 rounded-xl text-sm font-semibold ${shift==='night'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{tt.shiftNight}</button></div>
        <div className="grid grid-cols-2 gap-2"><select value={city} onChange={e=>{setCity(e.target.value);setDist('')}} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-2 py-3 text-sm text-gray-100"><option value="">{tt.addrCity}</option>{CITY_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}</select><select value={dist} onChange={e=>setDist(e.target.value)} disabled={!city} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-2 py-3 text-sm text-gray-100 disabled:opacity-40"><option value="">{tt.addrDist}</option>{(TW_REGIONS&&TW_REGIONS[city]||[]).map(d=><option key={d} value={d}>{d}</option>)}</select></div>
      </div>)}

      {(personType==='frontdesk'||personType==='student')&&(<div className="space-y-3">
        <div className="flex gap-2"><input value={code} onChange={e=>setCode(e.target.value.replace(/[^a-zA-Z0-9]/g,''))} placeholder={tt.teacherCodePh} className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100 text-center"/></div>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder={tt.customNamePh} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100"/>
      </div>)}

      {personType==='teacher'&&(<div className="space-y-3">
        <div className="flex gap-2"><input value={code} onChange={e=>setCode(e.target.value.replace(/[^a-zA-Z0-9]/g,''))} placeholder={tt.teacherCodePh} className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-xl px-4 py-3 text-sm text-gray-100 text-center tracking-widest"/><button onClick={doCheck} disabled={checkBusy||!code.trim()} className="px-4 rounded-xl bg-white/[0.08] text-gray-300 text-sm font-semibold disabled:opacity-50">{checkBusy?<Spinner/>:tt.checkBtn}</button></div>
        {checkMsg&&<p className="text-xs text-amber-400">{checkMsg}</p>}
        <div className="grid grid-cols-2 gap-2"><button onClick={()=>setGender('M')} className={`py-2.5 rounded-xl text-sm font-semibold ${gender==='M'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{tt.genderM}</button><button onClick={()=>setGender('F')} className={`py-2.5 rounded-xl text-sm font-semibold ${gender==='F'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{tt.genderF}</button></div>
        <div className="grid grid-cols-2 gap-2"><button onClick={()=>setShift('day')} className={`py-2.5 rounded-xl text-sm font-semibold ${shift==='day'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{tt.shiftDay}</button><button onClick={()=>setShift('night')} className={`py-2.5 rounded-xl text-sm font-semibold ${shift==='night'?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{tt.shiftNight}</button></div>
        <div className="grid grid-cols-2 gap-2"><select value={city} onChange={e=>{setCity(e.target.value);setDist('')}} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-2 py-3 text-sm text-gray-100"><option value="">{tt.addrCity}</option>{CITY_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}</select><select value={dist} onChange={e=>setDist(e.target.value)} disabled={!city} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-2 py-3 text-sm text-gray-100 disabled:opacity-40"><option value="">{tt.addrDist}</option>{(TW_REGIONS&&TW_REGIONS[city]||[]).map(d=><option key={d} value={d}>{d}</option>)}</select></div>
      </div>)}

      {err&&<p className="text-xs text-red-400 text-center">{err}</p>}
      {personType&&<button onClick={submit} disabled={!canSubmit||busy} className={`w-full py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 ${canSubmit&&!busy?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-600'}`}>{busy&&<Spinner/>}{busy?tt.submitting:tt.submitBtn}</button>}
    </div>
  </div>);
}

function ReadFlow({nid,profile}){
  const[phase,setPhase]=useState('checking'); // checking/register/done
  useEffect(()=>{
    sfGetUser(profile.userId).then(r=>{
      if(r&&r.ok&&r.exists){
        noticeLiffMarkRead(nid,profile.userId).catch(()=>{}); // 不等回應,GAS會繼續在伺服器端執行完成
        setPhase('done');
      }else{
        setPhase('register');
      }
    }).catch(()=>setPhase('register'));
  },[]);
  const onRegisterDone=()=>{
    noticeLiffMarkRead(nid,profile.userId).catch(()=>{});
    setPhase('done');
  };
  if(phase==='checking')return(<div className="min-h-screen flex flex-col items-center justify-center gap-4"><Spinner size={32}/><p className="text-sm text-gray-500">載入中…</p></div>);
  if(phase==='register')return(<RegisterFlow profile={profile} onDone={onRegisterDone} staticMode={true}/>);
  return(<div className="min-h-screen flex flex-col items-center justify-center gap-3 p-6 text-center">
    <p className="text-2xl">✅</p>
    <p className="text-lg text-gray-100 font-bold">已完成已讀登記</p>
    <p className="text-sm text-gray-400">可關閉此頁面，謝謝</p>
  </div>);
}

function ManagerCreateNotice({code,onClose,onPublished}){
  const[content,setContent]=useState('');
  const[aiResult,setAiResult]=useState(null);
  const[status,setStatus]=useState(''); // ''/analyzing/publishing/done/error
  const[errMsg,setErrMsg]=useState('');
  const runAI=async()=>{
    if(!content.trim())return;
    setStatus('analyzing');setErrMsg('');
    try{
      const r=await gasAnalyzeNotice(content.trim(),code);
      if(r&&r.ok){setAiResult(Object.assign({body:content.trim()},r.result));setStatus('')}
      else{setStatus('error');setErrMsg((r&&r.error)||'AI分析失敗')}
    }catch(e){setStatus('error');setErrMsg(String(e))}
  };
  const upd=(k,v)=>setAiResult(p=>Object.assign({},p,{[k]:v}));
  const publish=async()=>{
    if(!aiResult)return;
    setStatus('publishing');setErrMsg('');
    try{
      const r=await gasAddNoticeLiff({cat:aiResult.cat,subcat:aiResult.subcat,title:aiResult.title,summary:aiResult.summary,body:aiResult.body||content,bodyVi:aiResult.bodyVi,tags:aiResult.tags,titleVi:aiResult.titleVi,summaryVi:aiResult.summaryVi,author:code,code:code});
      if(r&&r.ok){setStatus('done');onPublished()}
      else{setStatus('error');setErrMsg((r&&r.error)||'發布失敗')}
    }catch(e){setStatus('error');setErrMsg(String(e))}
  };
  return(<div className="fixed inset-0 z-50 bg-black/60 flex items-end sm:items-center justify-center" onClick={onClose}>
    <div className="bg-white w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl p-4 space-y-3 max-h-[85vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
      <div className="flex items-center justify-between"><h3 className="text-base font-bold text-gray-900">新增公告</h3><button onClick={onClose} className="text-gray-500">✕</button></div>
      {!aiResult?(<>
        <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="輸入公告內容，AI會自動分類、產生標題摘要並翻成越南文" rows={6} className="w-full bg-gray-100 border border-gray-300 rounded-xl px-3 py-2 text-sm text-gray-900 resize-none"/>
        {status==='error'&&<p className="text-xs text-red-500 text-center">{errMsg}</p>}
        <button onClick={runAI} disabled={!content.trim()||status==='analyzing'} className="w-full py-3 rounded-xl bg-amber-600 text-white text-sm font-bold disabled:opacity-50 flex items-center justify-center gap-2">{status==='analyzing'&&<Spinner size={14}/>}{status==='analyzing'?'AI 分析中…':'AI 分析'}</button>
      </>):status==='done'?(
        <p className="text-sm text-emerald-600 text-center py-6">✓ 已發布</p>
      ):(<>
        <div><label className="text-[11px] text-gray-500 block mb-1">主分類</label><input value={aiResult.cat||''} onChange={e=>upd('cat',e.target.value)} className="w-full bg-gray-100 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900"/></div>
        <div><label className="text-[11px] text-gray-500 block mb-1">子分類</label><input value={aiResult.subcat||''} onChange={e=>upd('subcat',e.target.value)} className="w-full bg-gray-100 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900"/></div>
        <div><label className="text-[11px] text-gray-500 block mb-1">標題</label><input value={aiResult.title||''} onChange={e=>upd('title',e.target.value)} className="w-full bg-gray-100 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900"/></div>
        <div><label className="text-[11px] text-gray-500 block mb-1">摘要</label><input value={aiResult.summary||''} onChange={e=>upd('summary',e.target.value)} className="w-full bg-gray-100 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900"/></div>
        <div><label className="text-[11px] text-gray-500 block mb-1">內容</label><textarea value={aiResult.body||''} onChange={e=>upd('body',e.target.value)} rows={4} className="w-full bg-gray-100 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 resize-none"/></div>
        {status==='error'&&<p className="text-xs text-red-500 text-center">{errMsg}</p>}
        <div className="flex gap-2"><button onClick={()=>setAiResult(null)} className="flex-1 py-2.5 rounded-xl bg-gray-100 text-gray-600 text-sm font-semibold">重新輸入</button><button onClick={publish} disabled={status==='publishing'} className="flex-1 py-2.5 rounded-xl bg-amber-600 text-white text-sm font-bold disabled:opacity-50 flex items-center justify-center gap-2">{status==='publishing'&&<Spinner size={12}/>}發布</button></div>
      </>)}
    </div>
  </div>);
}

function ManagerNoticeList({userProfile}){
  const[list,setList]=useState(null);
  const[viewing,setViewing]=useState(null);
  const[showCreate,setShowCreate]=useState(false);
  const[shareBusy,setShareBusy]=useState('');
  const lang=userProfile.lang||'zh';
  const t=(T&&T[lang])||{};
  const code=userProfile.code||userProfile.name||'';
  const load=()=>{fetch('../notices.json?t='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(data=>{
    const arr=Array.isArray(data)?data:(data&&data.notices)||[];
    arr.sort((a,b)=>String(b.id).localeCompare(String(a.id))); // 倒序:最新的公告排最前面
    setList(arr);
  }).catch(()=>setList([]))};
  useEffect(()=>{load()},[]);
  const doShare=async(n,ev)=>{
    ev.stopPropagation();
    if(shareBusy)return;
    setShareBusy(n.id);
    try{
      const r=await getNoticeFlexContent(n.id,LIFF_ID_HARDCODED);
      if(r&&r.ok&&liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker')){
        await liff.shareTargetPicker([{type:'flex',altText:r.title,contents:r.flex}]);
      }
    }catch(_e){}
    setShareBusy('');
  };
  if(viewing)return(<window.NoticeDetailModal notice={viewing} settings={{code,lang}} t={t} onClose={()=>setViewing(null)} onMore={()=>{}}/>);
  return(<div className="min-h-screen p-4">
    <div className="max-w-md mx-auto space-y-3">
      <div className="flex items-center justify-between"><h1 className="text-base font-bold text-gray-900">公告列表</h1><button onClick={()=>setShowCreate(true)} className="text-xs px-3 py-2 rounded-lg bg-amber-600 text-white font-semibold">新增公告</button></div>
      {list===null?<p className="text-center py-8"><Spinner size={20}/></p>:list.length===0?<p className="text-sm text-gray-500 text-center py-8">目前沒有公告</p>:list.map(n=>(
        <div key={n.id} className="bg-white border border-gray-200 rounded-xl px-3 py-2.5">
          <div onClick={()=>setViewing(n)} className="cursor-pointer active:bg-gray-50"><p className="text-sm text-gray-900 font-medium truncate">{n.title}</p><p className="text-[11px] text-gray-500 mt-0.5">{n.id}・{n.cat}{n.subcat?('・'+n.subcat):''}</p></div>
          <button onClick={(ev)=>doShare(n,ev)} disabled={shareBusy===n.id} className="mt-2 w-full py-2 rounded-lg bg-[#06C755] text-white text-xs font-semibold disabled:opacity-50 flex items-center justify-center gap-1.5">
            {shareBusy===n.id?<Spinner size={11}/>:<svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.5 2 2 5.6 2 10c0 3.9 3.6 7.2 8.4 7.9.3.1.8.2.9.5.1.3.1.7 0 1l-.1.9c0 .3-.2 1.1 1 .6 1.1-.5 6.2-3.7 8.5-6.3C22.1 12.6 22 11.3 22 10c0-4.4-4.5-8-10-8z"/></svg>}
            分享到LINE
          </button>
        </div>
      ))}
    </div>
    {showCreate&&<ManagerCreateNotice code={code} onClose={()=>setShowCreate(false)} onPublished={()=>{load()}}/>}
  </div>);
}

async function copyText(text){
  try{await navigator.clipboard.writeText(text);return true}catch(_e){
    try{
      const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);
      return true;
    }catch(_e2){return false}
  }
}
function CopyBtn({getText}){
  const[copied,setCopied]=useState(false);
  const doCopy=async()=>{const ok=await copyText(getText());if(ok){setCopied(true);setTimeout(()=>setCopied(false),2000)}};
  return(<button onClick={doCopy} className="text-[11px] px-2.5 py-1 rounded-lg bg-gray-100 text-gray-600 font-semibold flex-shrink-0">{copied?'✓ 已複製':'複製名單'}</button>);
}
function UnreadListView({nid}){
  const[unreadData,setUnreadData]=useState(null);
  const[readData,setReadData]=useState(null);
  useEffect(()=>{
    gasNoticeUnread(nid).then(r=>{if(r&&r.ok)setUnreadData(r);else setUnreadData({error:(r&&r.error)||'查詢失敗'})});
    gasNoticeReads(nid).then(r=>{if(r&&r.ok)setReadData(r);else setReadData({error:(r&&r.error)||'查詢失敗'})});
  },[nid]);
  const unreadText=()=>{
    if(!unreadData||unreadData.error)return '';
    const parts=[];
    if(unreadData.day.length)parts.push('早班：'+unreadData.day.join('、'));
    if(unreadData.night.length)parts.push('晚班：'+unreadData.night.join('、'));
    if(unreadData.other.length)parts.push('其他：'+unreadData.other.join('、'));
    return nid+' 未閱讀人員\n'+parts.join('\n');
  };
  const readText=()=>{
    if(!readData||readData.error||!readData.readers)return '';
    return nid+' 已閱讀人員（共'+readData.readers.length+'人）\n'+readData.readers.map(r=>r.code).join('、');
  };
  return(<div className="min-h-screen p-4">
    <div className="max-w-md mx-auto space-y-4">
      <h1 className="text-base font-bold text-gray-900">公告閱讀狀況（{nid}）</h1>
      <div className="bg-white border border-gray-200 rounded-xl p-3 space-y-2">
        <div className="flex items-center justify-between"><p className="text-sm font-semibold text-gray-800">已閱讀名單</p>{readData&&!readData.error&&readData.readers&&readData.readers.length>0&&<CopyBtn getText={readText}/>}</div>
        {readData===null?<Spinner size={16}/>:readData.error?(
          <p className="text-sm text-red-500">{readData.error}</p>
        ):readData.readers.length===0?(
          <p className="text-sm text-gray-500">目前還沒有人閱讀</p>
        ):(
          <div className="flex flex-wrap gap-1.5">{readData.readers.map(r=>(<span key={r.code} className="text-xs px-2 py-1 rounded-lg bg-emerald-50 text-emerald-700">{r.code}</span>))}</div>
        )}
      </div>
      <div className="bg-white border border-gray-200 rounded-xl p-3 space-y-2">
        <div className="flex items-center justify-between"><p className="text-sm font-semibold text-gray-800">未閱讀名單</p>{unreadData&&!unreadData.error&&unreadData.total>0&&<CopyBtn getText={unreadText}/>}</div>
        {unreadData===null?<Spinner size={16}/>:unreadData.error?(
          <p className="text-sm text-red-500">{unreadData.error}</p>
        ):(<>
          <p className="text-xs text-gray-500">共 {unreadData.total} 人尚未閱讀</p>
          {unreadData.day.length>0&&<div><p className="text-xs text-gray-500 mb-1">早班</p><div className="flex flex-wrap gap-1.5">{unreadData.day.map(c=>(<span key={c} className="text-xs px-2 py-1 rounded-lg bg-gray-100 text-gray-700">{c}</span>))}</div></div>}
          {unreadData.night.length>0&&<div><p className="text-xs text-gray-500 mb-1">晚班</p><div className="flex flex-wrap gap-1.5">{unreadData.night.map(c=>(<span key={c} className="text-xs px-2 py-1 rounded-lg bg-gray-100 text-gray-700">{c}</span>))}</div></div>}
          {unreadData.other.length>0&&<div><p className="text-xs text-gray-500 mb-1">其他</p><div className="flex flex-wrap gap-1.5">{unreadData.other.map(c=>(<span key={c} className="text-xs px-2 py-1 rounded-lg bg-gray-100 text-gray-700">{c}</span>))}</div></div>}
          {unreadData.total===0&&<p className="text-sm text-emerald-600 text-center py-2">✓ 全部人都已經閱讀了</p>}
        </>)}
      </div>
    </div>
  </div>);
}

function NoticeView({nid,userProfile}){
  const[notice,setNotice]=useState(undefined);
  useEffect(()=>{
    if(!nid){setNotice(null);return}
    fetch('../notices.json?t='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(data=>{
      const list=Array.isArray(data)?data:(data&&data.notices)||[];
      const found=list.find(n=>String(n.id)===String(nid));
      setNotice(found||null);
    }).catch(()=>setNotice(null));
  },[]);
  const lang=userProfile.lang||'zh';
  const t=(T&&T[lang])||{};
  const code=userProfile.personType==='teacher'?userProfile.name:(userProfile.code||userProfile.name||'');
  const settingsObj={code:code,lang:lang};
  useEffect(()=>{
    // 這個LIFF頁面已經走過LINE登入確認身分,notice-modal.js的本機PIN鎖(設計給主系統那種免登入情境用的)在這裡是多餘的關卡。
    // 預先在本機localStorage寫入「已設定+已通過」的狀態,直接跳過那道關卡,不用修改notice-modal.js本身(主系統那邊的PIN鎖不受影響)。
    if(!code)return;
    try{
      const s=(window.MP&&window.MP.LS&&window.MP.LS.get('app-settings'))||{};
      window.MP.LS.set('app-settings',Object.assign({},s,{code:code,lockPwd:'0000',lockAutoTime:99999999}));
      localStorage.setItem('notice-pwd-unlock-'+code,String(Date.now()));
    }catch(_e){}
  },[code]);
  if(!nid&&userProfile.personType==='manager')return(<ManagerNoticeList userProfile={userProfile}/>);
  const isManagerWithNid=nid&&userProfile.personType==='manager';
  const backToList=()=>{location.href=location.href.split('?')[0]};
  if(notice===undefined)return(<div className="min-h-screen flex flex-col items-center justify-center gap-4"><Spinner size={32}/><p className="text-sm text-gray-500">載入中…</p></div>);
  if(!notice)return(<div className="min-h-screen flex items-center justify-center p-6"><p className="text-sm text-gray-500 text-center">找不到這則公告，可能已經下架或連結有誤</p></div>);
  return(<div className="relative min-h-screen">
    {isManagerWithNid&&<button onClick={backToList} className="fixed top-3 right-3 z-[60] text-xs px-3 py-1.5 rounded-full bg-gray-900/80 text-white font-semibold">← 回列表</button>}
    {window.NoticeDetailModal&&<window.NoticeDetailModal notice={notice} settings={settingsObj} t={t} onClose={()=>{try{liff.closeWindow()}catch(_e){}}} onMore={()=>{}}/>}
  </div>);
}

function ShareFlow({nid}){
  const[status,setStatus]=useState('loading');
  const[err,setErr]=useState('');
  useEffect(()=>{
    getNoticeFlexContent(nid,LIFF_ID_HARDCODED).then(r=>{
      if(!r||!r.ok){setStatus('error');setErr((r&&r.error)||'讀取失敗');return}
      setStatus('picking');
      if(!(liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker'))){setStatus('error');setErr('此環境不支援分享功能，請在LINE App內開啟');return}
      liff.shareTargetPicker([{type:'flex',altText:r.title,contents:r.flex}]).then(res=>{setStatus(res?'done':'cancelled')}).catch(e=>{setStatus('error');setErr(String(e&&e.message||e))});
    }).catch(e=>{setStatus('error');setErr(String(e))});
  },[]);
  return(<div className="min-h-screen flex flex-col items-center justify-center gap-4 p-6 text-center">
    {status==='loading'&&(<><Spinner size={32}/><p className="text-sm text-gray-400">準備分享內容…</p></>)}
    {status==='picking'&&(<><Spinner size={32}/><p className="text-sm text-gray-400">請選擇要分享的對象…</p></>)}
    {status==='done'&&(<p className="text-base text-emerald-500 font-semibold">✓ 已分享</p>)}
    {status==='cancelled'&&(<p className="text-sm text-gray-500">已取消分享</p>)}
    {status==='error'&&(<p className="text-sm text-red-400">{err}</p>)}
    {(status==='done'||status==='cancelled'||status==='error')&&<button onClick={()=>{try{liff.closeWindow()}catch(_e){location.href=location.href.split('?')[0]}}} className="px-6 py-3 rounded-xl bg-white/[0.06] text-gray-300 text-sm font-semibold">關閉</button>}
  </div>);
}

function App(){
  const[phase,setPhase]=useState('liffInit');
  const[profile,setProfile]=useState(null);
  const[userProfile,setUserProfile]=useState(null);
  const[liffErr,setLiffErr]=useState('');
  const nid=new URLSearchParams(location.search).get('nid')||'';
  const action=new URLSearchParams(location.search).get('action')||'';

  useEffect(()=>{
    const initLiff=(id)=>liff.init({liffId:id}).then(()=>{
      if(!liff.isLoggedIn()){liff.login({redirectUri:location.href});return}
      if(action==='share'){setPhase('share');return}
      if(action==='unread'){setPhase('unread');return}
      if(action==='read'){
        return liff.getProfile().then(p=>{setProfile(p);setPhase('read')});
      }
      return liff.getProfile().then(p=>{
        setProfile(p);setPhase('loading');
        return sfGetUser(p.userId).then(r=>{
          if(r&&r.ok&&r.exists){setUserProfile(r.profile);setPhase('main')}
          else{setPhase('register')}
        });
      });
    });
    if(LIFF_ID_HARDCODED){initLiff(LIFF_ID_HARDCODED).catch(err=>{setLiffErr(_fmtLiffErr(err));setPhase('error')});return;}
    sfConfig().then(cfg=>{
      const id=cfg&&cfg.ok?cfg.liffId:'';
      if(!id){setLiffErr('尚未設定LIFF_ID');setPhase('error');return}
      return initLiff(id);
    }).catch(err=>{setLiffErr(_fmtLiffErr(err));setPhase('error')});
  },[]);

  if(phase==='error')return(<div className="min-h-screen flex items-center justify-center p-6"><p className="text-sm text-red-400 text-center">{liffErr}</p></div>);
  if(phase==='liffInit'||phase==='loading')return(<div className="min-h-screen flex flex-col items-center justify-center gap-4"><div className="text-amber-500"><Spinner size={40}/></div><p className="text-base text-gray-400">載入中…</p></div>);
  if(phase==='share')return(<ShareFlow nid={nid}/>);
  if(phase==='unread')return(<UnreadListView nid={nid}/>);
  if(phase==='read')return(<ReadFlow nid={nid} profile={profile}/>);
  if(phase==='register')return(<RegisterFlow profile={profile} onDone={()=>{sfGetUser(profile.userId).then(r=>{if(r&&r.ok&&r.exists){setUserProfile(r.profile);setPhase('main')}})}}/>);
  return(<NoticeView nid={nid} userProfile={userProfile}/>);
}

class __EB extends React.Component{constructor(p){super(p);this.state={e:false}}static getDerivedStateFromError(){return{e:true}}componentDidCatch(err){try{window.__showFallback(3,{lineno:0,msg:(err&&err.message)||String(err)})}catch(e){}}render(){return this.state.e?null:this.props.children}}
ReactDOM.createRoot(document.getElementById('root')).render(<__EB><App/></__EB>);
})();
</script>
