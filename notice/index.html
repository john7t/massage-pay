<script>
  var PAGE="notice-liff",PCODE="03";
  window.__fbLang='zh';
  window.__fbApply=function(){var t=document.getElementById('__fbtitle');if(t)t.textContent='網站更新中';if(window.__fbData){var info=document.getElementById("__fbinfo");if(info)info.textContent=window.__fbData.page+" 網頁 v"+window.__fbData.ver+" 更新中　代碼 "+window.__fbData.code;try{var md=document.getElementById("__fbmsg");if(md&&window.__fbData.msg){md.textContent=window.__fbData.msg;md.style.display="block";}}catch(_e){}}};
  window.__showFallback=function(src,detail){
    if(window.__shownFallback)return;window.__shownFallback=true;
    try{
      var ver=(document.title.match(/v?(\d+\.\d+[-.]\d+)/)||[])[1]||"?";
      var line=(detail&&detail.lineno)?detail.lineno:0;
      var ecode=PCODE+String(src).padStart(2,"0")+String(line%10000).padStart(4,"0");
      window.__fbData={page:PAGE,ver:ver,code:ecode,msg:(detail&&detail.msg)||''};
      var el=document.getElementById("__fallback");
      if(el){window.__fbApply();el.style.display="flex";}
    }catch(_e){}
  };
  window.addEventListener("error",function(e){window.__showFallback(1,{lineno:e.lineno,msg:(e.message||'')+(e.filename?(' @'+e.filename.split('/').pop()+':'+e.lineno+':'+e.colno):'')});},true);
</script>

    setShareStatus('sharing');
    try{
      if(!(liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker'))){setShareStatus('error');return}
      const uri='https://john7t.github.io/massage-pay/auth.html#req='+reqId;
      const res=await liff.shareTargetPicker([{type:'flex',altText:'審核通知',contents:{
        type:'bubble',
        body:{type:'box',layout:'vertical',backgroundColor:'#FFFFFF',paddingAll:'lg',contents:[
          {type:'text',text:'📝 人員登記審核通知',weight:'bold',size:'md',color:'#111111'},
          {type:'text',text:'請主管協助審核此筆登記申請',size:'sm',color:'#666666',wrap:true,margin:'md'},
          {type:'text',text:'審核代碼：'+reqId,size:'xs',color:'#999999',margin:'md'}

          {type:'button',style:'primary',color:'#d97706',height:'sm',action:{type:'uri',label:'前往審核',uri:uri}}
        ]}
      }}]);
      setShareStatus(res?'done':'cancelled');

  };
  const doCheck=async()=>{
    setCheckStatus('checking');
    try{const r=await sfCheckPendingStatus(reqId);if(r&&r.ok)setCheckStatus(r.status);else setCheckStatus('')}catch(_e){setCheckStatus('')}

  if(checkStatus==='approved')return(<div className="min-h-screen flex flex-col items-center justify-center gap-4 p-6 text-center animate-fade-in"><div className="w-16 h-16 rounded-full bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 flex items-center justify-center text-3xl mb-2 shadow-lg shadow-emerald-500/20">✓</div><p className="text-xl text-white font-bold">已核准申請！</p><button onClick={onApproved} className="px-8 py-3.5 rounded-xl bg-amber-500 hover:bg-amber-600 text-black font-extrabold text-sm btn-glow">開始使用</button></div>);

      <button onClick={doShare} disabled={shareStatus==='sharing'} className="w-full py-3.5 rounded-xl bg-[#06C755] hover:bg-[#05b34c] text-white text-sm font-bold disabled:opacity-50 flex items-center justify-center gap-2 shadow-lg shadow-[#06C755]/20 active:scale-98 transition-all">{shareStatus==='sharing'?<Spinner size={16}/>:<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.5 2 2 5.6 2 10c0 3.9 3.6 7.2 8.4 7.9.3.1.8.2.9.5.1.3.1.7 0 1l-.1.9c0 .3-.2 1.1 1 .6 1.1-.5 6.2-3.7 8.5-6.3C22.1 12.6 22 11.3 22 10c0-4.4-4.5-8-10-8z"/></svg>}分享給主管審核</button>

function RegisterFlow({profile,onDone,staticMode}){
  const[lang,setLang]=useState('');
  const[store,setStore]=useState('');
  const[personType,setPersonType]=useState('');
  const[subType,setSubType]=useState('');
  const[name,setName]=useState('');
  const[code,setCode]=useState('');
  const[gender,setGender]=useState('');
  const[shift,setShift]=useState('');
  const[city,setCity]=useState('');const[dist,setDist]=useState('');
  const[busy,setBusy]=useState(false);const[err,setErr]=useState('');
  const[checkBusy,setCheckBusy]=useState(false);const[checkMsg,setCheckMsg]=useState('');const[checkFound,setCheckFound]=useState(null);
  const[pendingReqId,setPendingReqId]=useState('');
  const[pwdMode,setPwdMode]=useState(''); 
  const[pwdInput,setPwdInput]=useState('');const[pwdInput2,setPwdInput2]=useState('');const[pwdErr,setPwdErr]=useState('');const[pwdBusy,setPwdBusy]=useState(false);
  const[pwdVerified,setPwdVerified]=useState(false);const[finalPwd,setFinalPwd]=useState('');
  const[activeField,setActiveField]=useState(''); 
  const toggleField=(f)=>setActiveField(a=>a===f?'':f);
  const langDone=!!lang;
  const step1Done=langDone&&!!store;
  const canSubmit=(()=>{
    if(!step1Done||!personType)return false;
    if(personType==='manager')return subType&&(code.trim()||name.trim())&&gender&&shift&&city&&dist;
    if(personType==='frontdesk'||personType==='student')return code.trim()||name.trim();
    if(personType==='teacher')return code.trim()&&gender&&shift&&city&&dist&&pwdVerified;
    return false;
  })();
  const doCheck=async()=>{
    if(!code.trim())return;
    setCheckBusy(true);setCheckMsg('');setCheckFound(null);setPwdVerified(false);setPwdInput('');setPwdInput2('');setPwdErr('');setActiveField('');
    try{
      const r=await checkStaffCode(code.trim());
      if(r&&r.ok&&r.found){
        if(r.store)setStore(r.store);
        if(r.gender)setGender(r.gender);
        if(r.shift)setShift(r.shift);
        setCheckFound(true);
        if(r.hasLockPwd){setPwdMode('verify');setCheckMsg('✓ 已自動帶出資料，請輸入原本設定的密碼')}
        else{setPwdMode('setup');setCheckMsg('✓ 已自動帶出資料，請設定 4 位數密碼')}
      }else{setCheckFound(false);setPwdMode('setup');setCheckMsg('查無此編號，填寫後將送交主管審核')}
    }catch(_e){setCheckMsg('查詢失敗')}
    setCheckBusy(false);
  };
  const doPwdVerify=async()=>{
    if(pwdInput.length!==4)return;
    setPwdBusy(true);setPwdErr('');
    try{
      const r=await gasLoginPwd(code.trim(),lockPwdCred(code.trim(),pwdInput));
      if(r&&r.ok){setPwdVerified(true);setFinalPwd(pwdInput)}else{setPwdErr('密碼錯誤');setPwdInput('')}
    }catch(e){setPwdErr(String(e))}
    setPwdBusy(false);
  };
  const pwd1Digit=(d)=>{if(pwdInput.length>=4)return;setPwdInput(pwdInput+d);setPwdErr('')};
  const pwd1Backspace=()=>setPwdInput(v=>v.slice(0,-1));
  const pwd1Clear=()=>setPwdInput('');
  const pwd2Digit=(d)=>{if(pwdInput2.length>=4)return;setPwdInput2(pwdInput2+d);setPwdErr('')};
  const pwd2Backspace=()=>setPwdInput2(v=>v.slice(0,-1));
  const pwd2Clear=()=>setPwdInput2('');
  const pwd1Ok=isValidPin(pwdInput);
  const confirmPwdSetup=()=>{
    if(!pwd1Ok){setPwdErr('密碼不可 4 碼相同或連續遞增/遞減');return}
    if(pwdInput!==pwdInput2){setPwdErr('兩次輸入的密碼不一致');return}
    setPwdVerified(true);setFinalPwd(pwdInput);setPwdErr('');
  };
  const submitData={lineUserId:profile.userId,displayName:profile.displayName,store,personType,subType,name:personType==='teacher'?code.trim():name.trim(),code:personType==='teacher'?'':code.trim(),lang,gender,shift,city,dist};
  const submit=async()=>{
    if(!canSubmit)return;
    setBusy(true);setErr('');
    if(personType==='teacher'&&checkFound===false){
      try{
        const r=await sfRegisterRequest({...submitData,pwdCred:lockPwdCred(code.trim(),finalPwd)});
        if(r&&r.ok){setPendingReqId(r.reqId);setBusy(false);return}
        setErr((r&&r.error)||'送出失敗');
      }catch(e){setErr(String(e))}
      setBusy(false);return;
    }
    if(staticMode){
      sfRegister(submitData).catch(()=>{});
      if(personType==='teacher'&&checkFound===true&&pwdMode==='setup'){gasSetInitialPwd(code.trim(),lockPwdCred(code.trim(),finalPwd)).catch(()=>{})}
      setTimeout(()=>{onDone()},800);
      return;
    }
    try{
      const r=await sfRegister(submitData);
      if(r&&r.ok){
        if(personType==='teacher'&&checkFound===true&&pwdMode==='setup'){
          try{await gasSetInitialPwd(code.trim(),lockPwdCred(code.trim(),finalPwd))}catch(_e){}
        }
        onDone();return;
      }
      setErr((r&&r.error)||'登記失敗');
    }catch(e){setErr(String(e))}

function ReadFlow({nid,profile}){
  const[phase,setPhase]=useState('checking');
  useEffect(()=>{
    sfGetUser(profile.userId).then(r=>{
      if(r&&r.ok&&r.exists){
        noticeLiffMarkRead(nid,profile.userId).catch(()=>{});
        setPhase('done');
      }else{
        setPhase('register');
      }
    }).catch(()=>setPhase('register'));
  },[]);
  const onRegisterDone=()=>{
    noticeLiffMarkRead(nid,profile.userId).catch(()=>{});
    setPhase('done');
  };
  if(phase==='checking')return(<div className="min-h-screen flex flex-col items-center justify-center gap-4"><Spinner size={36}/><p className="text-sm text-gray-400">驗證身分中…</p></div>);
  if(phase==='register')return(<RegisterFlow profile={profile} onDone={onRegisterDone} staticMode={true}/>);
  return(<div className="min-h-screen flex flex-col items-center justify-center gap-4 p-6 text-center animate-fade-in">
    <div className="w-20 h-20 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 flex items-center justify-center text-3xl shadow-xl shadow-emerald-500/10">✅</div>
    <p className="text-xl text-white font-bold">已完成已讀登記</p>
    <p className="text-xs text-gray-400">您可以直接關閉此頁面，謝謝</p>
  </div>);
}

function ManagerCreateNotice({code,onClose,onPublished}){
  const[content,setContent]=useState('');
  const[aiResult,setAiResult]=useState(null);
  const[status,setStatus]=useState('');
  const[errMsg,setErrMsg]=useState('');
  const runAI=async()=>{
    if(!content.trim())return;
    setStatus('analyzing');setErrMsg('');
    try{
      const r=await gasAnalyzeNotice(content.trim(),code);
      if(r&&r.ok){setAiResult(Object.assign({body:content.trim()},r.result));setStatus('')}
      else{setStatus('error');setErrMsg((r&&r.error)||'AI 分析失敗')}
    }catch(e){setStatus('error');setErrMsg(String(e))}
  };
  const upd=(k,v)=>setAiResult(p=>Object.assign({},p,{[k]:v}));
  const publish=async()=>{
    if(!aiResult)return;
    setStatus('publishing');setErrMsg('');
    try{
      const r=await gasAddNoticeLiff({cat:aiResult.cat,subcat:aiResult.subcat,title:aiResult.title,summary:aiResult.summary,body:aiResult.body||content,bodyVi:aiResult.bodyVi,tags:aiResult.tags,titleVi:aiResult.titleVi,summaryVi:aiResult.summaryVi,author:code,code:code});
      if(r&&r.ok){setStatus('done');onPublished()}
      else{setStatus('error');setErrMsg((r&&r.error)||'發布失敗')}
    }catch(e){setStatus('error');setErrMsg(String(e))}
  };
  return(<div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-md flex items-end sm:items-center justify-center animate-fade-in" onClick={onClose}>
    <div className="glass-panel w-full sm:max-w-md sm:rounded-3xl rounded-t-3xl p-6 space-y-4 max-h-[88vh] overflow-y-auto border-t border-white/20" onClick={e=>e.stopPropagation()}>
      <div className="flex items-center justify-between pb-2 border-b border-white/10"><h3 className="text-lg font-bold text-white">新增公告</h3><button onClick={onClose} className="w-8 h-8 rounded-full bg-white/10 text-gray-400 hover:text-white flex items-center justify-center">✕</button></div>
      {!aiResult?(<>
        <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="輸入公告內容，AI 將會自動生成分類、摘要與越南文翻譯…" rows={6} className="w-full glass-input rounded-2xl p-4 text-sm text-white resize-none"/>
        {status==='error'&&<p className="text-xs text-red-400 text-center">{errMsg}</p>}
        <button onClick={runAI} disabled={!content.trim()||status==='analyzing'} className="w-full py-3.5 rounded-2xl bg-amber-500 hover:bg-amber-600 text-black text-sm font-bold disabled:opacity-40 flex items-center justify-center gap-2 btn-glow transition-all">{status==='analyzing'&&<Spinner size={16}/>}{status==='analyzing'?'AI 分析處理中…':'✨ AI 自動分析並整理'}</button>
      </>):status==='done'?(
        <p className="text-sm text-emerald-400 font-semibold text-center py-8">✓ 公告已成功發布</p>
      ):(<>
        <div><label className="text-[11px] text-gray-400 font-semibold block mb-1">主分類</label><input value={aiResult.cat||''} onChange={e=>upd('cat',e.target.value)} className="w-full glass-input rounded-xl px-3 py-2 text-sm text-white"/></div>
        <div><label className="text-[11px] text-gray-400 font-semibold block mb-1">子分類</label><input value={aiResult.subcat||''} onChange={e=>upd('subcat',e.target.value)} className="w-full glass-input rounded-xl px-3 py-2 text-sm text-white"/></div>
        <div><label className="text-[11px] text-gray-400 font-semibold block mb-1">標題</label><input value={aiResult.title||''} onChange={e=>upd('title',e.target.value)} className="w-full glass-input rounded-xl px-3 py-2 text-sm text-white"/></div>
        <div><label className="text-[11px] text-gray-400 font-semibold block mb-1">摘要</label><input value={aiResult.summary||''} onChange={e=>upd('summary',e.target.value)} className="w-full glass-input rounded-xl px-3 py-2 text-sm text-white"/></div>
        <div><label className="text-[11px] text-gray-400 font-semibold block mb-1">內容</label><textarea value={aiResult.body||''} onChange={e=>upd('body',e.target.value)} rows={4} className="w-full glass-input rounded-xl p-3 text-sm text-white resize-none"/></div>
        {status==='error'&&<p className="text-xs text-red-400 text-center">{errMsg}</p>}
        <div className="flex gap-3 pt-2"><button onClick={()=>setAiResult(null)} className="flex-1 py-3 rounded-xl glass-panel text-gray-300 text-sm font-semibold active:scale-95 transition-all">重新輸入</button><button onClick={publish} disabled={status==='publishing'} className="flex-1 py-3 rounded-xl bg-amber-500 hover:bg-amber-600 text-black text-sm font-extrabold disabled:opacity-40 flex items-center justify-center gap-2 btn-glow transition-all">{status==='publishing'&&<Spinner size={14}/>}確認發布</button></div>
      </>)}
    </div>
  </div>);
}

function ManagerNoticeDetail({notice,code,onClose,onChanged}){
  const[readInfo,setReadInfo]=useState(null);const[readBusy,setReadBusy]=useState(false);
  const[unreadInfo,setUnreadInfo]=useState(null);const[unreadBusy,setUnreadBusy]=useState(false);
  const[shareBusy,setShareBusy]=useState(false);
  const[toggleBusy,setToggleBusy]=useState(false);
  const[status,setStatus]=useState(notice.status||'');
  const[editing,setEditing]=useState(false);
  const[form,setForm]=useState({cat:notice.cat||'',subcat:notice.subcat||'',title:notice.title||'',summary:notice.summary||'',body:notice.body||'',tags:notice.tags||''});
  const[saveStatus,setSaveStatus]=useState('');
  const checkRead=async()=>{setReadBusy(true);try{const r=await gasNoticeReads(notice.id);if(r&&r.ok)setReadInfo(r)}catch(_e){}setReadBusy(false)};
  const checkUnread=async()=>{setUnreadBusy(true);try{const r=await gasNoticeUnread(notice.id);if(r&&r.ok)setUnreadInfo(r)}catch(_e){}setUnreadBusy(false)};
  const header=()=>'公告編號：'+notice.id+'\n公告摘要：'+(notice.summary||notice.title||'');
  const doShare=async()=>{
    if(shareBusy)return;
    setShareBusy(true);
    try{
      const r=await getNoticeFlexContent(notice.id,LIFF_ID_HARDCODED);
      if(r&&r.ok&&liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker')){
        await liff.shareTargetPicker([{type:'flex',altText:r.title,contents:r.flex}]);
      }
    }catch(_e){}
    setShareBusy(false);
  };
  const doToggle=async()=>{
    setToggleBusy(true);
    try{const r=await gasToggleNoticeStatus(notice.id,code);if(r&&r.ok){setStatus(r.status);onChanged&&onChanged()}}catch(_e){}
    setToggleBusy(false);
  };
  const doSave=async()=>{
    setSaveStatus('saving');
    try{
      const r=await gasEditNoticeLiff({id:notice.id,cat:form.cat,subcat:form.subcat,title:form.title,summary:form.summary,body:form.body,tags:form.tags});
      if(r&&r.ok){setSaveStatus('已修改');setEditing(false);onChanged&&onChanged()}else{setSaveStatus((r&&r.error)||'修改失敗')}
    }catch(e){setSaveStatus(String(e))}

function UnreadListView({nid}){
  const[unreadData,setUnreadData]=useState(null);
  const[readData,setReadData]=useState(null);
  const[summary,setSummary]=useState('');
  useEffect(()=>{
    gasNoticeUnread(nid).then(r=>{if(r&&r.ok)setUnreadData(r);else setUnreadData({error:(r&&r.error)||'查詢失敗'})});
    gasNoticeReads(nid).then(r=>{if(r&&r.ok)setReadData(r);else setReadData({error:(r&&r.error)||'查詢失敗'})});
    fetch('../notices.json?t='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(data=>{
      const list=Array.isArray(data)?data:(data&&data.notices)||[];
      const found=list.find(n=>String(n.id)===String(nid));
      if(found)setSummary(found.summary||found.title||'');
    }).catch(()=>{});
  },[nid]);
  const header=()=>'公告編號：'+nid+'\n摘要：'+summary;
  const unreadText=()=>{
    if(!unreadData||unreadData.error)return '';
    const parts=[];
    if(unreadData.day.length)parts.push('早班：'+unreadData.day.join('、'));
    if(unreadData.night.length)parts.push('晚班：'+unreadData.night.join('、'));
    if(unreadData.other.length)parts.push('未選班別：'+unreadData.other.join('、'));
    return header()+'\n未閱讀人員\n'+parts.join('\n');
  };
  const readText=()=>{
    if(!readData||readData.error||!readData.readers)return '';
    return header()+'\n已閱讀人員（共'+readData.readers.length+'人）\n'+readData.readers.map(r=>r.code).join('、');
  };
  return(<div className="min-h-screen p-4 animate-fade-in">
    <div className="max-w-md mx-auto space-y-4">
      <div className="glass-panel rounded-2xl p-4 text-center"><h1 className="text-base font-bold text-white">公告閱讀狀態分析（{nid}）</h1></div>
      
      <div className="glass-panel rounded-2xl p-4 space-y-3">
        <div className="flex items-center justify-between"><p className="text-xs font-bold text-emerald-400">✓ 已閱讀名單</p>{readData&&!readData.error&&readData.readers&&readData.readers.length>0&&<div className="flex gap-2"><CopyBtn getText={readText}/><ShareLineBtn getText={readText}/></div>}</div>
        {readData===null?<Spinner size={16}/>:readData.error?(
          <p className="text-xs text-red-400">{readData.error}</p>
        ):readData.readers.length===0?(
          <p className="text-xs text-gray-400">目前無人閱讀</p>
        ):(
          <div className="flex flex-wrap gap-1.5">{readData.readers.map(r=>(<span key={r.code} className="text-xs px-2.5 py-1 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-emerald-300 font-mono">{r.code}</span>))}</div>
        )}
      </div>

      <div className="glass-panel rounded-2xl p-4 space-y-3">
        <div className="flex items-center justify-between"><p className="text-xs font-bold text-amber-400">✕ 未閱讀名單</p>{unreadData&&!unreadData.error&&unreadData.total>0&&<div className="flex gap-2"><CopyBtn getText={unreadText}/><ShareLineBtn getText={unreadText}/></div>}</div>
        {unreadData===null?<Spinner size={16}/>:unreadData.error?(
          <p className="text-xs text-red-400">{unreadData.error}</p>
        ):(<>
          <p className="text-xs text-gray-400 font-medium">共計 {unreadData.total} 人尚未閱讀</p>
          {unreadData.day.length>0&&<div><p className="text-[11px] text-gray-400 mb-1">早班</p><div className="flex flex-wrap gap-1.5">{unreadData.day.map(c=>(<span key={c} className="text-xs px-2.5 py-1 rounded-lg glass-panel text-gray-300 font-mono">{c}</span>))}</div></div>}
          {unreadData.night.length>0&&<div><p className="text-[11px] text-gray-400 mb-1">晚班</p><div className="flex flex-wrap gap-1.5">{unreadData.night.map(c=>(<span key={c} className="text-xs px-2.5 py-1 rounded-lg glass-panel text-gray-300 font-mono">{c}</span>))}</div></div>}
          {unreadData.other.length>0&&<div><p className="text-[11px] text-gray-400 mb-1">未選班別</p><div className="flex flex-wrap gap-1.5">{unreadData.other.map(c=>(<span key={c} className="text-xs px-2.5 py-1 rounded-lg glass-panel text-gray-300 font-mono">{c}</span>))}</div></div>}
          {unreadData.total===0&&<p className="text-xs text-emerald-400 text-center py-2 font-semibold">✓ 全員皆已閱讀完成</p>}
        </>)}
      </div>
    </div>
  </div>);
}

function NoticeView({nid,userProfile}){
  const[notice,setNotice]=useState(undefined);
  useEffect(()=>{
    if(!nid){setNotice(null);return}
    fetch('../notices.json?t='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(data=>{
      const list=Array.isArray(data)?data:(data&&data.notices)||[];

      setNotice(found||null);
    }).catch(()=>setNotice(null));

  const lang=userProfile.lang||'zh';

}

function ShareFlow({nid}){
  const[status,setStatus]=useState('loading');
  const[err,setErr]=useState('');
  useEffect(()=>{
    getNoticeFlexContent(nid,LIFF_ID_HARDCODED).then(r=>{
      if(!r||!r.ok){setStatus('error');setErr((r&&r.error)||'讀取失敗');return}
      setStatus('picking');
      if(!(liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker'))){setStatus('error');setErr('當前環境不支援分享功能，請於 LINE App 內開啟');return}
      liff.shareTargetPicker([{type:'flex',altText:r.title,contents:r.flex}]).then(res=>{setStatus(res?'done':'cancelled')}).catch(e=>{setStatus('error');setErr(String(e&&e.message||e))});
    }).catch(e=>{setStatus('error');setErr(String(e))});
  },[]);
  return(<div className="min-h-screen flex flex-col items-center justify-center gap-4 p-6 text-center animate-fade-in">
    {status==='loading'&&(<> <Spinner size={36}/><p className="text-sm text-gray-400">正在生成分享內容…</p></>)}
    {status==='picking'&&(<> <Spinner size={36}/><p className="text-sm text-gray-400">請選擇欲分享的對象…</p></>)}
    {status==='done'&&( <p className="text-lg text-emerald-400 font-bold">✓ 分享完成</p> )}
    {status==='cancelled'&&( <p className="text-sm text-gray-400">已取消分享</p> )}
    {status==='error'&&( <p className="text-sm text-red-400">{err}</p> )}
    {(status==='done'||status==='cancelled'||status==='error')&&<button onClick={()=>{try{liff.closeWindow()}catch(_e){location.href=location.href.split('?')[0]}}} className="px-6 py-3 rounded-xl glass-panel text-gray-300 text-sm font-semibold active:scale-95 transition-all">關閉視窗</button>}
  </div>);
}

  const[liffErr,setLiffErr]=useState('');
  const nid=new URLSearchParams(location.search).get('nid')||'';
  const action=new URLSearchParams(location.search).get('action')||'';

  useEffect(()=>{
    const initLiff=(id)=>liff.init({liffId:id}).then(()=>{
      if(!liff.isLoggedIn()){liff.login({redirectUri:location.href});return}
      if(action==='share'){setPhase('share');return}
      if(action==='unread'){setPhase('unread');return}
      if(action==='read'){
        return liff.getProfile().then(p=>{setProfile(p);setPhase('read')});
      }
      return liff.getProfile().then(p=>{
        setProfile(p);setPhase('loading');
        return sfGetUser(p.userId).then(r=>{
          if(r&&r.ok&&r.exists){setUserProfile(r.profile);setPhase('main')}
          else{setPhase('register')}
        });
      });
    });
    if(LIFF_ID_HARDCODED){initLiff(LIFF_ID_HARDCODED).catch(err=>{setLiffErr(_fmtLiffErr(err));setPhase('error')});return;}
    sfConfig().then(cfg=>{
      const id=cfg&&cfg.ok?cfg.liffId:'';
      if(!id){setLiffErr('尚未設定 LIFF_ID');setPhase('error');return}
      return initLiff(id);
    }).catch(err=>{setLiffErr(_fmtLiffErr(err));setPhase('error')});
  },[]);

  if(phase==='error')return(<div className="min-h-screen flex items-center justify-center p-6 animate-fade-in"><p className="text-sm text-red-400 text-center glass-panel rounded-2xl p-6">{liffErr}</p></div>);
  if(phase==='liffInit'||phase==='loading')return(<div className="min-h-screen flex flex-col items-center justify-center gap-4"><div className="text-amber-500"><Spinner size={44}/></div><p className="text-sm text-gray-400 tracking-wider">系統載入中…</p></div>);
  if(phase==='share')return(<ShareFlow nid={nid}/>);
  if(phase==='unread')return(<UnreadListView nid={nid}/>);
  if(phase==='read')return(<ReadFlow nid={nid} profile={profile}/>);
  if(phase==='register')return(<RegisterFlow profile={profile} onDone={()=>{sfGetUser(profile.userId).then(r=>{if(r&&r.ok&&r.exists){setUserProfile(r.profile);setPhase('main')}})}}/>);
  return(<NoticeView nid={nid} userProfile={userProfile}/>);
}

class __EB extends React.Component{constructor(p){super(p);this.state={e:false}}static getDerivedStateFromError(){return{e:true}}componentDidCatch(err){try{window.__showFallback(3,{lineno:0,msg:(err&&err.message)||String(err)})}catch(e){}}render(){return this.state.e?null:this.props.children}}
ReactDOM.createRoot(document.getElementById('root')).render(<__EB><App/></__EB>);
})();
</script>
</body>
