<script>
  var PAGE="fd-liff",PCODE="04";
  window.__fbApply=function(){var t=document.getElementById('__fbtitle');if(t)t.textContent='網站更新中';if(window.__fbData){var info=document.getElementById("__fbinfo");if(info)info.textContent=window.__fbData.page+" 網頁 v"+window.__fbData.ver+" 更新中　代碼 "+window.__fbData.code;try{var md=document.getElementById("__fbmsg");if(md&&window.__fbData.msg){md.textContent=window.__fbData.msg;md.style.display="block";}}catch(_e){}}};
  window.__showFallback=function(src,detail){
    if(window.__shownFallback)return;window.__shownFallback=true;
    try{
      var ver=(document.title.match(/v?(\d+\.\d+[-.]\d+)/)||[])[1]||"?";
      var line=(detail&&detail.lineno)?detail.lineno:0;
      var ecode=PCODE+String(src).padStart(2,"0")+String(line%10000).padStart(4,"0");
      window.__fbData={page:PAGE,ver:ver,code:ecode,msg:(detail&&detail.msg)||''};
      var el=document.getElementById("__fallback");
      if(el){window.__fbApply();el.style.display="flex";}
    }catch(_e){}
  };
  window.addEventListener("error",function(e){window.__showFallback(1,{lineno:e.lineno,msg:(e.message||'')+(e.filename?(' @'+e.filename.split('/').pop()+':'+e.lineno+':'+e.colno):'')});},true);
</script>

<script type="text/babel">
(function(){
const{useState,useEffect,useMemo}=React;

const LIFF_ID_HARDCODED='2010673151-OMHcBUjJ'; // 需要另外申請一個LIFF App,Endpoint URL指到這個頁面的網址,填進來

const SHIFTS={
  A1:{name:'早班1',time:'08:00–18:00',pair:'A2',group:'morning'},
  A2:{name:'早班2',time:'10:00–20:00',pair:'A1',group:'morning'},

  C1:{name:'小夜1',time:'18:00–次日04:00',pair:null,group:'evening'},
  C2:{name:'小夜2',time:'18:00–次日04:00',pair:'D',group:'night'},

async function gasCall(action,params){const{gasCall:_c}=window.MP||{};const r=await _c(action,params||{},10000);return r||{ok:false,error:'GAS無回應'};}
async function gasCallPost(action,params){const{gasCallPost:_c}=window.MP||{};const r=await _c(action,params||{},15000);return r||{ok:false,error:'GAS無回應'};}
async function sfConfig(){return gasCall('sfConfig',{app:'frontdesk'});}
async function fdGetSelf(lineUserId){return gasCall('fdGetSelf',{lineUserId});}
async function fdRegister(data){return gasCallPost('fdRegister',data);}
async function fdCheckApproval(lineUserId){return gasCall('fdCheckApproval',{lineUserId});}
async function fdSubmitLeave(data){return gasCallPost('fdSubmitLeave',data);}
async function fdApproveLeave(id,approve,approver){return gasCallPost('fdApproveLeave',{id,approve,approver});}
async function fdListPendingLeaves(){return gasCall('fdListPendingLeaves',{});}
async function fdListPendingStaff(){return gasCall('fdListPendingStaff',{});}
async function fdApproveStaff(staffId,approve){return gasCallPost('fdApproveStaff',{staffId,approve});}
async function fdSetSupervisor(staffId,isSupervisor){return gasCallPost('fdSetSupervisor',{staffId,isSupervisor});}
async function fdAnnualUsage(staffId){return gasCall('fdAnnualUsage',{staffId});}
async function fdAnnualUsageAll(){return gasCall('fdAnnualUsageAll',{});}

const Spinner=({size})=>(<svg className="animate-spin" width={size||14} height={size||14} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeOpacity="0.3"/><path d="M12 2a10 10 0 0110 10" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/></svg>);
const pad2=(n)=>String(n).padStart(2,'0');
const ymd=(y,m,d)=>y+'-'+pad2(m)+'-'+pad2(d);
const todayYmd=()=>{const d=new Date();return ymd(d.getFullYear(),d.getMonth()+1,d.getDate())};

// ===== 本機PIN鎖(純本機,不存GAS) =====
const PIN_KEY='fd-lock-pin';
const LOCK_TS_KEY='fd-lock-ts';
const LOCK_AUTO_MIN=5;
function getPin(){try{return localStorage.getItem(PIN_KEY)||''}catch(_e){return ''}}
function setPin(p){try{localStorage.setItem(PIN_KEY,p)}catch(_e){}}
function touchUnlock(){try{localStorage.setItem(LOCK_TS_KEY,String(Date.now()))}catch(_e){}}
function isLocked(){
  const pin=getPin();
  if(!pin)return false;
  try{
    const ts=parseInt(localStorage.getItem(LOCK_TS_KEY)||'0',10);
    return (Date.now()-ts)>LOCK_AUTO_MIN*60*1000;
  }catch(_e){return false}
}

function LockScreen({onUnlock}){
  const[input,setInput]=useState('');
  const[err,setErr]=useState(false);
  const submit=(val)=>{
    if(val===getPin()){touchUnlock();onUnlock()}
    else{setErr(true);setInput('');setTimeout(()=>setErr(false),600)}
  };
  const press=(d)=>{
    const next=(input+d).slice(0,4);
    setInput(next);
    if(next.length===4)submit(next);
  };
  return(<div className="min-h-screen flex flex-col items-center justify-center gap-6 p-6">
    <p className="text-lg text-gray-300 font-semibold">請輸入密碼解鎖</p>
    <div className={`flex gap-3 ${err?'text-red-500':''}`}>{[0,1,2,3].map(i=>(<div key={i} className={`w-4 h-4 rounded-full border-2 ${input.length>i?'bg-amber-500 border-amber-500':'border-gray-600'}`}></div>))}</div>
    <div className="grid grid-cols-3 gap-4">{['1','2','3','4','5','6','7','8','9','','0','⌫'].map((k,i)=>k===''?<div key={i}/>:(
      <button key={i} onClick={()=>k==='⌫'?setInput(v=>v.slice(0,-1)):press(k)} className="w-16 h-16 rounded-full bg-white/[0.06] text-gray-200 text-xl font-semibold active:bg-white/[0.12]">{k}</button>
    ))}</div>
  </div>);
}

function PinSetup({onDone}){
  const[step,setStep]=useState(1);
  const[first,setFirst]=useState('');
  const[input,setInput]=useState('');
  const[err,setErr]=useState('');
  const press=(d)=>{
    const next=(input+d).slice(0,4);
    setInput(next);
    if(next.length===4){
      if(step===1){setFirst(next);setStep(2);setInput('')}
      else{
        if(next===first){setPin(next);touchUnlock();onDone()}
        else{setErr('兩次輸入不一致，請重新設定');setStep(1);setInput('');setFirst('')}
      }
    }
  };
  return(<div className="min-h-screen flex flex-col items-center justify-center gap-6 p-6">
    <p className="text-lg text-gray-300 font-semibold">{step===1?'設定4位數自動鎖屏密碼':'請再輸入一次確認'}</p>
    {err&&<p className="text-xs text-red-400">{err}</p>}
    <div className="flex gap-3">{[0,1,2,3].map(i=>(<div key={i} className={`w-4 h-4 rounded-full border-2 ${input.length>i?'bg-amber-500 border-amber-500':'border-gray-600'}`}></div>))}</div>
    <div className="grid grid-cols-3 gap-4">{['1','2','3','4','5','6','7','8','9','','0','⌫'].map((k,i)=>k===''?<div key={i}/>:(
      <button key={i} onClick={()=>k==='⌫'?setInput(v=>v.slice(0,-1)):press(k)} className="w-16 h-16 rounded-full bg-white/[0.06] text-gray-200 text-xl font-semibold active:bg-white/[0.12]">{k}</button>
    ))}</div>
  </div>);
}

function RegisterFlow({profile,onDone}){
  const[lastName,setLastName]=useState('');
  const[firstName,setFirstName]=useState('');
  const[nickname,setNickname]=useState('');
  const[hireDate,setHireDate]=useState('');
  const[shift,setShift]=useState('');
  const[phone,setPhone]=useState('');
  const[mgmtOnly,setMgmtOnly]=useState(false);
  const[busy,setBusy]=useState(false);const[err,setErr]=useState('');
  const canSubmit=lastName.trim()&&firstName.trim()&&(mgmtOnly||(hireDate&&shift));
  const submit=async()=>{
    if(!canSubmit)return;
    setBusy(true);setErr('');
    try{
      const r=await fdRegister({lineUserId:profile.userId,phone:phone.trim(),lastName:lastName.trim(),firstName:firstName.trim(),nickname:nickname.trim(),hireDate,shift,isManagementOnly:mgmtOnly});
      if(r&&r.ok){onDone()}else{setErr((r&&r.error)||'登記失敗')}
    }catch(e){setErr(String(e))}
    setBusy(false);
  };
  return(<div className="min-h-screen flex items-center justify-center p-4">
    <div className="w-full max-w-md bg-gray-900 rounded-2xl border border-white/[0.08] p-5 space-y-4">
      <h1 className="text-lg font-bold text-gray-100 text-center">櫃台人員登記</h1>
      <div className="grid grid-cols-2 gap-2"><input value={lastName} onChange={e=>setLastName(e.target.value)} placeholder="姓" className="bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-3 text-sm text-gray-100"/><input value={firstName} onChange={e=>setFirstName(e.target.value)} placeholder="名" className="bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-3 text-sm text-gray-100"/></div>
      <input value={nickname} onChange={e=>setNickname(e.target.value)} placeholder="暱稱（不填自動取名字最後一字）" className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-3 text-sm text-gray-100"/>
      <input value={phone} onChange={e=>setPhone(e.target.value.replace(/[^\d]/g,''))} inputMode="numeric" placeholder="手機（聯絡用，選填）" className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-3 text-sm text-gray-100"/>
      <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={mgmtOnly} onChange={e=>setMgmtOnly(e.target.checked)} className="w-4 h-4 rounded accent-amber-500"/><span className="text-sm text-gray-300">此帳號僅用於管理，不需排班／排休</span></label>
      {!mgmtOnly&&(<>
        <div><label className="text-xs text-gray-500 block mb-1">到職日</label><input type="date" value={hireDate} onChange={e=>setHireDate(e.target.value)} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-xl px-3 py-3 text-sm text-gray-100"/></div>
        <div><label className="text-xs text-gray-500 block mb-1">班別</label><div className="grid grid-cols-3 gap-2">{SHIFT_ORDER.map(s=>(<button key={s} onClick={()=>setShift(s)} className={`py-2.5 rounded-xl text-xs font-semibold ${shift===s?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{s} {SHIFTS[s].name}</button>))}</div></div>
      </>)}
      {err&&<p className="text-xs text-red-400 text-center">{err}</p>}
      <button onClick={submit} disabled={!canSubmit||busy} className="w-full py-3.5 rounded-xl bg-amber-600 text-white font-bold disabled:opacity-50 flex items-center justify-center gap-2">{busy&&<Spinner/>}完成登記</button>
    </div>
  </div>);
}

function PendingScreen({profile,onApproved}){
  const[msg,setMsg]=useState('');
  const[busy,setBusy]=useState(false);
  const[cooldown,setCooldown]=useState(0);
  useEffect(()=>{
    if(cooldown<=0)return;
    const t=setTimeout(()=>setCooldown(c=>c-1),1000);
    return()=>clearTimeout(t);
  },[cooldown]);
  const check=async()=>{
    if(cooldown>0||busy)return;
    setBusy(true);
    try{
      const r=await fdCheckApproval(profile.userId);
      if(r&&r.ok&&r.status==='approved'){onApproved();return}
      if(r&&r.ok&&r.status==='rejected'){setMsg('很抱歉，你的申請未通過審核，請聯繫櫃台組長')}
      else{setMsg('尚未核准，請耐心等候')}
    }catch(_e){setMsg('查詢失敗')}
    setBusy(false);setCooldown(60);
  };
  return(<div className="min-h-screen flex flex-col items-center justify-center gap-4 p-6 text-center">
    <p className="text-2xl">⏳</p>
    <p className="text-base text-gray-200 font-semibold">帳號待審核中</p>
    <p className="text-sm text-gray-500">請等候櫃台組長核准後即可使用完整功能</p>
    <button onClick={check} disabled={busy||cooldown>0} className="px-6 py-3 rounded-xl bg-white/[0.06] text-gray-300 text-sm font-semibold disabled:opacity-50 flex items-center gap-2">{busy&&<Spinner size={12}/>}{cooldown>0?`請稍候 ${cooldown} 秒`:'檢查審核情形'}</button>
    {msg&&<p className="text-xs text-amber-400">{msg}</p>}
  </div>);
}

// ===== 月曆元件 =====
function buildGrid(year,month){
  const firstWeekday=new Date(year,month-1,1).getDay();
  const daysInMonth=new Date(year,month,0).getDate();
  const prevMonthDays=new Date(year,month-1,0).getDate();
  const cells=[];
  for(let i=firstWeekday-1;i>=0;i--)cells.push({day:prevMonthDays-i,inMonth:false,dateStr:null});
  for(let d=1;d<=daysInMonth;d++)cells.push({day:d,inMonth:true,dateStr:ymd(year,month,d)});
  let nextDay=1;
  while(cells.length%7!==0){cells.push({day:nextDay,inMonth:false,dateStr:null});nextDay++;}
  return cells;
}

function CalendarTab({myStaff}){
  const now=new Date();
  const[year,setYear]=useState(now.getFullYear());
  const[month,setMonth]=useState(now.getMonth()+1);
  const[data,setData]=useState(null);
  const[filter,setFilter]=useState('all'); // all/morning/night/staffId
  const[threshold,setThreshold]=useState(3);
  const[busyOff,setBusyOff]=useState('');
  const load=()=>{setData(null);fdMonthData(year,month).then(r=>{if(r&&r.ok)setData(r)})};
  useEffect(()=>{load()},[year,month]);
  const grid=useMemo(()=>buildGrid(year,month),[year,month]);
  const filteredStaff=useMemo(()=>{
    if(!data)return [];
    if(filter==='all')return data.staff;
    if(filter==='morning')return data.staff.filter(s=>s.shift==='A1'||s.shift==='A2');
    if(filter==='night')return data.staff.filter(s=>s.shift==='C2'||s.shift==='D');
    return data.staff.filter(s=>s.id===filter);
  },[data,filter]);
  const changeMonth=(delta)=>{
    let m=month+delta,y=year;
    if(m<1){m=12;y--;} if(m>12){m=1;y++;}
    setYear(y);setMonth(m);
  };
  const dayInfo=(dateStr)=>{
    if(!data||!dateStr)return {count:0,entries:[]};
    const offIds=data.offMap[dateStr]||[];
    const leaves=(data.leaveMap[dateStr]||[]);
    const approvedAnnualIds=leaves.filter(l=>l.type==='annual'&&l.status==='approved').map(l=>l.staffId);
    const pendingAnnualIds=leaves.filter(l=>l.type==='annual'&&l.status==='pending').map(l=>l.staffId);
    const otherLeaveIds=leaves.filter(l=>l.type!=='annual').map(l=>l.staffId);
    const relevantIds=filteredStaff.map(s=>s.id);
    const countIds=new Set([...offIds,...approvedAnnualIds].filter(id=>relevantIds.includes(id)));
    const entries=filteredStaff.map(s=>{
      const isOff=offIds.includes(s.id);
      const isApprovedAnnual=approvedAnnualIds.includes(s.id);
      const isPendingAnnual=pendingAnnualIds.includes(s.id);
      const isOtherLeave=otherLeaveIds.includes(s.id);
      const supportKey=s.id+'_'+dateStr;
      const support=data.supportMap[supportKey];
      let label='';
      if(isOff)label='休';else if(isApprovedAnnual)label='特';else if(isPendingAnnual)label='待';
      if(support)label=(label?label+' ':'')+'支'+support;
      return {staff:s,label};
    }).filter(e=>e.label);
    return {count:countIds.size,entries:entries};
  };
  const toggleOff=(dateStr)=>{
    if(!myStaff||myStaff.isManagementOnly)return;
    setBusyOff(dateStr);
    const isOff=(data.offMap[dateStr]||[]).includes(myStaff.id);
    fdSetScheduleOff(myStaff.id,dateStr,!isOff).then(()=>{load();setBusyOff('')}).catch(()=>setBusyOff(''));
  };
  return(<div className="space-y-3">
    <div className="flex items-center justify-between"><button onClick={()=>changeMonth(-1)} className="px-3 py-1.5 rounded-lg bg-white/[0.06] text-gray-300">‹</button><p className="text-base font-bold text-gray-100">{year}年{month}月</p><button onClick={()=>changeMonth(1)} className="px-3 py-1.5 rounded-lg bg-white/[0.06] text-gray-300">›</button></div>
    <div className="flex gap-2 items-center">
      <select value={filter} onChange={e=>setFilter(e.target.value)} className="flex-1 bg-white/[0.06] border border-white/[0.08] rounded-lg px-2 py-2 text-xs text-gray-200">
        <option value="all">所有人</option><option value="morning">早上組（A1+A2）</option><option value="night">晚上組（C2+D）</option>
        {data&&data.staff.map(s=>(<option key={s.id} value={s.id}>{s.lastName}{s.firstName}（{s.nickname}）</option>))}
      </select>
      <div className="flex items-center gap-1 flex-shrink-0"><span className="text-[10px] text-gray-500">門檻</span><input type="number" value={threshold} onChange={e=>setThreshold(parseInt(e.target.value,10)||1)} className="w-12 bg-white/[0.06] border border-white/[0.08] rounded-lg px-1 py-1.5 text-xs text-gray-200 text-center"/></div>
    </div>
    {!data?<p className="text-xs text-gray-600 text-center py-8"><Spinner size={20}/></p>:(<>
    <div className="grid grid-cols-7 gap-1 text-center">{WEEKDAY_LABEL.map(w=>(<div key={w} className="text-[11px] text-gray-500 py-1">{w}</div>))}</div>
    <div className="grid grid-cols-7 gap-1">
      {grid.map((c,i)=>{
        const info=c.inMonth?dayInfo(c.dateStr):{count:0,entries:[]};
        const warn=c.inMonth&&info.count<=threshold;
        const isMine=myStaff&&c.dateStr&&(data.offMap[c.dateStr]||[]).includes(myStaff.id);
        return(<div key={i} onClick={()=>c.inMonth&&toggleOff(c.dateStr)} className={`rounded-lg p-1 min-h-[64px] text-left cursor-pointer ${c.inMonth?(warn?'bg-red-500/10':'bg-white/[0.03]'):'opacity-30'} ${isMine?'ring-1 ring-amber-500':''}`}>
          <p className={`text-[11px] font-semibold ${!c.inMonth?'text-gray-600':warn?'text-red-400 fd-blink':'text-gray-300'}`}>{c.day}{busyOff===c.dateStr&&<Spinner size={8}/>}</p>
          <div className="space-y-0.5 mt-0.5">{info.entries.slice(0,4).map((e,j)=>(<p key={j} className="text-[9px] text-gray-400 leading-tight truncate">{e.staff.nickname}{e.label}</p>))}{info.entries.length>4&&<p className="text-[9px] text-gray-600">+{info.entries.length-4}</p>}</div>
        </div>);
      })}
    </div>
    <div className="space-y-1 pt-2">
      {grid.filter(c=>c.inMonth).map(c=>{const info=dayInfo(c.dateStr);return c.count<=threshold?(
        <p key={c.dateStr} className="text-[11px] text-red-400">⚠️ {month}/{c.day} 人力低於最低配置人力：當天排休有 {info.entries.map(e=>e.staff.nickname).join('、')}</p>
      ):null;})}
    </div>
    {myStaff&&!myStaff.isManagementOnly&&<p className="text-[10px] text-gray-600 text-center">點日期可以排休/取消排休（自己的班別才會生效）</p>}
    </>)}
  </div>);
}

function LeaveTab({myStaff}){
  const[type,setType]=useState('personal');
  const[date,setDate]=useState(todayYmd());
  const[hours,setHours]=useState('8');
  const[reason,setReason]=useState('');
  const[busy,setBusy]=useState(false);const[msg,setMsg]=useState('');
  const[usage,setUsage]=useState(null);
  useEffect(()=>{if(myStaff)fdAnnualUsage(myStaff.id).then(r=>{if(r&&r.ok)setUsage(r.usage)})},[myStaff]);
  const submit=async()=>{
    setBusy(true);setMsg('');
    try{
      const r=await fdSubmitLeave({staffId:myStaff.id,type,date,hours:parseFloat(hours)||8,reason});
      if(r&&r.ok){setMsg('✓ 已送出，等候核准');setReason('')}else{setMsg(r&&r.error||'送出失敗')}
    }catch(e){setMsg(String(e))}
    setBusy(false);
  };
  return(<div className="space-y-4">
    {usage&&<div className="bg-white/[0.03] rounded-xl p-3"><p className="text-xs text-gray-500">特休剩餘</p><p className="text-lg text-amber-400 font-bold">{usage.remaining} <span className="text-xs text-gray-500">/ {usage.total} 天</span></p></div>}
    <div className="bg-white/[0.03] rounded-xl p-3 space-y-3">
      <p className="text-sm text-gray-300 font-semibold">請假申請</p>
      <div className="grid grid-cols-3 gap-2">{Object.keys(LEAVE_TYPE_LABEL).map(k=>(<button key={k} onClick={()=>setType(k)} className={`py-2 rounded-lg text-xs font-semibold ${type===k?'bg-amber-600 text-white':'bg-white/[0.06] text-gray-400'}`}>{LEAVE_TYPE_LABEL[k]}</button>))}</div>
      <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-lg px-3 py-2 text-sm text-gray-100"/>
      <div><label className="text-xs text-gray-500 block mb-1">時數（整天填8）</label><input type="number" value={hours} onChange={e=>setHours(e.target.value)} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-lg px-3 py-2 text-sm text-gray-100"/></div>
      <textarea value={reason} onChange={e=>setReason(e.target.value)} placeholder="事由（選填）" rows={2} className="w-full bg-white/[0.06] border border-white/[0.08] rounded-lg px-3 py-2 text-sm text-gray-100 resize-none"/>
      {msg&&<p className="text-xs text-center text-amber-400">{msg}</p>}
      <button onClick={submit} disabled={busy} className="w-full py-2.5 rounded-xl bg-amber-600 text-white text-sm font-bold disabled:opacity-50 flex items-center justify-center gap-2">{busy&&<Spinner/>}送出申請</button>
    </div>
  </div>);
}

function AnnualAllTab(){
  const[list,setList]=useState(null);
  useEffect(()=>{fdAnnualUsageAll().then(r=>{if(r&&r.ok)setList(r.list)})},[]);
  return(<div className="space-y-2">
    <p className="text-sm text-gray-300 font-semibold">特休使用總表</p>
    {list===null?<Spinner size={20}/>:list.map(u=>(
      <div key={u.id} className="bg-white/[0.03] rounded-lg px-3 py-2 flex items-center justify-between"><p className="text-sm text-gray-200">{u.name}（{u.nickname}）</p><p className="text-xs text-gray-400">已用{u.used}／總{u.total}天，剩{u.remaining}天</p></div>
    ))}
  </div>);
}

function ApprovalTab({myStaff}){
  const[pendingStaff,setPendingStaff]=useState(null);
  const[pendingLeaves,setPendingLeaves]=useState(null);
  const load=()=>{fdListPendingStaff().then(r=>{if(r&&r.ok)setPendingStaff(r.list)});fdListPendingLeaves().then(r=>{if(r&&r.ok)setPendingLeaves(r.list)})};
  useEffect(()=>{load()},[]);
  const doStaff=(id,ok)=>{fdApproveStaff(id,ok).then(load)};
  const doLeave=(id,ok)=>{fdApproveLeave(id,ok,myStaff.nickname).then(load)};
  return(<div className="space-y-4">
    <div>
      <p className="text-sm text-gray-300 font-semibold mb-2">待審核帳號（{pendingStaff?pendingStaff.length:0}）</p>
      {pendingStaff===null?<Spinner size={16}/>:pendingStaff.length===0?<p className="text-xs text-gray-600">目前沒有待審核帳號</p>:pendingStaff.map(s=>(
        <div key={s.id} className="bg-white/[0.03] rounded-lg px-3 py-2 flex items-center justify-between mb-1.5"><p className="text-sm text-gray-200">{s.lastName}{s.firstName}（{s.nickname}）{s.isManagementOnly?'・管理專用':('・'+(SHIFTS[s.shift]||{}).name)}</p><div className="flex gap-1.5"><button onClick={()=>doStaff(s.id,false)} className="text-[11px] px-2 py-1 rounded bg-white/[0.08] text-gray-400">拒絕</button><button onClick={()=>doStaff(s.id,true)} className="text-[11px] px-2 py-1 rounded bg-emerald-600/20 text-emerald-400">核准</button></div></div>
      ))}
    </div>
    <div>
      <p className="text-sm text-gray-300 font-semibold mb-2">待審核請假（{pendingLeaves?pendingLeaves.length:0}）</p>
      {pendingLeaves===null?<Spinner size={16}/>:pendingLeaves.length===0?<p className="text-xs text-gray-600">目前沒有待審核請假</p>:pendingLeaves.map(l=>(
        <div key={l.id} className="bg-white/[0.03] rounded-lg px-3 py-2 mb-1.5"><div className="flex items-center justify-between"><p className="text-sm text-gray-200">{l.staffName}・{LEAVE_TYPE_LABEL[l.type]}・{l.date}</p><div className="flex gap-1.5"><button onClick={()=>doLeave(l.id,false)} className="text-[11px] px-2 py-1 rounded bg-white/[0.08] text-gray-400">拒絕</button><button onClick={()=>doLeave(l.id,true)} className="text-[11px] px-2 py-1 rounded bg-emerald-600/20 text-emerald-400">核准</button></div></div>{l.reason&&<p className="text-[11px] text-gray-500 mt-1">{l.reason}</p>}</div>
      ))}
    </div>
  </div>);
}

function MainApp({myStaff}){
  const isSupervisor=myStaff.role==='supervisor';
  const[tab,setTab]=useState('calendar');
  const TABS=[['calendar','月曆'],['leave','請假'],['annual','特休總表']];
  if(isSupervisor)TABS.push(['approval','審核']);
  return(<div className="min-h-screen p-4 pb-10">
    <div className="max-w-md mx-auto space-y-4">
      <div className="flex items-center justify-between"><h1 className="text-base font-bold text-gray-100">櫃台差勤</h1><p className="text-xs text-gray-500">{myStaff.lastName}{myStaff.firstName}（{myStaff.nickname}）{isSupervisor?'・組長':''}</p></div>
      <div className="grid gap-1.5" style={{gridTemplateColumns:`repeat(${TABS.length},1fr)`}}>{TABS.map(([k,l])=>(<button key={k} onClick={()=>setTab(k)} className={`py-2 rounded-lg text-xs font-semibold ${tab===k?'bg-amber-600 text-white':'bg-white/[0.05] text-gray-400'}`}>{l}</button>))}</div>
      {tab==='calendar'&&<CalendarTab myStaff={myStaff}/>}
      {tab==='leave'&&<LeaveTab myStaff={myStaff}/>}
      {tab==='annual'&&<AnnualAllTab/>}
      {tab==='approval'&&isSupervisor&&<ApprovalTab myStaff={myStaff}/>}
    </div>
  </div>);
}

function App(){
  const[phase,setPhase]=useState('liffInit');
  const[profile,setProfile]=useState(null);
  const[myStaff,setMyStaff]=useState(null);
  const[liffErr,setLiffErr]=useState('');
  const[locked,setLocked]=useState(false);

  useEffect(()=>{
    const initLiff=(id)=>liff.init({liffId:id}).then(()=>{
      if(!liff.isLoggedIn()){liff.login({redirectUri:location.href});return}
      return liff.getProfile().then(p=>{
        setProfile(p);setPhase('loading');
        return fdGetSelf(p.userId).then(r=>{
          if(r&&r.ok&&r.exists){
            setMyStaff(r.profile);
            if(r.profile.status!=='approved'){setPhase('pending');return}
            if(!getPin()){setPhase('pinSetup');return}
            if(isLocked()){setLocked(true)}else{touchUnlock()}
            setPhase('main');
          }else{setPhase('register')}
        });
      });
    });
    if(LIFF_ID_HARDCODED){initLiff(LIFF_ID_HARDCODED).catch(err=>{setLiffErr(String(err&&err.message||err));setPhase('error')});return;}
    sfConfig().then(cfg=>{
      const id=cfg&&cfg.ok?cfg.liffId:'';
      if(!id){setLiffErr('尚未設定LIFF_ID_FRONTDESK指令碼屬性');setPhase('error');return}
      return initLiff(id);
    }).catch(err=>{setLiffErr(String(err&&err.message||err));setPhase('error')});
  },[]);

  // 閒置偵測:任何互動時更新解鎖時間戳記,但只在main phase生效
  useEffect(()=>{
    if(phase!=='main'||locked)return;
    const touch=()=>touchUnlock();
    const iv=setInterval(()=>{if(isLocked())setLocked(true)},15000);
    window.addEventListener('click',touch);window.addEventListener('touchstart',touch);
    return()=>{clearInterval(iv);window.removeEventListener('click',touch);window.removeEventListener('touchstart',touch)};
  },[phase,locked]);

  if(phase==='error')return(<div className="min-h-screen flex items-center justify-center p-6"><p className="text-sm text-red-400 text-center">{liffErr}</p></div>);
  if(phase==='liffInit'||phase==='loading')return(<div className="min-h-screen flex flex-col items-center justify-center gap-4"><div className="text-amber-500"><Spinner size={40}/></div><p className="text-base text-gray-400">載入中…</p></div>);
  if(phase==='register')return(<RegisterFlow profile={profile} onDone={()=>{setPhase('pinSetup')}}/>);
  if(phase==='pending')return(<PendingScreen profile={profile} onApproved={()=>{fdGetSelf(profile.userId).then(r=>{if(r&&r.ok&&r.exists){setMyStaff(r.profile);setPhase('pinSetup')}})}}/>);
  if(phase==='pinSetup')return(<PinSetup onDone={()=>setPhase('main')}/>);
  if(locked)return(<LockScreen onUnlock={()=>setLocked(false)}/>);
  return(<MainApp myStaff={myStaff}/>);
}

class __EB extends React.Component{constructor(p){super(p);this.state={e:false}}static getDerivedStateFromError(){return{e:true}}componentDidCatch(err){try{window.__showFallback(3,{lineno:0,msg:(err&&err.message)||String(err)})}catch(e){}}render(){return this.state.e?null:this.props.children}}
ReactDOM.createRoot(document.getElementById('root')).render(<__EB><App/></__EB>);
})();
</script>
</body>
